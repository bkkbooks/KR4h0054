body:
  text: 江湖後集卷二十二宋陳起撰俞桂桂字睎郤仁和人紹定五年進士有漁溪詩稿見遺書本茲葺自永樂大典中補詩八首採蓮曲朝露濕妾衣暮霞耀妾矚一葉小如瓜去住無拘束兀棹歌採菱襲襲薰風足蘆葉映港清捉對鴛鴦浴蓮中有苦心欲折手還曲折蓮恐傷藕藕斷絲難續平湖渺渺蓮風清花開映日紅妝明一雙鸂鶒忽飛去為驚花底蘭橈鳴蘭橈蕩漾誰家女雲妥髻鬟黛睂嫵采采荷花滿袖香荷深忘却歸時路西湖西畔荷花多扣舷女兒嬌唱歌道旁駿馬金叵羅欲住不住橫秋波放船却入花深處臨流照妝噤不語南山起雲北山雨折得荷花不歸去弄波驚起鴛鴦雙水珠濺濕芙蓉裳恨無飛羽致汝旁遡洄從之雲路長西風引袂涼雲起鴛槳扶船浮淥水露沁花脂茜粉香滿柄鋒芒刺葱指紅綃半妥金釧明堤上六郎窺唱聲湘中暮雨歡期失各自東西空目成船蕩波心烟漠漠歸路花從唱邉落緑艷紅妖江水深水砥靈均應不覺女伴歌採蓮清聲度流水無意驚鴛鴦鴛鴦自飛起荷葉籠頭學道情花妝那似妾妝清雙雙頭白猶交頸翻笑鴛鴦不老成拗落圓房響釧金背人細數子藏深不嫌到手多尖刺祇怕傷人有苦心提幹漁溪不涉驚濤心自穩栁隂隂處著孤舟的知世路多機穽一線閒名付直鈎武衍衍字朝宗汴人遺書本所載適安藏拙餘稿一卷皆絶句適安乙藳一卷古今詩兹葺自永樂大典中者題曰適安藏拙餘藳續卷乃世所行本不復見者也白鶴愁白鶴愁竹櫳窄凋𤣥裳緇素翮夕陽移影瘦空庭秋草碧白鶴愁竹櫳低秋夜清思歸飛天風吹夢落明月冷瑤池題楊伯起菊莊圖落落莊中人英英霜下傑酌水擷清露餐香帶寒月頽齡良可制髙興未渠輟醉幘岸西風長吟鬢吹雪復歸絲桐原注琴名玉壺氷藝居以詩見賀紀述備盡報以長篇兼簡葵窗爨桐制作妙莫傳冥搜恰恰三十年大雷小雷不可見一生夢想空流涎玉壺氷本王氏物指下琅然頗清越不知傳來凡幾姓隱隱蛇跗細如髮銅駝陌上春風和湖邉得侣相委蛇古囊提携帶詩酒一時樂事何其多座有知音豈容已滕上泠泠寫流水夕陽催雨入烟城回憶清歡如夢裏孟光有問我獲疑匣中朱絲胡不歸鄰翁篝燈出相慰官河櫂夫猶可追踉蹡十里夜幾午認得登舟元處所始知尤物果纍人終喜明珠還合浦拂拭徽絃正孤坐欲記微吟未成課忽聞風外剝啄聲報道藝居以詩賀謝藝居惠歙石廣香家無長物祇書卷又無良田惟破硯寥寥此道人共嗤君獨相憐復相善鄴侯架中三萬籖半是生平未曽見一癡容借印疑似留客談𤣥坐忘倦探懷忽出片石方雙池絲刷潤且光芙蓉溪深古坑逺論新品舊殊未遑慷慨珍投意何永更配畨禺心字餅歸來喜歡舉廢典春雨書樓閟深靜手抄羲經誤未刋塵侵商鬲灰久寒便燒團煤炙雲母旋滴清泉凝露漙㸃朱塗黃細商確時有烟絲裊風幕心融終日遊聖涯恍若置身天祿閣謝秀松庵蒲大韶墨古來墨工號竒手廷圭仲將骨已朽老蒲近世曽獨步伐盡西岷古松肘天收此老五十年膠法源流無復有松庵講師出一挺自說藏來為最久聮翩雙鳯飛雲頭覢若光醫照忩牖後來制作無此樣盈尺笏􅀈堅且厚十年一寸玉不如持以衒人人識否誠齊有詩昔曽誦始信得名渠不苟松庵識人欲炙色勇割見投歸我袖摩挲把玩何時休巾襲永言珍所授一生當著幾兩屐性嗜逺慚蘇子後家有中巖舊坑硯歸試寒忩雲碧溜却愁癡坐學臨書畫竹不成徒似栁月中桂詩人欲斫月中桂不知上有西河生年年奮斤伐仙樹帝愁桂長侵蟾精今夕月團團似扇桂影分明月中見廣庭香薄悲姮娥留得喬枝罩孤殿題薛益齊所藏馬逺夜潮圖兼簡方孤雲海天雲刷青漫漫天風飛上白玉盤濕銀山橫出空濶蕩來一色涵芒寒錢塘江頭竒絶者費盡丹青最難寫是誰吮筆貌天真應奉上方人姓馬馬生後進甲等倫妙處或能肩古人當時運意入縑素浩然心府空無塵壁間挂起忽驚異秋色滿堂醒客醉請君收卷勿復觀中有鴟夷千古泪有所思寄二琴友懷伊人兮在帝鄉山月白兮秋夜長流泉響絶橫秋牀感而不寐摧我腸美人遺我正始音何以報之百鍊金相暌相離兮嵗月深欲往從之兮夢難尋懷伊人兮在東粵山月出兮寒照雪匣塵不拂朱絲折感而不寐心悁結美人贈我璠璵樂何以報之和氏璞相思相望兮天一角欲往從之兮雲路邈次韻簡吳靜庵氷雪親𤣥論塵埃洗客衣幾回晨見速長是晚忘歸壺裏春常在人間事盡揮樊籠狂閙者回首悟前非畫展唐摩詰書藏晉右軍滿樓宣賜物插架古遺文竹影三更月爐香一縷雲有誰知此趣孤鶴語殷勤次藝居湖中韻放櫂湖心去風恬雨盡時插天青嶂合戀水白雲飛酬酢杯頻舉摴蒲局屢移碧蓮香不斷歸路浥人衣送汪謙齊赴松陽簿愛爾名家千里駒别親逺宦問津初要知撫字覘為錦豈但勾稽事出朱青眼相逢須入幕緑窗得暇且觀書故人此外無他屬嵐翠髙寒保二雛謝友人惠簟兼簡儲文卿風蹙秋波細織成展來堂上眼增明若因古制當為席或用方言强作笙居士未眠心已爽此君到死骨猶清呼兒掃淨池軒上便欲移床聽雨聲遇故人㑹飲分韻得山字賸呼歡伯作清歡百日終無此日閒苦被俗緣欺緑髮莫談世事對青山一天秋色鴈聲外十里香風桂子間光景易流人易散杖頭須帶夕陽還琴川致道觀簡葉制幾巋然樓殿壓崇岡八百年來古道場三級危壇封翠蘚七星靈檜滴清霜丹空緑合人何在塵滿朱欄井尚香絶愛隂符碑字古每來模索立修廊送汪耘業赴畨易判官栁寒莫折折官梅持贈君行盡此杯惜别不能無泪落相逢難得便心開改絃作意趨元幕通籍那愁滯逺才指㸃芝山應更喜板輿迎自日邉來白髮詩白髮晶晶抑可吁鑷來渾覺鬢邉踈近緣病起頻添此全謂吟多枉謗渠老境漸侵羞覽鏡清晨閒理不勝梳頭顱如許真堪笑猶向書中作蠧魚觀棊洞口雲深晝景遲支笻閒看野人棋路無寬褊眼須活機有淺深心自知忽忽滿盤紛黑白明明一著繫安危要當險處精神到何用頻更局面為憶舊逰二十年前氣頗豪每逢潮上客相招松間躍馬逰三竺花底移舟醉六橋拂壁便題誇得句扣舷相和索吹簫欲尋此樂何時再對水看山意未消宜永雜興雙蝶來何許騰騰翅粉妍驀然風逴去却在楝花邉簷隙蒲蘆祝籬根熠耀飛靜中觀物化頗亦見天機竹偃竿竿碧柳搖穗穗紅午過書未讀清坐一簾風臨字每僵指鍊詩常斷鬚不知勤苦學學到古人無呼猿洞雲褁諸峯冷未開洞深無路陟崔嵬杖藜斸石驚猿去却倩山僧喚得回積雪折竹有感清修抱節碧欄東積雪俄摧玉一叢擬奏通明劾滕六祇愁天路有剛風寓吳氏園杏花風裏蝶翻翻池館無人自往還不把詩來供日課也難消遣許多閒寄畨昜判官汪耘業賞音投合事非難五鶚齊鳴上九關從此暮雲休悵望春風催入紫宸班跋龍眠春牧圗鐡脊驕驄玉面騾分明相逐下晴坡當時不聽支郎語駿骨人間應是多冷泉亭鳥語泉聲自抑揚松風時拂藥花香老僧坐足歸寮去替與逰人憩晚涼清湖兩河秋水碧瀜瀜鑿得西湖一脈通流去有聲曽細聽市橋人靜月明中逰南山屐齒黏雲上石梯躋攀巉絶立移時好竒一世應成癖咋指從來笑退之上山得似下山輕不用笻枝緩緩行行到水邉才覺倦却浮一葉指煙城金林檎花半拂焉支帶露香玉環春晚試新妝三郎晚節無公論剛把豐肌比海棠步虛詞四闋夀吳靜庵朝元天路慶雲多桂樹吹香冷鬱羅應為仙翁今日夀玲玲環佩下星河紫鳯銜書出九關頻年光動虎林山龍奎錫號恩雖異自視浮榮祇等閒欲識吾庵以靜名內觀何有外無形探天别得長生訣獨抱清明合至靈金簡標名玉篆階莫將松鶴擬年華逍遙太極秋光裏細挹天漿對菊花恭謝慶成詩十闋二載明禋帝意専瓣香合謝祖宗前向來盛典從頭數紹述應須億萬年麝蠟籠紗粲玉階珠櫳齊撤九門開一天星斗明如月法駕徐檠出殿來宫監推簾探曉星景陽鐘動已妝成鳯輿陸續銜車馬黃道香濃尾駕行禮成列聖宴羣工浩蕩春風到竹宫傳㫖簮花俄似錦信知天子是天公大官宣勸禮優寬中殿妃嬪各盡歡和氣滿城天色好不妨直際晚回鑾樂奏仙韶進夀觥觚稜風細寶香清隔簾微見龍顏啓緣是優人有笑聲宫前儀衛尚般還花裏聲傳午漏殘見說御園才放水聖心遊泳正觀瀾染羅雕草斡天機簇戴工夫鬬出竒惟有近臣恩數異尚方别賜細欒枝小白長紅十里春歸來天仗擁香塵翩翩黃屋彤霞裏輦上無花止一人士庶重重間綺羅霽光熏作小春和御街兩行瞻天表比似前回人更多蠟梅二絶句磬口檀心紫暈重繁香微泄繡簾風照花休用添紅燭却怕輕明暖易融賦得姿容類至中哨枝宿葉又春風品題雖入江梅譜可惜名同韻不同逰吳門同樂園書池光亭壁呈使君張都承一城和氣萬花春金碧樓臺處處新太守不孤同樂意木蘭堂上看逰人書扇榴花枝上雨𡨕迷睡起鈎簾放燕歸簷玉無聲忩几潤一篝香靄自熏衣江湖後集卷二十二
