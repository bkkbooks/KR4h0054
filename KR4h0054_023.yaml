body:
  text: 江湖後集卷二十三宋陳起撰吳仲孚仲孚字惟信霅川人仲方之弟有菊潭詩集見遺書本兹葺自永樂大典中補詩五首呈䝉齊出處真麟鳯詩書得正傳仁心全造化風骨半神仙門柳搖春雨庭花鎖暮烟雲臺非隱地即日帝王宣上湖守趙希蒼方今選牧匪為輕果見名邦付老成白髮益堅憂國念丹心常藴愛君誠月遷花影龎無吠風舞棠隂鶴自行看著碧瀾堂下水與君政事一般清德大才優世所宗漢唐諸老莫如公高明正直行王事耿介清廉繼父風六邑人居條教內萬家春出笑談中即看詔促歸清禁手把梅花馬首東上高疏寮處州守神仙來守神仙地銘石庭空畫㦸森道接聖賢韓愈學詩關風教杜陵心二年鼓角傳清調萬古溪山得賞音即有詔書催入覲金蓮夜草玉堂深呈嶽總卿黃塵漠漠路漫漫舊釣空思水國寒鄉信不來雲樹逺斜陽無語下欄干胡仲參仲參字希道清源人仲弓之弟有竹莊小藁見遺書本茲葺自永樂大典中補詩五首吳王試劒石吳王鑄劒成自謂古難比試之髙山巔石裂斷橫理那無昔時人相逢干將里故宫宫中白日長春風野田百草香有誰慷慨不平事被褐踏花推酒缸次林庭植留别韻麯生皆可醉何必問醇醨浩氣長看劒愁腸半貯詩歸舟無麥載去路有梅隨瘴海風波惡此行君自知王用和屢言别而未歸頥齊有詩戲之次韻奉寄幾度西郊餞馬塵曾將尺素托文鱗荷杯酌盡開懷酒柳線縈回有腳春瘴海自多流落客陽關少見别離人出門有礙何為者徒負江湖老大身留别社友漫浪歸來六換秋又携書劒入皇州得些湖海元龍氣作箇山川司馬游奔走客塵因念腳勾牽時事上眉頭中朝滿目皆知已還有篇詩遣寄不和王和禮留别韻歸騎匆匆十日程客身猶自戀桐城未應江左追王建且去隆中卧孔明雞黍幾畨陪夜話鶯花一路伴伶聲秦溪溪上無風浪好與白鷗尋舊盟姚鏞鏞字希聲號敬庵剡溪人嘉定十年進士吉州判官以平冦功擢守贑州後貶衡陽有雪篷集見遺書本兹葺自永樂大典中補詩六首北髙峯詩間處春光淡逢僧共採蒿曲盤山磴險直上塔峯髙風露侵衣冷江湖送眼豪近年無隱者空負數株桃送僧孤峯分得西林雲滿巢瓣香端為逺公燒阿兄不解陶潜飲只倚山中水一瓢贈孤峯拄杖尋幽古寺中雲容淡淡雨濛濛歸來一笑春多事野杏山桃各自紅憶孤峯浮杯方渡湘江上又逐孤雲到嶽前七十二峯烟雨夜與誰同話懶殘禪題孤峯房雲木隂森天氣清杜鵑啼了又啼鶯幽人午枕不成夢憶得故山春樹生龜泉松未讓葛洪丹井靈石根流水更清泠多年不見仙桃出化作老松生茯苓戴復古復古字式之天台人嘗登陸放翁之門以詩鳴江湖間有石屏續稿見遺書本王士禎居易録云石屏以詩名而多直率然氣骨終勝今葺自永樂大典中補詩六首求先人墨迹呈表兄黃季文我翁本詩仙游戲滄海上引手掣鯨鯢失腳墮塵網身窮道則腴年髙氣彌壯平生無長物飲盡千斛釀傳家古錦囊自作金玉想篇章久零落人間渺餘響搜求二十年痛淚濕黃壤君家圖書府墨色照青嶂我翁有遺跡數紙古田樣髣佛鍾王體吟句更豪放把玩竹林間寒風起悽愴昂昂野鶴姿愧無中散狀兒孤襁褓中家風隨掃蕩於兹見筆法可想翁無恙幽居寂寞鄉風月共來往衆醜成獨妍羣瘖怪孤唱一生既蹉跎人琴遂俱喪托君名不朽斯文豈夭相舊作忽新傳識者動慨賞嗟余忝厥嗣朝夕愧俯仰敢墜顯揚思幽光發草莽假此見諸公丐銘松柏壙君其啓惠心慰彼九泉望春後呈趙懶菴久望春風至還經閏月遲梅花丈人行柳色少年時愛酒常無伴吟詩近得師離騷變風雅當效楚臣為癸已端午呈李伯髙客裏幾逢端午節看成雪鬢與霜髯救人採得三年艾背世翻成六日蟾老境可憐歸未得羇懷長是病相兼猛思一醉酬風月笑撚菖花揭酒帘長沙呈趙東巖運使併簡幕中楊唯叔通判諸丈日暮逺途行未休白頭又作長沙遊湘江一㸃不容俗嶽麓四時皆是秋香草汀州付騷客紅蓮幕府聚名流吟邊萬象寫不得上有風流趙倚樓到南昌呈宋願父黃子魯諸丈一秋無便寄平安新鴈聲聲報早寒昨夜檢衣開故篋去年家信把來看扁舟幾度到南昌東望家山道路長醉裏不知身是客故人多處亦吾鄉危稹稹字逢吉臨川人有巽齊稿見遺書本兹葺自永樂大典中補詩三首日漾水影於窗變態千萬因為之歌日在天水在池溶溶漾出黃琉璃須臾影上白雪窗爭竒角異無不為金鱗鱗玉絲絲鳯花織錦天孫機浮雲疾流星漢動老樹破碎光參差魚跳暈車輪蝦出展圓鏡一物動其間皆足助其勝小兒弄影嗔未大兩手抱石波心墮忽見千丈萬丈金蛇飛鐵騎無聲雪山過中有神人髙丈許金冠嵳峩軀幹武眼花不即辨誰何徐觀炯炯欄干露須知變態無定時要此中間為砥柱其餘妙處不可寫古來大明難繪畫君思舞劒悟書法况今讀書天影下不妨著眼為端詳此是天下真文章有能融化入吾用可使筆端萬丈生光芒初不必垂文希價咸陽市亦不必矜誇作賦中書堂請求天黼黻上補舜衣裳大作文明治昭然燭萬方和靖逸韻觀書入聖肯成癡宴坐湖邊閲四時桂窟風髙還子在梅村月冷少人知心安競病便成句手約敲推更問誰霜後江山清到骨明朝髙處共尋詩送孫行之出守衡陽日日江頭送客行况聞君去作専城心存臣子無中外士繫朝廷有重輕諫疏滿懷催上道中原萬事想關情戎葵到底還傾日側耳衡陽來雁聲徐集孫集孫字義夫建安人有竹所吟稿見遺書本今葺自永樂大典中補詩二首本心參政約游西山分韻得頂字僕僕事行役度盡千峯頂恣覽亦云倦困卧殊未醒西爽俄見要前約欲重訂結習若猶在寧復計兩脛天際豁輕隂溪頭橫短艇搖手謝籃輿信步踏荒徑適意自忘逺迷途誰為詗此翁平生意故自略畦町何妨一笑回呼童催煮茗兩年已三至我如飫五鼎無乃大屬厭徒欲逃酩酊老筆忽先倡髙標誰與並尚記去載游金碧光炯炯何處非吾鄉一氣相溟涬余種竹方成扁其室曰竹所友人以詩至用其韻屋老苔荒席久虛近分一榻與雲俱梅花未種招蜂怨竹所雖青缺鶴圖無事看山如對客有時隱几亦忘吾過門除却能吟者不是髙僧即老儒朱繼芳繼芳字季實建安人紹定五年進士有靜佳乙稿見遺書本今葺自永樂大典中補詩二十四首失題千年白蝙蝠來往撲人衣洞黑鬼相語天寒僧未歸巖溫生石乳烟起作林霏城裏遙看處唯應一翠微松澤西亭髙人太多事寒夜本無魚船子今何許涇流只似初白蘋秋浩蕩黃葉晚蕭疏更有斯亭在乾坤一草廬桐江舟夜蕩槳入虛碧星河俱動搖前村漁火近别浦鴈聲遙對景知明月回頭得暗潮桐廬在何許江路夜迢迢十暑十暑江湖客塵緇白苧衫人㳂沙島路風捲海門帆帶雨厨煙重通潮井脉鹹家書言不盡重拆又重緘西湖别業寥寥湖上趣大似水雲僧故國經年夢寒窗獨夜燈鞭聲爭輦道月色淡觚稜一覺平明睡都人却未能春遊雨過青青草湖邊信馬蹄夕陽沙路逺春水板橋低柳暗漁人屋花香燕子泥摩挲酒家壁留著醉時題秋風秋風欺病客力氣復何如髮短絲無數衣寬帶有餘見人慵作禮聞鴈强裁書門外生秋草呼童不要除再拜閬風帥幹寶謨郎中家世蜀青城摶扶幾萬程神遊應八表骨鍊已三生舉酒呼麟脯吹笙答鳯鳴欲將余馬紲蜷局不堪行刺桐刺桐依客舍晴緑上窗紗昨夜還飛葉來時未作花鴉寒驚月色人老惜年華今度逢搖落歸心一倍加清明餳面留寒不肯濃一年春事看成空人歌人哭清明日花落花開昨夜風薄薄絮泥行燕子深深茭蕩出鳬翁西陵橋上多車馬有底狂馳百嵗中新秋雜興晚烟起處是孤村漠漠郊原白道分菰葉池塘疏雨過豆花籬落夕陽曛逺山空闊圍天在鄰杵丁東帶鴈聞獨自尋詩風滿䄂不知身入白鷗羣和政和顔令君韻恰百年餘得縣名從前官長是誰清魚鮭市小通蠻逺雞犬村深見吏生過客莫嗔厨傳冷家人方喜俸錢輕却愁明日朝天去不得黃紬飽五更壽尚書意一先生天上麒麟地上行當年孔釋送徐卿重來司馬兒童喜初見歐陽老婢驚黃道日開經幄霽紫垣星近履絇明本朝寶策千千嵗惟讀書人共太平閒觀閒觀造化餘靜極恱自性胡蝶忽飛來吾心已無競幽尋幽尋興不淺歸路故遲遲猿斷空山答人行片月隨冷泉亭白猿弄清泚秋入山骨冷老僧怯慿欄忽失架裟影溪橋雲歸洞府癡龍睡日淡山椒倦翼還橋上行人橋下水如今日夜不曾閒見野祭者餳粥初香未賜烟百金難買過湖船南崖山下何年骨猶向人間覔紙錢疏山矮師叔道場白雲深處水茫茫四百年餘古道場我來不見矮師叔手種樹身今許長行都春事詩紫陌無泥雨後天緑隂多處正鞦韆土風未必知農事也聼村夫說種田蝶看見青蟲作蝶時不知蝶是此身非牀頭為有南華卷午枕酣來忽夢飛張子中牡丹圖寫來猶自挾春嬌想見當年魏與姚花外小車看未了杜鵑聲裏洛陽橋次韻胡仲方因楊伯子見寄此去廬陵定幾程向來笻杖未經行懸知征棹雲邊集大有吟情雪裏生楚渡食萍應甚美舜祠吹玉直能清二君即日青冥上唯我青山帶雨耕陳必復必復字無咎長樂人淳祐十年進士有山居吟稿見遺書本今葺自永樂大典中補詩二十九首春日偕遊響應山觀瀑泉飲漱玉亭上分復磴擁危泉賦磴韻十四溪山晴色妍桃李春意賸野服烏角巾郊游偶乘興同行皆好賔樂此境物勝古寺臨清潭鳴泉落危磴孤亭上雲雨木末渺難認林深行漸迷谷虛語相應隂壑號悲風懸蘿礙飛鐙掃花坐寒石意與幽事稱崖巔記曾遊蘚濕墨痕凝登髙浩懷古嵗月如墮甑百年幾朝昏今昔一長憑道人苦將迎頗亦厭車乘他時營菟裘隙地儻可贈舉杯酌山靈兹語為我證題東坡畫像東坡先生謫仙人騎鯨海宇幾十春麾呵日月斥八極笑觸豐缺天不嗔萬里歸來故無恙諸公非復先朝臣空令後世拜公像洛陽宫闕今成塵村家繞郭一溪斜溪村八九家招邀過鄰里欵曲話桑麻老樹低眠石寒流淺潄沙吾生尚萍梗愧爾獨興嗟積潦簡友人暝鎖層隂重霾深失逺巒積流上籬落飛影度欄干石髮梳風瘦垣衣護雨寒深懷褁飯去終愧往來難葦徑葦徑通支港舟行倚岸斜曉沙含宿雨老樹著疏花嵗月春城暮人烟水驛賒仍年為客恨飄泊秪堪嗟東吳逆旅他鄉又寒食牢落動歸心世事少如意明時無賞音江湖千里客桑柘一春深昨夜還家夢西窗見緑隂逺遊關山勞眺望宇宙憶經行地隔南溟斷天低北斗橫髙譙聞逺柝孤枕歷寒更隻影惟堪弔殊鄉鮮弟兄雨晴小步蠶月家家靜村流處處深草分兩岸色竹覆半池隂少飲亦微醉獨行還自吟兒童怪相問爭識野夫心晨征亂山迎馬首樹色辨微茫犬吠一村月鴉啼滿屋霜近郊人語早逺市漏聲長隔岸誰家圃疏梅出短墻出郭泥深留屐齒出郭少人行逺磬含餘韻疏簾透薄明浮雲時態異流水世情輕只讀南華了年來悟養生郊行夏半餘寒在新秧緑未齊僧歸知有寺水盡覺無溪疏徑風行籜空庭鳥篆泥東郊有幽致小暇一扶藜漏長漏長知夜久夢薄覺衣輕曙月侵霜白寒星度水明遙空一鴈過鄰屋數雞鳴著論吾寧敢徐徐待老成意行簡出少過從前遊仙夢中寒峰千嶺碧霜葉半林紅霽表浮餘景明邊落去鴻意行隨所止端未哭塗窮偶出野店荒雞曙籬荆帶暝開漏聲隨雨盡山色傍船來事業歸書卷生涯付酒杯溪翁往還慣不怕白鷗猜書西齊几半枕午窗夢一聲啼鳥清雨深花有恨春老柳無情退覺身名重閒知世事輕杜門非謝客懶甚闕將迎遲客小軒約客久不至春明坐小軒墻隂侵霽色簷暈上波痕晴色麥花老暖風鶯語繁午庭人寂寂桃李亦無言賦參政叔祖水亭一段漁歌起夕陽溪山佳處缺平章受風楊柳絲絲弱臨水軒窗面面凉約客有時同把酒橫琴無事自燒香沙頭鷗鳥忘機久却被官船去較忙夜宿山庵扣宿精廬旋啓扉佛香未冷坐多時分僧一半雲歸榻借竹幾些風入詩隔夢聼鐘疑寺逺避寒移枕覺宵遲起看猶有殘窗月春雪滿山啼子規書齊戲題數簷隙地葺幽齊小作軒窗傍竹開行蟻上緣風折笋飢鴉爭啄雨殘梅閉門惟有讀書樂愛客苦無佳士來最憶西湖柳隂底扁舟欲去尚徘徊江湖江湖路逺總風波欲向山中製芰荷黃葉落來秋色晚亂鴉歸處夕陽多慣經世態知時異拙為身謀惜嵗過有屋一區田二頃分無清夢到鳴珂過隱者居瘦笻獨與鶴相隨行盡荒郊入翠微溪鳥喜晴將子浴山蜂傍暖採花歸空村嵗月徴書晚深徑蒿萊客屨稀久欲依居圖别業自愁無計泣牛衣奉酬陳介庵明府桐江見寄寒侵征袖客先知曉角吹霜下客衣歸興只緣松菊晚宦情肯為稻粱肥山村日落人收市海浦風生浪打圍怊悵詩成無便寄夜深暗遣夢魂歸戲折竹葉為舟示奚奴乃翁兒戲可憐生折葉浮舟趂岸行有便信風翻覆易無心逐水去留輕觸崖頗似乘時意藏壑深關遁世情幸喜此身元不繫底須壁上覔寰瀛元日酌悠然賦坐客悠字韻東風第一畨去殾春游白夾清樽半日休花氣未醒蜂蝶懶宿寒猶殢雨雲愁人煙帶郭居全少林沼當軒趣逈幽吟過小橋歸夢晚亂鐘何處思悠悠重過東野故居郭外有村名孟堡舊傳君此卜幽棲草荒東野千年宅水繞南山一曲溪人物不生詩渺渺秋風無語恨悽悽可憐如許衣冠士不為留祠向竹西歸來小笠輕蓑卧短篷曉歌楚曲和漁翁片帆自識歸來路借得清江一釣風幽興自折疏花插小瓶醉眠明月讀騷經白雲也識幽人意分與秋山一半青山中冬至讀易燒香自閉門懶於世故苦紛紛曉來靜處參生意春到梅花有幾分夜軒納凉銀床破睡霧籠紗翠簟湘紋捲浪斜小院夜深凉似水一池明月浸荷花釋斯植斯植號芳庭住錫南嶽寺有采芝小集見遺書本兹葺自永樂大典中補詩二首和子履雍家園詩長橋南走羣山間中有雍子之名園蒼雲蔽天竹色淨暖香撲地花氣繁飛泉來從逺嶺背林下曲折寒波翻珍禽不可見毛質數聲清絶如哀彈我來據石弄琴瑟惟恐日暮登歸軒塵紛剝落耳目異只疑夢入仙家村知君襟尚我同好作詩閎放莫可攀髙篇絶景兩不及久之想像空冥煩送李容甫歸北都先生讀書不下堂堂上有客語浪浪弟子出觀如堵墻怪君眉彩生光芒北都朝夫子一别久相望君來道信問使我開肺腸三日不改服猶覺芝蘭香平生寡投分一笑且云樂殷勤發黃卷鈍吻慳應酢大杵撞啞鐘已厭音響惡更慙河伯觀未易窮海若索寞嵗華晚颼颼黃葉秋歸心劇流水忽忽不可留固知此鱣鯨肯託尋常溝直須見老聃可化南榮儔海州嵗有冲天鵠卵如萍實光琢玉蜀雞眇然何敢伏羽成不須求日浴一舉將驚萬人目江湖後集卷二十三
