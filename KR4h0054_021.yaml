body:
  text: 江湖後集巻二十一宋陳起撰黄文雷文雷字希聲盱江人有看雲小集見遺書本王士禎居易録稱其長句頗有骨力今葺自永樂大典中補詩四十首浚井詩工部種萵苣詩序傷時君子或晚得微祿頗尤野莧之侵苣矣又園官送菜詩序則病苦苣掩乎嘉蔬傷時小人妬害君子遇物遣興固不必盡同耶二僕鋭意浚井聊記其勞生理亦多變惟井不可遷澤國雖納汚松江本其源賴爾竭脩綆治此久不蠲有冽出舊甃水玉傾炎天安知峴山宅不數陸子泉大勝信行勞脩筒山崖巔池萍汙池一帶水淵然象深湫青空照浮雲過影不可留粼粼南薰微儵忽便轉秋眄彼浮雲輕隨風且乘流三月上澣忽忽逢休澣春隨栁絮飄業雖尊甕盎志秖樂簞瓢强飯寛啾唧攤書慰寂寥隣翁幸無事盃酒强相邀春向客中過心清夢却安月明蛙吹閙風暖燕翎亁汐共潮連信涇通泖作團詩成無賣處寥落想三韓歸汎彼將焉放歸歟来自東神官嫌愈抝末俗笑䕫窮好避鵷鶵路還開野鶴籠揶揄非爾力王績字無功上塘舟中可笑山翁拙微官亦强名京華難久客海角更孤征桑䕃時當宻菜花今向零短篷甘局促和氣謝春晴初識東塘路言尋槜李船魚鹽千古地吳越一家天夢覺何為者行藏不偶然半溪疎竹影相送海雲邉借周伯弜題天申宫蘇文忠公畫像大澤沾荒裔靈山識老臣微茫雲外迹衰病瘴中身濕草寒碑夕晴花午殿春髙簷風雨斷猶避六丁神江石詩贔屭牕前石參差類虎螭秋晴蘚可剝嵗晏竹相宜要自山川出那知陵谷移摩挲羣玉瘦風助馬王悲登舟綵句殷勤矗釣船乂翁也解去朝天風涵栁外疎疎意雨拂波間淺淺緣脱灑工夫尋活著依稀事業付遺編放諸四海吾能凖獨恨東逰不見仙登樓有感顧陸風流㡬夕陽桑疇麥隴自凄涼山従地盡雲垂海水共天浮日射洋門卒何年隠吳市嗇夫當日愛桐鄉蟻封未敢誇榮䇿芳草無人且自芳華亭以北所見荻門臨水劣生涯屋角香浮繞菜花雞犬聲如深谷長耰鋤力向甫田加葑填岸步聊憑木湖入溝塍不用車驚見茅茨新覆草東風輕颭酒旗斜翫物豹脚縦横底善鳴蝸涎虬篆最堪憎隄防暴客書嫌䑕約束閒人食畏蠅蠛蠓恰穿闗棙去蠨蛸又打局圖成隙光早晚占天轉靜倚東牕翫物情欲借書無可問者三江環地脈千古説機雲欲借圖經看携瓻且自醺華亭道間記所見二首楊栁隂中稻廩芙蓉花裏柴扉日夕牛羊下壠老翁穉子同歸田舍鷄豚壯長江鄉魚蠏鮮肥是處茅柴新熟老翁醉倒扶歸錢氏故園㡬年聞此好名園平地黔巫翠掃天蕭岸半摧林影暗亂螢閒自㸃湖烟中興次輔巧玲瓏尚帶承平艮嶽風一朶慶雲飛不去逰人眼冷夕陽中買鷄喜鬬慰安之獨立昻藏信魯鷄羽毛如鳯合梧棲不須盛氣誇金距付與閒庭自在啼納涼雲頭過雨月䑃朧少立橋亭萬里風想見松江烟浪急最涼多處屬漁翁臨行身是江湖老秀才等閒遊戲墮塵埃匆匆不盡桐鄉意慚愧前修是勉齋従来天地一閒人放去江湖自在身若把乂庵行止勘最迂疎處入經綸放潮每日朝晴暮則隂苦無甚雨洗秧針新来剪得松江水清漲浮瀾一尺深池面瀰瀰溝径斜學栽堤栁半生芽倚闌無事薰風急分得潮来看浪花舟中艮門東望盡嘉蔬麥壠桑疇總上腴莫怪泥塗也村樸百年供億帝王都錢塘從昔競華腴金碧籠加稱帝都漸逺郊坰殊草草但逢樓閣定僧居臨平山下道潛遊春半蘆芽藕未抽野水無情天更濶不知何處是汀洲蘆葦延縁百丈洪布帆収巻笑途窮丈夫雅意追宗慤不耐朝南暮北風新涇阻風示姪輩世事何堪拙更遲及時進業莫兒嬉但看煖景閒舟檝等得北風無住時題三髙士像原注范蠡張翰陸龜䝉霸越平呉亦苦辛黃金直鑄此功臣九州地主闗何事一舸鴟夷共故人西臺事去已多時月冷松江好賦歸會得華亭思鶴意秋風不是憶鱸肥日落長安路漸迷王官谷上有人非江湖好養能言鴨魯望從容比滑稽詠史山河帶礪果何憑壮士休悲走狗烹賜醢不知誰約法却將王禮𦵏田橫開元末路已無章天寳垂將付夀王追憶惠妃因至此如何不遇返魂香忠臣垂盡語琅琅愛子遺留八百桑公琰諸人都薦過後來郤正侍君王鄧羌乞得打鮮卑尹緯髙材却不知若比血誠扶正統九原吾與武侯歸章武重歌漢道昌卧龍勲業細平章欠伸不覺塵編盡雨洗炎埃一霅涼挽芸居海内交遊三十年臨分我到臥床前西湖一葉西風落淚盡秋風松下阡長安道上細哦詩如此相知更有誰芸葉一忩千古在好将事業付佳兒周文璞文璞字晉仙號野齋又號山楹陽榖人有方泉先生集見遺書本張端義云野齋嘗語予曰花間集有五字絶佳細雨濕流光景意微妙野齋之灌口二郎歌聴歐陽琴行金銅塔歌不減太白今葺自永樂大典中補詩八首金陵襍詠梁家天子抱琵琶淚灑華林御苑花今日閒韶無處所鴈烟蛩雨屬他家灧灧江波綠更肥蒼烟中有鴨鷗飛當年神武今何在老却遺民更不歸隂山側畔月如霜不為唫猿斷殺腸折得橙花無處賞帶枝分與櫂船郎長干小婦學吹簫樓外閒風弄翠條近得廣陵消息未暮潮已過赤欄橋寄華陽衆侣玉函捧上五雲堆邂逅通幽此一回十數年来増悵望絶無人上望鄉臺九錫碑亭日欲曛有人趺坐對爐薰憑誰為謝桓司馬句曲山中只白雲服事三茅過一生癡心不望羽車迎舊時手種黄龍子今解昇雲入太清怱怱山信寄来時中有黄庭七字詩已死華生無覔處㡬回吹斷玉參差葉茵茵字景文笠澤人有順適堂甲乙丙丁戊稿兹自永樂大典補詩六首生長生長古林丘擒来繋鎖囚休憐文變豹尚覺氣吞牛檻穽終難脱咆哮亦可休山中藜藿少君合早為謀别曽源一梅邉又上帝王都栁下俄空處士廬漢月楚星人去後淮雲蜀雨事何如東龜不食西征缺南鴈難期北信疎此去呌閽天路直何時快覩茂陵書洪都宗人則明盛年擇宗子之秀名之曰紹弟書来欲求語則明上侍重親承志篤學恤貧樂善繩繩蟄蟄未可涯也因書昔所賦廣平同系詩一章載賡以慶之善積端如水滌源源深自可羨来昆嵗當有室詎為老意者重闈思弄孫和樂定知江有渚碩蕃佇見葉流根河南心印元同自秋幹虷中細討論耐久交魚水時暫歡芝蘭近同臭惟有石丈人萬古情如舊失題受用十二時不離方寸地門外自風波行之以無事止庵驛路施茶時事艱難路險巇得来名利亦何為趙州茶罷速歸去莫待鐘鳴漏盡時張藴藴字仁溥揚州人官幹辦行在諸司糧料有斗野支藳見遺書本兹葺自永樂大典中補詩六十五首西忩雜言八首淵明孝忠人去官念同氣再拜營一粥於酒亦焉嗜寥寥千載間徳音猶未沬寓懐弔形影天地無根蔕商君弊秦法出舍何嗟及胡為乎弗思束濕日以急周家積忠厚神人安且謐我歌行葦詩繼以長太息志士生斯世疇不志顯美素分縣於天贏得為君子巧宦如郭尖徒足汙青史呼號三上書昌黎何必爾牀頭綠綺琴長抱風濤聲庭下老松桂苑苑霜中青資爾二三子聊以虞我生翟公自有常世情多變更巍巍巨唐基房杜實經始功名付諸賢一傳無可紀休休其有容書稱若人耳媢疾以惡之後来楊與李五氣無生滅萬神具於身明真不自見冉冉隨𡨕塵復命歸其根坐斷衆妙門靈芝嵗三秀不畏霜毛繁天匠染青紅髙下乘一機陽榮與隂瘁豈必相因依藤蔓荒故丘􅒗鶬托深枝芳草不入媚綠遍江之湄閒味甘如薺吾生拙可知道心平旦氣樂事早春時所欲維寛厚所親維書詩相過儻同調徑醉復何疑中秋陪文昌吳少蓬逰石壁精舎步月野橋逝嵗如頹波燕雲感秋節乾坤出清機老火濕魚頬人生豈常好萬里有隆替隂空動歸鴻萋草變鳴鴂愁端卒已来安得心如鐵朋情亦云厚晤言無厭歇曉勝忻有適一笑發覆蠛野橋横雲根寒泓侵金玦兹山昔所歴亦従多儒哲堂中讀書人流風儼不滅蒼蘚已上堦孤蛩亦入穴摩挲泉上銘清籟竦毛髪假日聊自娛肴糅酒不闕相期忽區逰言駕醉鄉轍歸来不成暝題詩報明月偶得碧蓮雙房可愛戲效宛陵體援筆對嘉蓮更想花初披生成若有偶形容徒費辭収釵背相倚舞琖手雙垂不比鴛鴦梅烟雨低壓枝送趙秋赴調魯鼎巧雕飾售者十之九君如古罍洗蓄眼見未有摩挱知㡬人銅臭不落手龍文粲綵翠照映覺羣醜一朝遇賞識持此足愛夀去去清廟陳引酒酌北斗七夕聞鵲溽暑正埃鬱一室坐焚磝忽占乾鵲喜庭樹繞飛噪流焱挾雨来天晚亦凉好巢居免漂搖示臆若吾告時止焉用留時行不俟報既非鳴不平厥理嘿有召九衝無驚波折葦近可到移將填河心人間作行道紀逰消搖事物外春風浩蕩天幽居少良友行樂才新篇隔縣數十里沿溪半日船詩隨野興發筆落雲態妍賞覽朝暮景騁逰東西阡時聞賽神鼓頻乞買魚錢浪碧麥風軟雨紅桃漲鮮堠亭新粉壁酒戸小村鄽鵲喜相勞苦驚飛雙導前榜人呼繋纜輿僕結行纒鷄唱炊烟裏僮窺籬落邉㬉香飄杏店濃綠暗桑田節物催耕織辛勤供食眠吾徒同臭味俗網斷牽攣我愛今葉令多情候陶淵原注孟郊云賞句類陶淵逡巡設鷄黍欵曲羅觴絃握手驚嵗箭聫裾跨時韉同尋入山路不著捷径鞭閲境初啖蔗去愁如絶弦苕苕縹㝢見靡靡青風連足躡方諸國身逰圓嶠巔衆竒勞應接四迥失窺緣一柱倚蒼翠九盤瀉潺湲風松調緣綺露蘚失青鈿邃殿開金户華榱暎玉筵除塵嚴客館移坐逺庖烟穿溜分汲路束枯汗樵肩林扉夕凄𦂳竹水光嬋娟搗藥琴聲碎眠雲鶴夢圓斷鐘催曉起糲飯與蔬便草屩濟吾勝藤杖扶欲顛洞雲寒黯靄石蔓翠鈎連鳯集今何許龍拏跡宛然丹留無骨篛䑕化有芝仙列瓮酒已燥一枰棋未仙燭幽然炬逺畏冷被衣偏勌足思暫憩芳醪欣屢傳轟雷倒銀浦紛雪漲瓊川鸞袖涼蟾舞鮫綃宿霧懸寒聲忽澒洞清瀉長宛延霜鬂不堪照塵纓聊欲湔大書見題石髙跡企来賢天常今已矣道士猶言焉子有逝川歎人誰如石堅羨渠白雲侣得此一壑専坐與世紛隔足使道氣全剛鑱钃靈藥温鼎溉華泉丹成九轉後道在太極先依韓罄夙志叩許滋擎拳蝶夢夜栩栩霄駕夙翩翩希言味無味示我𤣥又𤣥瞻望儵烟滅豁悟逾病蠲當取赤松友直遺黄石編兹逰信有造重慎香火緣玉山招隠歌風蕭瑟兮吹我襟歌叩角兮逰商音天空寥寥山日隂肅肅飛鴈蜻蛚吟閨人載績寒事深余髪早夜霜根侵辰乎既往知来今和寳未剖誰知心况感物化悲難任獨有良朋懐所欽吹笙子晉師堂琴秋蘇露茹酒可斟撥霞弄月窮幽尋好来相就玉山岑李氏山林呈吳鶴林程滄洲竹秋細麥登崆峒雲貌穿駁光曈曨一日涼燠氣不同玉堂二老仙才雄乗熏振珮明光宫此時此地欣相逢栁隂嘶馬拖金狨傾銀行玉炮麟龍湖嵌瀟碧環坐中笑指池上真珠樷沈烟熏就寳鬲穠飛雹過眼文楸空偕我卜晝歡沖瀜酒酣氣振悲孤蓬詩成灑筆凌飛鴻三月四日飲蔗竟海棠下蜀山嵯峨蜀江碧美人如玉多顔色豐肌勝韻天下竒競艷爭妍意亡極新機錦段翠織成轉盼生光欲傾國承露仙人靚有香避風皇后嬌無力欲開未開濃復濃曽注和膏紅琥珀人間風日苦不貸閬苑歸雲誠頃刻腮花褪盡畫睂長徐娘自負風流格佯眠賣眼擲春心堂上燭明爭奈得一尊相屬莫相違一年好景當寒食未多六品誇洛陽解記三須惟沈立分冬又酌分冬酒浮沈四十年無風香穂直遙夜燭花圓道騐芸芽長寒知柏性堅青山黄髪伴猿鶴故相憐張公洞詩吾宗仙府洞疑不在人寰鬼吏衣冠肅霓幢隊仗閑醉歸驢跡滑奕罷鶴飛還最巧罘罳頂空青不可扳題寳藏寺頗意西湖寺門前景畧同水流經室北栁入杜橋東鶴舉連軒白魚跳撥刺紅酒闌吟未稳歸櫂又怱怱題應山龍湫扁舟曉趂竹秋風囬首前逰夢一同風雨石苔漫古刻藤蘿烟水閟臨宫鳥聲晝寂聞塵淨花影潭深色界空毛令向来臨賞處分留詩物到衰翁東林訪僊杳杳仙踪不可期依然東老舊林扉石榴醮酒書何在山薜緣衣畫亦非風定觀中桃欲動月髙華表鶴曽歸扁舟小泊聊乘具趂得春山笋蕨肥山逢勝處屬僧坊西出城闉去路長一日講臺靈石性千年劍水動星光田花漠漠初霑雨江葉蕭蕭不待霜喜共登臨聊把酒癡兒有底為官忙和信庵留題虎丘韻椽筆題詩向此山隃知玉氣潤林巒光涵絶澗劍花凈影落中庭月樹寒春燕巢深金殿隠晚雲収盡碧天寛暫携寮吏登臨處未把風流遜謝安黄龍洞水邉逰賞亦無期物色黄龍洞最竒欹石倚人看欲倒斷崖懸樹望猶危貪幽未覺搜吟苦歴險寜教步屧遲客裏怱怱寒食過栁橋還憶去年時再用韻山水清音屬子期兹逰所得亦多竒持心定慧何由雜著脚平安自不危境凈本無塵土涴春融更覺洞天遲歸来夢與神仙遇説到鴻濛未鑿時秋興水落秋風日夜深小庭婪露雨愔愔鳴鶗忽斂芳林氣斷鴈猶遺故國音吟入古香穿月脅夢生孤秀出雲心年光亹亹成何事撫鏡搔殘髪一簮寒鴉飛不成行動作羣寒聲歴亂不堪聞棲深野岸經霜樹㸃破江天欲雪雲背日字斜濃忽淡圍風陳急聚還分有時鷗鷺參差見一局殘棊欲付君由後山過李園詩入眼春濃日自遲行穿犖确破藩籬園林勝事能忘酒風月閒情更有詩池栁乍開蟬翳葉井桃重長鶴棲枝歸来一枕㳺仙夢笑指酴醿作後期述情寄雲麓去年今日天平路曽侍先生杖屨行春入花租蜂足食雨殘槐夢蟻逃名貧甘杞鞠知勝肉嬾事衣冠畏入城自歎早衰身復病惟餘雙眼讀書明過霅碧浪湖邉望霅城水髙於地欲相吞春風歌鼔家家酒夜月舟航處處村西塞人歸魚市散東林仙去鶴宫存往来頻有鷗相識搔首閑汀日又昏寒食晚眺馳逐花塵鬂欲華狂歡憑酒作生涯一春行樂多妨雨三載清明不在家暖趣蠶工開柘葉寒生鳥信落梨花水村寂寂人歸後山崦新烟起焙茶和韻菊潭書懐中年百事念頭疎始信貧能富不如風趂隂晴為冷暖水浮世界信空虚漆園傲吏悲烹鴈蠻府㕘軍戲詠魚㡬度把君吟巻讀又將閒日半消除迎淮東趙大使相公明詔趣東還衮舄皇皇萬國觀慷慨一時平賊易辛勤十載䕶邉難沙堤馬上春行印御柳鸎邉曉繋鞍出處自闗公大節書生憂國只睂攅法華山詩擾擾名場轍迹環閒中人自不曽閒樹猶如此悲流水茶罷無言看華山春草一氣中行四序遷不緣栽種綠芊芊江南江北春風夢詩意蒼茫白髪前黄龍洞戍削蒼蒼壁倚天臥龍幽洞不知年白雲粘筆題詩去重寄相思與鶴仙紺袖紺袖香銷寳瑟塵雨愔愔裏碧桃春翠屏睡足空長晝多少相思夢不真雜興雲心長與白鷗期四十年非只自知天地無情空費日水邉照影得新詩天與汝酒不肯飲悲憂與我生俱生暮年陶寫政須此誰愛區區身後名越冠齊瑟竟安施誤矣甘為衆目媸百嵗能消㡬癡黠臨風三歎郢中辭西田蚤稻喜新穫西忩白菊憐初開年光逝水雙鬂改矯首暮雲人未来畏酒時猶飲過差重彈長鋏怨無家誰能貯椒八百斛自欲載書三十車山林蕉萃鬢滄浪夢境浮雲久已忘猶有讀書心未歇一燈對鶴語更長鴻漸無茶生病思龜䝉有菊誑饑腸閉門自得安禪法舉世空求得熱方庭柏千年解得仙君看霜榦石能堅妄希至道吾何敢中夜尋思輒廢眠虚皇来下素雲車清淨香中誦玉書一入幽遐超萬刼明忩塵在死灰如杜荀鶴去唐風晚張季鷹歸晉日危斯人已矣何嗟及千古論心酒一巵南忩石瘦竹疎疎沈水薰殘架上書旋破月團煎活水日長留客話清虚華院寒生小雨過博山香潤礎雲多重簾晝寂秋棊罷自寫牙牌記藥窠茭葉𠖇𠖇姑惡啼竹花漠漠伯勞飛畫睂對我玉臺鏡繡眼窺人金縷衣久聞學道能遺世故應薪水煩髙士劉安可笑無靈氣長與仙人守都厮夜氣蒼蒼白露凉蛩移哀響入孤床披衣起立階櫩月一鴈初聞欲斷腸小李將軍著色山千金一紙世無傳閒忩借本工臨寫去去重看意惘然一筯秋風菰菜羹二升雲澤桃花米吾生有涯何所求直是愛閒多病耳三間茅屋萬松間自障春泥斷往還時對月明搔技癢風傳幽曲到人寰大梁在東不架屋牽牛在西不服箱翟公書門固已錯貧賤自昔交情長曉汲銀牀洗碧洮緩搖桂露和朱調魯公書帖閒張壁披拂清風坐獨謠不假兵戎取蜀方孔明才畧輔闗張區區尚欲爭天下只送胡孫入布囊昔㑹仙人曲靜中赤藤斜拄眎白龍狡獪變化不可詰飈車忽駕蓬莱東漫漫長天捲樹風御冬無具百憂中癡兒强挽爺須説門外題詩柿葉紅離思重題金谷字閒情獨擬玉川詩霜横詩閣相期夜月滿南溪始泛時東屯茅屋竄松䑕南谷荒村啼竹鷄萬里乾坤雙不借百年風月㡬偏提海棠别種昌州最有聲十分顔色雨初晴錦幃睡起嬌無力羞見銀臺畫燭明小忩即事白雪香浮蟹眼圓紫雲光冷䑕須亁倉庚怨雨庭春晚𤣥乙窺簾花晝寒虎丘曼陀石上無根樹歴歴生公説法餘劍水一泓清徹底至今人説有龍居江湖後集巻二十一
