body:
  text: 江湖後集巻四宋陳起撰趙汝鐩汝鐩字明翁袁州人太宗八世孫嘉泰二年進士曽官漕帥有野谷詩集劉克莊䟦云明翁詩兼衆體而又徧行吳越百粤之地眼力益髙筆力益放巻中歌行跌宕頓挫剸蛟縛虎手也及歛為五七言則又妥帖麗密若唐人鍛鍊之作征婦嘆蓮浴雙鴛鴦梧棲雙鳳凰雙舞蝶度墻雙飛燕歸梁倚闌人顰翠忍淚心暗傷閉户羅幃悄孤燈耿空房欲睡睡未得獨立理絲簧彈吹不成調征夫天一方訪隐者不遇兩腋乘西風送我上髙岑竹根一泉通石徑萬木森中有隐者居敗屋莓苔侵山空人不見雲滿掛壁琴兩鶴出候我逢迎啄衣襟應酬乆頗厭走避不可尋誰伴山下去明月升髙林姜子平鄭華父見訪留飲月下敲門者誰子二豪姜與鄭揚袖入長揖掀髯略常敬于時月當階籟聲㫁四聴展席交股坐劇談飛舌競恃俠爭譽已拈巻索分韻呼兒注老瓦酒力快辛硬羶葷屏俗饌梨栗錯村飣杯行無不醻恐犯詩壇令十一月四日雪中小飲是月十日冬至書雲猶七日隂極剛未長風吹六花開飛舞隘雲壤一陽方欲来和氣已摩盪著池寂不聲入林發餘響與客同擁爐寒威不到幌洗杓開蟻樽下筯飯熊掌道舊驚物變談空湔塵想近詩稍閣筆對此又技癢踏雪訪梅花更覺吟興爽雪中觀客夜博積雪深一尺堆瓊迷山扉豪客夜排闥挑燈紅爐圍成梟呼五白轉勝賽四緋舉觴無不嚼寒深酒力微姑置博與酒劇談玉屑霏坐久更寖闌疎鐘到簾幃晚晴與何尹登水亭簡張丞溪流兩岸秋日落千山暮一亭壓其間登覽洗萬慮胸襟富丘壑方領此幽趣擲餌来潜鱗圍棋驚過鷺酒壺展逸興漁唱續逺浦安得哦松来撚髭同覔句憇農家似隂還似晴好風㺯輕柔土膏春犁滑竹深鳴禽幽農家頗瀟洒㶁㶁清泉流蹇予入茅簷解帶為小留荆釵三兩婦競將機杼投吹爐問官人肯喫村茶不羣兒忩下讀千字文蒙求余因拊其背勸汝早休休泓穎纔識靣白盡少年頭耕食而鑿飲胡不安箕裘廼翁聴我言急把書巻收遣兒出門去一人騎一牛尋僧不遇捫蘿入石徑野衲棲其間杖錫知何處留雲守禪闗當户走野䑕隔林巢白鷴候久移晚照困来潄寒灣翛然非人世欲去且復還木杪猿一聲六忩契山山題下陽懐沈叔忱詩夜雨曉方歇薄霧隨征車喬松二十里翠㣲三五家雙燕教羣雛一牛䭾兩鴉故人不可見回首天之涯清明日同傅元瞻閻才元周濟美曽原伯宇文子友宇文子英汪沖之王謙仲集櫻朱園分韻得食字二十韻宦情隨推移世事分限域帝城冠蓋㑹千里或咫尺賞僚盡英賢了事即餘日念我契濶情招邀見懐憶春事日光輝湖山好顏色徐行失前騎可望不可即徜徉大堤上徙倚長橋側㳺龍䀭生花意極反寥闃山房啟煙扉僧話寄禪寂同来妙人物髙論傾歴歴朋簮忽逢㑹並轡隨休適將軍萬金園花竹照燕席髙情發清曠絶巘疲危陟俯視天壤間錦繡蒙山澤太平豈無象黔首何知徳須㬰碧雲暮過羽杯行疾投林暝鵶還隔浦燈火濕呼車各零亂紅燭明青壁良辰尚多歡整整三分一後㑹儻相從前言未應食寄逺曲君馬踏邉塵繡幃妾一身仰天無過鴈俯水無逰鱗酒難獨自酌蟻樽空浮春食亦不知味駞峯徒薦珎憶昔送君君已醉醉言更戍一年事兠鍪北去幾寒暑兩地肝腸摧萬里别来容貌似舊無寄去衣裳知到未折柳絲絲紫塞心對花片片青春淚夜聞琴瑟皷隣家人皆齊眉老年華不忍恨君翻自恨長吁矯首天之涯幾度虚傳家信息愛聴乾鵲怕聴鴉孤枕有時髣髴夢中見覺来霜角咽梅花昭君曲禦戎豈别無經綸婁敬作俑言和親或結或絶患不已至呼韓邪朝竟寧稽首願得壻漢氏秭歸有女王昭君臨時失捐畫工賂蛾眉逺嫁單于庭玉容慘淡落紫塞粉淚闌干揮黄雲下馬穹廬行步澁彈絲誰要敵人聴年年兩軍苦爭戰殺人如麻盈邉城若藉此城贖萬骨甘忍吾耻縻一身聞笳常使夢魂驚倚樓惟恐烽火明狼子野心何可慿嗚呼狼子野心何可慿迎僊引羽人窟宅壓滄溟崑崙閬風天墉城紫蘭絳節跨彩鳳殷勤傳命邀同盟七月七日凉秋霽千官鏘佩森幢衛王母雲車九色龍上元霜袍三角髻劉徹屏息迎兩僊兠香塗門髙馥天星裳黼衮自酬酢方朔窺忩不敢前金漿玉醴濯凡腹紅顆絢飣蟠桃熟宴酣樂奏瑶池音琅璈子登笛雙成乞憐請藥承華殿教戒丁寧先自反三尸欲脫毋滛亂五性盡捨更勤儉各出數語鍼膏肓此是長生度世方徹心未悟益猖狂萬八千里周遐荒少翁欒大誅相繼海外何日無方士五柞宫中夢㫁時銅盤玉露胡為不起死上馬曲精神如熊氣如虹夢寐思勒燕然功龍泉寳鞘横三尺犀甲茸絛擐兩重鳴鏑飛空挟霜逺認旗貼身颭日紅玉轡繡鞍鞴驄馬眼有紫熖炯雙瞳誓縛單于獻天子離觴不揮兒女淚笳鼓動地歸来時金印斗大肘後繫君不見燕頷虎頭班超侯萬里又不見風聲鶴唳謝𤣥破淝水去婦詞入得良人門自誓終此身掃室擁箕箒進盥躬盤巾採桑趨壠首薦蘋潔澗濱十年盡婦道唯恐堂上嗔上和下睦本無事一二小姑恣萋斐浸潤既深貝錦成不棄不出譖不已良人繾綣涕漣洏父母之命安敢違舉頭天邉指缺月暫缺須有團圓時君不聞章臺長條依舊垂樂昌半鏡還復歸逺浦帆歸晚日放晴雨脚收楚山千里江吞秋上水風生荻花渚漠漠幅蒲天際浮輕雲驟掩目力斷雲消似過芳洲半危檣逐鳥惟恐緩燕子爭飛先到岸嗟此何景兮逺浦帆歸丹青欲畫殊堪垂蒙泉行二十年前客中都壁間誰掛䝉泉圖天造地設有如此果若所畫疑蓬壺御風来逰洞庭北此境突兀眼前出荆門之外天下稀翻思畫圖纔髣髴山根寒源月一泓細流循沼曲折分天光倒影㵼晴碧對此說我瀟洒心雲木枕崖影濕翠金蓮鋪鏡葩在水流觴自是摹蘭亭山隂今日那得爾向暮深林啼子規柳花作團貼水飛吟興未盡征馬嘶他時清夢猶見之馬上口占平林塗烟山擎日晚征漠漠客倐集浮生隙駒忙裏過虚名塞馬眼前失古来戰場莫回首一成一敗骨俱朽栁岸人家揺酒帘不妨小停春風鞭漁父四時曲春霽江浮春新水肥粼粼鴨緑春風微波心上下舴艋滑釣車香餌巻落暉纎鱗噞喁錦穿栁半留賣錢半換酒爛醉茅櫩紅杏家折花簮髪把兩手沙岸尋芳青驄嘶彈絲吹竹挟蛾眉笑指漁父何寂寞漁父掉頭我自樂夏烟溪流碧浸炎空滌濯袢蒸蒹葭風大港小港凉世界隔堤荷蕩香到篷儂家生長舟一葉豈識人間半㸃熱青笠緑蓑山雨来雨過波平夜撑月水亭避暑氷玉肌枕設珊瑚簟琉璃笑指漁父何辛苦漁父掉頭渾不顧秋新雁銜秋訪水涯分屯洲渚傍蘆花停橈相釣結溪社来徃無嫌同一家酒酣把笛吹村曲聲曵蘭花入山腹釣竿到手萬事輕孰是孰非孰榮辱江樓邀月粉黛濃簧璈嘈雜徹桂宫笑指漁父何冷落漁父掉頭我豈錯冬六花坼凍雲糢糊釣鈎空擲寒無魚繫舟枯栁歸茅舎撥火煨薪擁地爐賖鄰一榼醅醱玉老稚分霑春回谷重來解維放夜筒横風打向别港宿溪館對雪歌妓圍釡出駝峰酒羔兒笑指漁父何顦顇漁父掉頭但稱醉古劍歌洞庭湖魚人得古劍於網中張倅得之以遺余時開禧丁夘春館於岳陽樓邉事方急洞庭吞天天無風月印一鏡星涵空波心千尺光五色漁人嘖嘖疑垂虹睨而視之寂不見舉網下罩追遺踪須臾雷轟怒濤吼鼓蕩六合雰溟濛所得非魚亦非龍炯然三尺貫當中肉銷骨立精氣融鏗鍧其聲韜其鋒越砥稍稍如磨礱壯士見之肝胆雄雷煥已死不可起有誰解識斗間氣人疑龍泉或太阿萬古凡劍空一洗倚樓西北望邉城連月亘天烽火明隐憂枕上思請纓夜半躍鞘床頭鳴夢中見告若有神吾價豈但值百金吾勇豈但敵一人知君素有擊檝中流心誓當助君報國萬里清烽塵廣寒逰九秋半矩月團圎瓊瑶世界夜氣寒羽士躍身導阿瞞麾斥八極青雲端老柯擲桂香不死銀橋跨空一萬里飛步抽簮扣玉扄中有素娥三千人緑瞳剪水鬢堆霧風巻縞袖條脫露琅璈雲笛廣庭舞笑乘白鸞㺯蟾兎歸裁仙曲作霓裳天音盡洗凡絲簧霞裾星珮羅兩行玉環垂手春風揚樽前盡日看未足綘膏泣鳳夜繼燭宫商忽變不可聴馬嵬斜谷雨霖鈴楚觀歌吾聞楚鄉江山多勝處今之楚觀尤得江山趣萬象排拶索應酬丹青閣筆無所措大則湘水小臨蒸衆流合泒銀河傾陶冩秋氣浸明月夜波爽透百雉城右則鴈峯左右皷雙屏競秀蒼龍舞吞吐嵐光飛亂雲凉風暝送兩崖雨江山之趣于此無不宜朝暮變化愈出而愈竒最愛鷗鷺甘冷淡占斷汀渚供娱嬉東塗西抹晚煙翠漁父歸舟巻釣餌鼓枻而歌倚半醉中有滄浪濯纓意杜若一片迷芳洲凭欄懐古生新愁更上崔嵬千尺湘春樓縱目乾坤盡見衡嶽秋原注楚觀在河南憲圃湘春樓在楚觀之後蝨蝨形僅如麻粟微蝨毒過於刀錐慘上循鬢髪貫紺珠下匿裳衣綴玉糝呼朋引類極猖獗揺頭舉足恣飡啖晴忩曉捫屢遷坐雨床夜搔不安毯急喚童子具湯沐奔迸出没如喪膽童子蹙頞代請命姑責戒勵後不敢念其昔日到光明曽逰相鬚經御覽三珍行聶西清遺以東坡書工部夏夜嘆蜀人趙雲子畫李杜及素琴一張作三珍行西清平生雅好竒夜則忘寐晝忘飢搜今抉古竭心力常恐世間一物遺雲霧軒忩煙月户萬寳彚列牙籖垂循環邏視日千匝拊摩拂拭心融怡驚冦披猖變倉卒六丁下取留毫釐收拾售用自不足尚輟三珍贈我為六幅之珍老坡字印可誰氏參寥師怒鵬九萬氣吞吐驪珠百二光陸離兩軸之珍雲子畫李杜跨蹇將何之華隂縣裏過門日浣花溪上尋春時一張之珍太古琴孤桐斵削嶧陽枝刻石潄玉世少比較昔響泉彼堪嗤銀鈎鐡畫貴楷正此則倚醉飛蛟螭寸馬豆人貴纎密此則縱意隳藩籬金徽玉軫貴音韻此則得趣絶絃絲天機皆由胸襟出妙處莫以形跡窺愛兹三珍每自隨酒酣呼驢任倒騎抱琴委轡烏角欹琅然髙吟夏夜詩荆門行原注開禧丁夘被檄相視荆門關隘去年曽問荆州途鷄鳴犬吠民耕鋤揺鞭重来意慘淡前日井邑今丘墟雲昏雨澁初堆碧四野荒荒人跡踈深山扶攜皆露處骨肉蕩沒况室廬老農無力倚牀卧少定舉首来向余官人且坐待儂說未說涕泗先横裾老夫老豈識兵革忽見逺近皆狂徒懸崖絶壁魚貫進飛馬上下爭馳驅吾軍非是無身手未鼓棄甲先奔趨時平廩帛官不計戰勝爵賞官不辜進怯鋒鏑退焚掠兵既難堪堪女乎歸来未暇正其罪官有金帛還招呼老夫莫曉軍旅事但聞敗衂深嗟吁我聴其言為蹙頞含淒獨下西山隅金蓮似恨羶風染蒙泉未洗血水汚九秋半破明月夕照我孤憤行繞壁天子嘗膽方側席㣲臣敢作楚囚泣秋風一劔樓蘭國送竒仲過霅川少年湖海氣近又負詩名今忽擔簦去誰非倒屣迎雨茶煎顧渚春酒醉烏程有句茅亭著蘋風洲上生劉幹東園築圃非容易經營二十年煙松迷五鬛風栁起三眠疊石連山麓栽桃擬洞天最為瀟洒處正在竹林邉拍欄偶把欄干拍沙鷗水上驚晚紅殘照在秋碧逺山横盡被浮名役皆從妄念生不如歸去好杖履老柴荆小山寺披霧入野寺寒林響朔風更無僧出迓山鳥若為通松露染衣濕巖花照眼紅塵縁聊可息歸騎莫匆匆避暑炎赫無逃處如何得雨来雲生應有望風捲又還開攜簟尋池閣傾醪注晚杯堆盤粲紅顆味不减楊梅宿古寺黄昏投寺宿古屋瞰荒江村酒沽春甕山房耿夜缸灘髙聲撼枕月落影收忩僧老人皆玩樓鐘曉未撞雷潭寺憶昔登臨日今經二十年崢嶸新棟宇黼黻舊山川魚響潭翻浪烏飛風送船穴空龍已去鱗爪跡依然原注寺傍有龍窟鱗爪之跡尚存舟中離家俄十日千里獨衰翁篷響過雲雨㠶開逆水風新沙増岸脚小港隐蘆叢客思難消遣黄昏月一弓繫纜停征棹斜陽古渡頭風霜先逺客天地獨扁舟水鳥衝開浪汀鴻占斷秋在家貧亦好何用出林丘題化成巖二首命友化成巖同尋頃刻閒半途瞻佛塔數里入禪關松動影移石江清波漾山衞公讀書處有鷺宿其間原注有李衞公讀書堂公集中載白鷺賦一線㳂崖路衰殘步屧遲攀蘿衝霧上倚檻俯空危石佛像須乆山僧言不知㸔来衆亭子最是妙髙竒日融日融風力軟曳杖獨逍遥蜂去花心靜鶯遷栁影揺一年春易老兩鬢雪難消客至時留飲無縁特地招秋夜懐歸鄉里千山月塵埃兩鬢星秋聲雖是爽客耳不堪聴多淚風前燭孤明竹外螢吟蛩更無頼終夜幾曽停訪鄭隐君不遇行盡櫪林村柴門閉夕曛自来松下坐閒想壁間文守樹猿偷果窺山犬吠雲多應尋鶴去秪隔暮溪濆晚興是處牛羊下喧譁走牧童霽煙拖淡碧夕照殞殘紅老鬢日添雪衰軀晚怕風愁来無著處分付酒杯中登法雲寺雲林擁深寂山寺倚崔嵬童子請先坐老僧恐便迴庭黄霜到橘堦緑雨滋苔掛樹猿相玩呼之却不来招賢渡溪閣晚望溪流清到底十頃浸秋光煙重山加色風强雁失行塵埃雙老鬢天地幾斜陽何處一聲笛征人暗斷腸同子嚴初夏飲山閣緑隂千百頃約我共登臨山翠含煙重榴紅著雨深行藏皆有命計較漫勞心病怕杯中物憐余淺淺斟夏日普信寺江閣到此全無暑虚闌千里風看飛雲度水聴落石鳴空日月忙烏兎春秋逓燕鴻一生塵裏過煙艇羡漁翁江閣夜小閣臨江逈疎簾帶霧鈎雲鴻遥影滅灘月碎光流詩思偏宜夜衰髯不耐秋漁燈三兩㸃隐隐荻花洲醵飲劉園隨意攜盤饌毋煩事禮文燕飛衝幕過鶯語隔墻聞興自樽前發韻從花下分詩成似供課醉墨競紛紜清明小飲草草清明飲惠風天氣和身輕梁燕舞舌巧栁鶯歌但道三春好其如兩鬢何升沈付杯酒由命不由他春郊數㸃緑楊風春光處處同蜂喧搜蘂瘠鳥閙聒山聾聫句逢詩友尋僧問牧童家家辦農具凖擬試新工臨川縣治古桂兩大株與葉潜仲鄔文伯飲花下雙桂相傳久百年殊未衰樹聫鋪葉密根老著花遲葩墜粘詩筆香濃透酒巵月中但孤影安得兩交枝倚樓兼葭秋色晚百尺倚江樓日暗煙藏寺風髙浪拍舟歸雲投逺嶺飢鴈呌滄洲心事非年少塵埃白盡頭到農家難得官人到茅簷且駐車自擕鋤掘笋更取網求魚一媪来斟酒諸童競挽車須㬰對吾泣科役苦追胥舟泊舟泊似差早篙工愛酒坊羊羣歸逺隴栁影戀斜陽澤國人千里暮霞天一方茶多不思睡漁唱聴滄浪前頭無泊處且住荻花林水沸知灘淺煙蜂花在瓶呼童治茶具有客扣柴扄共說山林話休嗟兩鬢星維舟望見人家了猶須轉一㘭寺從山背出船向栁邉捎問酒尋溪館呼兒解臘包三杯亦徑醉無事且權抛訪曇師道人雲外住小徑入庵幽榦老梅逾瘦林疎竹自修揀茶相伴煮補線且停抽此事如何說下山歸去休贈慈上人踏遍叢林後歸来隐石崖任梅斜到牖聴竹長侵堦掛壁塵堆笠穿山雲惹鞋真機須我悟餘事是持齋空師欲逰嶽往訪山寺聞師逰嶽去打急訪髙岑躡屐若来晚挑包不可尋山寒梅意悄林茂鳥聲深行住無非道何須枉費心送上人歸閩頂笠遍參請平生志甚勤耳方離嶽瀑眼已接閩雲宿嶺星辰近渡溪煙霧分勸師早休歇禪不在多聞雪中尋僧尋僧閒踏雪握手上鐘樓初下寒飄屑纔濃風輥毬水波糊紙閣春乳泛茶甌片片看来好龎公有話頭寄圓老聞欲移住他院妄動生于念禪床坐不牢舊窠元自好新刹又何髙去住身如寄奔馳足漫勞挑包聞已決應笑我忉忉送聰上人歸四明辦得四方逰孜孜討入頭歸雲起齋鉢髙浪送行舟笠戴天童雨鞋穿雪竇秋平常心是道莫更問人休過寳雲寺訪密師寺纔三二里曳杖且徐行晴塔松梢見風鍾嶺畔鳴樵夫分道過僧子就房迎竹有千竿立塵無一㸃生送仲兄之京口纔歸又東去且道幾時還筭路亦差逺縁君不耐閒江城登鐡瓮煙寺認金山我昔經行地詩牌掛壁間題崇真觀東軒東軒靣水枕山阿左右雲烟濕翠蘿風度鶴聲聞逺壑日移松影轉前坡愁来獨靠清樽遣老去休憎白髪多道士罷琴揮醉筆詩成自喚小童哦題戴洪甫愛竹軒竹癖難憑俗眼看琴書靜對翠光寒秋聲鳴屋風初度夜影翻牀月半殘天乞幽人供嗜好日呼稚子報平安忩前幸有閒田地分我雲梢四五竿同趙尉飲江亭草草三間兩眼明數峯如畫一江横風烏破浪㠶檣急野鶻過林鳥雀驚蟻取浮篘尤有味魚方出網正宜羮流鶯憐我無歌者簧舌頻翻栁上聲題合江亭石鼓山頭一小亭乾坤萬里眼雙明雖因刺史能尋勝不遇昌黎豈得名衡嶽雲開秋洗碧蒸江湘合水爭清書巖莫辨當時字空積塵泥野草生原注昌黎有題合江亭寄刺史鄒君詩末有願書巖上石勿使塵泥涴之句梅園名金柅多竒卉古榦靈根獨異常耻與春花爭俗艶故將雪質對韶光天葩巧削崑山片露蕋疑含建水香當為君侯好封植角弓三嘆誓無忘茶罷茶罷晴檐唱午鷄偶騎驢去過東溪酒餚分倩樵夫挈筆硯專令童子攜放目水亭欄獨倚題詩僧舎壁新泥興闌歸問来時路到處蟬鳴日已西史鎮江匄祠得請仍進職兩載南徐屈從臣笑談樽俎運精神民無木土絲毫費手挈江山表裏新千里舳艫渠水利一團錦繡閬風春夾河栁接甘棠影下有攀轅卧轍人原注築間疏渠終河葺圃百廢具舉盡出公費帝念承流欲報功力祈閶闔請琳宫固知槐鼎身將近却愛蓴鱸味不同寳閣風雲雖學士滄洲烟雨且漁翁到家宣室思前度又使猿驚蕙帳空原注史自號滄洲午炊徐坊嶺途長力困時時歇日影將終僕馬飢糴米荒年増價售汲泉逺井得炊遲竹稠亂笋穿開路藤茂多花盖盡籬飯了店翁相送出丁寧前靣小橋危避暑溪上不堪蝸舎暑如炊何處清幽可杖藜未約客須先覓酒要尋凉必去臨溪撑船訪洞林間港坐石吟風栁下隄晚網得魚似湖白鸞刀鱠玉擣香虀雪徐廣文招同官小集分韻得明字瞰江亭館約登臨雪後慿闌景倍清波靣玉虹千丈霽塞邉氷鏡十分明放懐共恨添杯少分韻俄驚擊鉢成對奕不知誰勝敗醉中但聴子丁丁宿妙果寺贈洪上人上人留我禪房宿煮笋烹茶語夜闌鐡馬鳴風山牖寂木魚敲雪曉廊寒真筌但要此心悟公案休將故紙鑚若道吾言沒滋味請師且去坐蒲團晚征回首家山已十程揺鞭自嘆苦勞生雲先帶暝巖邉宿月獨伴人溪上行草屋倚驂難可意杏翁叱犬不容聲明朝路逺起湏早第一鷄啼是五更途中雨中奔走十来程風捲雲開陡頓晴雙燕引雛花下教一鳩喚婦樹梢鳴煙江逺認帆檣影山舎㣲聞機杼聲最愛水邉數株栁翠條濃處兩三鸎宿江閣閣前眼界如圖畫山色侵忩竹打簷雲帶鴈聲移别浦月將梅影進疎簾壯懐自笑年年减華髪無情日日添夜半驟風天驟雪貴家鼓舞客心嫌春眺獨倚危䦨春意逺本無情緒强登臨一眉晚掃晴山黛萬縷風揺岸栁金乆負故園泉石約恍驚老鬢雪霜侵兩年雙脚數千里奔走塵埃損道心訪黄簿留飲愛靜移家住水南門排古木枕寒潭鶴翎漸長呼童翦麈尾頻揮對客談旋切銀絲膾鮮鯽新嘗金顆擘香柑惜予戒飲難陪伴舉白掀髯子獨酣醵飲出城二里野人居最愛園亭傍室廬墨湧晴池聚科斗雪明碧嶂過舂鉏興来醵友尋詩酒忙裏攜盤但醢蔬新剏小軒尤更爽百来竿竹間㯶櫚黄幹見約小飲就宿病後何人慰寂寥長鬚持簡忽相招溪山見說為樓爽杖履寧辭去郭遥栁絮一天晴舞雪松聲十里夜聞潮談詩直到疎鐘動酒困頻將茗椀澆郴州鹿鳴宴連科已占十名前行聴鴻臚第一傳我俟合符留勸駕君能摛藻預興賢湘山㸃化名千佛郴嶺飛昇傚九仙此去瓊林天上宴今朝先賦鹿鳴篇原注郴人事湘山佛及有馬嶺蘇仙上昇處號九仙一佛次韻袁州鄭守鹿鳴宴詔増貢籍自端平大比賢書㧞衆英學備六經俱里選賦推五色以文鳴雖由黄巻能勤苦皆藉朱旛與作成来嵗錦標先奪得天街聴唱狀元聲原注舊解九人經五賦四新制増取二人經六賦五六經遂備題村舎壁柔風十里日曈曨雨後陂塘野水通兩岸栁煙籠曉緑數枝桃露滴春紅明知鐘鼎衆皆羨到了山林味不同田父殷勤邀我坐一盂白飯一盂菘早征店鷄一唱接疎鐘起整行裝尚夢中沙路踏殘征馬月栁隄啼斷曉鶯風水肥渡險添舟子岸没途窮問牧童千里鄉人逢陌上片時握手各西東杜宇纔聴今春第一啼如何便道不如歸聲穿忩隙驚歸夢血溜花梢濺客衣呌斷寸腸誰接續懶隨羣翼戀芳菲田園荒盡腰猶折我亦因君覺昨非訪别胡倅留飲水閣故人知我已膏車折簡殷勤屬訪渠惜别怱怱留語笑臨時草草治餚蔬密遮池靣荷千蓋斜揷雲頭月一梳此夕凭欄又何日鴈来莫惜數行書田家嘆破屋三間結草扉柴根煨火合家圍此生能得幾年活薄命連遭兩嵗飢腸久鳴雷惟淡粥體雖起粟尚單衣晚来稚子多歡喜報道小姑挑菜歸沿溪宿虎山山家髙低田水曲通池小小人家短短籬杜宇教唆春去早隂雲遮盖月明遲年年只解催教老公事從来了是癡若不隨縁强煩惱漫添兩鬢幾莖絲苦吟幾度燈花落苦吟難便成寒忩明月滿樓上打三更山寺樹暗常疑夜山多易得雲撞鐘最深處嶺外不曽聞吟髭壯嵗髭如漆年来暮景侵更令如雪白撚斷不妨吟漁舟秋巘翠千疊晴溪玉一灣漁舟三兩箇来徃釣其間出郊二月垂楊岸行春詩酒徒蒼頭前引道拄杖掛葫蘆題莊舎壁水深荷較晚地僻草偏多佇立風前聴樵夫隔隴歌登樓地卑梅雨濕氣壓篆烟低孰是披襟處髙樓百尺梯夏日山中瀑近書皆潤林深簟更凉山中無一事夏日覺猶長贈定上人談禪皆是病參請不須忙且看諸尊宿相傳甚藥方讀離騷琅然醉讀離騷經一鶴聞之來中庭童子屢麾不肯去直凑樽前側頂聴溪上一番雨過驟晴時溪上春光色色竒日煖花繁蝴蝶急輸官尚欠二斤絲倚欄倚欄有恨無人說暮角吹梅寒聲咽急風捲雨過鴻驚吐下蘆花一枝雪江湖後集巻四
