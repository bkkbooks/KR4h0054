body:
  text: 江湖後集卷十宋陳起撰林希逸希逸字肅翁號獻機福清人端平二年進士歷官翰林權直兼崇政殿説書直祕閣知興化軍有鬳齋續集竹溪十一稿劉克莊跋云乾淳間林艾軒始好深湛之思加煆錬之功一傳為網山林亦之再傳為樂軒陳藻三傳為希逸竹溪稿乾中含華滋蕭散中藏嚴密窘狹中見紆徐王士禎居易録亦言鬳齋詩多宗門語如題唐明皇按樂圖逹摩渡蘆圖長歌皆佳題江貫道山水四言原注此畫匹絹作石林簡齋有詩跋之逺山叢叢逺樹濛濛咫尺萬里江行其中短長何岸高低何峯彼坻彼渚彼瀑彼洪晴嵐乍豁煙靄蔥籠或斷或屬且淡且濃爾崒奚寺爾盤奚宫或垣隂翳或梁嵌空有吠者厖有樵者翁危檣落碇短棹掀篷往來異趣寂動殊容羃翠其庭豈非盧鴻略彴而渡豈非龜蒙昔我經行雲山萬重若淮南北與江西東亦蓑而雨亦帽而風乃今追維夢境相從及此開卷恍然昔同誰居作者造化論功淹總其裔熙成是宗聲聞九陛既召而終謂彼樹白原注貫道畫林木如算子其身皆白讖其身窮其然豈然訊之天公此名穹壤疇曰不逢石鼎聨句圖畫意不畫形形勝意不足正如九方臯相馬不相肉此筆誰為之繅藉以錦玉一几共三人彌明喜師服𢋫酬夜何其漏箭在銀燭誰如豕腹脹誰作龍頭縮始胡為頡頑末胡為屈伏彼既鼻撩天避席徒局束去者俄翩然二子睡正熟扊户問童奴曉雲凄古木質之昌黎萹段段皆實録用意豈不精或者疑近俗我聞文章家同工而異曲或如駿歷險千里在一蹴或寸步不遺句句必連屬在詩則樂天在文則永叔畫品恐亦然願言寶此軸毋使歎巧心受嗤于拙目午齋即事晴窗吾伊罷風薄清晝永陳編幾廢興適笑心自領青精飲何味車笠拂塵境佇立共幽懷虛簷踈竹影方溪上謡溪上行吟山裏應山邉間步溪間影每因人語識山聲却向溪光見人性溪流自潄溪不喧山鳥相呼山愈靜野雞伏卵似養丹睡鴨依蘆如入定人生何必學臞仙我行自樂疑散聖無主獨賦溪山謡山能逺和溪能聽雲木相參歌溪翁結茅傍溪南近山繞屋青如藍天垂四野雲到地千頃萬頃羅松杉著亭小小寄面勢往來萬象窗中含有時倚杖日未吐但見雲木朝相參蒼蒼古木大百圍白雲無心出復歸雲無盡藏木不老雲木千載長依依我醉呼雲雲不飛風和萬竅如塤箎此時此景誰能盡既以名亭聊賦之安豐作塞北悲笳起淮南古木踈風髙疑唳鶴水落見義魚俗僅傳丹鼎人誰問枕書因吟招隱賦久客自嗟噓宿西興渡古寺鳴鐘罷髙林宿鳥忙竹明風弄影荷淨露生香月到中天小星過野水長江村人寂寂敗葉響銀床讀程氏遺書浮生長短夢可見幾英雄不有遺編在應隨落葉空中宵門外雪一月坐間風似此難傳處能言孰與同與陳同舍飲三元樓失身杯酒莫追尤爛醉生涯儘自由可倚何須鸚鵡賦相逢且解驌驦裘今無客入揚雄巷終有人題李白樓却笑三閭太憔悴獨醒猶作畔牢愁心王易言不動工夫密書説惟微體段彰仙漫有方求氣母禪非無見指心王靈根本要行藏在稿木寧於應感妨一語何思千古訓莫言為陸背程張日用詩賴得人間念已灰省身克已問參回事隨緣法安排去病向根源點檢來布襪青鞋資懶散筆牀茶竈恣徘徊偷忙不住提撕著猛可投機亦俊哉題玄扃君從何處叩玄扄耳學紛紛莫浪聽剗盡念頭方近道掃空注腳始明經見聞日富祗塵積涉歷年深似酒醒不必但疑禪背理請君細讀信心銘虧欠休放間愁到酒邉眼前虧欠是良緣六王才畢秦關失二寇俱平晉社遷月滿一輪須漸破屋留三瓦莫教全誰名缺減人間世雖道畨僧也自賢郊行即事野店相依門向背牧童對語岸東西草枯白見樵成徑木落紅隨葉入溪色有淺深峰逺近影無長短樹髙低眼前好句間收拾歸到書忩却自題老樹菌生鋪兔目斷蹊泥濕印牛溪山僧渡水雙携履野客歸村獨杖藜羣鳥爭枝聲上下孤松夾澗影東西行吟注意搜詩料欲近前溪路匆迷世味世味更嘗百念輕眼前何辱又何榮寧教鬼解揶揄汝不許人能駕馭卿躍馬卧龍皆夢事焚香弄鏡了餘生春殘雨水差沾足却願從今米價平自警靜退雖知趣味殊終然習氣未全除有無對境宜俱遣夢覺何時解一如得力要須生處熟用工最怕密中踈莫教草草匆匆去却恐從前枉讀書題詠近藁拿舟早己向三韓莫放天風解引還九轉黃芽先白雪千年翠甗後紅斑棊無盡算仙猶在性要全空佛未間得路不須愁險絶看他腳力盡時山題艾軒詩為道難言不著書但知日用是根株當筵自昔傾龍象嗣法何人識馬駒六學即今皆勦説一齋孤立可長吁犀斜南谷窮愁骨仙境能談舊事無列子口義成莊列源流本一宗微言妙趣不妨同但知絶迹無行地原注莊子齊物論豈羡輕身可御風二義乖違劉絶識原注劉向敘中有二義乖背不似一家書之語八篇參校湛何功原注今書八篇張湛所參校就中細細為分别具眼應須許此翁讀關尹子青牛車後抱關翁師己西遊道却東著論九篇今獨在命名一字古無同原注九篇皆一字名不知身老傳誰氏可愛文竒似考工博大真人莊所敬寥寥千載想宗風題新藁少日無端苦學詩倚樓面壁總成癡斷無子美驚人語差似堯夫遣興時最上宗風理沒久新來家數見聞知吾生恐被師傳誤自比靈雲更不疑至學至學玄談理最微負門粗細有誰知蛇生弓影心顛倒馬齕萁聲夢轉移須信風幡元不動能如水鏡却無疵咸經四字分明訓截斷憧憧未感時原注先師樂軒云貞吉悔亡四字今古坐右銘也小象以未感害釋之有感有應而後害生未感則無可悔也物理六言以鳥養鳥盡性惟蟲能蟲知天萬物與我為一反身樂莫大焉羊蟻不如魚計鴻鵠豈比鴈謀為問折腰五斗何如散髮扁舟杜鵑前身名宇蝴蝶夢境為周至理但觀物化吾心自有天遊醯雞甕中世界蜘蛛網上天機他心我心一是大知小知俱非蚯蚓兩頭是性桃花一見不疑了得葛藤三昧却參芣苡諸詩非魚知魚誰樂夢鹿得鹿誰誣若與豫也皆物原注莊子語執而我之則愚原注關尹子田圃雜興疇昔多慚世網牽收身幸早賦歸田四科人物皆髙第只覺樊遲也自賢獨坐搔頭曉未梳喜看童僕理園蔬漢儒不悟真消息却下簾帷只讀書郊迎猶待一畨風主相那能不愧容縱道東還心事白更須定洛乞明農嵗計溪南數畝中但將風雨祝天公人生何必堂厨飯米滲藜羮一飽同雨過高低水地平扶犂野老續歌聲憂時莫問蓑衣讖但看烏犍破曉耕原注讖語見文公集雜著輪輿蓋軫及車弓模寫文竒是考工農具因何却踈略周公於此愧龜蒙原注笠澤叢書農具説最工寄書後作幾度題書客未還歸鴻節節度鄉關遙知一紙平安字慈母燈前閣淚看登舟喜頓清秋暑觸暑登途衆共猜好風誰料逐帆開天公應是憐行客正忤炎官熱屬來張煒煒字子昭杭人有芝田小詩雜詩笙簧世所貴正調多溺沉有人懷古心臨風理瑶琴一彈秋月髙忽覺開塵襟或疑澗泉聲忽作鸞鳳吟得意自怡悅子期難再尋銅壺一枝梅儘可為知音苦寒二首北風吹枯桑汙注如語汝窗虗夜少寐展轉莫寧處衾裯冷如鐡凛凛不可禦家居猶畏寒何况逺行旅白雪農家瑞亦使天下寒陋巷無飢民此瑞古所難上方播春仁發粟賙飢餐一飽生歡心萬户各獲安海棠楊妃睡未足西子粧太華餘妖媚東君化為枝上花嬌羞沁紅玉裊娜揉春霞少陵恐添愁不欲詩句誇題夏訓武圭畫牛枯木立數莖斷岸走千尺旁有牧牛兒放牛倚拳石牛間芳草間兒倦眠局蹐畫手筆入神淡墨奪真迹慿誰喚兒醒落日歸路僻覺來橫短笛吹斷逺山碧遊葛嶺瑪瑙寺瞻孤山尊者像柳風吹蘭襟蘚暈識芒履尋幽古招提偶識尊者墓斷碣眠蒼雲慈容慘香霧孤山豈無詩未若壁間句虛谷虛室既生白空谷亦傳聲山翁抱高標借為虛谷名中有如帶水流出心源清我欲從之遊臨風濯塵纓柯山製墨胡處士求𨽻字有客落魄逰京都形服差類山澤臞袖携一紙故友書來求古𨽻銘墨模我方臨池且自娛觸撥雅興生江湖坐扣墨法果不誣出示數餅泥金濡質模溫潤凝龍酥麝氣酷烈清透膚浣濯研沼塵滓無磨動淳漆生金壺吳箋半幅翻雪腴碧雲掩冉生兔鬚豪家有錢貯金珠誰肯淡好如吾徒自憐我為貧所拘傾囊盡易令無餘臨行束擔付獠奴就索詩句榮歸途天下具眼不可汚芳名豈借人言沽試宣毫中山瑞獸久不出天下筆工徒負名近聞宛陵獲數輩束縳管製差專精携入京師求鑒賞一見不以他毫輕呼童滌硯淬醫玉催我紙上雲煙生買劔袖携一劔三尺銛試與豪士論醜妍鋒鋩閃爍走氷雪靶鞘激烈拏風煙斷蛟截犀挺靈怪照人切玉光牽聨昔時歐冶不再出純鈎磐郢名空傳越王苟不遇薛燭萬户駿馬誰肯捐物雖有價瑤無價瑤逢識者逾精鮮主人得之亦自壯十襲珍祕輕萬錢何當佩服却戎羌會令沙漠無戈鋋辛丑長至物意通人事陽生一脈天梅雖攙臘破栁已得春先襪頌趨時獻臺雲取巧傳所須惟飽耳延頸看豐年寄任居士原注希言師默修禪觀龍升虎自間眼開俱是道心定亦無山癭木牀三尺蓬茅屋半間錬成真積力䇿景到瑶關為徐叔剛賦逹齋男兒徑正氣期欲展經綸場屋求程藝山林多隱人學優冝必仕道在不妨貧快舉摩霄翮聮翩立要津題蓮峯集後奪得蓮峯秀英名馥邇遐文章騰氣焰句律煉聱牙一梗江湖客三朝忠義家欲評清絶處雪月照梅花紙閣紙閣新裝褫青氊喜尚存翠圓垂彩絡紅朵粲陶盆藏密寒無著融真體自溫夜深誰晤語花綴短檠昏遊蔣山家世帝王州鍾山恥未遊卷書趍幕府散步入林丘泉湃懸崖醜雲間古樹愁草堂今在否更欲展詩眸簡耕月一犂將暝色月下自耕耘為適能吟趣非干力穡勤草芟心地濶苗揠世情分莘野如膺詔新詩就獻君辛丑長至後九日其夕大風朝家禱瓊瑞天忽賜雄風靜聽耳轟鼓凍眠身屈弓把茅吹卷後矮柱兀搖中拶曉怪威息太陽升海東過西興渡久不到西陵重來扣便􅦬眼吞滄海碧帆卷越山青路逺人煙盛官清風浪停片時登岸口小立望雲亭題淨衆壺隱古院無僧住含情更惘然緑苔欺破閣白鳥沒飛煙壺隱遲遲日筒分細細泉欄干聊小憑取次綴詩篇騎馬陌上騎驄馬朱纓耀日丹袖欺鞭竹瘦靴入鐙金寒毳帽兜貂鼠茸裘織雁團戎裝吾亦可初不礙儒冠題友人深居間中有真樂深隱向林巒􅜩竹招山色栽梅結嵗寒事因貧後少心到老來安拾芥取青紫野人猶畏難觀集芳園千步入修廊猶聞碧霧香風翻宫襭紫菊染御枹黃亭宇丹青老笙歌嵗月長上皇臨幸少書圃自翺翔謁和靖祠先生遺隱迹年古路荒涼鶴喚詩魂去梅留姓字香孤山應似舊薦菊謾流芳翻作西湖夢騷人為斷腸題心逺别墅聞説藏修所慿山更接溪百花攙序發萬竹剪雲齊地勝塵無染㕓居俗正迷二王詩絶唱何用我留題舟離和州别史君眷客留連久分携各惘情櫓搖江水碧城凸曉煙明衣薄寒先覺心平浪不驚鍾山青在睫歸興逐雲生謙齋席間贈苔磯因合謙齋飲新編得細哦髯掀天地闊足歷水雲多才敏逢青眼家成隱翠蘿近聞詩債盛老退欲停戈訪劉山人隱居步入山回處茅櫩隱士家逺峰奔渴驥曲徑裊修蛇純翠千莖竹交紅一架花客來費清供汲水自煎茶春晚郊行有懷行春車馬漸無多間步郊原玩物華已角未腴隂徑筍似香非韻别籬花子規饒舌空催客蛺蝶貪遊不戀家常記湖邉同詠賞歸鞍扶醉月籠紗冬至冷笑書雲上魯臺乖祥俱向眼中猜隂逢剝處自陽復否到極時須泰來霜剪草茸寒欲斷日烘梅粉暖全開吾儂喚作尋常事坐看兒童拜節回學吟騷豪矢口便成詩全異推敲鍊句遲一字下平搖不動數聨生就穩難移池塘春草英靈處水月梅花頴悟時我亦學吟功未進每將此理扣心師題六和塔秀江亭秀江亭上駐吟懷苔蘚軒窗四面開潮怒挾風吹海立櫓聲搖月下天來浮漚世事等出沒泛梗羈人幾去回待寫篇詩紀遊迹路迢不奈馬頻催雪忩自西陵以新詩並水仙見惠洛浦風流幾隔年江南重見色依然根從野卉同分品香與梅花可並肩葩白中黃饒蘊藉臘梅春暖肆芳妍殷勤併挾新詩送領略丰姿夜不眠餞友人赴靖州通道尉竹風荷氣約朱明路入渠陽暑尚清馬耳蕭蕭懸墮月雞聲喔喔勉修程何拘梅政誇年少即泛蓮漪贊老成莫把西湖浪吟筆楚山空濶更關情題友人自方家峪遷居北山棲霞嶺素喜華居逼禁闉北山何事又移文來依嶽麓千章翠間却南屏一片雲招月詠梅君自樂煮泉瀹茗客同分未隨燕雀伸忱賀先剪溪藤述寸芹遊洞霄棲真洞筍輿搖兀到山前就宿棲真古洞天老木倚風清鶴唳濕雲拖雨護龍眠塵凡敻出幾千仭足迹經由已半仙到此豈容間詠筆重來知復是何年題可山梅花巖髙人深欲買山居常辦栽梅養鶴圖喜有名園鄰水月不妨清夢憶江湖羲之坦腹應相愛和靖掀髯足自娛旦夕杖藜須踐約錦囊先束付奚奴題童宰盤隱才了花隂入要塗暫時歸去友樵漁逺山數筆意不盡流水一泓清有餘我輩愛吟懷退步誰人得計肯間居古梅樹下三間屋深掩柴門靜讀書歸耕紆青拖紫信天緣才説歸耕自樂然二頃良田供活計一鉏風雨飽豐年妻條桑葉催蠶起兒脫莎衣傍犢眠不是此心甘隱退為貪農隙理殘編援藤援藤穿蘚扣雲扉清足髙標顯翠楣風月任隨時事改江山不被世情移雖無白酒留君醉却有青編可自怡朱紫紛紛徒説貴隱居真樂幾曽知桂癡兒總向月中求不信人間賸有秋萬點盡垂金粟顆一枝宜上玉搔頭清香已壓龍涎倒墮蕚冝將蟻醑浮吟得詩成對花舉不須招客費賡酬簡任新恩自别梧姿二十年情親何暇鴈傳箋深疑楚澤蟠胸次不放吳霜點鬢邉我憶花間聽樂府君嗟柳下度吟鞭于今又遂銜杯樂湖海相逄豈偶然寄武岡宰宋雪巖柳下分携鬚影蒼好風吹夢過都梁諸蠻帖化花隂靜一騎飛塵薦墨香書就幾曽逢驛使公餘應不冷奚囊雲情鶴態元如舊應倚株梅憶錦鄉謝朱髙郵惠湛盧詩集門掩飛花欲曙時起來忽接湛盧詩清新盡奪氷霜氣婉麗渾無脂膩辭題品江山今已了登庸廊廟不冝遲髙沙父老休專惠宣室今興夜半思寒月郊居心逺郊居間亦勝磚爐紙閣類僧房倦抽樂府翻吳韻獨對騷經味楚羌句到奪將袍錦赤功成消得帶金黃相逢每惜芝蘭種猶在瀟瀟水竹傍再逰玉泉觀金魚曽見金鱗已十年重來鬐鬛尚凄然忍從蝦蟹常為侣好作蛟龍飛上天古木聳雲尊梵宇靈源疏滴潤農阡商霖已得真賢佐旱暵何勞籲玉泉謝友人惠筆翰墨場中浪得名近來研席愧塵侵紫懷心素鋒鋩健紅束腰身管套深珍重故交分數種勝于野老獲千金便當拂繭晴忩下賸寫新詩倩鶴吟湖上次韻湖邉舊好即潘楊惜不同舟艤岸傍竹葉肯陪三揖醉荷花分受一襟涼雪壺色淨氷心爽金縷歌停玉骨香客散樓臺收晚照獨看西子學吳妝宿洞霄虛白房列岫宗竒觀藤蘿結翠門隔巖龍喚雨雲走半窗昏懷玉山人過越江玉石紛紛嘆混淆君今懷璞在吟袍快帆聞指西陵去識眼相逄價自高鞦韆吾今兩鬢已成絲每每逢春獨自悲最恨鞦韆無力上風流不比少年時綵索髙懸錦柱頭女郎花下競風流垂楊影裏曽窺見飛起嬌紅一點愁賦竹宫羽人藝谷昔年摘葉更尋枝踏遍山巔與水涯今日華陽親薦得玉苗仙草映靈芝觀王氏山亭舊基山亭礙月不容留拆去危基立故丘落日倚笻舒望眼片帆鈎破一江秋書向耐軒薌林一譜傳清白以耐名軒更出竒修竹護窗梅夾路嵗寒消息獨君知翠微亭萬木輪囷卧嵗寒一聲啼鳥應空山興來小立危欄畔身在碧雲霄漢間知果寺參寥泉原注坡仙嘗瀹茗論詩于此破屋伶俜斷碣橫剝苔倣佛見題名自從人去西湖後一掬寒泉便不清鷗鷺世界原注徐氏堂扁間飛蘆葦疑成序獨立菰蒲似不羣愁思無邉煙水闊畫家詩境合平分謝瑜首座寄黃龍茶寄我黃龍茗一圭旋烹竹雪試新竒地爐火軟湯初沸先約梅花小賦詩忩底日炙虗忩暖欲春忩前椒蕾破梅英朦朧困眼看書倦驀聽蜂兒撲紙聲巖桂天街清曉似香林壓擔秋花塞市心總被時人低價得葦簾茅屋盡黃金題問坐主梅隱萬點春風吐白雲孤芳繞屋占雲根幽間中得幽間處暗水流香緊閉門竹所數幹當櫩眼便青翠隂千畝况為鄰休貪冷地間風月好作清朝徑節人書雲萍録聚若浮萍散若雲江湖姓氏總相聞何煩爵里重鋪敘只倩梅花舉似君傑閣峥嶸據桞灣段侯江令夢魂間我來不問興亡事傲立薰風看蔣山試翁壽鄉貢餘墨萬杵煉麋搖夜月一圭分劑割晴雲雪腴半展陶泓淨改罷新詩寫贈君贈製墨羽人葛太玉回公膠法不輕傳太玉知機合伴仙安得翠雲蜚象管書邀風月上蠻箋寄簡崇禧司徒髙士原注佑聖羽人往傳法袖惹天香隱故廬一山猿鶴伴清虗有人來叩神仙訣就剪晴雲問起居花飛花飛梁苑春消後月落秦樓夜斷時一點不如歸去恨阿誰説與杜鵑知簡趙真休曽向詩壇奪錦袍至今湖海誦風騷何如放下渾無事句不驚人意更髙􅀈回友人轉示詩卷拾得驪珠不祕藏來尋識眼共平章臨風一盼留書架夜夜豪光射竹房贈梁彌仙原注羅浮山人笑側華陽一幅巾碧眸蒼鬢貌如春羅浮洞裏通勾曲疑怪相逢似故人雪忩惠海棠驅奴分送海棠花裊娜枝頭剪碎霞插向銅壺當愛惜且留春色在吾家題適安隱居蘿蔓紉巖竹翳閭天然幻出隱人居客來欲問山中趣挂壁絲桐插架書試童巖野墨杵麋烘麝樣新翻蟾玉輕磨漆未乾合走春風供化筆肯隨清譽到詩壇書和靖故居童鶴飢癯古屋低孤山猶憶數聨詩先生更有清髙處未必梅花盡得知小池恰恰方池欵竹齋風搖窗扇掩還開無端半夜踈荷雨更帶秋聲入夢來題村居村居何識見時節春去春來自一年誰與兒童話寒食也將楊栁插門前數舍茅茨簇水涯傍簷一樹早梅花年豐便覺村居好竹裏新添賣酒家
