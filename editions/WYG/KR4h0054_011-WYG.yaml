body:
  text: 江湖後集巻十一宋陳起撰万俟紹之紹之字子紹郢人有郢莊吟藁方洪序曰相家子也按宋宰輔表万俟卨外無爲宰執者豈卨之族歟又大觀中万俟湜知澤州以循吏著語云前有王琪後有万俟固有以亷節顯者也方洪郢莊吟藁序曰洪㓜侍先君子側一時雋秀多相與游郢人万俟子紹相家子也力學好修先君子敬愛之寓居琴川嘗登抑齋先生節惠王公門見聞卓犖故其文閎以肆負西北鯁亮氣不隨衆靡故其詩清以嚴兩上春官人期之與自期不薄也居亡何疾而卒臨革以平生所爲詩屬其友順適葉君俾鋟之梓葉君耽于詩篤于誼不負所託一日擕詩示洪曰子紹予友也亦君友也其詩不可以不傳予既成其志君盍序之嗚呼一死一生廼見交情吾是以知子紹之不獨能爲文能爲詩且能取友也何敢以固陋辭子紹名紹之郢莊其自號云餞友宰丹陽昔曽覘吏事不是小規模萬象胷中布全牛眼底無迅雷推敏速片月對清孤鐵甕城邊邑今畨凋瘵蘇傑閣傑閣倚空闊身高𦕈萬山棟雲飛縹緲簾鐵閙虚閑地歩氛埃外天威咫尺間好風吹笑語餘響落人寰方水滴子質由良冶就心向主人傾外倣斤金制中藏勺水清兎毫芳露染龍尾濕雲生終命雙眸烱曽窺妙女成陸墓寺距城纔五里野景自蕭然塘水清環寺窰烟黒翳天市多沽酒旅橋列賣魚船欲酹宣公塜淵陵幾變遷旅中僦樓如斗大不與嬾相便盃酒常妨飯缾花亦費錢狂蹤依客燕短夢怯啼鵑欲去老丘壑無謀可買田次郊行韻蝶怕花殘舞更忙隨風柳絮聞輕狂尋芳客去馬蹄倦試酒人歸衣汗香過雨千林舒翠葉䕶田一水露針秧留春無計空惆悵信手敲棊語夜長送觀書記住山本是儒流學釋流枝藤所寓即清幽西山不用一錢買北磵空爲百計留禪向静中能妙覺詩于閑處得㝠搜秋風芳蒂甜如蜜許我溪頭繫小舟游天平山白雲泉踏開松徑幾層陰一勺寒泉洗客心高處天風吹靣冷險邊石磴警人深祠尊范像香煙潤碑刻唐詩蘚暈侵鳥道更通幽絶處恨無足力可登臨游建康碧瑶洞洞口篔簹幾百竿洞深襟袂易生寒鹿眠桃塢春常在鶴唳松梢夜未䦨瓦鼎香騰秋霧薄石盤碁撒曉星殘道人許换塵凡骨同向壇前説煉丹謁曽祖提刑墓簮纓輝映紹興間身後清貧陋巷顔猶有雲仍在西浙遠思霜露拜南山祖風三世未應息天道百年今好還欲去欲留松下路藤花染淚路斕斑席上次韻東風幾度客京華今日飄零天一涯無柰剛腸欺竹葉幸因清坐對梅花更長不覺銷銀燭寒峭從教透碧紗語到前朝行樂處綠楊深院是誰家呈印主學君世通城武石城不堪兩處揔烽塵向時未快披雲願今日同爲避地人襟宇光風無盡藏杯盤夜雨有餘春喚回十載槐黄夢欲借靈槎去問津婢態纔入園中便折花厨頭坐話是生涯不時搯數週年限每事誇稱舊主家遷怒故將甌碗擲傚矉剛借粉脂搽隔屏竊聽賓朋語汲汲訛傳又妄加次新竹韻籜粉飄零幹拂簷午陰比似舊時添棲留薄霧生秋意勾引清風滌夏炎弱質自同詩骨瘦新竿也學舞腰纎丁寧養就化龍杖休劈輕絲織繡簾訪新城宰野花香細綠陰成風着征衫暑尚輕流水有聲如學語亂山無數不知名柘林葉盡蠶初熟麥隴人行雉不驚少駐藍輿聊問俗兒童亦悦長官清餞常熟宰籠鶴歸來到北闗玉墀春裏趣朝班九重定問琴川事爲奏通川一渡間多幸三年依德宇喜無一事到公庭庭前柳是公遺愛去後相看眼更青金陵郊行快提金勒走郊原拂靣東風醒醉魂好景流連天易晚來朝更過杏花村冬閨怨塑出獅毬對畫䦨笑呼女伴傍前看宫鞋濕透猶堪着未扺空閨繡被寒寄永興宰兄相閥峥嶸南渡初百年遺緒要人扶從知物理終無否棠笏于今属魏謩憶昔京華聚首時大兄常念阿連癡别來相望天涯遠長誦對床風雨詩題扇靣起晚慵粧立小樓杜鵑聲裏萬紅休儂愁未逐春酲解飛盡楊花不舉頭蝶戀花春風啼鴂一聲雲榭晚好夢驚回蓬島疑行遍無緒東風簾自捲香苞雪壓荼䕷院似有還無煙色展絮煖魚肥時復吹池靣扇影着花蜂蝶見藥䦨春静紅塵遠風入松一春心事與誰同緣聚眉峯小樓徹夜聽鳴雨想西園錦繡成空欄漾金魚池水鈎閑紫燕簾風年時忻折海棠紅來比芳容如今玉减香銷似怕輕寒懶出房櫳塵滿謝娘吟巻從教飛絮濛濛賀新郎秣陵懐古決眥入飛鳥正江南梅雨初晴亂山浮曉鳳去臺空簫聲斷惟南有踈林鴉噪但空鎻吳時花草指㸃中原青山外柰征塵迷望愁雲繞佳麗地謾凝眺清風助我舒長嘯問其中虚簾曲檻閲人多少風景不殊江山在况是英雄未老且􅂸與尊前一笑欲説前朝興亡事喚謫僊人共傳清醥歸路晚月明照儲泳泳字文卿雲間人著有華谷袪疑説題胡琴窻方徑詩窮推不去終有惡圓心樓倚風煙外琴横星斗沉行看花四靣坐對竹千尋却笑陶彭澤歸來荒草深清閟軒萬竹中央住清心自愛持不除傷砌笋慵洗宿禽枝影落翻經處聲敲入定時重泥新雪壁留待客題詩送春送春歸去後身却在天涯有夢忘爲客見書如到家樓空初入燕柳暗欲藏鴉故苑新桃李閑開一度花聞采石分司芸隱訃忽聞千里訃涕淚已交横遽奪英雄去不教功業成人疑藏六甲天使伴長庚惆悵青山夢分明坐兩楹小園墾葦栽花柳園林小小成旋分黄菊本新扁草堂名池水通湖活江風過竹清不期車馬到足自稱幽情亭下亭下冷泉清松深地絶塵細看門外樹幾換寺中人别嶂孤猿曉幽花百鳥春坐來危石上疑是比丘身思歸客樓高處望獨立對斜暉負郭有田在故山何日歸秋深楊柳薄水濶鷺鷥飛風景正蕭索何堪聞搗衣送人遊邊邊風吹鴈至君却向邊遊正立功名日去防闗塞秋看鵰因撚箭調馬試呈毬奏凱歸時節應須萬户侯送兄潮舉原注䕶嫂䘮歸於温陵老來偏惜别此别更闗情水陸三千里舟車一月程鴈聲鄉思遠鸞影旅魂驚楊柳彫零盡無枝可贈行寄兄玉老原注時隨兄秀老往守雷陽雷陽路迢逓回首亦闗心重别因輕諾遠行多近唫客懐秋色早歸夢嶺雲深莫以書無益人來惜萬金澱山寺無路接塵寰中流擁翠鬟望中疑有寺游處若無山過雨行雲濕衝風釣艇還龜邊舊鷗鷺心事頗相闗悼古鏡果佛慧法師霜毛垂半頂説法國王前定裏修千刼佛中添一員諡尊終後賜真諦在時傳講下諸徒弟焚香石塔邊送陳雲厓出門即遠道君去有誰令詩價侯門賤時情客路輕晚雲歸獨樹寒雨暗荒城此地還相别誰能不動情送盧萍齋當春雁北飛之子獨南歸寒暑本無定去來應有機柳煙迷客棹花露濕征衣明月人千里相思消息稀紅藥紅藥階前半吐葩露枝已入貴人家不如庭下無名草一度春風一度花涵虚閣菊秋梅臘百花春過眼年華醉夢身今日不因登此閣不知人世是紅塵春日郊行東風吹著便成花粧㸃園林賣酒家田野可栽閑草木十分春色在桑麻柬藏一靈竺山前滿逕苔遊春車馬可曽來共君便欲携尊去一樹海棠花正開胡定齋惠墨求詩萬杵𤣥霜玉兎魂刀圭煉就許平分流珠輕滴銀蟾露化作催詩一片雲春晝亭院深深春晝長度窻蜂影去來忙自從野菜花開後一月熏爐不炷香送人昨日含愁始送春今朝又復送行人江頭楊柳不須折那與愁眉替得顰覺來西風吹夢過錢塘獨上孤山叩冷香紙帳四垂燈影薄覺來疑是月昏黄朱復之復之字幾仲號湛廬建安人端平中使北展謁八陵劉克莊詩話載摘句初夏云忽聽夏禽三五弄新紅突過石榴枝秋日云紅蕖老去羞明鏡推讓朱榮上蓼花葢亦纎麗之作也别湯伯紀停雲思何長伐木夢苦短飄揺乗風來倐霍摶沙散匪今我獨黯自昔客屢嘆之子曷云戾微陽逼候炭囚山對線景汲井共清盥玉露泚金莖水泉流藻翰方竹桂芳襲未覺枳栖遠仰天鏡其團一弛弓向半書堂渴吾伊佇立了瑟僴子如飛鴻漸我如禁門鍵天寒柳無枝指直不得挽歸來翫題墨寂寂眯雙眼與静使君約遊姑山記事古風二十韻苦熱日已遠杪秋遂凄凉邦候及清暇小隊豫郊崗一麾先嶃巖半刺驂翶翔卿月動左轄客星移奉常誰歟南冠者共挹北斗漿翠幄穿晨曦鎻金歩流光窮惚某氏建架構遡斯堂閩紅傾泛盎楚緑餖圓方平原磊落人仙碑勒荒唐方平叱石起來問東海桑蔡子狗竇過蛇蟬蜕冥茫麻姑十八九兩髻已成霜惟餘老杉星省識鄧紫陽往事莽如迹且醉糟書房翼亭躋齊雲游目望八荒挽河落飛瀑洒雪芙蓉裳夕矣憺將歸一一玉帝旁蹇余雅幽尋嗜此崔嵬藏請從浮丘生學笙翳鳳凰他年儻相思矯首空斷腸夜飲羅懐叟三盃屬余剛制共讀孟郊詩建子初寒月篝燈對語時獨醒蘓客酒細咏孟生詩蠧老無新巻烏驚有夜枝白雲路不遠明日肯重來别李商卿羇思孤耽僻蛩音偶出虚緑陰分坐乆清話見情初春過詩魂怯年銷劒術踈相看漸成故臨别欲何如滕王閣傑甚滕王閣登臨思𣺌然宿雲開北牖秋水盡南天帝子今何處王童記獨傳客懐無住著浩蕩白鷗前九日偕翁與可江正甫鄭景雲遊鳳山褁將破㡌鳳山遊鳳去臺空餘古丘白髪尚能今日客黄花祗作故園秋天浮渭北荒荒杳江入旴南隱隱流我始欲愁君且莫人生何處是吾州太平寺塵外閑題高樹青圓不見天小風微動竹梢偏衣涵空翠元無雨庭閟餘聲獨有蟬老去此心無所住向來我見不須先狂吟但過寒山子薦得騰騰一味禪謝張生見湛盧歌劒術空踈今罷休家山何處越中甌欲談往事渾亡是喜得新詩替莫愁原注晦菴贈詩有江邊艇子無莫愁之句故云葛仙井葛翁鑿井冽寒泉浸熟丹砂去作仙底事並煩仙子按却隨海水變桑田羅懐叟思歸一詩留之客子歸期莫有期地爐松火獨吟時西山暮雨吹成雪錯擬楊花理釣絲姑山他文太白不多竒一賦姑山世絶希生後此公方到此龜趺不見仆前碑李時可時字當可里居未詳劉克莊千家詩載其天寒鴉欲棲一首野寺野寺不逢僧修廊且緩行竹藏雙鶴睡風助一蟬鳴坐石侵衣冷臨風潄玉清詠歸無限意新月帶星横别余司法欲别愁如結來時眉便開相逢兩無事且盡十分杯明月今宵共春風幾日回梅花發墻角此際望君來雪行天寒鴉欲棲客路尚遲遲泥滑蹇驢澁風斜破㡌欹雲藏山斷絶梅苦雪禁持客裏愁無着愁邊却有詩題方漕水閣三間水閣傍溪湄曽倚欄干此賦詩山色溪光還似舊惜無詩思似當時舟中夜聞讀書臨谿一舍竹疎疎舟過時聞夜讀書姓字是誰何必問定應不是俗人居六朝舊迹六朝更代㡬興亡滿地黄花只舊香水鳥不知人事改雙飛猶自戀寒塘杜鵑花杜鵑躑躅正開時自是山家一段竒莫據眼前看易厭帝城只賣擔頭枝盛烈烈永嘉人有峴窻浪語送黄吟隱遊吳門寒江買櫂催遄征何如緩泛六橋尋鷗盟侯門懐刺謁掌儐何如散䇿孤山探梅信吟隱豫章之耳孫調高琢句期顓門西江不住來西湖喚醒晚唐諸老魂有時吐出驚人語定須貴殺雒京楮膾炙人口徒屬饜還來隻字不堪煑行吟荏苒歲欲暮束裝又問吳中路節翁舊有珠履緣何况薦書袖無數此行一句直萬錢十句唾手腰可纒歸來卸却揚州鶴推敲調度權架閣湖天晚霞鮫人織出綃五色馮夷不敢閟深澤闖得燭龍歸􅙜嵫横舒幾占半天碧光絢列岑浮紫翠琉璃倒蘸成琥珀何當乗風掣下來并州快剪隨意劃製就詩囊百萬箇分與江湖放吟客白髪白髪非有種如何忽自生盡從方寸地蒔此兩三莖塲屋債猶欠山林計未成頭顱知漸醜羞向鏡中呈午牕即事午困俄驚囀栗留東風獨立思悠悠蜂搜花醴勤王事燕拓芹巢爲子謀白髪愁邊添漸密青春忙裏去如流無言猛拍欄干曲恰喜長鬚薦茗甌同黄吟隱湖上散歩煖飜鴨頂一川晴喜共長堤緩轡行落盡繁紅春結局傳來太白酒尋盟人于冷淡交偏好句向蕭閑吟倍清鵜鴂一聲林外喚短篷歸帯夕陽明觀下湖漁者漁舠逗曉來相續短笆亂割春塘淥須留一半還詩翁要看早晚鴛鴦浴玉閬風書院偶題原注西湖雙清樓之下塔倚翠微椽筆勁湖吞碧落硯池寛天然調度誰消得不是吟家出手難歲事從他沸似糜小窻挂起只看詩不知那樹梅先謝一片香飛入硯池堤上歸舟横别港赴鷗約人立斜陽等燕歸心事一春拈不出兩堤楊柳又綿飛片雲篩雨過横塘襯斷蘋風作晚凉意快短檠推不照柳邊聽月對啼螿漁父詞曉岸披風駕短篷平蕪煙浪幾重重鳴榔莫近荷花浦鷗鷺早凉眠正濃春興涇雲全放兩峯青灣柳絲金照眼明短棹又隨鷗鷺去笙歌少處結春盟暮天即事東寺鐘聨西寺鳴前村樹末暝煙平天涯倦翼歸無限只有鵶飛自喚名幽庭幽庭鳥蹴梅花片䔩䔩因風摶復散貪看立到晝陰移滿地蒼苔遮一半朔風小窻簾箔䕶重重榾柮鑪心蜕骨紅昨夜朔風能凛冽冰花亦結硯池中晚歩叚橋垂紅頂上快登臨拍拍秋光滿袖襟伎癢欲吟吟未穩兩山鐘裏莫雲深史衛卿衛卿鄞人按宋史史彌鞏之孫䝉卿著書立言一以朱熹爲法又史唐卿與兄䝉卿同登咸淳元年進士則衛卿亦䝉卿兄弟行也秋歩述所見趂晴收斷薪破曉循幽浦山寒樹欲風雲重天將雨兎奔初種畦鷄拾穫殘畆葉深樵無蹤水落魚可數幽草不須生千林秋已素捧檄家山閒居愧未能帷幙冷於氷家檄官無俸山吟客有僧池荒眠鷺石樹折飲猿藤寥落誰相問孤明雨夜燈春晴平明晴可愛眼界一湖春不見水中鷺惟多堤上人梅花已白盡柳色正青新日暮無歌舞清幽屬野身聽演師琴禪悟却參琴山高水復深七絃手共語萬籟耳無音激烈鬼神淚發揮天地心秋風時一曲懐古更傷今漁父白頭長是醉湖海不知年活業惟耕網全家秪住船荷花同鷺宿楊柳得魚穿一笛吹明月朱門謾管絃書里中所見䦨干十二纈簾遮獸棟鱗鱗鼎貴家莫道樓臺無地起滿城秋色半槐花所見齊眉沉醉綺羅叢心事誰知付去鴻不惜千金留粉黛更無一語怨東風有所見不著畫羅金鏤衣尋常打扮最相宜春風燕子樓前過飄落梨花雪一枝冷泉觀放水溪流平地響晴雷石上生風巻雪來醉拍䦨干衣袖濕十分身在白雲堆柳梢青蕚綠華身小桃花扇安石榴裙子野問歌周郎顧曲曽惱夫君悠悠羈旅愁人似零落青天斷雲何處銷魂初三夜月第四橋春江湖後集巻十一
