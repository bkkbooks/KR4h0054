body:
  text: 江湖後集巻十七宋陳起撰吳仲方仲方字季仁霅川人範七世孫仲孚之兄也著秋潭集今輯自永樂大典散篇者惟詞若干闋名虚齋樂府鵲橋仙富沙七夕為友人賦翠綃心事紅樓歡宴深夜沉沉無暑竹邊荷外再相逢又還是浮雲飛去錦牋尚濕珠香未歇空惹閑愁千縷尋思不似鵲橋人猶自得一年一度漢宫春次方時父元夕見寄投老歸來記踏青隄上三度逢君寒忩冷淡活計明月空樽紅紅白白又一畨春色撩人誰信道閑中天地園林幾見成塵今夕偶無風雨便滿城簫鼓來往紛紛鼇山寶燈照夜羅綺千門珠簾盡捲看娉婷水上行雲應自笑周郎少日風流羽扇綸巾木蘭花慢漳州元夕玉梅吹霽雪覺和氣滿南州更連夕晴光一畨小雨朝靄全収人情不知底事但黄童白叟縂追遊駕海千尋綵岫漲空萬㸃星毬風流秀色明眸金蓮步度輕柔任往來燕席香風引舞清管隨謳何曾見癡太守已登車去也又遲留人似多情皓月十分照我登樓永遇樂七夕和劉隨之雲鴈将秋露螢照夜涼透忩户星網珠踈月奩金小清絶無㸃暑天孫河鼓東西相望隐隐光流華渚粧樓上青𤓰玉果多少騃兒痴女金針暗度蛛絲宻結便有繋人心處經嵗離思霎時歡愛愁緒空萬縷人間天上一般情味枉自錦牋囑付又何似吹笙仙子跨黄鶴去夜飛鵲七夕和方時父韻㣲雲拂斜月萬籟聲沉涼露暗墜桐隂蛾睂乞得天孫巧愔愔樓上穿針佳期鵲相報到年時此夕歡淺愁深人間兒女說風流直到如今河漢幾曾風浪因景物牽情自是人心長記秋庭往事鈿花剪翠釵股分金道人無著正蕭然竹枕練衾夢回時天淡星稀閑㺯一曲瑤琴沁園春自鄞歸賦客問吾年吾將老矣今五十三似北海先生過之又過善財童子參到無參官路太行世情滄海何止嵇康七不堪歸來也是休官令尹有髪瞿曇千巖秀色如藍新著箇樓兒恰對南看浮雲自在百般態度長江無際一碧虚涵荔子江珧蓴羮鱸鱠一曲春風酒半酣憑欄處正空流皓月光滿寒潭賀新郎送鄭怡山歸里載酒陽闗去正西湖連天煙草滿堤晴絮采翠擷芳遊冶處譍和嬌絃艷鼔看栁外畫船無數萬頃琉璃渾鏡浄陡風波洶洶魚龍舞談笑裏遽如許流觴滿引澆離緒便東西斜陽立馬緑波前浦自是蓴鱸高興動恰值春山杜宇謾回首軟紅香霧咫尺佳人千里隔望空江明月横洲渚清夢斷恨如縷張輯輯字宗瑞履信之子馮深目以東仙故又號焉有欸乃集朱湛盧序其詞云東澤得詩法於姜堯章世所傳欵乃集皆以為采石月下謫仙復出不知其又能詞也今輯自永樂大典散篇者只詞若干首名清江漁譜憶秦娥有寄春寂寂畫欄背倚春風立楚山無數暮天雲碧琴心寫遍愁何極斷腸誰與傳消息當年情墨淚痕猶濕浣溪紗夀老母夏果初收喚緑華氷盤巧簇映金𤓰荷香飛上玉流霞明月長留千嵗色蟠桃多結幾畨花誰知羅帶有丹砂霜天曉角日暮暮天雲闊懶汎琴三叠恰有梅花相伴忩兒上一枝月憶别恁時節吟情誰共説欹枕偶成清夢畫角曉更愁絶臨江仙望廬山迢遞闗山身歴遍烟霞勝處曾遊九江江畔繋孤舟匡廬如畫裏南望插天浮瀑布香爐齊五老層層爽氣陵秋何須魂夢覔瀛洲雲松終可卜我與謫仙儔洞仙歌代夀張辰川蓮舟玉字得真人親授圮上家風又還有問因何五馬踏月雲臺秋色裏却賞煙霞袖手酒邊聽説劒歌舞昇平方許君為赤松友任濁世紛紜海水揚塵再相見雪髯依舊且嵗嵗中秋後逾旬更半月東籬菊花重九滿江紅題馬蹄山壁原注予讀書晉王伯遼馬蹄山居雨中欲訪道㑹稽山空鶴寒落葉自語大書此句於碧崖丹壑間以堅歸盟醉髪吹涼但拂劒狂歌而已倩誰問九霄黄鶴便曾來未玉女忩深松晝静研朱重㸃參同契記前回赤水得𤣥珠驪龍睡空擾擾人問世除學道無真是把洪崖肩拍挹浮丘袂朝駕長風滄島上夜騎明月青天際更幾時回首舊山川三千嵗東風第一枝代夀李夫人雨蘂方桃晴梢漸杏東風嬌語弦管愛香簾約餘寒喚舞袖飜嫩暖紅顔清健舊墨竹扶疎手段且碧牕寫就黄庭畫楫海山開巻春自好得花不淡花又好得春不淺曉鶯瑤佩秋生月蘸翠尊波滿長逢花處笑西母霜娥偷換要日邊争看貂蟬綵侍更迎宣勸瑞鶴仙夀趙右司栁風雙燕語問有誰留人岸花去艣星辰快平步俯圜扉草色青青如許兒童擁路玉豁邉當年杜母料従今指㸃山川縂是繡衣行處回顧東堂深􅆼楚帖長春竹尊清午紅雲帝所揺佩玉更容與把蓬萊一笑幾畨清淺緑野為花作譜向花前三叠琴心看蒼鶴舞綺羅香夀趙太卿欲雨涼生初弦月在畫㦸香中清歗旋種芙蕖深夏木蘭芳沼銀漢入天鏡攙秋福星度雪欄争照又誰寫萬幅蓴波一江佳思到魚鳥吳兒睂語笑裏要見圜扉緑遍平疇青繞羽扇綸巾瀟灑玉貌長好問千年慶會風雲政此日静春花草更弦管非霧非煙鶴聲簾幕曉沁園春予頃遊廬山愛之歸結屋馬蹄山中以廬山書堂為扁包日庵作記見稱廬山道人蓋援涪翁山谷例黄叔豹謂予居鄱不應舍近取逺為更東澤黄魯庵詩帖往來於東澤下加以詩仙二字近與馮可遷遇於京師又能節文號予東仙自是詩盟遂以為定號十年之間習隐事業畧無可記而江湖之號凡四遷視人間朝除夕繳者真可付一笑對酒而為之歌曰東澤先生誰説能詩興到偶然但平生心事落花啼鳥多年盟好白石清泉家近宫亭眼中廬阜九叠屏開雲錦邊出門去且掀髯大笑有釣魚船一絲風裏嬋娟愛月在滄波上下天更叢書觀遍筆床静晝蓬忩睡起茶竈踈烟黄鸖來遲丹砂成未何日風流葛稚川人間世聽江湖詩友號我東仙賀新郎代夀趙饒州緑䕃涼尊俎映雙旌飛翻新帯日邊恩露千里湖山添鮮碧玉宇光浮眉嫵料范老應難獨步君亦胸中兵十萬把甘霖小小春東楚江上早一犂雨赤城霞起連天姥有丹經親曾宻授八篇竒語道骨仙風騎鯨客合侍紅雲帝所且畫㦸清香時度散入邦人簫鼔裏恰春留芍藥叢歌舞歌更誦大􅉇賦前調夀湛盧先生鵲喜花間曉惜凝香低將簾捲海棠開早前度登樓清嘯月吹入春風不老後五日花朝方到趂舞羅衣花訊暖撚吟髭玉勒迎東笑留肯住春郵小廬峯青裏壺天好一千春棋聲晝永劒光雲表綘雪驪珠看丹轉金鼎龍盤虎遶且未可飛仙蓬島河洛煙蕪眠狐兎握風雲辦此升平了却共我拾瑶草江湖後集巻十七
