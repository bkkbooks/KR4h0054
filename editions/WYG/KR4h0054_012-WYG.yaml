body:
  text: 江湖後集巻十二宋陳起撰胡仲弓仲弓字希聖清源人仲參之兄有葦航漫游藁按江湖集諸人唱和詩葦航詩名頗著於仲參而諸選家無一及者永樂大典載其集甚夥此乃陳起所選者也雜興百年一瞬息萬事皆塵埃所以身後名不如掌中杯山園足花草雨露相先開獨有崖下松春風不曽來青林曉霜重百卉顔如灰蒼髯五大夫鬱鬱何佳哉佳花費事治十無二三本惡草時掃除已復相苯䔿試嘗問園丁否泰乃爾反渠方倚鋤笑謂我見事晚老天亦何心生花日衮衮梁武欲為佛秦皇欲為僊萬乘猶不足要與天齊年人生㡬兩屐過眼如風烟此心苦無已憂患常烹煎不見客斯逐力詆爭秦權寧知咸陽市父子更相憐海月當觀濤青天與海連羲娥代吞吐封姨助餘威陽侯倐起舞或奔千丈龍或轟萬疊鼓蓬弱此路通祗界一斥鹵浩浩無津涯尾閭闢地户嬴女驅鮫人獻怪扶桑府琛球來百蠻玭珠還合浦獨立象罔外身世等一羽宇宙納溟渤萬山齊傴僂清風與明月造物不禁取臨流喜得句玉欄失笑拊眺望此一時澒洞注千古安得捲上天霈作天下雨過駞巘嶺中興諸將士殺身報明主生前七十創死後一丘土嶺上生愁雲紛紛不可數平生憂國心氣結不能吐肝膽常輪囷未知死何所杯酒酹夕陽臨風淚如雨醜婦謠人知醜婦醜不知醜婦妍醜婦安乎醜婦德或可全荆釵與布裙常坐紡織邊妍婦巧於人玉貌長娟娟嫵媚及依阿萬態隨方圓醜者妍之實妍者醜之端醜者妍之德妍者醜之賊人皆惡其醜我以醜爲則人皆愛其妍我以妍為惑丁寧醜婦人莫效妍婦顰欲保醜婦德莫學妍婦色人鑑不可欺妍醜自明白題金粟洞名山洞府三十六若擬㡌峯猶未足有人曽此坐丹爐有人曽此安碁局一朝悟道歸去來依舊紫雲鎖林屋武榮賈客來洛陽手攜尺書叩巖谷覿面親逢吕洞賓有眼不辨鄭文叔功成行滿欲度人酬之遺以半升粟豈知粒粒皆金砂一服可但能辟穀先嗔後喜來重尋癡心纔動隔山谷故老相傳金粟仙凌霄有塔蒼標玉乾坤外物號無塵凢夫到此懶著脚我來稽首問先生若為乞得壺中藥刀圭分與醫國人却入深山抱幽獨先生道我亦不塵且走千巖并萬壑它時相過岳陽樓定把竒書與君讀過新蓬二嶺新嶺髙蓬嶺髙兩山前後爭嶆峨世途平處多風波何如嶺嶠肩相摩脚踏實地無偏頗著身髙處不為勞新嶺髙蓬嶺髙勿令此地生蓬蒿芳庭為作希聖二字以詩謝之貫休鐡畫天下竒芳庭心法今似之偃波垂露久不作雲煙灑灑光陸離北山塔穎健筆卓西湖倒瀉爲研池長空萬里紙一幅等閑揮翰搖坤維大書姓氏牋金闕書仙驚問子為誰安定後人希聖父曽披骨鯁干龍墀公權筆諫粗有志未知所遇何如時書仙聞言發一笑風雲際㑹須有期何當濃墨寫竹帛千古萬古長昭垂試劍石青蛇生膽氣袖過洞庭湖既有虎堪刺豈無龍可屠鐡山何用碎崖石至今枯欲斷樓蘭首能安砥礪歟法山寺距城無數里乃有此名山海近雲常漫林深風易寒齋餘飛鳥下定後野僧閒一宿何曽覺翩然又起單次法石寺即事韻近郊來往熟馴犬向人迎半是吟將老何時隱得成月明山景合潮落海痕生歸路霜鐘外微聞三數聲清吟寺髙僧曽住此長對佛爐吟蕭寺有興廢清名無古今禪心秋水瑩燈影石壇深不見鬼神泣空聞鐘磬音廢寺鐘皷蕭條久誰從此地來僧房無户牖佛面有塵埃碑斷眠荒草廊空長綠苔鵂鶹并蝙蝠時或此徘徊得闕越州冷掾寒氊纔入手便動帝鄉心千古蘭亭在三年芹水深文排崑體作詩對越人吟自得髙山趣何當遇賞音頥齋聫日有事於琛亭賦詩聊為解嘲詩人有公事日日走琛亭紫翠和衣重香塵滿面生蚌還江月濕龍起浪雲腥薏苡亦何有奚囊澈底清次雲心韻贈臞仙清修如野鶴心性在雲間蔬食從來瘦林居耐得閒爐分真造化夢繞舊鄉關汨汨塵樊者聞風想厚顔送季同歸龍泉天寒猶客路行李况擔書喚醒江湖夢歸尋水竹居詞華須近古劍氣欲凌虚好趂功名㑹言詩特緒餘明發明發占鷄唱停驂數暝鴉半生多在路十日九懷家照水芙蓉色滿園蕎麥花歸田何日是對客話桑麻題黄耑玉寒瘦藳㡬囘吟傑句破硯幾遭焚古道不復作唐風猶可聞寒於梅傲雪瘦似竹侵雲近世無郊島詩人數到君山行觀紫雲洞浪遊知幾載久不到山巔泉石曽留意煙霞未有縁松隂長匝地塔穎欲鑽天待洗塵埃脚重來訪紫仙嘲赴緣僧道身在塵縁外如何更趂縁僧堂清富貴道院小神仙飯飽休持鉢丹成莫賣錢但能了生死何必問蒼天山庵蒲團清夜話吟鬢任鬅鬙瀹茗遲留客焚香靜對僧嵐蒸侵硯版月冷逼禪燈萬籟俱岑寂呼童亦不譍送傅明府之南安撫字及催科三年鬢已皤公心如日月浮議任風波父老顰眉說兒童拍掌歌歸裝無一物空有綵旗多道中遥觀五峰五峰天外立驢脚慣經過十載身萍梗今朝面薜蘿雲低山色暗風急樹聲多蠟屐何時辦來聽樵子歌送趙明叔分教潮陽昌黎遺俗在興教更煩君地産無名木春生半水芹詩歌麟趾化筆補鰐魚文莫厭官毡冷相期粉省芸送梅臞三山曽共梅花約論心到歲寒如何傾别酒獨自上吟鞍藥裹留餘劑詩囊有近刋懷人眇雲際頻展墨龍看原注梅臞臨别自作墨龍見恵自笑自笑謀生拙多應涉世疎為貧趨斗祿因病試方書榕葉寒侵户梅花深結廬焚香坐清夜吟到曉鐘初倚欄倚欄商好句雲散海山青風急天無恙人驚心地靈潮頭迎日月㠶片落滄溟夜靜濤聲息龍吟得細聽薄遊詩薄遊歸較晚清氣滿丘園鴉噪盤林影蛩聲咽草根吟腸思茗盌醉眼廹冰盆心迹兩忘處難同俗子論哀黄鳥憐君金縷衣失脚蹈危機自是我心惻非關物命微引雛誰共食求友便忘歸送汝入幽谷驚魂何處飛題崇福寺青山閣禪餘無一事冷面看青山明月幾時有白雲終日閒地虚塵不到天逺手難攀直下看人境紛紛醉夢間為源上人題寳葉寳蓮千萬葉葉葉是如來淨土社中得無波水上栽根頭藏舍利香氣避塵埃移向松灣去山花不敢開寒食初過一百五園林正好看棃花未全秃梅子帶微酸近世煙無禁何人食肯寒東風猶作惡誰念客衣單不飲之子青州裔生來契分疎難從將進請屢下絶交書甕面空浮螘樽前但取魚任他賢與聖清濁不關渠春晚山茶花數朶艷甚萬紅彫落盡留住隔年花獨艷迎人笑殘粧帶雨斜物情無老少春意自繁華顔色休相妬風流别一家題清泉院孤僧如槁木住處逺人煙山有千年寺名因一派泉堂虚遺像暗壁敗野藤穿法座空塵積無人來叩禪題通妙亭柱小亭存古意雅稱道家風池水鴨頭綠山茶鶴頂紅内丹還九轉法鼓叩三通若問希夷事櫩鈴語未終遊紫澤觀地偏塵不到俗客可曽來寫帖雲侵硯朝真風滿臺蘭荒根有蠧梅古樹生苔莫論還丹訣金爐久已灰虹橋詩纔過虹橋渡漫山皆紫泥鷗邊秋水落牛背夕陽低酒向汙樽飲詩從板壁題江郎在何許靈石與天齊山中世情紛醉夢抱獨入山林有竹堪醫俗無絃誰賞音松蘿青嶂合鷄犬白雲深未必幽居者能賡梁甫吟尤溪山中山中寒意足自笑索裘遲野店鷄聲飯頹垣鵶字詩雨餘松徑滑溪漲板橋危問訊恬軒老鄉鄰總不知原注恬軒乃趙維也棄官入山三十年矣柬蕭芸莊十載江湖夢鴻飛不到君近聞吟思苦半為宦情分往事隨流水懷人看暮雲相逢又相别安得細論文舟中即事攜家驅官牒短棹泛桃源人語聫篷屋漁歌隔水村雲歸千嶂合雨過一江渾爲愛招提近纜船楊栁根舟中歸興舟膠回短棹岸曲抱溪斜香篆迷煙草燈光閃浪花歸心隨舴艋遺響託琵琶明月如留客猶籠淺渡沙寄舟中諸吟友溪流何太急畫槳去如飛詩壘才無敵愁城醉解圍日斜㠶影亞風細樂聲微誤入桃源去月明猶未歸觀江郎石江郎何日化千古鎮長青乍見人疑怪多應地有靈世間無此石天上應何星海外蓬萊島猶疑在杳冥桐江舟中推篷納山色愁坐對黄昏雨過天無翳舟行水有痕鐘聲來逺寺犬吠隔煙村柳下漁人屋收罾早閉門延平舟中雙槳去夷猶延平津上州英雄三尺劍今古一潭秋市近人爭渡山迴水急流前頭風浪惡莫放釣魚舟送羅去華江湖如許濶無地著詩流難覔青精飯空回明月舟分甘貧國士莫謁富民侯隨處風波惡無魚可上鈎夜飲頥齋以燈前細雨簷花落為韻分得前字又得花字賦二首春歸如惜别淚雨滴櫩前酒病思盧橘吟魂逐杜鵑堂虚香穂直風定燭花圓萬籟沈清夜瓦溝聞落泉萬仭騷臺立海涯堂堂筆陣走龍蛇喚回蝴蝶三更夢吟落荼􅐘一架花座上風流追靖節酒邊豪放逼劉义幅巾危坐清源石小待山隂漸熟𤓰贈神籟談天曽將甲子問羣生來向人間說五行眼底精神雖晦昧胷中造化却分明指推寳厯八千數時弄玉簫三四聲袖裏百篇題品盡何曽識得一公卿次韻賦海棠萬樹嫣紅壓錦城此花宜雨又宜晴睡中銀燭層層照醉後朱唇暈暈輕攜酒獨來蘇學士逸詩笑殺杜先生雪兒檀板休教唱見說嬌羞不耐驚次麓湖韻送王用和歸省侍因訪詩宗特特來子猷興盡轉船回故園松菊元無恙新本芝蘭更欠栽傑句多於貧後出好懷長是醉時開白雲只在青山外歸去堂前學老萊次林明府清源洞壁間韻解帶臨風臥看山夢魂飛不到人間雲蒸空翠和衣濕石潄泉聲透骨寒解語靈禽如有訴倦飛野鶴自知還吟詩盡道隱居好能㡬人來肯棄官再和抱拙清源洞韻泉聲一路和吟聲可是山雲未放晴勌客難攀千丈壁遊仙空負十年盟草廬不信無龍臥松徑㣲聞有鶴鳴此舉羨君髙著脚山肴野䔩薦杯羮和杜友遊清源洞韻涉險何如過虎牢白雲堆裏著身髙登臨我欲招元亮談笑時能接李翺人境下看猶粟粒洞天西去有蟠挑學仙恐是虚無說且向峰頭跨六鼇已酉上元詩同日立春又是京華見上元一番燈火奪春寒花蛾巧剪禁風撲綵燕新裁帶月看客裏無家愁對酒吟邊索句夜凭欄寄言雲雨休相妬天下人人欲縱觀和希膺春日醉吟節物催人白髪新放懷不减少年春叵羅酌酒猶堪醉古錦爲囊未是貧清坐相看情不惡淡交至久味方真妓圍笑指紅樓去寂寞窮吟胡楚賓和壁間韻萬仭岡邊去路長道人採藥試丹方弈枰誰解爭高著仙樂時聞按大涼日落塔頭雲氣紫雨餘山脚蘚痕蒼年深洞古無塵迹惟有先皇御墨香寄鱸鄉主人天北天南獨鴈飛別君動是隔年期尺書久欠鱸鄉便寸步難邀馬足馳池草驚回春夢句梅花開到歳寒枝江湖諸老凋零盡從此逢人懶說詩送趙汝楫分教建安又領臯比走建安青衿喜色上眉端詩因老去難言别氊到春來不覺寒當口紫陽傳授學他年粉省校讎官聖門豈必肯私淑莫把規隨一例看春日雜興漁翁樵叟自行藏裹飯過從樂未央撲滿自緣錢作祟鴟夷聊以酒為鄉老來願棄人間世病去欲荒墻下桑黄犢不嫌人日雨村村苖長緑微茫殘雪初消月正明茅簷自雨竹窓晴肩寒聳聳吟詩骨肺渇泠泠醒酒羮少有梅方成野趣不多松亦作江聲高人合著山巖裏縱有窮愁澈底清野性最於魚鳥親自知不是世間人生成雪壑冰崖面收得煙蓑雨笠身楊栁春來青眼舊山林老去白頭新毋多感慨令君瘦獨立斜陽一欠伸吾生身事信天縁一死何須較後先未怕時逢真太歲或言壽過古稀年窮餘禄料齏百甕醉負生涯囊一錢又見山林春意思辧隨芳草落花眠天與之愚竟不移經年兀兀槿花籬拙於生事可無粥工乃窮人賴有詩只恁麽休身是客知何以故鬢成絲寒欺雪屋青燈夜六十猶癡始是癡緑繞西疇小作勞溪村寒入舊綈袍五窮政坐沒梁斗百舌不如無口匏穫稻條桑豳雅頌紉蘭餐菊楚離騷客來更話唐虞上盍且卑之毋甚高鶴骨嶄嶄疾未瘳怯行山亦倦登樓久知老去自當爾自入春來雨不休虚器甚慙居士屩實封難覔醉鄉侯小遲須有佳晴日待試山翁已健不春來多病感頹齡草藥泥瓶不暫停身似漏船難補貼齒如敗屐久凋零炎黄豈解留年壽莊老聊堪悅性靈長劍拄頤兒戲耳底須麟閣更圖形花柳村村奈老何一春門巷斷經過無繩可繫西沈日有水皆隨東逝波妄想已空騎鶴夢勞生亦厭飯牛歌正須秉燭遊清夜轉眼蘭亭舊永和幽溪㡬日不曽來半是紅香半綠苔樂事毎從忙裏過好花偏向雨中開慣貧可使居無竹髙隱共忻山有萊投老田廬筋力倦不才多病兩悠哉髙下雲藏野老家縱横水潄竹籬斜勤將春去許多雨流出山來都是花白首風煙三徑草清時鼔吹一池蛙身閒不耐閒雙手洗甑吹香夜作茶南岡北嶺對窓扉看盡朝嵐與夕暉社後來曽聞燕語雨中誰不惜花飛山醅約莫幾日熟沙笋輪囷一尺圍莫怨風光損桃李荼䕷芍藥又芳菲衝雨衝泥處處行物情殊不可詩情牡丹又是一年過春事略無三日晴先後笋爭滕薛長東西鷗背晉齊盟山居寂寞誰堪共杞葉菊苖俱可耕緑隂芳樹鳥啼春與客相攜發興新半落杏花初過雨㣲酸梅子已生仁毎尋詩去必遷坐稳跨牛歸不問津筋力尚堪蓑笠在莫欺老子髪如銀浄掃小房不以貧旋炊野飯喚比隣子規啼處一村雨芍藥開時三逕春丘壑自成安樂國漁樵尚有老成人茅簷相對坐終日只說桑麻語自真題金粟洞誰信東南有此山㡬回蠟屐只空還乾坤超岀浮塵外世界深藏粒粟間鶴不歸來華表在犀從飛去紫雲閒捫蘿直上凌霄塔見說㣲垣手可攀和瞻甫韻住在壺中小有天故山猿鶴作忘年雲歸毎失碁盤石人去不生丹竈烟肯信玉華空有洞自貪黄粟便無仙我來立盡斜陽暮猶撚吟髭風月邊過嶺作崇岡峻嶺欲凌霄鳥道行邊去路遙客裏恰逢三伏暑程頭方到九秋橋不堪流水鳴嗚咽賴有詩篇慰寂寥但得此身强健在任渠皤鬢自蕭蕭舊題寳勝寺壁十里湖光鏡様平銀潢一派向東傾寺從楊柳隂中岀僧在蓮花㑹上行佛地也容擔板漢梵音莫近採菱聲我來借榻醒塵夢歸去吟詩韻更清早過豪光嶺輕烟䕶日曉霞明身在豪光嶺上行虎過新蹄看未了犬逢舊客喜相迎摘來山栗連蓬買采得溪芹帶葉羮一字推敲猶未稳奚奴知我有詩成郊行同張宰雨晴郊外共尋芳細水交流注野塘花欲戀枝風不肯柳纔舞影日還藏轉添老態難於健看得閒時少似忙擬訪一僧共茶話禪房扃鎖岀遊方和劉後村雜興冬深差喜病根除藥褁猶親酒琖疎門對好山純種竹園通活水可澆蔬櫩牙帶濕霜晴後簾額移隂日出初時有郵筒逓詩至吟餘便擬借牛車㡬年待漏趣朝班乞得閒身返故山公論盡歸恩怨外清談不落是非間屠龍肯信無高手畫虎雖成亦强顔馬革褁尸徒自壯爭如投老得生還出處難為卜筮謀植鰭無復轉巖求清風不度麒麟閣明月空沈鸚鵡洲采石僅埋吟骨在新亭猶帶淚痕羞書生慷慨談時事未必膺門肯見留避俗常關白板扉北山泉石尚堪嬉臨流且賦觀魚樂憂國何消捋虎危自許丹心長戀闕獨憐萬户未逢時割雞為黍尋常事客至休言子為誰邇來筆硯亦相疎野服焚香讀異書築室不須臨孔道閉門只合造輕車有梅花處猶堪酒無竹人家不可居渉世直消誡口過是非榮辱不關渠誦讀未多才思慳數編遺醜落人間洪音互雜蛙蟬奏封事空投虎豹關楊震有知金忍受相如未死璧終還且須靜守心齋坐學取簞瓢陋巷顔累疏殷勤奏榻前憂時急似救頭然功名常是中年立忠孝當於晚節全投杖歸來泉石上班荆坐向竹梅邊烏臺無復詩公案弄月嘲風亦偶然近學時粧越様新空遺畎畝處忠臣燭之武老未為老劉伯龍貧可是貧造物不應推若輩江山亦合助斯人挂冠神武當年事明哲從來要保身宦海風波亦足驚得閒聊爾慰平生雖無塞上雪堪臥幸有山中田可耕一老拂衣何太勇羣兒撼樹漫相輕絶憐千丈西涼瀑偏與人間訴不平當日曽彈貢禹冠懸知出處獨今難寧將退翮翔千仭誰肯模棱持兩端風雨筆頭猶老健江湖吟鬢未凋殘十篇話破平生事留與時人作様看遊承天寺偶成人間熱惱正匆匆纔入山門便不同雲板聲中僧出定月臺影裏佛觀空堂隂岑寂常如夜殿角清涼不見風纔得浮雲閒半日明朝馬跡又西東春晴寒齋淺酌喜新晴絶倒湘纍賦獨醒清坐苦無佳客話朗吟生怕俗人聽五湖四海雙塵屐萬壑千巖一畫屏雲雨從來翻覆手黄昏更看照泥星次洪陽巖太卿韻爲方䝉仲書監賦西清風月莫聽豳人歌楚茨鬻書空笑未多貲治中盡說裴懷古館下曽宗韓退之西望前山誰拄笏南來别駕例能詩昔賢自有清標在添在桐城一段竒寄朱静佳明府十載江湖嘆不遭識君歲月漫蹉跎文書南去靜邊省山水西來佳處多琴調本髙縁撫字詩逋未了欠催科騷人標致清如許製錦機中製芰荷寒食雨中用李希膺韻平明風雨釀春寒試把餳和杏酪餐野祭人來悲冷節郊行誰肯共吟鞍煑香有約泉堪品禁火無條燧莫鑚一百五朝全戒酒定知夢不到邯鄲夜飲趙明府歸來偶成睡思濃時酒已醺主人猶自倒金樽綺筵散盡月初上畫燭泣殘宵正分榕葉聲中清醉夢梅花影裏返吟魂歸來小立樓西角紫㡌峰頭生白雲清泉院用柱間韻僧居一路曲通村日落層巔生暮雲白石巧於山背岀清泉時向澗邊聞鉢盂未信承龍化錫杖曽經解虎紛歸去鶴猿應笑我稚圭何必更移文耕田田可耕兮圃可蔬㡬年夢不到亨衢山林受用琴書鶴天地交遊風月吾事變無涯人老矣死生有命汝知乎客來時復一盃酒盡作鱸鄉醉隱圖代壽圓嶠顔文昌原注時已引年致仕長命新絲恰剪裁瓣香南望祝蓬萊千齡春筭從天與九節蒲根著地栽范不待年甘引去文雖告老召還來肉芝幸有丹書在留取他年薦壽杯壽趙黙庵九十風光老益强一生長得對東皇結成梅子味初實開盡荼䕷晚更香堯厯不隨春脚去周天從此日頭長年年常記今時節花滿朝冠酒滿觴和趙同叔送桂花韻少年折桂已心灰纔臭清芬鼻觀開喜見月宫和影落傳聞天女散花來黄金枝上留仙粟白玉臺前絶世埃聚逺樓空成感慨不堪時節苦相催包家山看桃花春風吹到小桃根便覺仙凡有路分紫氣直衝文德殿綵霞隔斷武陵源錦官城向山頭岀玉蹕聲從天上聞一見圜丘懷故土令人寂寞暗銷魂次韻柬李希膺相逢一笑便忘懷䑕量難當三百盃幕府清閒無檄至郵筒絡繹有詩來分朋盡屏牛僧孺取女親逢羊角哀滿眼鶯花良不惡春風吹上越王臺柬倪梅村蕭寺相逢喜溢眉未言心事我先知半生風月樽中酒十載江湖社裏詩滿眼秋容關客况背時春色到南枝飜思舊日長安市醉拍欄干歌楚辭用後村韻送陳先輩休將心事問西隣原憲長貧豈是貧黄葉落邊迷去路白雲飛處倍思親世間那得埋金者原上空慙負土人苦語只堪吾與汝倚廬抱恨此情均南地數㸃青來海上山山根斷處水漫漫爲無南雪地偏暖纔有北風天便寒生理盡歸蠻賈去宦遊直作瘴鄉看塵迷鉅野家何在縱有雲梯見亦難囘文體二首紅花濯錦織前山日暖啼鶯春晝閒空院古廊風寂寂僻居幽谷水潺潺宫移舊曲新翻譜酒暈濃愁淺帶顔同調賦詩吟思苦匆匆急逓走囊慳灣前過渡小舟虚好景粧成天畫圖山列翠屏開户牖麥翻黄浪滚田圩閒鷗樂處晴波細暮鳥歸邊殘日晡攀柳共人人恨别綿綿落絮有情無存方寸地此心僅方寸去天唯咫尺欲付子孫耕先自竭吾力失題成蹊雖無言嫵媚隨東風挺挺氷雪姿所稟自不同篇篇剔蠧魚字字編科斗螢小無晶光明月入我牖光風霽月胷懷自灑落風月特寓形造物無盡藏何假乎丹青一志念頭纔起處此一常分明其中有主帥談笑驅五兵汲清原注清湖渡頭有古井趙庸齋題扁其上慾波如濁流心源如古井不患無清泉祗惡無修綆鱸鄉道院宦情原自薄卜得吳松居鄉味已飽諳胡爲羨鱸魚翠竹修修青琅玕霜雪不可折肯隨流水去賴有歲寒節張南起爲作葦航圖仍示以詩次韻繼賦風搖古柳散羣鴉小艇尋詩來水涯身在江湖平稳處一塵不到浪頭花繫纜蕭蕭蘆葦傍酒和翰墨醉淋浪靈槎不泝銀河去却向人間羨野航過莆城懷劉後村中書因以奉寄村在山邊雲半遮懷人咫尺是天涯眼前不見𤣥都觀空負碧桃千樹花入洛深衣已十春聲名千載有知聞不須更結耆英社溧水前頭獨繪君當日揚清激濁流身危肯作稻梁謀不從黨錮諸賢死竊祿偷生亦可羞模楷從來屬李膺臯比授業我何能倚墻甚欲重參請恐累龍門不敢登郊行杜鵑聲裏又花紅處處隂雲日影䝉心事太平人事好眼前無物不春風題馮中郎廟論將宫中可䇿勲至今香火宻如雲生時不遇孝文帝定有何人肯薦君山中有花一種俗名花葉不相見感而賦之世間燕鴈本無情天上參商誰㑹面花葉自是同根生何事開時不相見紅逺濃淡中邊費剪裁朱唇得酒笑顔開春風不度西流水休說香從蜀道來觀中原指掌圖月明空照八陵碑玉館瓊樓失舊基故國不堪囬首處西風滿地黍離離觀丙辰省試宣鎖作四海文章屬品題老夫刮膜有金箆諸君熟讀阿房賦未必能爲五色迷撒幙焚香冰鑑開觀君切莫負多才黜邊取廸渾閒事只恐紛紛擲甓來一窓絲雨一簾風當日虀鹽滋味同見說主司多好句肯將蠶蟻待諸公過釣鈎嶺悼亡友盛景韓一見㝠旌作許愁西風飄落冷颼颼早知真氣無伸處悔不當時曲似鈎暑中雜興一刻之閒直萬金苦無人可共幽襟成年不作西湖想聽得啼鶯不自禁不慣山中夜月寒滿窓樹影蘚花乾移床近壁不敢臥恐是龍蛇之屈蟠今年不上一竿竹渠豈於人亦世情風雨尚餘千箇在結巢吾欲聽秋聲白鷗吾有一日雅疇昔見之相與親滄浪忽欲從此逝嗔我手揖無詩人是非不到野溪邊只就梧桐聽雨眠睡熟不知溪水長鷺鷥飛上釣魚船平生多可曹修士說我唐詩最逼真不道蹇驢風雪裏何如黄犢過比隣俚謂革華烏脚鬼吾尊毛穎黒頭公與華作傳何為者穎則萬世辭文工只鋤蔬甲亦妨閒久與溪雲斷往還今日偶來僧却在共煎茶喫話廬山辛丑上元官府張燈試太平斯民從此不聊生使君只聽笙歌沸不聽閭閻愁嘆聲雙髻山千古丫鬟高插天淡粧濃抹傅雲煙眼前不見峨眉老獨有青山長少年次韻烹筍一絶錦䙀纔脫見龍孫便好西園到玉尊滿肚歲寒無著處此情難與俗人言西來洞天可是胸中負怪竒一丘一壑儘逶迤自從猿向西方去鷲竺飛來未可知送梅村歸三山此别重逢知㡬秋梅花雖老更風流東君未漏春消息罰與人間作蹇修原注時爲王留耕之孫請姻于泉獨笑坐鞍自課詩江雲雨樹兩依依客情生怕西風惡纔入秋來便賦歸逺將歸不勘圖經認地名亦知此去近桐城行人未至心先至差勝離家第一程鶴不歸來華表閒輝金耀碧滿湖間後來若有林和靖定不吟梅向此山寄題春谷監簿敲碎吟扉杳不聞數聲犬吠谷中雲㡬番欲去重囘首立盡斜陽不見君丹青閣紫芝峰上一凭欄煙草茫茫天地寛眼界已隨流水去丹青無復舊時看失題抱琴終日坐槐庭萬綠隂中一掬清天地山河俱䕃芘肯將風浪向人生年來古道不堪行盡避君厨俊及名莫枉錐刀鞭算手且調金石擊撞聲謫居姜相庸奚損貧殺元英直是清風月分來無著處摩挲海眼看長鯨梅答多謝東君為主張十分霜雪十分香開時已辧和羮料肯入風流時世裝西湖寒食寒食風光不動塵西湖㡬處淚沾巾客中忽作松楸夢羞見原頭滴酹人西陵橋界破蘇公十里堤雕梁軋水漾虹霓杜鵑也戀錢唐景不向西陵橋上啼梅坡席上次韻牡丹爲甚花神受氣偏却來南地逞春妍鞓紅未數青州種粉白猶疑洛浦仙不學時粧添酒暈休將風景對茶前沈香亭北空囘首目斷關河萬里天失題一别家山不計程斷人腸處若爲情客牀欲結鴛鴦夢夜夜相思睡不成柬石軒便著工夫去看山蘭亭未遇莫空還向來一段風流事只在茂林脩竹間義谿舟中夢裏不知身是客却疑身是老坡仙羽衣道士飛將去月在波心人在船春遊不爲尋芳出錦城偶隨吟杖繞山行春風的是多情物吹下紅樓笑語聲遊天竺靈隱三絶遊山此是第三囘天竺禪門八字開已斷此生休佞佛又隨人去乞靈來呼猿纔了復臨流洗出胷中一派秋泉石世間真富貴幾生修得到巢由冷泉亭角坐移時試看孤峯飛不飛峯自不飛人自醉暮鴉棲了更忘歸感懷曽將敝帚棄墻隂十載塵埃懶重尋今日攜來掃花徑老夫安得不關心
