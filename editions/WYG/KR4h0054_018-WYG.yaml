body:
  text: 江湖後集巻十八宋陳起撰敖陶孫上陶孫字器之號體齋長樂人為太學生題詩三元樓弔趙汝愚為韓侂胄所捕亡命江湖侂胄敗始登慶元五年進士第官泉州簽判有臞翁集見遺書本王士禎云臞翁古詩歌行頗有盛時江西風氣其詩評尤為談藝家所推引今葺自永樂大典中補詩八十六首熊得自古英之近江舟子譁然此異徴也為之留皮與膽餘均所獲以侈神貺云作獲熊一首時庚辰孟冬七日來黝者誰僉曰熊與渉江亂流實始逆予天畀敢違俯取以薦維古英神謂予汝眩有男不夢有妃莫當居然兩目視晝若盲甚者痔下取怒河伯醫者色難請謀諸藥熊兮主方我有𤣥囊清汝决眥扞汝濁腸有如不信剖肝自明寧我一死以與衆生拜神之休率曹披啖爾愛其蹯我愛其膽古興我有古時鏡云煉三精魄雙龍䕶其紐𤣥霧紛四塞持照盤古帝面目湛可識包藏久不事天地稍蒼黒昨中試拂拭依舊存八極惟有世人心寸膜不可得昔我走東海遙望殊庭曲獨木盤九龍欲以鐡網漉紛紛下百怪牙甲争踏蹴珊瑚泣沈沈悵望不省録終然拙用大坐閲年代速寄謝寥陽天龍宫書未讀前感興一首烏几學癡坐吾炊何以晨了知詩自好不與甑相聞蒼蒼本空空嗚呼誰使然甌窶知滿篝稍喜斗斛仁而我亦齊民不貧後世賢腹無一寸温百憂鎮燒煎巋然一破竈寒蟲欲無年更欲辨名字蟋蟀螽斯間書生謹守書放步防疾顛蝦蟇縁青冥孤光恣吞吐於菟無角翼為天守門户持此感物化堯舜萬萬古氷蠶不知寒蓼蟲不知苦未知了身口甘煖復㡬許髙髙化人臺下視多刼灰我欲轟雷車老天怒不開死語無出路六經聖所裁惟應蒯緱劍日夕同歸來後感興二首皇天分四時氣節幾錯遌俗兒一驚呼識者淚横落悠悠羲皇前日月何磊犖不世更凌歴地上光景薄十年看花草皴靣少膏沃看看六鰲背坐愛白日曝何當寥陽天朗咏無生樂朝為感興吟暮作感興吟何者最可憐淚盡枯人心身後多所化所遇或淺深奈何姝姝人色裹矜冠襟野芳必在擷濁酒必在斟死題善人表生托君子林置之勿復言愁隂復愁隂秋日雜興凉颸動空谷振我庭樹枝鮮榮忽顰蹙顔色慘不怡節序一如此明當戒裘衣寒蟲勸機杼敦迫不貸時汝意固可尚我機坐無絲晝氣差小祥夜氣益以清林端動華彩初月當我楹澗光若翻鶴草露如栖螢攬衣一徙倚肝鬲涵空明一室噤衆籟寂寥無人聲落葉忽墮瓦憂心還獨驚客從湘中來問我手中松當時一寸根翥霄作鸞龍子可爇我鼎肪可澤我容松今已如此而况種樹翁寄聲十八丈法當理歸笻陣雲起西北中原暗黄塵豈無康時筭無路不得陳書生亦過計夜夜占天文匣劍似識時中宵啞然鳴我亦發悲歌沾衣涕從横昨日尚絺綌今日便衾帟天公不闗白故故出不測郷來三丈熱變滅在倐忽蓬根􅐩然醒凉意滿巾幘團扇豈辦此羞澁謝陋質不必待秋來理宜長棄擲袁同史丈令賦所欲作醉皓堂詩以為後日數椽張本四老有袁謂乃其逺祖云黄雲䕶靈芝丈人非獨醉蕭然四鶴髪海鳥眩觴味古來閉闗人學道用其意滈池未返璧政欠頹然睡仙苗足風露中有熏心厲支頤得一笑劉郎已為帝乾坤重盪滌奈何前星墜昂藏君家老招喚作許事當筵就羽翼顔色變韶穉出山雲怡怡還山雲洩洩追思千載上把酒足自慰君堂定果耳或者樓閣氣是間堪厎用萬甕盛醴齊阿戎氣如虎神手了一世政宜日無何雪紵展鵠翅髙吟紫芝曲四老恐歘至再簡林子大糟丘酒無時釋麵雲濤翻前身阮步兵搜句急追奔詩清酒更冽自扣玻璃盆緬懐君家翁滿懐蟠虞軒職當調九鼎小却䕶北門胸中補衮線豈但民瘼痊胡為坐海山揖客通寒温邉庭失細大益我愁思繁今君富文采色正語不喧念我死塵􅅽妙語為返魂班班古罍洗一笑三家村凄其嵗晚不勝鄉國墳墓之情再得四篇贈宗之毋以示他人也隣曲竟還往嵗除當餽分作我淡生活小龍破宻雲天機亦良勤錯綜合瘁芬松栢青始獨苕華黄已芸重趼踏九州一源貫九流嵗晚天報子茲樓斂其秋正西蒼龍尾下掉白鷺洲旁人為我嘆汚瀆横吞舟紅塵暗九衢生白有我室山平拄笏頤月滿横琴膝三年蠻府掾不愧紙尾筆夢從南海君供我波羅蜜昔我宦南海賓友日撃鮮今來童市歸掌肉分烏鳶旅食何足校苦望雙旌煙願為墓户家毋為地行僊送安豐尉丁夢符歸霅川因簡之晦兄弟時寓崇川報恩寺原注潘指崑山宰文叔以作邑制酒丁姻家云世紛何豫人直作走千里寒壓破虎韉霜風殺淮葦能來得吾願連夜燈花喜矯矯將軍力一日破萬紙填胸龍豹韜政坐毛錐子區區寄人幕誰訪習鑿齒相見各挽鬚士窮乃如此吾謀適不用步到狼山趾荒村圍海氣央城如卧已幸當小盤旋長袖為君起囘首呌周郎湟水面欲死往者城南杜鈿車凑流水胡然落此地伴客歌快耳吾徒離濶好見即裂其眥中年迫婚宦官事漫不理闗心且詩酒甕面撥寒蟻如聞董召南犬鷄封石髓感君好兄弟行當訪虚址雍丘且勿念將星落寒紫送歸無好語凉月挂鯨尾君行定過潘茶鼎面曲几因之啓三請問酒所以止别袁席之二首漏盡有行客袁侯挽不來掉頭緇塵中胡為此徘徊何處非詩具螺江如潑醅公子亦豈癡索笑西湖梅平生詩書腹不計簿領材噫嗚梁父吟慷慨新豐杯夢作方士鳬唤杖聽風雷何知江東路瘦馬衝塵埃君名在吏部作吏始此囘獸弱而弩強蹙縮生自猜自猜固如此一語須君裁王事有靡盬柴車誰當推行矣勿告勞試身文書堆昨送鄭廣文持氊就客坐今辭習主簿相與枕書卧名字擅一世此法當寒餓臞庵書滿屋十夏作僧過就使君交我指目等竒貨百年寸箠折萬事一甑破獨念君行路歴歴眼中墮入衢酒無聲道信山辭涴每憶上程時店火明箇箇征人語暝靄嘶馬帶枯莝是間萬金藥貴子身劑和飲酒端不惡為米知何奈手板付丞相此語尚須佐次韻陳景齊糾掾題品山齋數石之作吾山何足誇君語煩専送姿為丘壑􅆺意重璆琳貢芥胸劃玲瓏眯眼豁塵瞀白雲足怡悦明月得簸弄居然衛霍近頓壓鄒魯閧故人真陽守遺補臞庵空數株立拏螭一笑慰歌鳯緬思昔牛李競勢急鞿鞚能令山崒硉所欠腹空洞那知負之走更使逐者衆誰言山上山竟作夢中夢老衰本無欲標榜聊取衷獨憐伏虎雄必得飲羽中荆室雖苟完漢儀亦多偬君能載酒來我願共飯甕有感一首典衣沽美酒鑄金買艷歌青燈烱長夜如此粲者何平生有㢘藺方駕欲更過低顔兒女中鬱若鷹在羅酣望八極表老淚如懸河諸兒頗嗤黠見謂同一波相如混滌器謝鯤困擲梭古來賢達人細過非所科竊願天子聖朝廷半丘軻青春深農桑東盡青齊阿坐令倡樓女委棄黛黒螺下里羞陽春中宫張原注去聲雲和我為太平人短褐生槖駞醉魂招漫郎或有石可磨謗議四方集謗議著面矢如雨前身雷將軍柴立吾甚武卻還觀我生與世實鉏鋙西通禰衡隣東接􅄞康堵以茲料身後藐未得死所一州納一嘲一邑獻一侮並淛十五州我作大謗府餘外九州者設伏特未舉徐思浮言端中實無所主怪雪羣犬吠眩日百鳥語何由澤其喙環海變春醑坐使聲名髙一日跨堯禹貰酒酒泉我南隣喚客青旗翻渇心若絆馬未騁意已奔平生無長物取具一瓦盆萬事漫不理得酒雙眉軒相傳新豐坊北奏司命門衣冠敬再拜一病煩公痊冨貴不敢願施我腰脾温今晨客舟出落日鳴蟬繁屬車得鴟夷秉羽可解暄却愛畢吏部神全不驚魂渠能給萬甕甘老愚公村龔立道家藏虢月石屏桑田鑒一奪周官寒如灰賜珏先淪奔乃自垂棘胎刼火到咸陽六國無珍材空餘虢山在蚌水相縈逥古潭月荒凉孤光翳復開六丁所邀留珪魄幻紫瑰閟藏三千年握獄無張雷君先世閩南家枕鳯咮堆夜光有感觸渠伊入剸裁向來匪石心不轉誤國魁皦如照萬世是君以聞來逺孫極風流乞語譾餘哀摩挲紫雲姿百感集我懐石汝亦不遇無兩歐蘇梅雪中陳孔章招飲始秋我如京禇中無所齎蕭條方逆旅敗履手自提入門一曲几塵暗烏皮低平生實有恃壮氣干虹蜺丈夫死則已未死牛衣啼以茲悟生理得展庶可齊城中雪沒靴凍馬不敢嘶病夫亦怕出登樓去其梯故人知我貧坐有一石韲招要過廬下春風破餘凄老懐不勝酒秩筵已如泥感君一寒語醉鄉強攀躋還歸叱塗路撑斤只槁梨我䇿三十六第一捐町畦佩服今十年黙化浙東西惟有三宿戀弱念牽房閨常時過飯家屋上瞻烏棲勿輕一壺酒踏凍誰為攜窮途見弟兄感涕沾䚢觿世情尚醻答人事多乖睽終焉媿閔嘿夜卧三畫臍何時接綢繆門牡炊家雞入舍更主客愧無鹿門妻謝蓋晞之餉筆仍詶以古夀春石刻金剛經詩人貴筆精如射得矢同有筆仍工書如矢入彀中先從鼠乞鬚次論腰到蜂平生竹林交未數阮仲容住逢蔡邕書三日清我胸還臨晉賢帖明眼搏赤熊規摹到晚唐戰手驚揚風興來欲捉筆趯若螽在蛩夢想諸葛誠腰錢走江東霜氣侵短褐十日守兔蹤故人知我鄉孤峰秃玉融遣到管城子令補麟趾終驕豪始入手廩如控奸雄竊擬専賞罰爵之中書公何以報嘉恵古夀碑色空字方蘭亭逸墨比頭陀濃君家閲古脚今日聊㑹逢更待黒蚍蜉滿紙昏花濛和姜堯章桂花裙字韻紅紫有偏尚桂花總宜人䗶雪明孤斟絳雲嬌小顰可憐愛花人兩屐穿秋雲懐人小山作寄愁中書君向來鷲嶺詩政坐書檄嗔月中落桂子習氣知㡬塵潘郎桃李姿頗亦尊所聞提攜風露前縷衣深紺裙附堯章作空山尋桂樹折香思故人故人隔秋水一望一囘顰南山北山路載花如行雲闌干望雙槳穠枝儲待君西陵䕃歌舞夜夜明月嗔棄捐頳玉佩香盡作秋塵楚調秋更苦寂寥無復聞來吟緑叢下凉風吹練裙送袁席之挈家之任神龍不池拘威鳯非籠馴自我交袁君愁見地上人一官固兒嬉君視真埃塵去如下鞲鷹來即釋嶠雲相從復㡬時孰老西湖春門前烏桕花頗怪烏來頻問知八九雛翅短青尚新感君攜孥行道路嗟良勤念子春秋學當重博士茵胡為簿餘干折腰五斗陳祭河先惡池小大則有倫細意事朱墨凡例實要津贈言吾豈敢輒獻所食芹惟時風雨交塗潦埋車輪十年上饒路夢中説悲辛黄泥漫塘坡鳴鼉舞淵淪贈子方竹笻副以白紵巾笻方嚇鬼蜮巾白來祗神意氣得人命杯酒聊慇懃上馬莫囘頭慎勿愁我貧亦莫作怪事祭竈通比鄰杼山閣詩原注杼山以禹四載立名攝身上諸峰我無千手目神交庶子泉夢老王官谷平生林壑趣魚鳥即往復杼山落何許面勢工設伏故人郊居賦雌霓從衆讀大聲嗑黄華令徳猗緑竹永言乘樏叟㑹計踵納麓方尊讀書倚肯效舞經祝幸當草木近安事筳篿卜顔公况華扁江令有餘馥騫掀鵬摶海夭矯龍起陸於焉峙横閣渠是伯夷築何年黄金彈雞狗隨蹋踘還持揮蠅扇静對振鷺瀑前山入手版後水激㡌屋風聲逐孫登星采向荀叔誰能治西曹束帶望賜沐清客班雜坐動處草皆蓼乾坤磨旋蟻身世蕉覆鹿異時留峴首羊公難諱獨次韻蓋宰大化我蟲臂常時炙牛心居然身桔橰老圃愁漢隂簡書實畏人吏事頗見侵千里得蠻語十年生越吟寧為尺一稽何者可枉尋盖公學齊魯頗似東海任雙骭留石涔舉世方盤鍼稍傳閉闗術抑按娯五禽朅來道院中狼山即知音披衣起視夜欲借北斗斟寤言種秫陶渠肯挾䇿欽琅然庭柯句欲和南風琴勾牽老維摩善哉去來今飛􅅗不同穴著鞭英雋林贈縉雲陳志仲主簿楚語一篇若有人兮江之臯搴珠樹兮紉落毛既輕舉以逺睞衆流靡靡兮汨獨與吾相遭余懼夫人之仙幻兮指逵術以要之忽改容而善步兮紛還折之得宜斥姬滿之荒淫兮服堯禹之所趨載神鼎以自隨兮出䕫魍以驚愚予慮夫參重以賈踣兮曰此耿耿之故也閔一世之滔滔兮謂彼不吾即而吾亦為此懼也嵗貿貿其婉晚兮天浩浩其雨霜反而顧余兮被髪内狂前九疑之喪道兮後渭滻之無梁微夫子之亢衡兮㡬人鬼之披攘望兔迹之咫尺兮仡馳騖之堅彊車軋軋其相摩肩促促其相望欲抽心而改錯兮慮夫子之我懲忽風后其降予兮天老字予以嘉名獨怦怦其不自得兮淚流軾之縱横幸哀其中道之離立兮若示之以正通縱世人之不吾與兮吾將卒以自明燈前曲琉璃燈暖燒春紅水晶簾垂望欲空美人縹緲隔花霧春心咫尺無由通寳釵沽酒市樓中當筵一曲悲絲桐少年逰蕩足行樂江南日日長春風借山谷後山詩編於劉宜之司户因書所見呈宜之兄弟拾遺詩視孔子道豫章配孟顔後山自餘衆作等别派彪虥貍豹虎一斑我修直筆公萬世議論不到甘謿訕中間杜老饒寒餓陳也絶葷黄尚可天公讐施略相當一字而貧更憐我去年臞菴太荒凉釡中得魚雷隠牀了知詩祟力排擯誰言錮疾蟠膏肓劉郎食飽嗜昌歜又一過目思手攬編詩更著顧癡筆字字可丹藏石䃭知君療病我益病心手相忘還展詠百年長病可得辭兩翁落唾皆可敬勿云身後無知音此詩百變無邪心候蟲時鳥足感耳我思正在南風琴誰能首塗追四始以經夾轂騷駕軌意所不快鞭曹劉此時折汝一寸箠長安市上逢聮璧人持一箭與我直請君了却三萬軸再見坐我牀下客與太常丞丁晦甫我昔嘗為李公客坐覺金氣肅東南鉤章棘句䕶帖妥獨立卻視何巉巉此公行世有步里十不五試驚愚凡尺書飛出岷峨西每沐問訊相雕鑱向來思賢實微尚夢濯杜老百花潭瓊英玉蘂媚初服風日清美生妍酣直言李公似杜公前者何愧後何慙今來劃逢丁太常目所未接心已甘孤標出林唳霜鶻健論轉海驅風颿張旜萬里足騎壯冨公所説惟飢饞國中何自得吾兀尊足乃為公所貧承郎曹司略清貴龍鸞犠象勞所監工歌韶頀未敢請前有琴瑟紛相參據梧枝䇿了自解箭鋒一語渠誰諳世間聲利大葦箔置身各自縈繭蠶一聞解縛脱軀命往往唶舌徒婀媕千人萬人聲一㮣請聴野老真常談捐身大是守身橛閲世當求出世銜君今氣色日日上嵗晚能同彌勒龕夀通守趙寺丞忠簡公騎箕尾星千古萬古明天庭在天髙廟足歡喜敕使孫枝扶炳靈輟身仙班寄閑逸閶闔正繞烟花出朝元冠劍妥未動一笑明朝作人日漢家最重水衡丞廩餼錢多上所能掌藏頒用渠式法置之忽分淮股肱春風作意囘焦土黄池﨑險爾如許區區鼠輩何足磔此心本應僧伽祖甘泉酒作真珠紅和氣已墮胡牀中奮髯扺掌直細事參佐同此祥冲融大江洸洸去無極江南老人候舟色諸公歸補父兄處二十五城那得直海門短簿初來時青衫恰輟惟烟姿興來得句自推激為公壓倒崧髙詩代劉漕使夀相君神仙窟宅㑹四明氣候中和開二月是間表表韋平家奎閣明良拱天闕前周後魯岌相望孕昴降嵩天所設大慈平等現官身思日賛襄盡臣節平生履狶真益下餘刃磔牛何慮缺道逢不平忽偉事坐覺日月妖氣豁未嘗示袒勃安劉亦復和羮商得説由來轉物得三昧政爾成風聊一吷涵濡少海益重潤運動紫樞髙柄掲邇來邉瑣向平寧西土民艱隨殄㓕撞搪噭呼間未免寸地尺天吾忍免公身固已佩安危公夀應當等溟渤花明栁暗沙堤外著眼昌昌見春物想當鳯沼引䕫龍内樂宮壼儼成列天皇酌醴賜加勞詞人第頌歌明哲㑹令宇宙還帖泰要與鴻濛論融結此時桃李競新枝草木恩光相焕發小儒囿身坱圠内獨駕封軺來百粤惟當嵗獻南山詩長與天朝誇突兀贈龜山慧海長老向來縛虎正死急今日看牛無可鞭我提審定之兩印十年勘盡諸方禪浙東西山好僧相頭目静如秋水蓮試令囘眼參壁觀掣頓已作獮猴顛平生棒喝不作用何者可毒臞翁拳龜山爬沙吸淮海上有蜀客蹲其顛石顱鐡脊鋸牙齒老龜無力供迴旋自言小來坐鬼窟木客對誦明月篇山中白石足朝飯無語可對蹲鴟前一行乃得命大謬萬事瓦裂今蕭然祇念竿木事遊戯鐡胎五百成拘牽至人無心亦到我顧念塵脚相摩湔是身如雲即虚幻安要包裹争鮮妍爾來臞翁頗狡獪隨風轉柂忘洄􅆓都梁采藥竟何有杖頭挑得枯藤僊髙堂暗坐觸蝙蝠放光時有堦頭塼了無一法可酬難蒲團禪板久已捐山空月明礎石員百圍老幹行參天何當斷手釋椎鑿與師共泛荆溪船江湖後集巻十八
