body:
  text: 江湖後集巻一宋陳起撰鞏豐豐字仲至號栗齋東平人南渡後居婺州淳熈十一年進士有東平集二十七巻芋洋嶺背聞雨聲滿山細聼林上槁葉風過之相戞擊而成音後先䟽數中莭清絶難狀篷籠夜雨未足為竒日未出扶桑雲猶屯海嶽宛是欲雨時朝隂凛巖壑霜林亂葉多荏苒乾未落颯颯滿空山細聼㣲雨作一葉初自吟萬葉競相謔就彼最髙枝相摩應宫角燥響欲相慿風来能領畧湏㬰不聞風但聼雨索索是雨亦無竒如雨乃可樂風停葉静時雨從何處著霜野物聲乾終帯塵土濁篷音非出虚瓢音太傷朴得似此聲清瀟洒過笙鶴天籟者非耶䕫襄不能學送湯麟之秀才往漢東從徐省元教授學詩士㳺鄉校間如舟試津浦所見小溪山未省大島嶼一旦逺遊學如舟渉江湖所見寖以廣變怪驚龍魚人生本自有丘壑陋巷棲遲窮亦樂何必三江暨五湖始助胷中疆界拓我言随寓耳目移馬遷所以㳺㑹稽向令俯僂但京國未必大放雄深詞君今濯秀雙溪水下語不凡真可喜若使循為舉子文定自棘門兒戯耳古來妙技如屠龍不療飢餒徒為工不如髙科取富貴如一棗葉持鍼鋒挾冊将㳺随子國親賢况是諸侯客曽將好手冠南宮行當闊歩趨文石奮飛欲往氣莫降蒹葭莽莽天雨霜揚瀾左蠡吞九澤大孤小孤插長江請停詩筆莫容易大義聮翩且周禮原注將改經從徐路途千里負笈人併以經塗相指似大孤大孤小孤在何許大磯小磯忽當浦顛風吹浪未肯停猒聼蕭蕭打篷雨今春積雪深復深爛銀猶照廬山隂狐裘欲脫未可脫蟻醁當斟誰與斟晚來潮靣烏如石遥㸔知是長魚脊篙人且下鐡狸奴更與風波鬭今夕二蟲吟鯤鵬至大兮形載于荘周逍遥之篇蟋蟀至小兮名託于周公七月之雅一則變化徙天池一則悲嗚入牀下周公作詩陳艱難瑣屑如與婦子言天經地緯發真藻特驅小物歸毫端鵬大無倫世無有揮斥八極隘宇宙世人有眼不見鵬直頼莊周為不朽當年蟋蟀吟秋時秦家宫殿隋家墀鵬飛雖占九萬里得地稳宻誰如伊大鵬擊水翔寥漠蟋蟀逢春死籬落二蟲得失何厚薄天晴日午槐花落為舉子時所用方硯小童滌之誤傷其左角巾箱硯子何處得溪翁用作待魚石博時不費杖頭錢遂入余家掌文墨父祖相傳晚畀予自㓜相随真莫逆七星象斗隐約明一口如池方寸窄憶曽携入對集英僅畢春秋二三策後來随宦落江湖同上武昌題赤壁定交首尾三十年晏子狐裘虞老屐村童唐突豈偶然一角㣲傷真可惜大禹圭璽猶缺殘因損不妨成友益靈光一殿亦偶存小物本來甘弃擲賛經禆史則已多論議失中天賜謫敬追子産謝叔向息黥補劓全吾璧詠豫章蕉葉素扇寳月乘鸞空復情頗嫌㩗重愛携輕犀皮赤柄終傷俗細骨洪蕉竟入清格調不殊蒲處士工夫全藉楮先生文饒空賦桐花鳳絢麗虚成畵史名原注李衛公有畵桐花鳳圑扇賦海棠銜子來東海仙巢有鳳雛華開新棣蕚莟結小茱萸富貴天專與嬌柔韻不麤輕盈飛燕趙韶麗彩鸞吳入譜雖千品傾城但一株霧藏雲體魄霜染雪肌膚酒暈欺西子冰姿笑藐姑暖風唇破玉寒雨淚凝珠蝶喜穿油幙蜂羞賦蜜租葉如踈復密香似有還無淨灌岷江錦濃施禁國朱欲眠湏客去佯醉索人扶劔外空逢杜黄州却遇蘇已多歸綺繡唯未入氍毹原注氈花多麤未見有作海棠者金谷非佳妾雕隂是醜奴自珍紅頰輔應怪白髭鬚照樹呼銀燭澆叢命玉轤有詩曽送别無力為嘘枯尤物空凡馬芳春過白駒尚憑花藻鑒摘句已成圖炊熟日有愴松楸小樓吹斷玉笙哀春半餘寒去復來五歳不澆墳土上望江心折刺桐開雪汀見二鷗三鵲對立二鷗三鵲羽毛鮮立在方沙更可憐全似爛柯棊勢裏白棊初讓黒棊先周弼弼字伯弜汶陽人文璞之子嘉定間進士江夏令有端平集十二巻荷澤李龏又選而序之曰端平詩雋序曰汶陽周伯弜與予同庚生同寓里相與徃來論詩三十餘年嘗手刋端平集十二巻行於世伯弜十七八時即博聞彊記侍乃翁晉仙已好吟洎長而四十年間宦游吳楚江漢足跡所到皆有作於七國兩漢三國六朝隋唐之體靡不該備聲騰名振江湖人皆争先求市但巻帙中有晚學未能曉者稍多予恐有不行之弊兹於古體歌詩五言律七言律并五七言絶句摘其坦然者兼集外所得者近二百首目為端平詩雋俾萬人海中續芸陳君書塾入梓流行庶使同好者便於看誦吾伯弜平生心不下人今隔九原聞予此選必不以予為謬寳祐丁巳冬至日荷澤李龏和父述石鐘寺山前削成面山後不露骨何人戀巢居結屋寄突兀多風鎻寒殿頻雨閉石窟筍透獅子傾草蔽鴟吻沒髑髏串胡神纓絡纒古佛熹燈影摧殘槁栢香蓬馞丹葉夏猶在緑樹暑未發坳徑鳴秋蛬閒堦起蒼鶻僧衣莓苔侵齋鉢野萊掘梵庋止數巻矧能備巾拂奔波道塗間體倦神屢竭大險阨在前醉夣魂恍惚信陋獲安處不勝塵土汨經房晚棲禪殆亦未易忽鐡風終日呌心頗惡此物欲去欲住間征㠶已超越送覺新上人還越古越多精藍名僧逓相接青林瓶盂聚丹壑楼觀疊今乘秋濤便莫待寒雨渉何處聞鳴蛬虚廊掃黄葉琵琶亭蕭蕭楓林青雜出間椅檟尚忍送行舟繫此木葉下雲開星垂山水蕩月在野江空夜倀倀淚復誰滿把汀洲泥沙換葭葦顔色假變遷斐然殊感慨益以寡黄煙飛髙桅絳雪當道灑餘春去不盡併放湓浦㵼豈無夜深彈寂寞少聼者尚有沙灘人時時說司馬題蕺山僧竹閣高閣俯人世越香清古岑林表山煙薄竹多苔色深露笋翻曉籜雲房生晝隂天風自然來明月照我琴景豁謝幽事竟日聆仙禽佳言出竒觀清梵揚空音子猷昔好此故園今陸沉睠然顧兹賞蕭蕭生道心牡丹江南牡丹凡有幾徳安打頭歙為二金陵舊物間有之池陽吳郡皆居次地近京畿種偏好鄂城栽接不草草舂土篩泥繞畫欄石甃方壇净如掃當頭第一帶鞓紅膩紫嬌黄别作叢盤盂追出最迎日碧玉萬片藏春風寳葉絲絲帯縷金錦斑酒暈閒攅心翻騰梔茜亂朱粉様各数名分淺深低樹猶高五六尺花重剛枝反無力迥出層隂轉耐㸔始悟年深有真色晚添細雪來相簇露醒香魂冷方浴倚柱黄昏眼倍明頓覺夜䦨須秉燭洛水芳林應更多不禁飛雨洗銅駝酥煎送酒有人在草沒故園無柰何鄱陽湖鄱陽湖浸東南境有人曽量三十六萬頃我昔乘槎渤澥間眇視天溟坎蛙井浪何為而起於青雲之底日何為而碎於泥沙之裏太極初分一物無天水相包若鷄子揚瀾可供李白青州杓彭蠡付與盧敖洗龜殻斗大孤山沒處藏斸取來榰鼎鐺脚胸中八九吞雲夣似此蹄涔亦何用安得快意大荒之東東復東指麾魚鱉騎蒼龍賦建寕浦城李頻行祠詩建安梨嶽老梨木刻作唐朝建州牧香爐忽動吹寒灰浦城環翠隂風來嶺頭頑石盡能走澗下奔泉皆倒回猿猱啼兮鬼嘯野六𤣥虬兮四驪馬想湏吟遶碧草亭舉手高翻白雲冩峯為文通名夣筆楊公書堂曽散帙麗月鮮霞付與誰煙墅有人還築室田父何所祈贈爾青麰黒桑椹里儒何所求贈爾黄粱布囊枕萬歳兮千秋既往兮復留抽蘭心拆椒口簸南箕挹北斗不假竹枝歌何湏折楊柳只用秦原妙絶詞傳入神絃薦春酒將適毗陵道中遇居簡上人姑蘇觀下逢居簡㡌子欹斜衣懶散自言契闊漫東西雖老猶能青白眼知音不在禪床乆抱刺懐書謹奔走反舌無聲亂草間囬首盡成獅子吼荒蕪野寺孤城外赤葉黄蘆日相對午睡䨇鳩喚欲醒起傍生臺炙肩背㺯筆濡毫摠蕭索尚餘酒量添於昨語盡横塘笛未終東風滿靣楊花落匆匆觧䌫攙程去從此相期更何處一椀官酤般若湯把手同看獨孤樹煙波亭避暑澄江横匹練月洗黄羅扇捲盡白雲衣恒星撒沙見天低欲就人夜色凝深澱歘吸動㣲光時絣斗間線凉亭逼曠野軒楹敞三面萬象悉鋪陳隨機互遷變十歳逃虚空得此方一遍相對坐談𤣥終宵亦無倦只恐駸駸催曉箭湧上東方老銅片湏著干求大帝君莫使陽烏眼睛轉乆客思歸感興乆客空江上閒吟對石門青山非遠近流水自朝昏夜月添鄉夢春風入燒痕翻思南郭路迢逓隔烟村逸人壁深僻人稀到天然野意成荷衝崩岸出草入廢泉生曝术充山貨抽茶當地征未須尋伴侣時有自來鶯江臯送别把酒對汀洲相㸔發去舟迎風一分手驚浪幾翻頭燭暗花消淚楓寒葉弄愁恐猶回首望終夕凭高樓白羊路隔一重溪山深客易危驛亭惟有額官堠盡無碑竹掛黄身虺林香白面狸得船争欲渡先奔槿花籬靈竺寺有孟宗祠不因純孝者古寺若為安壁彩蝸遊遍爐香䑕踏殘鐘聲􅀈破梃旛影颭危竿尚恐冬生笋時來竹外㸔送僧歸舊隱自言歸去後只在故山邊紗㡌臨溪盥銅瓶傍水禪晝閒松塔雨春盡草堂煙何故相抛捨沉浮逐世緣寄鶴林智福上人深山高頂寺黄鶴舊曽留鶴去無蹤跡山僧幾白頭鳥閒齋皷靜猿嘯佛燈幽宿約何時踐題詩向瀑流送僧妙通遊平江萬夀寺故鄉離幾日何處躡秋陵梵葉床頭樹唐衣壁面僧雨花粘舊錫風籜掃寒簦新謁期相寄呵彈破小乘㽞别唐棲雲泉上人水宿唐棲寺何縁更浹旬千山今日路三歳異鄉人小殿眠身佛空廊折臂神歸時重作禮又拂一畨塵贈僧仲寳月溪幽棲深絶地靜夜獨宜僧上下兩輪玉中間一片氷影收懸罟索光息過船燈獨坐觀心了無由更小乘送惟徳上人還黿溪為愛林間寺幽閒少是非因抛蓽門業來着稻田衣石蕨衝雲細山蔬膩雨肥禪居安穩後更莫啟柴扉送惠嵩上人住西山蘭若孤雲無定迹又入亂山居既息禪機穩從敎世網踈曉香嵓屋像寒呪石潭魚待我尋詩境看君坐隱廬送黄同甫人生各有安出易欲歸難古道春泥重孤城暮雪寒酒鋒精似將詩業逺於官野榖如堪飽從君借鶡冠野橋日暮野橋邊都歸醉客船數竿沙際日一片水中天影落衝煙鳥聲移帯雨蟬殆非人境得江月又初圓楓橋寒山寺江楓吟咏工幽寺冷遺蹤不改前朝路猶聞半夜鐘地凉汀月皎村迥水烟濃試問誰曽見惟應獨有松送胡宗原還天台山故里杉松表歸程筍薤初盃多常失飯囊罄只留書海墨收秦棄山糧食禹餘古來仙隱者多在赤城居千金寺十載他鄉别春歸逐浪層晚晴沙市皷夜雨石橋燈帆側摧乾葦衣寒脆薄繒舊時來往寺惆悵不逢僧菩提廢寺野寺孤僧住當春亦掩扉曉鐘三板去昏杵一盂歸古屋垂山榧幽忩飬石韋未容行客憇荒樹兩鳩飛幽居漫成便入空山住休傭漢省書薄雲翻藥畚斜日送柴車遠業松花膩生涯薤葉踈抱琴誰共聼一尾食間魚乍歸無定業蕭索帯村居神樹當中朽人家著外踈藻痕千漂絮花影一床書何必為真隱相安便有餘鹿苑寺分半作民棲猶藏一曲溪鵲窺蓮葉座僧占菜花畦白蠧魚銷粉青乾獸剥泥幸留唐刻在相伴峻廊題馬鞍寺水國何年寺蕭條野渡邊僧驅田雀倦神抱海犀眠細網垂秋屋殘燈泊暝船數家枯柳下猶有舊人煙雙林寺杳杳雙林路林深不易登寺幽憐宿鳥地僻喜閒僧静徹垂梁板寒銷背壁燈水邊人忽笑猿落過溪藤訪别聖代吟家衆無君衆體詩數竒官職見心苦道塗知積夣難相寄流年自各悲金閨催製錦又復向黄陂溪館送别旅館成佳集臨觴送逺征厨烟含燭㷔溪雨奪琴聲愁動草邊色恨牽花外情明朝過平望應念隔春更晚泊芳草渡頭猿夜吟孤舟一繫百年心舊遊零落不知數客路經過空復尋暮雪關山千里鴈夕陽烟火數家林明朝嘆息東征士髪垢冠欹不欲簮秀野小作幽園傍宅開只須數畆占樓臺石移林屋秋雲至水帯松江暮雨來徑草散香迎過屐砌花分影䕃流盃人家園囿應無數不似君能日幾回行吟獨行沙岸不相携凖擬沿溪更渡溪藥蔓交加蟲上下柳花撩亂蝶高低杖頭曉伴春雲石屐齒晴翻夜雨泥詩就隨時為人冩等閒抽盡錦中題吳山仁王寺山寺憑高夕未昏上皇曽此定乾坤甌閩散驛縁江島龕赭收潮入海門細雨亂花唐輦道淡煙踈柳漢營屯何時汴水東流畔君返宸居臣故園感事書劔悠悠屢變遷老諳多故始知天汗青每愧抛長日髪白無由逐少年暮雨暗消江岸柳曉霜初透野池蓮此心懸解何湏語人問惟應一指禪過荻港波眼沄沄浪復輕稍甦羇束過清明倩人覔路先尋酒乆客懐鄉始見餳松下紫芽肥野菜竹間青葉帯山櫻自從一别齊安後直到今朝始聼鶯烏衣巷日落凭欄感慨頻長干橋畔冷殘春桑田蕪没徒多事蘭玉叢生更幾人風暖影翻花外燕雨多痕蝕草間鱗堪嗟羣從成功後不及鍾山一尉神送趙山臺赴江隂匆匆何事觧朝衣甫為君王領一麾歴考近來成故事就遷長是未多時寒更夜徹防淮柝曉舶晴翻出海旗不乆赤蹏應已到只須畧賦練江詩滕王閣高閣巍峩接水濵興亡纔問便傷神鳴鸞東閣知何處跨鶴西山别有人柳映落霞江渚暮草鋪斜日野田春羣鷗亦厭多悲感偏與忘機客最親道中有感遠程已過經行處别有逶迤古道存寺已寂寥猶有殿水纔窮盡又逢村一株枯木人分路十里飛花客過門畢竟悉依生處樂不知何事别家園南樓懷古五首昔人有意乆經營極望寒蕪遠更平三國斾旌羣鵲散六朝樓閣一鳩鳴雪消晴嶂沉孤壘風打寒潮入廢城多少怨魂銷不盡草根燒斷又還生事乆銷沉只等閒好將深意逓相叅舳艫宵遁誰思忖裙屐春遊自笑談西日瘴回迷漢沔北風波逆上江潭隔城方唱招魂引一拍殷勤至再三茫茫迂曲度平川何處孤村近水邊煙䕶劉琮殘壁壘雨沉黄祖舊樓船寒沙細擁菰蘆地破隴斜耕苜蓿田見說去年秋潦後更無茅屋起炊煙幸際清時息五兵舌頑無處說縱横蟻封一夣難分别蝸角千年强鬭爭丹壁郵亭新蜀道白樓烽戍古邾城自知夜半徒興舞移遠寒鷄不使鳴夕陽光退杳難憑欲問江鷗只怨憎得意舉帆燒北岸傷心流涕鎻西陵雪消蜀貨千檣下風順吳鹽萬斛増且趂一樽相暖熱自非乘醉莫來登夏日泛袐湖朝來泛舟花滿湖亭午返棹風相呼已收波浪入菱芡晚開雲日媚菰蒲羣飛皷翼數沙鴈一去没頭雙野鳬少留霽色定堪玩可惜歸程時已晡黄溪怱怱寧不恨飄零轉更分岐過别汀世事總如迂曲路年華都付短長亭冡桃褪蘂無人色社櫟盤根作鬼形心自感傷人豈識回頭猶顧峴山青㑹稽山衣冠從昔化文身峻嶽當天自有神秦帝刻碑三十載越王棲甲五千人江連雲氣分南紀海接星河近北辰畢竟興亡誰可料但聞陵谷變飛塵題西湖竹閣寺精舍蕭踈近水凉分明一徑緑沉槍就移山近湖皆隱放出樓髙寺倒藏春透露梢齊曲檻曉翻風籜過修墻長堤花盡人稀少來聼蟬聲伴夕陽贈唐棲寺僧山門寂寞唐棲寺别去閒居又一年草暗暮田羣鴈遠花明春院一僧禪雲房夕磬浮清雨水殿寒燈宿細煙作得詩成無寄處幾回遥認隔溪船留題唐棲寺僧房十日相留戀為怯生寒未到家挿岸斷氷妨蕩槳入簷飛雪助煎茶香臺穴碎逃秋蟻古殿巢翻失暮鴉惟有溪梅最禁耐傍籬爭發向陽花羅家洲對港近村俱有路扁舟倍覺往來頻入秋破褐惟存線盡日收錢不滿緡逺岸冷沙啣墜葉淺灘寒水卧枯蘋未知行役何時斷縱使更深亦喚人送人之荆門昔年此路逹王畿荒燒畬煙事已非山向崤函空北望水隨江漢自東歸凄凉坂路征車逺寂寞郵亭候火稀遥想思鄉怨岐路杜鵑花發鷓鴣飛採香涇繒甲如荼䕶此臺玉顔憔悴錦㠶來一溪香草無蜂過千里空葭有鴈回響屧蘚埋丹鳳迹縷衣花變粉蛾灰誰知子夜歌殘日樹滿西山似緑苔浮遠横障瀰漫恃此丘長江東騖轉湍流波間去海無多里沙際鋪淮輙數州風勢起花山郭暗潮聲侵樹野田浮無由望徹蒼茫外回首斜陽總是愁鄱陽湖四十韻巨浸連吳越高躔直斗牛𤣥明開别府江伯匯支流象緯元精逼神姦袐怪裒番君䟽帯礪彭蠡壯襟喉赴隙如無地凴壖忽有州津涯逾冩潤窟宅定刳幽島認瀛鰲戴濤疑陣馬蒐珠跳憐雨駛鏡滑識風收樹帯喬枝隱山餘短碧浮窺覘疲罔象䁹睨态陽侯漾月都迷皓蒸雲間作油涵濡均藻荇冗長到蝦鰍蜃幻晴虚閣龍腥夜㧞湫萬尋縣圃玉一帯洞庭秋盈縮知誰紀吞并似力揫鯉矜封赤鯶龜笑斥朱眸嵌竇扶桑齧珍文匠石鎪鷗羣馴野客蚖肆傲潜蚪罟數筐零霰檣輕弩激鍭孰分浮瓠澨或訝繞蛇丘絃索延商婦舽艭送莫愁陶朱誠得䇿神禹想遺憂端稱潺湲弄非無隱伏摉豆分高下渚葦視去來舟血脉乾坤活瘡痍稼穡瘳披猖包息壤𤨏碎略浮漚蓮女嬋娟棹漁郎芼燥甌有人搴繡被無客傲鸘裘貨貝窮乾没醪羞肅丐求束枯論沃釡戒覆比傾輈衆水杯盂外佗年吐納尤鵲填功未議鯨吸志應酬何事輕思濟吾防果未周阽危心骨醉飄泊靣顔羞敢計乘桴去何知戴笠遊片㠶真擾擾隻影轉悠悠卑濕嗟一作羞梁傅星霜挂魏牟勞歌慙孺子破簏付平頭烏豉緣蓴置黄粮為鱠謀清螺取歸日穩棹聼夷猶仲宣樓仲宣徙倚思歸後又復誰傳獨歩名自昔城闉雖尚在至今波浪未嘗平半規赤日沈荒渚一縷黄煙起廢城梅落碎花催塞色葭横響葉弄邊聲驚寒牧馬頻西顧趂暖賔鴻漸北征况乃有懷傷歳暮登樓那不動鄉情冷泉幽憇水源窮不盡垢膩生春襪未敢輙揭流且向幽亭歇溪亭話别芳時談古調霅浦少同人花日桃花外歸船便隔春歳除思歸山妻書到多日野渡舟横幾回想見溪邊亭上故人待我啣盃春風氷斷千尺曉霽雲開百重何處溪橋爭渡誰家山寺聞鐘野屋定堆落葉山徑應鋪石蕪一别經秋不到隔籬黄犬誰呼題湖上壁寒食風埃滿客襟西湖煙雨送愁頻日高未起鳥呼夢春晚不歸花笑人贈别水雲翁離離䨇鬢似秋蓬慣逐沙鷗與斷鴻漂母磯頭春水濶扁舟何處繫東風烟中梅冷花踈蘂竹間横淺薄籠烟淡作晴怊悵野橋春水斷幾回相見不分明贈從古上人山僧䄂出新詩巻字字馨香撲人面清晨何處展㸔來捲得梅花兩三片囬山僧書就題書尾憶昔同行題落葉寺前枯樹鶴巢邊不知今度苔枝上多少秋蟲已化蟬寄雲泉僧永頥二首書來只說住高峯不記松林第幾重欲㨂青巒問茅舍秋山一様白雲封誦罷南華誰得聞兩川寒玉一禪身松邊彈石低聲念莫引龍來變作人逢僧文禮二首空山落日又逢僧雨雜塵灰滿㡌紋但憶來時門不掩麝香偷卧石床雲師說古香寮舊開鮑昭曽為惠休來至今猿鶴猶知敬靜對寒星禮碧苔四聖觀小園寛占一山孤别有墻遮古觀居到了恩波攔不住水忩遊出放生魚女墳湖石龜無語對東風海鶴曽迷曉市中三十六鱗朝夜月玉釵人在水晶宫詠史二首一曲呼凰下九霄石臺春動海山遥周秦戰血縱横盡猶卧白雲吹洞簫碧樹童童䕃屋廬分明青盖畵龍車南陽病叟成何事便謂枯池沽得魚客樓水國秋清潮半生越王臺殿鎻荒城西樓一夜思歸客斜倚朱欄獨聴笙送人遊西山三首昔人深夜看星斗鎮壓靈壇尚有符偷冩只應蒼䑕慣幾行丹篆繞春蕪鎻斷寒蛟亦有神冷波寒水病殘身誰收匙鑰權相借畧放天池洗白鱗抽鈆㸃汞舊臺荒何處捜尋舊草堂誰見洪崖最深處一坑泥䕶石中黄下渚秋暮淺灘近渚沙相接水落漁人朝暮渉摵摵風鳴若雨來繞堤吹散乾荷葉題野廟野廟荒蕪到掩扉寂寥香火客來稀年年歸燕相看覷空滴春泥損畵衣顯應觀桃花白雲隨鶴乘將去深碧桃花滿故宫三十六簧明月夜不知何處吸春風溧陽桃花見說謫仙曽到此東風千樹鎻雕墻游人偏向花間酹雨濕春泥噴酒香風惡偶成二首柔櫓雙隨下水船亂㠶輕柂逓相先無端繫着山村岸高枕蘆芽對雨眠三日要行還止住冷沙寒水暗消春一千四百蕪湖路怨雨愁風多少人秋日馬上詩本無謀畧強談兵每媿臨邊病未能筋力豈知猶可喜一鞍千里到江陵思歸閙裏看山不識真偶來軒檻振衣塵諸峯便覺移相就分付春風欲去人㸃㸃楊花飛滿洲只應催促送行舟非關向晚傷心事自怯春寒不肯留盡日憑欄客興濃山雖西遶水還東便乘春暮家園去猶及棠梨滿徑風自覺才踈乆願歸敢將山色便相依漢家事業雖全盛亦放梁鴻一箇飛道間偶成彎彎田角路周遭摘盡柔桑露淺蒿無限寂寥門半掩一車偏建夕陽繰牡丹莫對餘春起嘆嗟最難保守是繁華君看南渡百年内看到子孫能幾家延山渡解㠶登岸作山遊林木茅茨共一丘數日驟寒消不盡尚餘殘雪䕶松瘤江湖後集巻一
