body:
  text: 提要總集類江湖後集二十四巻臣等謹案江湖後集二十四卷宋陳起編案起以刻江湖集得名然其書刻非一時板非一律故諸家所藏如黄俞邵朱彛尊曹棟吳焯及花谿徐氏花山馬氏諸本少或二十八家多至六十四家輾轉傳抄真贋錯襍莫詳孰為原本今檢永樂大典所載有江湖集有江湖前集有江湖後集有中興江湖集諸名其接次刋刻之跡畧可考見以世傳江湖集本互核其人為前集所未有者凡鞏豐周弼劉子澄林逢吉林表民周端臣趙汝鐩鄭清之趙汝績趙汝回趙庚夫葛起文趙崇嶓張榘姚寛羅椅林昉戴埴林希逸張煒万俟紹之儲泳朱復之李時可盛烈史衛卿胡仲弓曽由基王諶李自中董杞陳宗逺黄敏求程炎子劉植張紹文章采章粲盛世忠程垣王志道蕭澥蕭元之鄧允端徐從善高吉釋圓悟釋永頥凡四十八人考林逢吉即林表民之字盖前後刋板所題偶異實得四十七人又詩餘二家為吳仲方張輯共五十人有其人已見前集而詩為前集未載者凡敖陶孫李龏黄文雷周文璞葉茵張藴俞桂武衍胡仲參姚鏞戴復古危稹徐集孫朱繼芳陳必復釋斯植及起所作共十七人惟是當時所分諸集大扺皆同時之人隨得隨刋稍成巻帙即别立一名以售其分𨽻本無義例故徃徃一人之詩而散見於數集之内如一一復其舊次轉嫌割裂參差難於尋檢謹校騐前集刪除重複其餘諸集悉以人標目以詩繋人合為一編統名之曰江湖後集庶條理分明篇什完具俾宋季詩人姓名篇什湮没不彰者一一復顯于此日亦談藝之家見所未見者矣乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:98c43ea0dff0458e9bba3fc91055c6fe6c6181ee9232cc80b9048b6a4eefde12
