body:
  text: 江湖後集巻十六宋陳起撰釋圓悟圓悟閩人遊清源洞清旦尋幽洞攀躋有同遊霧雨藏諸峯萬竅響颼飀樹杪飛磴懸巖外見客舟蘚藤垂翠琰風葉隨清流百丈崖班駁千尺木聳修烏啼暘谷曉雲淡海城秋莓苔蝕丹竈山房花竹幽踈烟生墟落逺水浮汀洲朝斗空壇在昇仙徃事悠倚䦨吟未就歸屐少遲留山中四首飛瀑掛髙崖幽禽響虛谷憐此一片景借得數椽屋澗木卧槎牙巖花散芳馥䇿杖從所之偶到南山麓踈林過㣲雨西嶺收殘暉草露濕我屨松風吹我衣坐久四山暝吟餘獨鳥飛歸來不知晚蘿月盈牕扉雅懷無所拘偶行度前崗長松發佳色澄潭閟幽光而我亦何幸於此得相羊低頭心語口兹遊那可忘暝色歛平川雲歸日已夕閒行信杖藜倦坐憇苔石花亦滿意紅草自無心碧吾亦樂吾年人生不滿百海雲閣天風來海門驚浪作飛雨岸雲過已盡隴樹青可數掛㠶鷗鳥外清吟正凝佇欲去猶未能漁燈粲烟渚重遊清源洞此地今重到藤蘿長碧隂緬思仙去後長有客來吟出鳥江濤白連雲嶺樹深杖藜宜少駐靈跡尚堪尋小立小立當清曉一笻吟影孤蘭香和霧濕竹老帯藤枯野水流将合春山淡欲無雨晴猶未卜勞爾鵓鳩呼晚渡橋巷低臨水數家深掩門路竆生寂寞人渡更黄昏風色占帆席潮痕認栁根岸回林影暝漁火滿沙村遊静真觀古觀門幽寂來遊亦夙縁林堪巢老鶴壇可禮真仙秋晚寒生屋雨深苔印磚舊藏多御賜應識尚留傳題泉州張許祠泉與睢陽隔事聞猶涕零人雖死忠義祠自活英靈壊砌寒雲聚空庭古柏青功名見信史何必更碑銘和胡教授山庵見訪歸韻因赴山中約歸途帶暝痕禽聲沉衆樹人影背孤村霧起寒城裏江流古岸根行吟多得句知欲與誰論大㡌山衆山皆弭伏獨讓此峯尊絶頂時猶雨中林晝亦昏逆風松勢偃觸石水聲喧定有幽棲者何因得晤言山中夜歸一鶴候柴關林空境自閒竹房秋後凍病叟夜深還樹宻疑無路月明猶在山幽居便所適已是十年間瑞興寺路僻今蕪翳寒厨尚起烟僧依三佛住門與數峰連雨潤苔封塔年深竹覆泉創時靈異事猶有斷碑傳真人洞捫葛敲幽户空山得遍觀雲離朝拜石苔積上昇壇秋晚澗聲澁月明松影寒真人不可遇誰復此燒丹和黄瑞玉山庵偶尋孤隠處幽僻逺腥葷結屋聊依石栽松却傍墳山深長霧雨海近𣺌風雲不必稱昏瞶自然踈見聞趙山神祠山中雖隠跡名被世人知無策欲干主有詩還立祠水雲通别渚枳槲䕃空墀多少能吟者焚香為拂碑題秦君亭昔只為吟隠偶然依佛居路逢隂壑盡雲抱曉巖虛亭在因人重山深與世踈倘懐名利念到此欲何如承天寺尋勤上人古寺多陳迹幽花祗自開净無秋後暑逺絶市中埃苔色侵碑石松隂蔽月臺山人遲未至欲去重徘徊次姜秦祠和胡教授韻曉謁崇祠霧靄深行藏因識二賢心榻前自有孤忠疏林下誰賡招隠吟寂寂精廬蒼蘚入堂堂遺像暗塵侵客中莫致生芻奠聊汲山泉薦菊斟題寳山寺二首寓此曾三夏重來隔五年溪山亦良是懷想轉凄然去臘應差暖今春定有寒澗梅花半樹侵曉又凋殘宿友人白雲庵三首不到嵗時久重來人事踈掃雲僧亦去誰伴主翁居萬籟夜俱寂蒲團清可禪林踈窻過月巖逺竹通泉城裏秋猶熱山中寒已濃紫檀時小炷危坐聼晨鍾送壁上人歸承天寺城寺思歸興忽生又携笻杖出雲扄月明後夜空山裏繞屋泉聲只自聽方海豐詩境樓分賦得春風暖襲遊人陌上塵不知花信㡬畨新莫教吹到荼䕷處吹到荼䕷是晚春釋永頤永頤字山老居唐棲寺有雲泉集按上天竺志云永頤杭之耆宿也淳祐十年冬十一月聞上天竺佛光法師以左藏薛師普占廨院欲作㕔佛光勿許輙渡江東歸永頥甚高之遺書嘉慰則永頤之操行亦可知矣食新茶自回山中來泉石足幽弄茶經猶掛壁庭草積已衆拜先俄食新香凝雲乳動心開神宇泰境豁謝幽夢至味延冥遐靈爽脫塵控静語生雲雷逸想超鸞鳯飽此巖壑真清風願遐送和韓澗泉韻題周晉仙山楹不翦亦不斵山楹在塵表石泉聲淙淙秀谷自圍繞是中𤣥覽人未見今日了君固自無心世亦不易曉夣奠何可攀頺然泰山小當時巖壑人百世何矯矯清冷振霞纓日翳羣隂悄葺唐棲舊廬矯時無峻節立行虧衆美逺岳憚孤征徘徊就鄉里人情好愉悦我老齊賢鄙娓娓聴鄉言時時容側耳前脩不可見法社漸凋毁名山半征徭祖塔亂獐麂林築無清資澤居循舊址鑿牖納晴曦蒔竹臨幽泚時将了嵗寒閉户春風裏吕晉叔著作遺新茶原注其品大窠葉收二餅葉二十七一餅郝原葉仲原四餅章坂葉二十九二餅碧原王家二餅大佛嶺游潤四餅凡六家四業及王游共家原坂嶺嵗摘建溪春争先取晴景大窠有壯液所發必奇頴一朝團焙成價與黄金逞吕侯得鄉人分贈我已幸其贈幾何多六色十五餅每餅包青蒻紅籖纒素檾屑之雲雪輕啜已神魄惺㑹待佳客來侑談當晝永感鴈來紅落落雲中鴈亭亭階下草草心将變紅鴈聲來已早霜風日夜催對此忘吾老玲瓏葉數層次第顔色好臙脂染盡時倚欄如醉倒年年秋鴈來每被吟情惱越溪吟石磊磊猿啾啾越王霸業秋山頭英雄喪盡如何數可怪猶存浣紗處當時月照清溪頭美人如水逐東流至今片石終難改千載猶含澤國羞乾元山洪水乾元山頭洪水發溪有長蛟潜伺察兩岸居人莫等閒年深物怪終騰㧞往嵗隣封遭水變只道溪流浄如練倐忽人煙數里間夜半平沉皆不見東南地坼乾坤浮幾畨赤子𦵏洪流神龜去後不復返休看浪打石人頭苧瀆夜泊吳城水冷秋風髙迎霜楓葉飄城濠吳儂趨利如趨市髙帆大艑横江濤黄昏不顧風水惡篙兒怒挈何輕豪苧瀆人家慣迎接憧憧來往無停艘水上懸燈招夜泊沙頭認客相呼號人生富貴多不足亦有裨販當勤勞萬斛髙裝謀重利斗升未給浮輕舠吾生最愛魯仲連封侯不受海上逃輕世肆志甘貧賤誰能富貴詘辱遭夜歌新詩喜逹旦起看征鴈飛雲臯野棠野火回颷掩舊株新叢滿眼臨征途綠攅深棘欲自蔽千朶萬朶争敷腴新晴逺客過林坂烟漲吳船春泊晚冶艶空揺蕩子情繁香暗逐吳姬逺吳姬漂泊行人愁年年此花開不休半壓壊牆荒館外亂生春蕪野池頭人間買花貴紈綺一世争知異朝市曲檻朱闌轉首空野棠無主自成叢山行與周弼伯弜同賦野廟芳草没荒基終年掩畫扉酒臺乾舊滴香殿入斜暉神樹枝枝曲山魈個個歸春來歌鼓動野老薦新薇山池早秋荷葉傾香露山池見早秋石涼幽蟹過枝脆雨蟬休廢堰憑虚漲荒泉入亂流水花紅漠漠相對渚煙浮送僧之金陵秋針感線蹊雲衲幾回披隴月當牕夜鍾山入句時夣依紅樹宿寒渡碧江遲吳楚繁幽勝相逢苦未期月夜遊冷泉亭地靈泉上寺松壑定深清獨聽子規呌况逢山月明樹藏春洞黒石擁夜泉鳴日出喧車馬終非隠者情夜歸昨夜溪上歸雲下扣松扉老褐啓重鑰瘦厖循我衣院静雨聲大氣寒燈暈微叨叨聽林鳥春歇訴無依徃龍岫舟中龍山溪上路短棹臘中行雪霽寒郊闊春回宿霧生栁揺氷線斷鷺起玉衣明未見晴梅發先思杖屨輕周令自江夏東歸郜溪芳草萋迷征騎歸且依張負入書帷家園嬾記閑花草蔬豆重甘舊藿葵崔灝能吟有陳迹襧衡作賦想當時才能徃徃為身累好讀淵明飲酒詩遊何山登道場中流望極山頭寺溪午聞鐘泊栁津春草細霑微雨潤老松髙與碧雲隣鶴歸烟麓書堂廢虎去寒巖蘚石皴無奈薄遊歸路晚水邊風斾濕征塵雲巖寺老來好古尚關心寺裡荒題幾度尋山鵲報晴窺畫閣水雞嫌雨上髙林麥殘餘冷收春候棟落輕風滯晚隂無限幽懷難具寫一慿闌罷一閑吟送王以通之官金陵芳辰早失意兼哀不擬君來重舉杯雲暗月墻花氣重蠟殘風幕鳥聲催醉鄉人有江東役乘興船從闕下回明日沙頭相送罷荼䕷小院獨徘徊伯符兄弟最英雄千載青山繞故宫宋祖只知曹馬事齊髙還與獍梟同暮簫尚帶蘭陵怨春水多愁舊壘空登覽未應迷宿昔夜猿啼在晉時楓雨牕江湖春水欲生時開盡梅花鴈北飛風雨滿庭人不寐小牕燈火夜深微題裴六書堂數峯相對夕隂遮新占書堂舊竹斜地冷石堦秋菊小一叢開得兩三花天竺秋日翠滴千竿濕砌苔曲廊花木小叢開吳僧愛覓閑吟處偷向花邊竹裏來行繞方池日又斜青雲小注濕秋霞䦨干幾度渾敲徧為引遊魚出浪花水仙花洛浦香銷珮解時荆臺歸去峽雲遲緑羅湘帶無心疊玉墜頭花一半垂鷲峯山後山前行徧了倚欄不是動秋吟從頭自較山中石烟雨苔痕幾片深苔峰只對堦基列卧榻雲牕烟翠凉老去山中貪勝賞只應迢逓負三湘過聚景園路繞長堤萬栁斜年年春草待香車君王不宴芳春酒空鎻名園日暮花㸔梅雜興春動晴山照野扉早梅開後失歸期夕陽無奈山郵路過盡行人雪滿枝掛頭方㡌與烏紗兄自㸔梅弟煮茶閑問水邊行樂去向陽渾有幾株花青松古院一株梅寒殿無人花自開日暮老僧清梵罷夜深偷照月華來寄行宫監門王以通中興天子議攻車歎息諸公屈壮圖行殿不開塵鎻合至今風雨暗金鋪玉鈎簾外前朝栁鬬鴨䦨邊小艶葩莫道君王不曽問好收銀鑰䕶宫花觀烏鳶山下藤樹一株老樹蔽荒村下有藤懸巨蟒身幾度日斜烏鳥散山昏鬼哭斷行人㳺張園觀海棠戯作春色都将付海棠羣仙㑹處錦屏張約齋妙出春風手子美無情為發揚雪中海棠蜀妃夜謁紫虛皇玉鳯參差促曉妝讌罷瑶臺魂未醒臙脂臉上白雲香聞子規情誰是不思歸芳草春深未有期昨夜月明啼更苦山花滿樹落臙脂唐棲寺前唐棲寺前溪水流客㠶來徃舊杭州津亭樹老無人記得見幾回僧白頭
