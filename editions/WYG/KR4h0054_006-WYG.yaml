body:
  text: 江湖後集巻六宋陳起撰鄭清之下賜第登樓避俗懶成癖登樓睡失魔忘機鷗自下開檻蝶相過髙處景差勝静中春更多君恩何以報歸夢欲如何戯調長鳴鶴瘦鶴雲霄志相從伴獨清可堪三徑寂頻作九臯鳴博字輸鵝頸横空避雁聲終辭華表去汘漫逐騎鯨覺際閒行斜逕轉山腰平疇露稚苖雲低松挾長雨足浪宣驕宿鷺翔孤嶼歸僧睨斷橋倦餘成小立新月掛青霄三月末泛湖半晴隂更重乍煖冷猶争墜葉蒲芽綴新蓴荇靣生鐘聲帯雨澀㠶力貯風横客至雙飛鶴歸歟茗可烹食蛤戯成滿殻濡潮汐因沙産海滣文身呉泰伯緘口魯銅人雀化宜分雋蛙烹肯擬倫原注蛙大者名風蛤試呈饕賦手半熟酒含津菴前徐歩小橋衘石路安歩水之湄浪盖菰蒲伏寒禁笋蕨癡蜂房深户牖燕壘漸塗茨過眼春餘幾延縁歸思遲書齋獨坐避事寜違俗端居悟及身頴泓供媵御方冊替親賔室闇月䦨入庭空花自陳所安惟適耳誰復辨秋春東歸越上急雨先聲入芰荷傍船魚躍弄新波東西黑白投林鳥高下青黄異畆禾村豎相呼騎犢背小舟斜艤問漁蓑秋來物物供吟筆不着黄秦可若何桂花香粟飛從月姊邊秋花無數總饒先清芬肯作椒蘭觀雅韻羞陪粉黛妍㸃就金丹篩雨露染成玊骨跨神仙餘芳更孕青青子相伴寒梅到雪前金峩途中石路縈紆水遶村酒帘深處見柴門横塘樹宻鳩携婦老屋籬深犢有孫麥莟菜花成錦繡筍芽薤甲當雞豚竹輿莫作追程去半似桃源欲細論奉題蜀邸五雲西岷峨保障西望岷峨天一方誰教地險絶遐荒皇風已喜渾無外國勢那須别有疆黄鶴盤空飛不過金牛拔地去何長漢庭四海皆臣妾一曲歌風未忍忘小軒偶成齋餘宴坐息深深萬法皆閒境㑹心輕浪颭荷珠溜玊晴曦穿竹翠籠金岸頭舟楫人歸語檻外菰蒲鳥去音謾説陶車并謝屐如如不動勝登臨村邊以湯婆様惠示與詩俱來依元韻惠中秀外更清便婭姹嬌羞二八年無奈畏塗生袵席寜教寒夜折氷綿遣來勣嫗知君狀擬伴涪翁到曉天只恐甎花陶學士風流未老續膠弦戲占横塘雨過水初平浪影窺窻一孔明籬下觸羝五鹿角林間反舌百禽聲柳公權可送行客梅子真能寛渴兵誰道夏園如所有蓮花端可傲張卿比以拙詩戯調張籍不知作者已盈軸矣輙和兩韻展也虞朝庶績熈合修厥貢暨熊貍兕容于野雖非地豹澤其文似識時毛革正須供有用血牙安事殺為嬉國僑惠政人誰犯虎聴多應謝子皮虓虎寧如龜有知陸行端自觸危機縛渠吕布還須急驅以王尋謾失威肯使黔驢呈短技直教獵騎合邊圍惡盈詎必分人獸猛獲終擒自衞歸原注宋人請猛獲于衞石祁子曰天下之惡一也云云衞人歸之因㑹原注古外切來詩再賡元韻組練横陳壯士貔想因羽舞去窮竒千山白髪存公道十日清吟費老詩待伴易銷春有脚交光最勝月如眉只愁無著梅花處東絹平章付伯時續詩之寵依韻以謝莫搜險韻續貒貔雪景須知雪後竒日絢寒光莊净界梅將真色薦新詩試敲折竹煎茶舌旋覔遥岑出黛眉油幕輸君談笑樂聖杯正是一中時題雪竇千丈巖並海危峯駕六鼇招提深處緑周遭樛松直上睡龍起怒瀑飛來風虎嘷坐向亭空雲作伴待看身與月争髙山靈意我酬清賞為酌氷泉讀楚騷思鄉味戯成隔籬野圈㹀眠犢帶雨村舂雞喚雛旋熟黄粱留客住滿篘白酒倩人沽未諳旅况三分在早覺藜腸一半枯寄語吾鄉譜鮮子原注朱謙之有鮮譜莫教辜負脆皮鱸除夜求屠蘇椒盤為計定春前客裏那知歲籥遷行路問闗穿履雪薄官羞澀看嚢錢媿無黄帝屠蘇酒試謁淵明種秫田原注徳化彭澤鄉令尹可人應拍手從教滿意作新年贈陳童子前身端合是王充收拾羣經貯腹中書吻可能如布榖筆鋒應不事雕蟲看來眉目真蘭茁攬取詞章作繡筒歸去莫誇童子技好尋芳躅到蟾宫山行山行心迹已雙清驟見清溪眼為明鬼谷洞前符竹在觀音巖下魶魚行宗師宴坐空餘石龍女分流不作聲人影交横到林薄緑煙深處一猿驚正月六日早行松山道五更河鼓尚横陳小立晨光漸可人日出野雞猶唱曉雪晴山鳥競呼春溪筠拂袖霜花落石路支笻蘚迹新慚愧明朝江國近買魚沽酒祓征塵送行詩中年别意増懷抱昨夜秋聲到客船流水孤村鴉好在平沙逺景雁依然惜無繡口供吟筆只有蓴羮愧昔賢付與西湖林處士重陽健倒菊花前半生霜鬢飄萍迹㡬度風餐繫柳船舞詠未忘雩里在去來翻似賈胡然先生自是今和靖林下端能友士賢二畆孤山應更好瘦梅踈影小春前山房秋日即事雨後鳴湍走碧溪水聲秋意恰相宜窺蟬螳臂方𠂻甲啄蚓雞羣競濟師初月掛簷窻未覺新涼入牖簟先知西風早已催征棹管領蓴鱸入夢思失驚墻外已飄黄屈指秋來十日强暑㓂負頑猶出沒風師未壯且翺翔橘包捧腹徴藏葉桂蕾呈身只欠香掃盡暮天疑浴罷半眉淡月畫新妝稻花經雨已脱白楓葉未霜先借緋入紵蚊牙千計巧掛簷蛛腹十分肥田翁看水擕鋤去山婦臨炊抱蔓歸唯有詩腸無一事隔溪數盡暮鴉飛晨興散歩軟紅銷盡利名韁興到湖山取次行萬馬拍堤春浪起一龜曝日曉峯横客中寢飯根塵寂雪後松篁意氣生身是定僧無欠䞉惟餘雙鶴報寒更僧居西畔鶴居南我向中邊住此菴歲晚結交松莫逆老來知味菜分甘禪心每日閑中得世事新從夢裏諳隐几空明香穗斷净揩雙目對晴嵐晚歲知非蘧伯玊前身作脫戒師兄青山不灼利名火白髪能銷忿欲兵境對虚空全體現眼無揀擇内心平曉窻醒寂闗何事到枕清鐘一兩聲食後閑歩乞得閑身入釣臺柳眉舒盡見桃腮山中歴日花開落物外交朋鶴去來更展書窻延竹影䞉翻隙地長梅栽春寒無頼欺霜履健倒應愁破緑苔同黄制屬自延壽寺雨過禪寂寺箯原注平聲輿掠雨到僧門帶得清閒一二分素喜堂中無偃月朅來寺裏作穿雲赤心莫逆唯松友青眼相看有竹君燒葉更聮東野句紙窻鎖隙候晴曛偶成五物中間著一翁園㕓隨分可支笻章施采服花粧露戛擊鳴球竹嘯風踈種宻栽觀木漸淺流深浚養泉蒙眼前丘壑無佳句自哂詩腸苦未窮祈晴行西湖上呈館中一二同官踏盡紅塵挹翠巒江湖清夢入雕鞍濛濛薄霧渾疑雨惻惻踈風不是寒野菊頻催花事早老楓初試葉聲乾恰知病骨宜清景恨不浮家學釣竿曉色窺林半淡濃亂鴉飛去水漫空山横孤霧殘霞外秋在微雲踈雨中官事却能成勝賞詩壇端可䇿新功呉儂浪說西湖景蓬觀今逢蘇長公偶於圃中問訊梅友老榦數枝疎花初放有足喜者率爾有作洗出金灘鎖骨沙種成老樹競槎牙氷霜歴盡肌生玊牕牖寒深影到紗舊歲枝頭新歲景十分好處一分花誰言冷圃惟秋菊春意撩人乃爾邪宿翠山箯輿十里見青嶄行盡松隂得翠巖萬壑聲中清磬出一峯髙處白雲緘茶新煑鼎作魚沫僧有可人能塵談自覺靈山縁竟熟佛禪重問後三三暖風依日佐山行幾許春隨屐齒生溪舞緑雲苔出沒田翻翠浪麥斜横閑中適意榮三事歲晚無年式耦耕一静可能銷幻藥剰開胷次着峥嶸旌徳觀瀛丈移從弱水間君恩泮奐得躋攀茗香壺酒成三事中褐枝笻佔獨班境勝亦能充道勝官閒何似在家閒𤣥都猶有桃花在更向西湖訪好山緑蓑青笠慣菰蒲錯認東湖處士居舟尾笑迎車後客渡頭催買網中魚水程趣戍半規日山意論交千巻書歸去重樓試凝望恍曾雲氣矗凌虚余識頔雲岑已三十年晚居覺際又八載矣近因山行疑接談麈偈語奉贈嬾把無生話更參月移梅影到枝南身心識破夢中蝶頭角老來春後蠶笑斸野泉畦露菊巧尋煖地圃霜柑蒲團睡足書遮眼貝葉叢間㑹孔耼調雲岑戯將鶡弁慱緇衣般若叢中賸作癡鵝頸肯為羅隐笑鷄林能辨樂天詩好從休處求安逸莫向閒中覔住持覺際湖山最佳趣藕花洲渚菊東籬因林治中近有捕虎之役調以拙詩豺狼當道實堪嗔就乳於莵哭楚臣馮婦下車宜衆說將軍射石見心真渡河應避馮河勇搏獸終歸舞獸仁他日朕虞須命益九官濟濟定相親余自東山往金峩住山戒師迎於中塗到上方泉石幽勝有心匠助天巧者因成數語以贈一奩鳴瀑冩天紳怪石鯨奔欲化鱗靈隐飛來真相後原注真相乃金峩寺類老坡重證戒師身居山活計今成趣造物工夫總待人自喜愛閒逢勝絶杖藜端不負殘春贈談命陳總屬彈鋏朱門歲月過生涯安樂徧行窩談天有口機闗别處世無心笑語多自是君平忠孝在其如曼倩滑稽何一㠶又作鴟夷去遥想江湖聴踏歌三友松號大夫交可絶梅為清客志相同英英鳯實卑餘子楚楚龍孫過迺翁晚際一弓櫜素月署中千斛糶清風小軒正欲供晨坐付與遮攔曉日東遣興舟車覆郤萬變人雷動静兩忘蟲臂聴渠得失羊腸何異康荘出市得鱖魚成六言長鋏歸來有魚狀似松江之鱸為向東坡傳語醉卧黄公酒壚觀史有感家令身危侯國計洛陽讒擯涕流書都門祖帳何功徳千古徽名説二疏晚晴濯翠篩紅獻晚晴為渠日脚䕶歸程碧雲四合如相妬纔剰西邊一縷明覺際偶成自愧端平村宰相今為安晚野堂翁君恩全付閒身世山水從容一笑中覔桂花於夷陵宰月圃仙人試道粧風流六一舊琴堂遥知鼻觀盈秋馥乞與氷曹數粟香東家竹屋最窮空不識簷花落雨中笑遣呉剛揮玊斧解令冷舍作蟾宫謝送桂花金闕真黄入靚粧仙葩何事到鱣堂只縁風雨要人甚窖取旃林百斛香道眼如如了色空維摩方病散花中杜陵有酒勤相覔留竢清齋出梵宫自嘲我亦逢埸因作戯要令竿木自隨身老僧不學靣壁觀山偈隨縁舉似人感事退之硫黄藥成疾伯仁金印恩為讎眼前世事盡如此十日峭寒春作秋鳯栖方杖矮伯老於周柱史瘦梅青似楚離騷推窻欲覔登山路無數青苔落鸛毛晚景斜照染成金色界嫩霞蘸出水紅天箇中買得皆真境不遣詩人費一錢一巖一巖洞空掛雲山巧印穹蒼半璧環只為廣寒宫殿逺故留闕月在人間虹出輕紅淺翠抺弓腰髙映斜陽跨碧霄半似一條瓊玊帶合成五色水晶橋讀虞美人草歌戯成心似合驩因恨結眉如别柳為愁彎罇前舞影風能偃争奈當年力拔山太史報彗星沒老彗妖芒欲爇天王良見迫為收鞭紫微一夜璣衡轉甘雨祥風到野田旌徳觀半生東甬數間屋一日西湖十首詩囘首風光少年客春山擁翠作蛾眉調雲岑佛法方當惡劇時偃溪笑裏袖鉗鎚不教管領千雲衲打徹頭闗更問誰聞蟬人行沌口三程路蟬作陽闗第四聲待到日夕蟬歇處無端促織替渠鳴紀龍井上所見揺曳輕隂羃柳堤坳塘日暖漾鳬鷖無端崖下鳴榔發飛起一聲過水西梅粉靣芳心碧玊裳特來宛作故山香征途不覺春如許更問蘭芽幾寸長戯作窻蠅詩曾記窻蠅古徳詩笑渠未有出頭時驀然撞破窻間紙透出虚空未是遲清明有感井泉槐火幾清明白髪紅顔管送迎榮落智愚千古恨一時分付子䂓聲觀王導傳作江東老子惠之和九錫牛車愠葵婆不殺伯仁君信否澹然推分意如何食豆莢西風槭槭草蟲鳴萬莢叢中詫瑞蓂煑啖快輸兒女吻燃萁不忍尚堆青蓮房洗硯圓長已褪青雲子芳軟猶存緑玊房留伴陶泓共新浴要令毛穎沃清香小憇上菴竹邊深静納新晴瘦䇿徐行足力輕曲檻負墻塵不到游蜂時寄採花聲題東山上方謝公雅志在東山一入黄扉不復還公去我來山屬我為公償却半生閒題偃溪聞長老堯民擊壤圖炊煙萬井著僧居人在康衢畫不如寄語偃溪灑淡墨圖中添我一柴車泊黄檀夕陽茅屋占江干風斂炊煙作暮寒間看月光牛背上畫圖添我一檣竿玊泉觀魚金鱗玊翅舞漣漪雷雨休言變化遲尺水能開千里潤看來端的是龍兒謝童天老秋蘭楚畹春曾汎曉光直留雅艶到虹藏山中不把一枝到世外那聞千佛香秋色追隨入慧光肯擕幽卉問行藏深林未省炎凉態來為閒人特地香緑葉青青原注音菁帶紫光原注經有紫金光聚拈來笑處沒遮藏宻圓應具楞嚴偈非木非空出妙香湖風不順推篷滉漾失船踪萬頃玻瓈在沌東政戀湖光挾山色知心龍伯贈横風聞覺際被風寄頔老古徳把茅惟盖頭􅄓風飄屋等虚舟矮窻猶有蒲團滑也勝床前衮雪毬南坡口號十八首十日南坡兩日晴時時不放日華明春光似妬閒人佔端的春風飽世情天工忽忽度年光料理人間富貴忙閒裏何曾闗造物一分風景亦收藏誰將春晚作冬看添着綿衣减却難道是麥寒猶未在願渠麥熟且禁寒休言無地起樓臺十箇花窠沒處栽東近北鄰西近水且教紅白靣墻開欲識魚梁試作原注則箇切看輕抛野渌罩清寒幾囘漉起空無物輸殺羣兒下釣竿吾宗孫子喜相過一笑檀欒似樂窩且向尊中陪北海直須閒裏識南坡酷愛鳥鳴山更幽墻隂風雨但颼颼筠籠買得春禽語不㑹憂時也白頭原注近得白頭翁善鳴管絃不礙登山屐梁肉何妨滿腹書豈是清談愧夷甫為無阿堵遶吾廬試向清池放小鮮洋洋圉圉忽攸然校人真箇知魚樂殺活機鋒總是禪分席春畦僅一弓靈根移自石窻東原注五味子生於四明山饒渠五味誇仙藥争似鹽梅正䇿功紛綸造化信多才果解分風作去來我向南坡一旬雨春隂今曉為誰開小窻白醉篆香遲只有書君伴燕頥料得人間無此樂殷勤獻與定牢辭枝笻掛起一旬彊剪剪春寒到柳塘白髪不公欺老我偏於閒處引風霜記得兒時誦古詩其甘如薺謂吾欺淡交休恨相知晚擕向晶盤笑殺伊原注墻根春薺怒生曉來兩鵲屋山鳴報喜多應只報晴似為東皇傳好語故留勝賞到清明舊日都城飫子魚一鱗今不到茅廬果然額上通三印盡去侯門代鯉書安晚生涯冷似灰别墅經營半月廻誇與兒郎翁驟富詩嚢盈握送陳雷紅紅白白共支榮怪底山茶有寜馨倩得司花來判斷不妨一姓養螟蛉和虚齋勸農十詩迢遞層隂曉自開僊舟花底問瀛萊文章太守非遊衍為省春耕特地來爇天妖熖彗初沉朝汲仁賢簡帝心未用鋒車便脂舝小須千里徧春霖蔽日寒雲悄欲秋仁風載路曉光浮田翁攬抱兒孫笑竹馬横陳未肯休問訊桑麻真郡政按行松菊似家山挽回和氣歸田里只費齋鈴半日閒暇日棊書六一翁錦檣絲轡與春逢年時豹尾車中望山色有無知幾重曉夢吟成望帝歸征鞍未許柳絲知笑聴鄮嶺春禽哢去博延英午漏遲酡顔醉客玊西東半濕塵衫上翠空鄒谷雖寒應解黍朱車靣靣是春風小隊旌旗半道歸松隂緩䇿攬清暉女郎未覺褰帷過笑語相教著嫁衣老黠山靈具六通解將蒼狗䕶竒峯虚齋自有青嚢眼郤笑景純書未工恰好農時踏翠煙睡龍驚起雨公田官程便作乗閒看不用扁舟學計然三月二十四日自東山到金峩一宿而歸偶題壁上安晚居士自覺際航湖入東山道金文意行至此淡晴輕冷風䇿䇿有聲草樹清幽泉石雅㓗如在天竺靈隐間深靚過之既暮假榻瀑通夕喧枕始印魯直夢成風雨詩粥魚鳴展鉢而去因筆一絶橋石天台水谷簾峯迴秀擁更深嚴我來便欲兼忘世少立清風為拂髯和白雲老禪二偈閲盡恒河水上波聲塵何似泡漚多還師拍板鉗鎚後更唱誰家别調歌簷鐸吟風月半凹黄金布地欠誅茅三更出日真光景大好欽身正笠包戯嘲杜宇呼晴不似鳩知務報喜何如鵲愛人有口自鳴誰禁汝亂啼何必待殘春游松山溪塘晴日蕩漾紅染花梢未是真一川晴綠最闗人誰知屬玊雙飛處占斷西湖幾許春漁舟明月清風住釣船新秋世界落詩編漁翁若遣騷人作原注去聲肯食人間一㸃煙即事微雲踈雨一分月折葦枯荷强半秋猶有逺禽飛不盡急翻孤影暮江頭别僧溪邊風景逺且平頗似江鄉雙眼明柳風淅淅茘日淡計取生還第一程頔上人持瑩蘿月五詩見示因走筆和韻聊禦睡魔蘿月禪機莫强猜如來無去亦無來霜凝寒緑歸松鬢春染輕紅入杏腮須彌境界含方廣芥子中間見福昌但使有船堪載月不應無佛漫留堂竺乾心法拈花笑洙泗家風鼓瑟希一問已應居第二更詢來處落三機三更日出行千里百尺竿危到幾囘遮莫分身兠率去聴從路滑石頭來病著心華須佛治老僧眼纈要經遮勿逢蘿月五禪偈絶勝盧仝七椀茶賜第登樓桃李漫山不是春紛紛蜂蝶趂遊人梅花已帶春歸了分付垂楊浥露塵病思歸心走兎迒自嗤幻境未渠忘并州便作咸陽看設若桑乾亦故鄉登飛來峯懸崖石路擘蒼苔川竇巖扉處處開信是拔山人有力一峯搦碎總飛來濃綠中見芍藥一朶杏桃結子已成翁稚緑中間著耄紅階藥元來如許壽麥秋天氣露春工夜雨依風急雨墊秋清踈數無時總有聲最是可憐雲裏月幾畨雲翳幾畨明花間見蝶粉翅縈花幾度忙惜花長是為春光争如箇箇蜂鬚上到處分甘作乳房天育二老禪惠示經佛偈答以十詩二老毫端一滴曹喚醒䆿語沒叨叨更無慧可安身處作麽當時立得牢餘塵明極强分離菩薩如來是阿誰既道本來無一物將何芥子納須彌龍宫海藏自分明搕􅩟灘頭一任傾因果若還終不昧政須防作野狐鳴書經猶有遮箇在畫佛何曾夢見來玲石玊峯雷雨過梅花昨夜一枝開三經已是太多羅州去休休更問婆箇裏幸然無一事何須終日把甎磨四千刼來閒坐休忽抛長舌閙藍頭若言靣壁為心法瞿老還須第一籌懵懂維摩不二門畧無遺囑付兒孫普賢若匪剛饒舌此事如何更吐呑老胡無聖亦無言驀指虚空喚作禪掌血條痕無著處誰教白地患青顛般柴運水老龎禪佛法無多在宻邊餅汝將來還與汝因師交㸃更團圓生老年來病已深灸瘢著艾復難禁六根四大元無有何處求師下一鍼江湖後集巻六
