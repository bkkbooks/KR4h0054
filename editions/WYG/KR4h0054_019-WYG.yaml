body:
  text: 江湖後集巻十九宋陳起撰敖陶孫下中夜嘆臞庵胸中空濩落正爾有愁無處著比來有酒三捫膺突兀又似堆衡霍道邉俗子畧滿眼舉扇鄣塵不容卻正如白日殺快讐草草九衢面皆惡不應叔末盡鬼魅世道如此我何樂麞頭鼠目動侮人貌敬逡巡背輕薄其餘邉幅綴周孔汝身無苦何遭縛中原干戈六十載八陵玉座塵漠漠假君無力堪汎掃渠可忘憂置恢拓屯田邉壘差易事三十餘年束髙閣嗚呼吾君至仁厚一言罷行水赴壑雷塘勺陂可復請専創一司足經畧牛犁居屋旋填補虎士編氓間參錯聊城指日下魯竒祁連刻期開衛幕行之十年倘未効臣頭請膏斬馬鍔奈何諸人忍奈事天保正用初無作居然判道君北海不復追隨我西洛墨池到了須楯鼻茶甌小緩支鐺脚儒生寂寞守太𤣥共盡同歸一丘壑張連魯仲本蜀人從其先宦嶺表僅五六十年矣為言廣州城内有檜竒古甚土人相傳自唐末至今往時東坡先生道惠宿留此州嘗供佛其下得甘露綴枝之異予徴二事皆無所據而耆舊相傳云爾要必有從來者張乞詩為賦長謠一篇亳州仙檜耼翁玩西湖老檜陳朝餘區區草木定何意多生要傍齋房居吾行東廣足已劬兩年纔到安期蒲菩提葉老還書蠧波羅子重空懸壺地荒了不快人意照耀南海何能無邇來劃見張公子火雲肉山煉心水搜竒訪古偶及之破笑勞君相指似門前罄折得堵宫諸天龍神俱儼容左呵右禁防所奪上帝遺我駟玉龍問從張公得明證指畫檜身分四印嗟哉此老亦不逢生世適當唐晚閏天迴地轉逢今茲霸戰王争了不知試看左紐足竒怪虎脛骨貫龍鱗皮霜枝雪榦如相偶老大商山餘四叟年深㡬慣雷霆争夜定一從牛兕走道形天貌吾何心晚嵗聊依清磬音忽然空中聞款綮指李丈人勤逺臨更傳坡仙曽設供甘露綴枝如潑汞桃源事託五栁翁後世請將吾語用長歌行徐州文壤基崇壇老蔡徑尺刳心肝銅槃照夜血光碧上有慘澹雙鏌干請君載書許君死徹器未竟盟已寒了知今人不如古古人亦有難知處張生刎頸殱陳餘酈兒給印屠諸吕勸君結交勿結心報君多是逡巡人捄飢重脱嗾􅋙厄出淖曽叨食馬恩輕言託心腹心腹為禍媒畏途巉空薄側掌要離孤塚空崔嵬我願中堂置甕常盛酒後列絲竹前賓友細腰燈前拓秋窻有來白事酹其口交亦不必結名亦不必聞燕南氍毹藉地醉千載一笑平原君次韻翁伯紹教授南窻解衣學畫史夢繞西湖貌西子了無一語對青山側釐隃糜相與閒平明視鏡稀可數生愛詩名壓千古春風别我不作難壺漿瘦驢行出祖政思坐上覓佳客廣文先生秀眉宇船頭把詩報忙事欲些黄陳作黄土摩挲老眼説舊觀絳衣大冠逢建武二公派當百似續行舒綴逺如觀舞百年許長作灰冷手披口吟心獨苦許君一死力負荷麾斥衆楚昌齊語典衣沽酒人敢易鼠壤猶堪窖餘窶長生木瓢要賞真元劉放浪猶詩人眼前生後姑置論紅紫事休天地貧代送别趙使君白衫紫領休霑襟聴我一曲截鐙吟使君五馬新鑿蹄大江横前氣駸駸問知淮民何所戀年來家有生氂犬同州雜鞭且未下山隂大錢聊可選門闌書生守遺經二年作吏勞丁寧即日遂良鬚盡白平生阮籍眼偏青君行奏書踏龍尾好為人間種桃李魚竿冷宦不足言有一負公如此水雁中箭詞原注平望澤中觀弋雁者愴然有感己酉十月初四日南來羈鴻北方客背負嚴霜飛不得日中命盡射生手一箭正中凌空翮一鴻中機百鴻驚㸃空細字紛斜横力窮遭烹忍一死可憐片影長孤征古人畢弋豈無意登俎亦可無肉味至今暴殄及胎夭殺氣為妖滿天地物生何至相吞屠蒼天變化還須臾坐殿忽作杜鵑去行河豈意黄能趍人蟲得䘮無了日客行感此淚横臆有弟落南今在亡十年一字無消息冥鴻一來聽祝辭世間踏地今危機菰蒲飽霜湖水滿見草為人汝當逺送楊帥赴詔謂公目光射牛背公視赤子未脱綳謂公足跡躡龍尾公守凍壁如癡蠅看公進退無一可公欲自判何方慿邇來詔書下峻層趣公入趁花底根腰龜杖節亦已了持槖上雍須公能公言臣是江西獰坐中十言九帶棖滿朝貴人面雪色可忍一一為臣頳吉州城南水如澠有蔞可絲魴可罾書生説食涎已滿寄謝龍闕雙觚稜祝融海王神最靈胡能呵霧遮前程堂堂大舸截江去天呉擊鼓馮夷迎孰居其間為此争東西欲奪公無情衆生焦灼大火聚公但抱寳眠清冷再用韻酬陳祕校來詩有擊楫清中原之志故中間多及之海中老蜃嘘樓閣局促鶢鶋魯東泊忍能杯視九雲夢戢戢魚頭沸相嚼濤江亭東識君面再見白也大鵬作雄辭巳褫壯士氣窮髪天驕堪面縛我家荆楚起孤劍奮身多自青油幕南遷閩嶠已三世土風正坐儒冠錯尚當拂磨十丈崖刻頌欲將文字託今君精悍喜談兵指畫魚麗分鸛鶴㑹當平敵走行在金印皇皇看手攫不應從我學詩句格律牽纒紛纆索世間冷暖逐處所火井自温冰井涸論詩説劍亦竒事媿乏三盃澆索寞誓將併敵起三闗不作羣狐猜鎮惡齊紈魯縞我山東指日戎車㑹于濼永嘉魏祕校訪僕蕭寺且言出處甚詳属與余同客崑山使人不能無懐魏云欲還故鄉而呉中兒女森森如立竹矣因用所惠詩韻聊綴數語以塞來意韻長不復櫽括資客中一噱可也陳侯一榻懸千古賤子何能望入府門前誰者髙櫑具甚口美髯方快覩裙衣新失大雲寺告訴天呉煩拆補隂風立我鐡户限起倒不供人笑侮邇來稍挫牙角勇一見何知肺肝吐繪衣君欲試華蟲鶯領吾方愧桑扈新篇直欲命騷僕寸舌寧當下齊虜已從雁蕩歌貫休更向烏江憐項羽遙知筆下巻波瀾乞與胸中洗塵土魏侯魏侯聽我語醉裏江山迭賓主呉歌一聲落青蒲遮莫催歸啼杜宇江南江北知何許萬水千山話僧廡因君永嘉説謝客南海維摩堪淚雨樽前卜試鸜鵒舞一閧從渠較鄒魯送别張長官東歸勸君少留持一觴三年一日纔初長春風愔愔著桃李露雨沃沃開麻桑道傍簫鼓莫凄咽使君平生面如鐡裁量渠是臺閣具坐使霜蹄困羈紲前生瘡痏生潢池手披腹摩隨所醫州家徴財使家督灌輸輦送無愆期諸郎自是豐年玉誰能待荒學儲穀虚名作祟謹勿近介者得嫌同者俗臞庵先生室無鄰晚年得君情更親常時問政有寛猛獨覺處世無緇磷何人幕府容疎懶憶君髙樓衣帶緩朅來問訊池上魚一笑相看喜無筭了知喜極還生愁獨自􅅤情上小舟府中參佐足追送坐念長江天際流還家且種鹽官棗垂栁當門樂華皓詔書定起尹翁塗珍重身名莫草草上丁郎中原注焴君家去天纔三百君身去天無尺五忽憶泥功棧外山盡是杜老思君路而今西子媚迴塘坐令猛士紆柔腸可能直下窺秦隴翻作呉兒時世粧仲章薛公十一鶴季章李白詩百篇自我過都得二老頗覺閩蜀堪同川今來劃逢丁將軍秀傑萬里來嶓岷篋中當自有行記幸借天壁開嶙峋送舅氏行迎面賓鴻去未多攬袪官栁不勝拖還家定笑扊扅曲上水初聴欸乃歌濁酒過隣通問訊青燈語夜愜平和機雲也有謀東日可解滄浪理釣蓑寄福清翅山舅陳夢實路岐引人不作長野梅官栁禪風光看山看水入詩眼嵗月不覺鬚眉蒼請從丈人開肺腸身非石人忘故鄉五年江湖枕書睡夢隨南去落翁堂亦知行坐歌白頭池南隠几浴鳬雙鰥孤肯復有羈旅石塘破寺魂悲凉毛錐不補萬事裂存者各在天一方善和里地知㡬易遼東城郭空相望平生何用酷似舅政似嫫母顰施嬙兒時拊頭祝文章祇今未入崔蔡行三年一書願見貰骨肉滿縣悲難當屋頭荼䕷定過牆滿窻日色文章香眼前欠甥頗念否我亦口挂蠔山旁煩將歸意作泉下小待錦衣漫浴妝北窻雅言寄朱仁叔風日暖天大裘蠅飛打窻油北窻墳䇿髙於丘我欲發視勞牽抽把酒起望天門陬斜鴻書破半張紙枯荷網空散鉛水機中挑出錦文詩淚滿鴛鴦半身紫新愁波不窮後愁更隨風美人如嬌春何物可御冬古人已恨愁不足却遣今人送愁續輕將玉斧贈呉剛漏得寒光照孤宿素女為天揀退絲伶倫猛截孤生枝沙蟲含寃射千載誰勸黄竹栽瑤池歌夜長歌夜短淮南桂枝香滿滿為君持酒夀金人少待露盤辭玉椀飄風荆溪船頭月渾雲不度轉眼光隂遽如許江湖無地寄風威短蓑遺作胡旋舞還將老病入孤舟碧波為人生白頭闌中五更鵝鴨亂老漁畫肚起長筭贈英徳風和尚風師風狂無是處文采成龍或成虎向來打橛釘虚空今日入山還削鐻晴窻洗出烟巖秋休嗟李廣不封侯見説行年今在坎老慵且作囚山囚月華道中善財平明白下床供君一鉢曹溪香山中老盧致無恙為我一洗醒而狂問君江行何所見邂逅今朝識山靣羣峰亦自不相知窪者欲逃危欲獻窪逃危獻知奈何小草逺志元同科時來隨喜出雲雨不來抱藹休巖阿老人於山消厎物畢願託身仍託骨接頤孤撑看未已萬馬崩騰過倐忽貴人祇聴宫門鐶何曽一葉吼氷灘轉頭便下貞陽峽嶺猿舉臂招人還歸來海上亦不惡把酒持螯誇至樂明朝逺碧望林巒依舊朱欄照城郭再賦薄薄酒薄薄酒全吾天醜醜婦引吾年敗繒麄布形骸便辛勤著書塞屋椽何如郭外二頃桑麻田折腰斂板髙鳶肩何如方床八尺供横眠左為劍鋩右鼎耳勸君却步行相先斗量明珠埓編錢郿塢未就臍已燃十眉間坐争連蜎絶纓滅燭薰腥膻農家醜婦眉半櫛白頭惟有夫壻憐勸君酒薄君勿嗔尚方賜尊能殺人力微覆餗有明誡食鮭三九元非貧酒不薄人自薄妻不惡人自惡不如濁酒三盃呼醜婦共作原頭賽神舞續薄薄酒薄薄酒勝齋蔬麄麄布勝無襦醜妻惡妾勝鰥孤叱塗呵道驅髙車何如醉歸連臂行相扶巍冠束帶商唐虞何如北窻散髪擁腹千爬梳金樽瓦盆酒如一食芹差可無彫胡名堯字孔相號呼百年螻蟻同丘墟朝為卿相暮匹夫青黄蚤失溝中枯錐利未必賢椎愚左圓右方徒區區不如濁酒三盃對醜婦荆釵布裙相媚嫵次醉中歌犢車油壁塵紛紛恨君不識如花人金鞭争道誰家郎出門三日香人牀春風酒面吹微鱗主人㧞釵留上賓洞房燭花盡意明為君拂絃駐歡情陣鴻塵􅉣聲難安城烏夜啼訴春寒呉歈未終初日上璇題藻井知無恙請君銜盃莫問天茂陵劉郎初學僊人生百嵗俱可憐願君流歡及盛年世間萬事不如酒九環寳帶時人有感君一曲寛百憂當時見人面色羞君不見牆東儒生食井李一生飲牛㢘讓水醉歌得誰釀法乃爾佳連引數盃極口誇須臾忘物亦忘我是非榮辱不可加兒童相隨拍掌笑阿翁醉也扶歸家平生故人趙半刺遣騎折送園中花飲酒不待勸夜如何其月欲斜倒著接䍦自起舞笛聲趁拍鼓三撾陶陶兀兀意有得小姬在傍雙髻丫驅令磨墨具紙筆滿幅大草飛龍蛇婦云汝醉當止矣明日酒醒不愧耶謁衛㕘政頃年投詩衛左史今年謁詩衛相公何方客子辟道路詩巻長邀石浦風先生官職泥土如萬事盡付阿堵中天教權嬖表忠節劍首一吷毫毛空祇今事業已如許願聞當時北歸語面對手畫真自知十年絶口吾甚武謝安風流過王𨗳芙蓉王公竊其表從來雅志在東山角巾不為筝歌老古人進寸退一尺江草江花足自適功名時來不作難雷動風行本無跡百姓相驚當歴耳三江五湖作瘡痏百年天地亦悠悠長鑱老人淚如水側傍湖脚澱山藍出見輕鷗已不凡頗聞琳琅塞門内三筆六詩公所監何能撰杖閲諸子看公著帽淹㡬晷朱衣目前空復愁客有焦桐勞下指去家初無可葺牆獨抱遺經天一方石浦倘為蒼生起天衢日轂遙相望短歌贈臨安友人素絲衝塵化為墨老人雙鬢無由黒俗兒翻手候炎凉惟有君心比霜雪破窻草亢風雨寒夢遊帝鄉虎當闗枯魚對酒淚濺俎雄劍夜吼銅花乾二十辭家顔色故春心不語絃解語借君古鏡施鉛華含羞獨泣羅房雨青天中開多不平少年裘馬多流星千金無處買俠骨坐念嵗月空崢嶸夜坐來雁無消息寒蟬久寂寥鬢毛隨日化吾意得詩消樓影三更淡天星㡬夜搖眼中無長物拄頰又明朝倦夜河津傳五漏霧雨入千家白日鳴饑鼠深更歇怒蛙境空愁稍進詩短意能加客路多風雨深憂斗柄斜贈得一禪師舊時黄正父今日一浮屠四海誰知已三更忽撚鬚空山吼獅子暗壁縳於菟何日當吾眼藜牀淡爾臞燈下嘆老馬知塗益可羞寒燈冷硯照窮愁著書不望從兒讀歸舍何當與婦謀赤脚踏鯤真浪許短衣射虎恐長休何人得似襄陽守乞我苕湖十頃秋次韓耕道贈别韻一昨羊城别五僊駕言韶石叩鈞天偏師政擬劘詩壘淺瀨那知滯酒船但使繫書勤雁足敢思騰上竦鳶肩區區定取韓康笑賣藥逃名却自然病中用杜工部江村韻早嵗縱横論九流中年往往愛清幽細觀夢境皆争鹿静遣機心欲狎鷗池上貪閒臨晉帖燈前抱病看呉鈎山林鍾鼎從天賦言志俱慚㸃與求和開元寺省公韻振錫浮盃定偶然繭窠誰見老蠶眠祇知大膽嘲無本渠識前身是普賢師欲嬴糧趨建徳我慚觀畫訪開先莫將幻境誇陽燄吐盡多生渇死涎附省公作莫辭委刺去蹁躚料得先生已醉眠打徹愁城休强酒壓低詩社不言賢琴中有趣嗤陶令席下無人誚孝先想是逢人不肯出來臨法㑹定流涎至日記見簡輔漢卿二首滿窻晴旭散輕埃報答生成只酒盃篇什正須今日用嵗時偏傍俗人來輕舠上藕泥初拭小巷争魚臭不開試作横竿權土炭聊從夜半候陽囘枕上吟哦安意好新詩自覺鬼神扶遙傳舊嵗無多子皆試新衣是早圖天下自須胡伯始江東只在管夷吾鄉山此際當治麥誤矣為文傚兩都賀郡守得江隂檢㸃詩篇方細讀忽傳新渥照澄江榮公銅虎非渠事舊憶河豚是此邦蕭散盖公宜置舍風流謝守想臨窻他時我得扁舟去直過凝香索酒缸自笑抱甕終焉與世迷斵輪久矣嘆吾衰江南未必無佳士海内何由得二兒不共施梁争折角却思陶謝與同時歌成未免傍人笑農馬雖専技已卑清明日湖上晚步一百五日苦多雨二十四花能㡬風壯心欲與兒女競春事翻成冦盜空公私蛙合笙歌裏客主山張圗畫中作意後逰仍獨醉西湖莫忘逺來翁寄徳久舍人時將過呉門昏花亂眼嘆吾衰寳帶忘腰羨子宜碓下誰明能行者甕中聊覓永禪師醉鄉欲結無為社刼火難燒見在詩忽憶扁舟洞庭路霜螯斫雪㸃橙絲送王楚材往湖州聴讀短羽真成入殻游小儒蹤跡欲誰求非闗古字誅揚子自是諸生欠沈猶百計千方元薄命雙溪二水各宜秋此行試卜唐夫子㑹向芹邉問楚囚贈玻瓈僧慧觀長老千年觀一如三日客同居祇道清淮近烏知濁世疎地窮初限橘水富巧藏魚排闥風烟入觀心視聴虚飯香鴉闖户茶熟水鳴除潮載支祁憤天闗禹貢書磬材徴古在石蕝表兇餘董杏通鄰堵秦𤓰過滿車逰方孤雁去問法翠屏舒何日荆溪道誅蓬對結廬晚霽湖邉獨步短短桃身盡著花微風細雨響蘆芽一晴眼底皆新物蛺蝶成羣聚淺沙題郁氏子床屏歌舞教成王謝宅百年華屋㡬人居豈無藤葛垂隂地女轉繅車兒讀書醉歸夜深霜月冷侵膚醉飲歸來得自娯霧氣水光同浩𣺌誤看田野作江湖次潮陽寧公詩韻三首原注時欲往天台住方廣院天外誰飄桂子風老夫鼻觀已先通直須斬斷年時話匹似西來歎不逢十方無壁慣曽遊一片孤雲任去留莫話潮陽舊公案天台行色滿簷頭竹枝抝折殊多事參取茶甌未到前為報天台癡五百撞齋邏粥莫争先送行者妙淙往青龍謁陳七官人三生同聴寺樓鐘𦂳峭芒鞋任所從莫向華亭覓船子趙州橋下有青龍為竹奴解嘲用山谷先生韻通身有眼更無腸好上臞庵師子床莫作緑衣顛倒想班姬陳后兩凄凉送霅川丁世卿宰舒之懐寧長安亂葉舞征衣獨把新詩送吏師自古才名諳宦拙邇來官事要兒癡八公草木迎人處三老風沙上水時直使邉頭行國寳少年白面且經維江湖後集巻十九
