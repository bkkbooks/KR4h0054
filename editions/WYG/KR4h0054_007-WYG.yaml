body:
  text: 江湖後集巻七宋陳起撰趙汝績汝績字庶可浚儀人有山臺吟藁别曹松山柳條能幾長袖手不忍折東風惡作劇客袂吹欲裂男兒數寸管平世三尺鐡何門無鄒裾有國駐孔轍鷹鸇擊飄風不受錦鞲紲驊騮踏飛電寧顧黄金埒中年易悲傷浩歎彌激烈常恐兒曹覺况與我輩别侏儒囊粟飽壯士唾壺闕子行亦何以問口尚存舌但惜新相知未是古决絶長安萬花春蘆鞭裊晴雪一第宜慁子相期抱貞節無罪言哀哀民何辜遭此凶歉厄初聞數米炊次復併日食草根掘欲盡木皮屑不給疲老就枯僵少壯作捐瘠千百存什一鳥喙仍菜色朝憂夕恐懼不得見新麥城市逐末徒奔走困貴糴剥牀遂及膚近半死於疫吾皇素仁惠一念軫饑溺發粟通有無寛逋已徴索郡縣乏宣化鞭扑庭下赤貪官猴而冠健吏虎而翼天災偶參㑹人意莫致詰淮楚困烽塵荆蜀斃鋒鏑湘潭煩調戍洪贑事供億昔聞惟内地可以稱樂國豈料一年饑狼狽如此極公卿飽輿臺王侯羅第宅私財足苞苴公帑罄符籍匪難活民命何以夀國脉子牟心徒勞之武壯自惜安得扣九闗玉階面咫尺天地本至仁君臣願一徳賢人斯在位能者各效職太守務循良監司去姑息智則謀朝野勇則衛疆埸自然風雨時自然稼穡植自然至龢生自然元氣實何憂乎驩兠何畏乎强敵勿罪狂斐言斯言定金石環碧園饑信守趙蘭臯分韻得燕字開忩俯平湖折柳舉離宴五馬遲未發暗雨雜飛霰江東古名州廣信今近甸兵驕費紀律民瘠易咨怨磽田嵗少登孔道楮常賤正須儒者事母媿循吏傳休辭一杯酒徃副千里願有語不敢留低頭媿檣燕墨歌空山老桐勁如鐵英枝翦翦夜撑月霜風著子涵玉膏烈手崇朝剖融結别令刳木環清泉翠缸紙羃籠輕烟霏霏𤣥霧掃難聚斷犀烹煉凝蛟涎和成萬杵擣圭璧良工欲售常自惜絶憐剡水多夭藤又慮端溪欠竒石乆知此藝人罕精作者未必識者明九華山下祝公子頗以膠法成其名相逢但問詩有幾以詩換墨兩自喜酴醿園館已謝春楊柳池塘正藏水薫風拂拂吹硯波呼兒教作病手磨須㬰滿硯片雲黒無詩可冩如君何陳老畫牛老融弃髪逃於禪胷藏丘壑身林泉時拈寸草幻墨汁慘淡咫尺生風烟尤工畫牛古絶比不特形似真神全平生知己一攻媿惜墨如命詩猶傳至今鄞人懐片紙如䕶圭璧珠璣然陳生少壯曽入室妙處已覺墻及肩岸痕樹影彷彿地雲隂雨氣冥濛天寒禽立背渡淺水野葑沒足行淤田礪角思鬭力居尾倚木揩痒勢擁前或沿草徑逐羣去或傍茅簷抱犢眠如何盡得此態度前身想住桃林邉世人貴耳不貴目嗚呼此畫空爾妍我方求之不論錢巻收更閲三十年欲尋此老不可得摩挲陳迹方争憐題黄存之春莊雨急圖山濃樹宻春欲浮農夫有事營西疇鵓鴣聲歇風雨急田塍滑澾如翻油牢披蓑衣𦂳繫笠渾身水流兩股慄㨂時浸種開稻包心急鞭牛牛步急前年春寒再移秧去年夏旱赤地荒東隣西保幾人在渠今尚得本身强低頭無言心似苦定願五風十日雨禾頭粒粒飽秋露糠籺充腸米田主我家鏡湖烟水湄身雖不耕眼見之何人得此畎畆趣短紙冩出無聲詩坐令展巻三太息力穡莫供浮末食君看此輩終嵗勤返向溝中作捐瘠憶昔一首憶昔三十氣拂雲鉞神纛鬼泣禡文欲提河洛數千里重收圖版歸明君只今萬事付孤憤坐看江西竹生粉苧絲成疋剪釣衣一櫂賀湖烟水逺游石忩玉妃箋天收雪權東皇領春行人寰恍如身在五雲表游到海上神仙山翠鳯婀娜竹夾道蒼龍偃蹇松當闗夀籐絡崖半青白文蘚繡徑全斕斑亭臺隐映樹石罅樓觀突兀烟霄間遥峯前後獻竒峭流水左右供潺湲珍禽倐來不可致瑶草已種何容刪目光貪翫忽炫焜足力亦倦難躋攀日斜路轉歸意迫忽見洞府臨銀灣洞中仙官笑呼客光風霽月氷雪顔云是四明石忩主新自五老峯頭還猿留鶴戀不覺乆碧落有詔行催班却愁曳履踐台斗三十六峯花木閒離越東闗寒水深逰子别家心櫂急波鳴枕篷踈月在衾半生多道路何日定山林隔岸聞漁唱離騷不敢吟峽江龍祠坐占山囬抱平看水怒流丹青今古像香火徃來舟石插青沙岸雲横夕照樓揚靈相恐動巫覡有深謀檜房老檜倚虛房能生九夏凉讀書參句讀臨字識偏傍婢織蒲為履童燒术當香興來吟不就頻與月商量溪翁惠秋蘭不夢靈均乆西風為返魂頓忘千載逺但喜一香存勁葉牽湘色踈花洗露痕勿嫌盆盎小能貯雪霜根漁父換米活妻子餘錢付酒家身前舟似葉世上事如麻擉龞過深浦伴鷗眠淺沙旁人問醒醉鼓枻入蘆花出郊難得晴如許春㳺第一畨鳥啼花底樹雲裏面前山馬躍平沙地帆投落日村戯呼漁子問吾與汝誰閑和牡丹韻園工巧栽接樹樹品新竒富覺春無厭貧疑地有私色須綃幄䕶名記玉牌垂若説能傾日墻根有晚葵道中登嶺慚愧輕輿寄僕肩蛇蟠小徑入層巔升髙但覺少平地視下方知在半天尺壠寸田皆石級堵墻椽屋即人烟客程到此更風雪聞一禽聲恐杜鵑雁山章君以江山無盡圖求詩冩此何人雲夢胷色塵真幻等成空看君一軸畵圖上在我半生行記中剡水囬舟乘夜雪楚江燃燭聽秋風轉蓬蹤跡徒勞耳心媿鴈山頭白翁送蔡亷父赴贑辟同㳺兩見菊花時忍對西風話别離官逺人應觀所主心平事必得其宜急流進進常思退公事惺惺要帯癡執手羞為兒女語此言或可當箴規西山影淡水無聲知道扁舟破曉行我欲夣魂隨去櫂君應望眼斷髙城紅蓮緑水官中事白酒黄花客裏程從此欝孤臺上月十分知為故人明南坡小園路口安柴户日日山翁手自開禽有色聲皆可玩花無香實不須栽柳根着石宜安釣巖罅通泉可泛盃更向南坡臨水處參差純種百株梅將歸拄笏西山一笑中掛帆猶及棟花風此身可是屠羊説餘事寧非失馬翁不問鬢毛成早白免將癡面發羞紅故人新寄䖍州布歸製吟袍管釣篷送荷渚歸越湘湖蓴線正宜羮一舸濤江汎曉晴屋破不妨從客借田荒自欲課奴耕不隨不激真吾事乍佞乍賢皆世情從此一麾江海去西風斷鴈冷無聲送荷渚兄自永嘉歸越荷渚盟鷗冷不飛此畨可與報歸期結廬雖小尚堪隐負郭縱荒何慮饑吟得四靈無避處鑄成一錯在來時吾家浸碧幸無恙草夢何須必謝池客鬢蕭踈漸秃翁歸來恍與鶴仙同山川米老畵圖上風月放翁詩句中隣圃有蔬􅃵釡滿私田無秫酒樽空欲尋上竈雲門路湖水不多船未通林壑閒歩二絶懶不看書不賦詩樹隂濃處坐移時世間此等清閑福問著漁樵却不知參差臺榭碧雲中柳北松南一徑通帯得碁枰無敵手與僧不語立薫風漁父魚滿笭箵酒滿壺渚鷗汀鶴伴清孤此身漂泊雖無定能與人間作畫圖迎慶避暑古寺無風地亦凉人家難得此修廊老僧貪説葛藤話不覺山童上晚香柬陳宗之略約東風客袖寒賣花聲裏立䦨干有錢不肯沽春酒旋買唐詩對雨看姚江道中漉酒蒸糕餽嵗時紛紛兒女換新衣隣翁七十看鵝鴨日暮破船撑未歸謝髙左蔵惠墨竹幅牋幻墨起秋風便與蘭亭景致同料得揮毫盤礴際渭川千畆在胷中韓仲龢墨竹墨暈生冰硯影寒素毫幻出碧琅玕尋常夜月忩前見此度秋風紙上看送竹軒歸越東風隔岸繫歸航怕送君行重憶鄉為探山臺墻下柳新來添得幾絲黄趙汝回汝回字㡬道浚儀人太宗八世孫嘉定七年進士至管進奏院有東閣吟藁簡陸少監登瀛彼何人選海𣺌無際巨矣萬斛舟不與貧士濟起檣開錦帆逆浪使風勢貧士望洋立惆怳發深喟少監笠澤英清芬襲蘭砌不經覓舉難不道覓舉易毎恨里選衰髙才守低位趨榮靡願辱不富焉有貴一塗總不歧隻臂韝羣鷙園桃各春妍崖松以霜悴端笏玉扆前極口陳國是上之及公卿下之言守帥剥膚到饑甿孰與䕶元氣凝隂積層霄剽賊延内地毋謂民不神民情即天意善瑟無弊絃良工先利器所願招雋豪弃取委公義庶㡬臯伊出扶傾掃沉翳從來立仗馬唯作噉蒭計堂堂不諱朝鳴鳯峙鵷陛㳺列真觀劉道士拉上潮際觀漁珠宫何岧嶤前江後層嶂開山者何人蕭梁山中相竊惟經營初豈曰此幽賞地靈宜仙事境寂銷俗相既積惜水功帝命使瀛丈手泥燒丹竈嵗乆化黄壤石突古殿出磵循隂廊響道人如修静我豈陶官長偶結清浄縁下榻税塵鞅夜報前溪漁命酒將鱠享撑篷待月來架槳乘潮上秋髙氣凄澹清極思超敞蹔廢一夕眠庶䝉列真奬寄昭武馮司户朝解白鵠袍夕投武陽壘武陽衆盜區風傳駭妻子六月日癸亥一書滿三紙具言五月初獨宿鍾石邸脅從在所矜渠魁固無幾仰慿天子威肅導使君指豁逹生路開擲劒秉耡耜始如浮釡魚終如慕羶螘游騎從何來使我顔有泚幸逃食其烹猶存漢家體黄巾與緑林徃昔殊僣擬陸梁能幾時寸戮而已矣理國若理身慮我不慮彼潰癰復何難實恐元氣毁江閩五十邑荆棘五千里我農失種穫我士乏儲峙捕招兩悠悠分明養彪兕頃予參此軍忽忽逾一紀素飱歌伐檀居前愧揚粃坊閭儼在目煨燼空遺址使君君子儒規摹用詩禮軍勢李晟孤國事賈生恥蛟龍無波濤胡能制蛇虺誰謂曹掾卑偉矣天下事生平報國軀小節安足死南北乆𤓰分須君混文軌送盧五方春分教端州柳南矯矯蛟龍騫古詩古文髙入天奉試詞場三十年柳度夜夜魁星躔集英殿下聽臚傳唱在第十衆所寃天豈恨汝月蝕篇罰使獨吟瘴海邉中州近年栽木綿春寒秋熱氣已偏我心憂國身甚便編排失手安足言敵窺淮漢蹂兩川君相不得髙枕眠古人度嶺悲南遷今人度嶺如登仙端溪溪濶山無烟長腰米白鯽鯇鮮山媼採蕉蜑採蠙羽檄不警徭賦蠲黨碑諸賢昔徃還人士盡識洛水源廣文下馬春風前升堂講書鼓鼘鼘逺方朋來笈在肩再拜願預弟子貟中庸大學𤣥又𤣥商盤周誥非雕鐫燈花兩簷陳俎籩一一口説手註篇霜毫之筆雲濤牋墨香瓦滑不受研下巖古坑石杮填千夫秉炬入戽泉鑱出一片紫玉甎色如馬肝鵒眼圓得之酬直不論錢乍是對客寒無氊翠閬行餞宋廷材分教大寧蜀道不難兮君無聽李白之狂歌石棧梯雲入翠閬峽船㴑水通銀河棧平峽穏行人多灔澦堆前落錦帆諸生郊謁冠峩峩秋堂晨鼓講義出亭夫樵竪知丘軻官冷莫思歸去來且可淡飯閑吟哦君不見江西嶠南賊未滅仕者蚤夜防弓戈玉溪謡雍灘束水水箭急逆水上灘灘壁立折篙斷䌫船不前乘船人懼梢人泣柳風揺春花雨晴飛帆忽過如飛星仙人坐機織錦鯨邀我為賦銀河清茫茫天路髙無陛予止坎兮曷為至閑將身事問仙人仙人笑指灘船是長風引船水沒灘天地變化須㬰間不生凌清遡紫骨何用費火燒還丹五百童男東入海水弱山遥無藥採千層萬級通天臺方士致神神不來君不見桃花滿山不知處劉阮逕入天台去期平叔兄不至兄昔别我遊衡麓我亦東吟石橋瀑八年能接幾函書弟今白頭兄何如河水流澌雪風惡梧桐渡口孤舟泊山房夜坐兄不來蠟梅花拆燈花落贈劉道士竹嵒鳥啼雲影閑此是玉帝藏書山他峯葉盡一霜後仙洞春如三月間白鬚道人年八十指予漈路從溪入靸著芒鞋不杖藜嘯泉歸去衣裳濕送張敬甫常薄出守荆門前年匹馬辭軍幕今年千騎從天落座主門生合虎符棠隂夾路春如昨身名貴驟俗所羡使君夷然心澹泊父書盈篋本孫呉師燈一㸃傳伊洛莽莽叢榛亂草中孤松昻昻立氷壑自古十二取世官換得青袍髪幾鶴曽因窮逹悟乘除以寵為危不為樂荆門形勢衿喉地新城突兀壕未鑿天子憂邉復愛民鑿壕還恐妨犂穫謂君夙抱文武資須君小試綏懐畧予聞衛國如衛身癰疽甚毒腸胃薄堂堂人物守邉州國中羣盗令誰縳薛景石𤓰廬湖村有真逸愛着釣魚袍鶴語柴門静身閑筆硯勞移來𤓰種别看得桂叢髙所冩雖云僻文名不可逃除夕泛靈溪拜敕管桃源其如骨未仙年荒醉者少官小野人憐臈雪梅花在溪春草夢圓新正有忙事未訪洞霄泉和荷渚寄同遊韻知幾百事懶夢只在山林一馬塵中出千峯頂上吟月新松逕黒柝静斗城深相憶梅花下花寒瘦不禁春吟一春吟未稳今日再吟看石井桐花晚江城榖雨寒白烟浮野寺蒼蘚繡池欄為謝松梢鶴官卑去住難寄題王次㸃東巖生事付妻兒山居清可知自言雪收後不夢客逰時洗石䥴唐帖凭松讀楚詞却愁登第去草沒菊花籬桂一夜桂花發千崖風露香樹經秋㡬過人在月中央不預離騷賦空居寂寞鄉山翁對之飲酒色也鵝黄送李寅歸里憐君竟不耦毎事與心違南雪嵗將暮西江航獨歸停薪待官米借宅共僧扉吾老嫌為吏相煩尋釣磯送趙正甫丞湘隂行舟何所有新酒滿甆瓶若使三閭飲終應一念醒官卑掌苗籍吟苦掩松㕔清夢如湘水遥通春草亭酬諸友喜歸之作却歸思去日十過草池春新雪滿雙鬢故交餘㡬人蔵書蟫獨飽借宅鶴同貧夜起吟芳什凉風吹桂輪送劉成道旅遊從軍不願賞歸補萬松栽獨作漁樵計安知婚嫁催江船深夜月山驛小春梅老境詩閒淡孤吟薦一杯漁父衡嶽早來雨湘江増緑波小舟浮似屋香草結為蓑水定見魚影夜清聞櫂歌悠悠百年内醒少醉時多初夏倚春望六祖寺柳絮兼花片舞風湘水濵濃嵐如細雨初夏是殘春鳥度山家曲泉清佛界塵年衰眠易醒歸夢不能真聞趙昌甫赴召甘得眠雲復飲氷此翁不獨擅詩名山深難避蒲輪召陛逺聽扶藜杖行老去報君心轉切年來守局夢頻驚有時湖上看埀釣只憶磻溪溪水清題劉荆山母墓緑草䰐鬖白露晞老樵能記虎眠時石函深貯懸鍾䜟翠壁新刋斷織碑隴勢三分松檜色泉聲千古蓼莪悲珪郎向日升堂友留宿雲庵撰誄辭陸侍右得祠歸里往餞弗及寄以是詩三以嚢封入紫㣲一星今夜出郎闈賈誼幸無湘水謫知章乞得鏡湖歸乘潮不等詩人别望闕恨憂諫者稀笠澤門前古松下他時容我借漁磯弔盧玉堂金鑾坡上文星落收拾遺文有㡬函草制空教生白髪蓋棺只是着青衫吟魂夜訪林逋塜破屋寒抛謝客巖自有舊家椽筆在豐碑竪起壓松杉弔蔣弋陽悲風急雨柳塘寒巵酒篇詩哭肖韓長記湖西訪梅日獨於船上取琴彈弋陽百姓私營廟紫府無人别擬官墓隴從教長新草雙鳬何處只空棺送蔣大璞赴揚州司户維揚幕府最風流何掾梅開蔣掾遊新籍楚民今㡬户舊年隨帝此停舟慈親就養惟愁雪元帥崇詩不畏秋壕濶城髙豈忘戰平山堂北是神州縱遊人事元知不可諧名山踏破㡬青鞋百錢掛杖無時醉一鍤隨身到處埋驛壁讀詩摩病眼僧忩看竹散幽懐亦知詩料無窮盡燈火蕭踈過縣街西湖重午作髙誦招魂招屈平只應沉恨隔浮萍著騷直以尸為諫亡楚如何醉不醒像虎空懸青艾束辟兵難望綵絲靈慿君一激沅湘水淨洗中原血鎧腥奉歸柳塘潘希白詩藁織柳縫花雅道衰將題錦巻復敲推夜寒吟苦氷澌合境寂心融造化來斸石崑崙擕玉下乘槎河海到天廻今時古調何人愛東野長江在夜臺王道士惠柳檜千年檜出寒巖罅掘得根來比金價髣髴山隂見此株尋思却是闗仝畵
