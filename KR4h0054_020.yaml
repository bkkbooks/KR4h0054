body:
  text: 江湖後集巻二十宋陳起撰李龏龏字和父菏澤人家呉興三滙之交不樂仕進年登耄期自作墓誌未幾死無子趙文曜復為誌葬之何道兩山之間種梅百株趙徳符題碣曰宋詩人雪林李君之墓按遺書本龏詩止集句二種曰剪綃集曰梅花衲今葺自永樂大典中者有呉湖藥邊吟雪林採蘋吟雪林撚髭吟雪林潄石吟雪林擁蓑吟仍存其目分編於前其無標識及賦一首分體附於後端居冩興地偏雙耳靜心近古無懐掃壁書秋夢聽鐘辨午齋貧疎親骨肉老病瘦形骸欲買劉伶鍤教童死即埋二月二日行藥城下病懐歡易失勝踐負流年行藥到城下看春立水邊小花雙蝶閙秃樹一鷗眠絃管同羇旅今辰幾處偏題瑩講主雲林聞說有雲林吟人未易吟無風常滃滃不雨自隂隂宿鶴秋枝老懸燈夜屋深雖於朝市逺僧住若為心貽劉似道百年能幾日一别又三秋涉世雖相似成名却不侔蘋香分旅夢棗色動邊愁南海曽游處應多異寳収贈蜀客萬里潼川路連年没野蒿君家在何許客寺忽相遭渇雨秋雲熱窺人夜月髙時平歸蜀去應記識吾曹松邊晚思小立聽松聲身如海際行認巢飛鳥盡脫雨素蟾生角動州城逺燈深古巷明一春和病過猶未得心清道室雨中無事役長日幽孱掩道房雨蒸吟軸潤雲滃藥爐香黄螘穿苔走青蛇入竹藏世縁抛似夢還自覺凄凉春思一心無外事春思似秋清掩室惟欹枕看山間出城花分閒地落筍入斷堦生寂寞從人笑貧難與命爭夢遊僊渺渺僊京到不難夢遊頃刻過蓬山桃池根暖春常在桂殿花寒夜弗關簇仗龍來珠箔捲奏章人去玉庭閒塵縁未斷雞聲起又落黄粱未熟間寒食日歌哭相喧熟食邊野原花栁盡生煙身如厄木猶多病心似寒灰豈欲然鷗鷺乾坤知有我燕鶯日月認誰憐溪城半掩斜陽暝落得閒愁幾畫船失題應是三生愛酒人誤流醉魄入花身風酣日釅微香度全似偷閒穤瓮春木筆巧如雞距銳如簪蘸紫濡紅粉不深青帝合教隨侍史萬花國裏冩春心緋桃漢武西池宴未歸霞妃粲粲弄春機靚粧似怕東風笑盡換宫羅五品衣衣裁緗纈態纎穠猶在瑤池午醉中嫌近清明時節冷趁渠新火一畨紅郁李花花身合向玉新裁同是𤣥元指姓來抛擲人間春色裏霞衣小艷亦文哉聞貴家搗浣敲風㸃月重還輕遊子聞來最動情峻宇雕墻雲雨外那知此石有離聲寓惠日寺世路兢兢似履氷得閒何處不輸僧青山未有投閒地我亦僧邊寄一燈題丁吉父梅扇簾捲春寒月過中𤨏窻風淡暗香濃横枝半颭蘭缸影曽惹佳人繡唾絨夢回荆溪聞雨迢迢殘夢太湖西窻眼未明雞已啼蕙草無香秋被冷十年情緒雨淒淒右呉湖藥邊吟貽陳體忠十日不作詩昏昏如著酒西風吹笛聲淒然透窻牖暝色起煙浦庭梧多空枝因軫故物念暗螢死書帷濡毫冩中情哀蛬沸窮巷藜藿弗滿餐庸兒謂癡惷天髙白雲逺獨偭梟獺羣蹇歩望逸駕衣巾粘垢氛交游日凋疎芳草積零露薄俗徒云云此意欲誰訴答江無極男兒懶種南山豆短褐踆踆走京口一枝彩筆度陽春五年不飲烏程酒杳眇長堤斷馬蹄吟詩豈為黄金悲菖蒲花老楓香謝頭上驚霜添暗絲紅雲無光日將暮半幅離情捲幽素迷魂細雨撲寒空秦淮鯉魚撇波去東家東家買金鈿西家買翠鈿雙鬟耀釵澤顔色如春妍朝開鉛粉匣金翠爭光鮮粧成倚髙樓誰不生愛憐君不見采蘋老人門似水嬌女無錢作梳洗學他隣舍為花鈿惟將素面貼苔錢貽張巨濟上國交游盡見君殊惘然相尋相别日二十二三年紫陌辭塵佩青門委蠧編詎知歸老地還向􅀈峯前贈摘阮道士下山何處去語别老君前自背一張阮逺登三楚船夜程依岸芷午飯對江蓮若見知音了歸來定絶絃贈陳籙士青囊傳寳籙龍虎度師家短褐煙霞滿離山歲月賒不愁生白髪自解死朱砂逺向華陽去言尋蔡少霞寄從弟道士惟中一門羣從葬秋煙奕世儒家失舊氊汝昔已工敲月句而今惟使醮星錢夫差臺榭遊應徧魯望篇章録想全古觀燈殘風雨夜可無歸夢入臨川右雪林採蘋吟寄餘干鄭丞君為丞處是吾鄉門對煙霞竹繞墻於越城荒雲樹暗代陽溪近水苔香的知左宦心應折未必東歸鬢便蒼若過藏山山下寺松楸慿與問凄凉貽孫花翁數寸書空筆拈來直欲焚絶憐吟貎減多為客情分晚逕飄黄葉秋簷掛白雲因君論一飯千古憶田文早起逺鐘雲際斷一雁度殘河閏氣今年正秋聲昨夜多露花縣蔦蔓風葉捲蟲窠坐結西遊恨南隣猶醉歌寄張公洞黄宫主春草没驢肩新吟今幾篇每逢僊友說多在石田邊燕穴穿平地龍巢出半天常思訪毛節凡骨恐腥羶說經道者瀾翻口裏說三車一衲唯披百結麻應笑經僧内供奉等寒盡著紫袈裟送栁鍊師歸台山月照秋塵三丈飛破囊攜藥下黄池僊家不數人間事瀑布橋邊憶看棊題贈秋洞周鍊師誦熟神農本草經夜深猿鶴亦潜聽世間三百來般藥用著毉人盡有靈沆瀣壇邊月影寒朝元多戴蘚花冠俗人或問長生事教看西風一竈丹送月窻王敬叔遊武夷客程遙指建溪行要踏東風看幔亭君去莫嫌春色晚落花一路水苔青右雪林撚髭吟題贈髙士章少機度人經注就進罷徑還鄉自說為髙士深恩感夀皇斷琴支醉石寒㡌擲吟床八十身猶健元無服食方右雪林潄石吟寄國史校勘陳體仁天禄對藜燈丹鉛照眼眀雖稱小朝士不是老書生職重三塲筆官聨六館名懐君既良晤歲久又崢嶸端午日髙門髙掛艾天師玉臂還纒五彩絲我只一杯昌歜酒羲皇窻下讀騷辭摺疊扇尺素裁成半葉荷竹批六夾影相羅玉人笑把遮羞靣還向縚邊見笑渦早起看竹殺更聲裏亂啼鴉十二屏山捲碧紗海月傾欹光未没隔墻猶照紫薇花節抱秋霜緑玉君一林風月有司存吟邊不領閒公事報了平安聽掩門右雪林擁蓑吟祀神詞食蘋兮崑崙駕文鰩兮西海登羣玉之府兮白雲熊熊祀司天兮毛采占筳篿兮瑤池恍余心兮􅥝厲旋升兮軒丘即平圃兮佇眙颯晨風兮丹木聞環玉兮泠泠神來歸兮洋水舞青鳥兮都庭陳桂尊兮藉白茅申微詞兮再拜以傴歆余誠兮神何私惟怙終兮拙魯秋征圖斷崖兮秋清野橋兮煙横彼何人兮短褐跨蹇驢兮孤征登蜀道兮出函谷叫閶闔兮謁承明蘭皋兮芷葺木涵風兮楚聲渺何之兮不返因有感兮吾生君子有所思揚颿越震澤暮上姑蘇臺飛目眺衢市第宅星宫開丹甍翔虹浦碧户闖瑤街方泉沼清鏡怪石環蓬萊姬房儲越女歌院集呉娃涌觴廣遙夜蠟淚毬青煤懸景駛流水安樂難安排堪輿金玉身不防熬豹胎石穹霤能穴樹大風先摧君子哉若人方寸逆自裁遣興三首弱齡性淡泊鄭圃吾其師及兹拙生事窮窘常經時無方可紓急何以宣中懐柴門蔽殘席咏書倦徘徊呼兒促觴至目翫天雲飛山鳥送新響日遲花露滋頽然醉櫩下不省何如時雖非富貴樂富貴乃所乖疎松碎明月宻竹篩清風親交昔與别若謂行相從延企邈不及音容隨想生諒彼亦耿耿飛爽留空形援琴不能寐意乃多於聲晤言豈無偶眷眷詎可忘編蓬諧夙心尊古豈文義所得靡有言應酬聊爾爾室中無莱婦童弱偶成四團欒寧無思達此天亦蛻客來問長鬚新醅可篘未行行陟髙岡一顧俯煙水客去不肯留吾歸且休矣寒暑吟赦寒乃望春赦暑乃望秋望望復望望寒暑無停輈磨空兩靈魄日夜東西流血肉具此體老我誰為謀泛然寓大塊萬物同一丘壮兮耄所㐲盛者衰之由暑退秋紅滋寒徃春緑稠奈何秋與春不赦腸中愁蕭寺逢寒食皇天無私覆白日照不明覽鏡見白髮無路通上清惡命如惡草羞與蕭艾争春風鼓元造吹我來吳城繁華久寂寞車馬猶肥輕寄家盤門裏古寺如荒塋地頑蘚皮厚終日無人行囂譊故相逺妻女多輕驚朝聞勃姑聲暮聞姑惡聲聲云苦復苦朝暮難為情梨花照愁腸痛似遭五兵一杯寒食酒誰與論浮生飛仙篇用周草窻韻明星燦白石八極傍無端羽駕紫霞表月窟春闌珊三元流珠秘換骨初不難弹指一塵刼世人漫愁歎王喬羡門生鸞鶴常媻媻剛風導旛旟冉冉如飛翰仙人攬六著著以赬玉盤上朝東華閣主君顔渥丹邀我小稅駕為説平生歡彤雲爍羽袂鼇背晨光寒古興四首用周草窻韻薫風入虞絃萬物闡生意圖南豈無心所恨老已至浮雲翳高槐縹緲動羇思吁嗟鷦鷯枝詎可巢孔翠塵坌障䨇眼閉門息交㳺聖經斷金義當從古人求清尊洗風月非可與婦謀據梧不成寐簾影燈幽幽隂崖月常昏曠野日生早太行不通舟車馬畏鳥道草草度嵗時空慕茹芝老不有離騷詞何能泄幽抱流俗厭拙直對面猶褒斜氷玉漫堅白錦繡矜姸華徃徃怪僻者反為時所誇交情到妻子令人生歎嗟採桑行採桑東陌頭日出紅光流採桑南陌頭和風滿桑鉤採桑西陌頭日落烏颼颼採桑北陌頭明月照歌樓擕籃敢憚逺手胝足成趼蠶饑恐歸遲一日三四返昨朝蠶三眼燈前微合眼夢中見征夫短衣供築版庭樹啼霜鴉夢回自天涯小姑報蠶起蓬鬢忙梳爬相望萬餘里那敢興怨嗟出門還採葉細雨濕桐花弔魏嶼川永嘉嶼川魏起雷客死吳興安定書堂殯於曹公廟中孤櫬望故鄉千有餘里堂長将遷瘞於義阡余傷其殁作是詩以弔寓形大塊内變滅如風埃依依孤蘭姿不上黄金䑓客死古豈無君死猶蒿萊方君初病時秋自京都回空齋數相見書案皆寒灰對飯不能喫買藥親炮煨氣劣面如削高説尚雄瑰破衾褁羸骨今在古廟隈俛仰視所親旅櫬惟霜苔何人置肴豆何人陳酒杯故鄉那得返義塜将就培我成薤歌聲君聞寧不哀八月三十日小園桂香清甚招同僚吟賞憶劉判官葉令君日出理簿書夜常秉燭歸不知花開謝間關園鳥啼朅來巾峯下三度著秋衣丹桂立西風明年開向誰俗吏癡已甚騷人貌難追坐中金蘭契蕭爽芙蓉姿酒漓飲不醉取歡在琴詩村落有貧民攔道訴寒饑官涂一笑過念此令人悲賢哉二大夫露宿東西溪古贈别三首撫我膝上琴酌君杯中酒惟琴乃正聲惟酒是醇酎芳年如驚飊願介斯文壽結交非悠悠所貴在耐乆今君逺行邁黄葉辭故林驅車背寒日何能冩冲襟勿歎儒服弊去為塵土侵白雲在空谷歳晚毋遐心孤寂乆杜門莓苔未嘗掃風吹别離顔少日鬢已槁靡靡嵗月逝清霜散幽草君去贈一言岐路歸直道有所思白蘋洲前風似刀白頭有客披苧袍芙蓉鬱紅墮芳沼楊桞擯緑揺空壕擣衣砧歇蛬無語美人清宵隔湘浦獨掩高樓聽逺更不禁老樹鳴秋雨夜宴曲用草窻韻博山飛香靄空緑大菊杯心凸金粟百幅罘罳障夜寒歌䑓小妓吹横玉蘭堂畫燭如椽麄楚腰魏鬢嬌相扶四筵高談遏花漏犀盤雜還羅天酥杯行過手如飛箭座上愁無繫歡線曉韉䭾月朦朧歸東家又報開春宴猗蘭曲湘花小朶分幽春封根苔土如蛇鱗東風曉剥兎豪殻青瑶斛冷香吹人滋香夜滴金蟾水綠葉紫莖光韡韡佩囊荒破赤龍愁璧月斜沉泣騷鬼古春謡蒼梧雲塞東風路勾芒太皥無行處草嚙枯泥后土愁桃花自滿雲中樹黄牛力作興農工一犁細雨香濛濛阿香夜奉玉皇詔搥鼓空喚閒虵蟲桃州古田鎛歌原注今武康縣老翁犁山田土中獲得昔人墾田噐似鐸有柄如鍾不圜身長二尺徑八寸口薄腹厚唇微穿顔色紺碧艶綠處間有班紅如血鮮形模古拙見者怪銅性已變不復辨疑是死鐡兼頑鈆老翁視為棄物委床下一朝移出茅簷前塵灰糠粃俱塞填乃有博雅識是古田鏄垂涎拂拭再三㸔扣之尚覺聲隠然水痕土色兩相蝕歎息不知鑄自三代之何年邀翁問所得共入酒家保買以十萬青銅錢買來携歸置几案一架坐插青絲氊圖書鍾鼎相聨編寳玩要使兒孫傳自秦厯漢以來此鏄只在土出世便苦無常主博雅好事歸泉臺可憐閲世亦如草頭露高堂山鬼不守䕶他家便有好古人又以青錢易将去憶昔行憶昔當年十四五嘗㸔秋潮到江滸飛裾徑上酒家樓慿欄直望潮生處數百里間名海門悠悠一線色如銀漸近江心痕漸大洶湧聲吞十萬軍須臾潮頭髙數丈衆潮隨接皆奔上中有雄心拍浪兒幾㸃紅旗爭蕩漾風前縹緲奪標來神蛟鬼鰐俱摧頽監潮候有伍胥在但見濆薄旋推回後來沙漲西興口潮勢何曾十分有水上人騎騍馬行車如雞栖馬如狗數年之後不可當漰湃驚聞洗目塘汪洋且撥菜園去壩子橋邉亦渺茫神臯内史承天㫖擺樁疊石曽料理至今遏捺逾十年樁石如城牢在水江頭人謂可安居連年不奈還憂虞西風吹潮半夜起子胥之怒知何如隂威作寒帶烟霧捲石掀沙出幽府堪羡雲中拍浪兒踏著危機不怕危乗除消長君休忽牢執長竿一面旗婺源琉璃萬燈歌原注節齋堂中所張婺源燈匠奪天巧做出新燈極精好細細琉璃萬縷中織得禽魚及花草錦娘眷眷繡娘羞煌芒五色燿氷毬江梅盈枝玉彯蘂離枝滿樹紅堆頭水晶不瑩珠璣冷屏間雲毋空烘影百尺長竿横畫梁寳葢懸空繫纎綆緑灔鱗鱗晃曲波斜岡蹙蹙映平坡瓶中梔子豆心綻籃裏海棠絨帶拖午夜髙堂明似晝璧月涵光燦星斗蠟香坱靄熖春陽錦光倒射金杯酒此燈絶妙世間無乃是婺源燈畫圖梁園下客非夸大從今不必説姑蘇氷壺飲歌金流石爍草欲枯炎氣熇熇嘘洪鑪蘭臺兎園避處無髙堂貯氷排玉壺珊瑚水晶間犀株扇車作風轉轆轤水戯蠟刻鴻鷗鳬大𤓰浮緑李沉朱碧筩捲香㪺雲腴膾盤堆雪封秋鱸美人笑指袁安圖汗珠滴出紅羅襦苦寒歌凍天添雲埋晝光江河膠合蛟龍僵涸隂嘘風無慘烈枯磧莽莽沙浮霜蟄春老屋如氷井獸炭烹紅烘不醒南山飛瀑成玉絲哀猿􅂒落孤松頂關山月玉門關外月逺接黒山明晃色同沙冷飛光掩雪清宿師方偃陣㳺騎復窺城不信長生魄年年照戰爭對月水上重樓閉虚空雲盡收十分今夜月一片玉晨秋秪有詩能冩都無價可酬寥寥飛鵲外歌吹在青樓道場山灾後葉靖逸同遊石爛木全焦鍾魚變寂寥老僧無法說諸佛亦魂消寺有州圖載山餘窣堵標嗟嗟伏虎事誰更問前朝石山僧禪衣掛石稜月澗瀬流氷釘畫掃寒壁覆棊然夜燈别來增落葉病起損枯藤說透蓮花偈相依有越僧華亭延恩律師花㑹收雲席經聲散窅㝠無言坐巖壑隨意使精靈齋鉢重教漆埋龕預作銘飬成松上鶴相對兩眸青寄北山僧一庵猿鳥外琢石叠禪扄行道拖寒衲消閒補壞經新泉開出逺古像呪來靈常憶相尋日中巖松桂馨贈華亭延慶坦講主身不鑽權貴諸方盡說師講多禪子聽行少俗人知猿䕶挑經錫龍依洗鉢池舊房天目下松長幾秋枝寄心禪人寂寂古山根閒房竹半分野禽聽佛偈香草入禪薫白露滴孤壁悲風生破墳昨來經世業應已付浮雲送超海翁逰金陵𣺌渺金陵道江天正寂寥孤鴻隨去影一錫破寒飈官渡潮多涸臺城寺半凋離宫見楊栁莫折弄春條送僧歸杼山亂峯村口寺舊有晝公房鳥宿猿啼處風吹月在傍揭雲松景黒涸石蘚痕黄明日烟霞外相望隔夕陽送僧廣明忽辭同侣去自喜水烟濃江草有閒色野僧無定蹤衣弢方眼笠瓶系曲枝笻明宿楓橋寺先聽夜半鐘題贈然鏡潭象圜非假鑄湛湛一泓深獨露古今體静涵天地心月沉聲不響雲晦影無侵定起何人㑹魚龍識梵音寄輝老八十空門侣如君有幾僧眼明非服藥身健不扶藤雲綴搜吟筆花紛說戒燈小師親得法新度碓頭能與昭慶因律師西湖戒壇寺近逼九重天師住無他惱人言有宿縁蓮香熏梵裓栁色䕶齋筵四分南山律今誰可共宣春日題吳興峴山寺花草滿苕陽東風隔短墻窪樽殘葉爛壊塔老藤僵鴿暝栖苔殿僧寒閉竹房荒阡人哭散惟覺紙煙香送客赴邉任山陽今近敵君去酒當呼不為留行役閑因說道途春沙郵騎老夜雨戍樓孤袖裏酬君劒須将示丈夫河軒初秋夜坐滌熱屢呼茶河軒去郭賒雲紅初夜月風白乆晴沙樹暗惟聞蚻波明間躍蛙松江鱸入思客老媿浮家題車葢實公庵雲火欲燒天得涼過得仙蛙隨殘雨閙犬䕶一僧禪竹色揺山磴荷聲拂水田别期秋月夜來借石床眠雨樓晚思紅葉入溪樹悽悽吟思㣲雨連秋市暗鐘遶暮天飛淺井隂螢出髙城宿鳥歸誰知凭欄處愁響隔林機遊空相寺追憶輝老兼懐伯弜詩山門掩夕曛芳草緑紛紛蛛殿縣隂火鵶城聚冷雲探吟僧滅度寄静客離羣何處増惆悵秋房駮蘚文題友人郊居鷗鷺羣栖地幽人長閉關孤村皆是水疊石自為山春雨車溪外秋風笠澤間短籬忘世味惟看釣舟還烏程趙尉㕔冬夜詩宴論詩仙吏宅酒罷夜寒增雪映髙城月風吹古岸氷入橋聞短棹隔塢見㣲燈重媿羇吟客青雲去未能送溧陽友人依茅山玉宸觀主抱琴遊帝里一㡌兩靴塵忽憶歸金瀬還謀老玉宸魚分仙澗月虎讓古山春伏事陶𢎞景終非是俗人樗翁朱安叔下省真儒方進用春榜又遺賢時屈道終在才髙人共憐休疑考官眼且結作詩縁桃李東風外身閑却是仙凭欄呈劉季良傲貧成白首萬事不相關有病身元嬾無官心更閒紅塵抛永日黄葉換秋山欲識冥冥意孤鴻夕照間道院春日褰簾捲竹房僧去罷焚香濕樹流殘雪疎籬挂夕陽花遲春意静苔宻凍痕光野水盈愁望尋巢燕已忙刈田刈田秋雨外孤嶼集罛師紅樹籠斜照青篙網細絲鐘殷山麓寺燈淡野塘祠一片鳬鷖水羞來鑑白髭送趙子真尉進賢王孫為一尉古邑近西山梅福仙名在此官非等閒水程蟂孽後野店䑕迯間未必須三考應持鶚表還送趙子真赴信州司戸鳴鐸臨征路信州非路程官曹有名勝版賦足修明地富饒銀毋山清韞水精貧交以貧累不得伴君行貽趙司戸同徃爭名地回頭二十年君今官幕府我費客逰錢夜雨梨花店春風栁絮船澆情一尊酒逢在冶亭邊九衢九衢名利路日有是非塵所以隐淪客棲於寂寞濱秋聲飛野栁凉色弄溪蘋贏得身心净人間不媿人小窻臨竹地借住半年過枕上感秋事月中聞棹歌青山無力買白髮有痕多那得成漁計江村自養和張約嘯巖書院雅調背時流月分吟外秋墨研青嶂石茶泛碧霞甌果熟猿難喚松寒鹿自遊風前横一笛不必更登樓㸔桃偶集僧舍㸔桃臨水寺幽㑹得文襟移石分花坐含毫對酒吟日斜幡影倒風斷磬聲沉人散清溪暮鶯啼出栁林與箬溪煥上人夜坐一庵秋色裏共坐佛燈前風引上香磬月浮煎茗泉袖寒沙氣逼窻逈樹聲懸語罷鴉棲定山僧入夜禪送張将領平生憑一箭此去必成名晚月催行色秋風入别情潮分江口鎮山擁石頭城疋馬烟塵外當開驃騎營偶飲溪寺踈雨過長林溪頭日半沉開尊成草酌得句嚼花吟蝸砌苔堆濕蛛簾栁映深倚欄秋欲暮醉耳怯寒砧雲間贈别薛沂叔水竹居成久何因又出山有詩懸肘後無事在人間短劔丹霞鋟扁舟白石間野情元不定遥載鶴鶵還梅草木盡凋殘孤標獨耐寒瘦成唐杜甫高抵漢袁安雪裏開春國花中立将壇年年笑紅紫翻作背時㸔癸卯元日一簷朝雨若輕塵新歴雖開未是春著出隠衣朝太帝送來名紙謝同人故園有弟音書絶要路無親旅食貧五十平頭今日到不堪卧病似漳濱送僧過建康一酌離亭桑落酒毿毿短髮長愁苖秋房已棄星居屋晚寺應投旦過寮歌哭盡從流水去榮枯半逐暗塵消江船載月敲銅斗莫向臺城問六朝倚欄裊裊朱欄倚細波緑雲相對閟嵳峩中天車駕曾擒冦何日樓船定入河霽栁午隂隨岸逺露桃春色過墻多黄旗適應東南運已辦簫鐃幾曲歌吳下春隂雲揭繁隂雨乍收吳王故國悄如秋春光物態千年在草色人心一様愁香徑有時迷野蝶帆涇無處覓沙鷗桃花欲謝清明近兩鬢霜絲感昔遊秋日山家露華滲冷入踈袍獨坐雲亭日易高林茂不知山色减石枯因見水痕牢避人黒䑕窺茅栗引子黄猨拾楮桃野老欲論城市事逺教童稚覔香醪水軒遣懐漠漠風烟滃緑隂小軒多是暗愁侵逗明月落杜䳌呌向晚雨寒蚯蚓吟一鏡自知添鶴髮五湖誰解食魚心帯春應有餘花在吳苑荒殘不可尋古項王祠册帝追王事總非殘碑猶自對斜暉廟無人到苔痕古地有蛇盤樹色肥月暗野風吹鬼火塵昏沙雨駁神衣烏江渡口停騅處今日誰知作釣磯退将自慚戰陣未曾親便待歸田養幸身隨仗馬閑秋骨瘦打毬單散曉眉嚬遊邊尚憶擒虓将畫閣何堪作老臣昨日望春門外過鐡鞭惆悵暗生塵偶憇破寺當軒水漬一池苔竟日無人見客來飛鳥忽從花下出游僧恰自雨中回半邊枯樹雷燒破幾段殘碑雪凍開檀施只今何處在金容冷對石爐灰秋初漫吟吟腸悽斷月蒼蒼促織聲中露未涼高掛酒經縁抱病閒㸔藥録為參方乆要兄弟書皆絶旋雇奴童住不常擬續逐貧揚子賦筆黏塵網硯池荒弔松山曹可擇供奉芸籖内殿間身清不愧是卑官帯殘敕號縚應斷吟出新詩板未刋妾引哀歌秋燭暝客收閑迹曉松寒端平才子如君者免死江湖把釣竿喜宥寺梅屋幽幽一屋巧藏春花匠何曾動斧斤逐朶似裁霜漢月滿椽如架石橋雲繁花綽有苔錢賃清夢那無蝶羽分欠得玉人相共住金樽檀板送斜曛秋曉聞鶴唳角斷鐘殘月尚明誰家霜鶴唳蘋汀空簷竹上滳寒露野水城邊沉曉星清帯離情穿碧戸遠将秋思入蒼㝠徃年禮謁茅司命曾記昇元頂上聽夜歸風急漏聲斷月斜人影長殘燈收短市鴛瓦已凝霜詠老桐枯心不作花儀鳳那采取何當被朱絃齎身大晟府贈舟上人放浪詩騷外塵心鍊到空白雲開夜觀海月冷松風倚樓客意入燈篝無詩過一秋角聲吹雨斷人在截雲樓山崦早梅晴逼寒笆春滿鄰漢奩芳額漸輕勻東風未放全消息雨蕚愁香不見人留别范可叔吳皋一水幾番行鷗鷺相逢眼亦青一别隔年頭白盡離歌今日不湏聽漁父引漁伴歸來語笑喧盡擕筒罩醉雲根自從城裏魚増税船在江村不入門代贈牧馬将草枯水冷馬添臕箭放鳴髇不射鵰塞北又傳烽火動冠軍人望霍票姚寒食日讀盡唐人寒食詩人於此日重傷悲如今裹飯吳中俗可是相㳂為子推楚宫秋怨水殿芙蓉拆錦苞暮簷小網集蠨蛸射麋人醉秋江畔風罥塵絲落燕巢張氏池亭飲歸金荷杯冷酒醺醺重費殘花一夜春横玉聲乾桃葉渡斷雲空惹舞靴塵淳祐辛丑元日滴酒焚香把筆熏未書名紙謁朱門對天大冩冝春字先與孤寒懴宿根杜鵑心聲呌出思歸苦呌得春風破膽愁江北江南皆蜀客年來添白幾人頭一片一片青蘿絡緯啼星稀月没未聞雞數聲柔艣斜窻外彷彿風光罨畫溪僧去僧去焚香白晝空客窻斜掩楝花風黄鸝舌結春歸盡煙雨滿林聞郭公閑倚春風樓外白雲堆壁上塵昏雨後苔倚盡夕陽牕欲掩小風猶抱落花來送髙可久遊越東風大扇九區春吳下吟人發廣津欲上㑹稽探禹穴桃花和雨撲離巾賦元秀坐主孤峯一峯峭立俯羣山下有僧居一體閒收拾春煙與秋雨年年曾在碧苔間文式上人月溪菰蒲聲裏著禪扄一𣲖蟾光畫不成試㸔世人心似火何時得此定中清曉起蕭城一雨夜迷迷聞道春流已滿溪漉秃隔墻烏桕樹曉來猶有亂鴉棲春晚呈節齋趙大資二首韶光似酒著人濃池館春殘栁絮風花不耐愁春自去鶯聲全在緑隂中宿雲惹雨膩如塵濕盡薔薇一片春鶗鴂恰鳴胡蝶嬾軫香惟惱扈芳人蟋蟀朱欄碧户緑莎邊挑入雕籠合自憐應是不知悽楚意癡兒爭把闘金錢月林為僧甫賦篩金鏤玉影颼颼一片松杉不斷頭鐘梵聲殘寒汐外石床常擁四時秋送超上人過靈隠斗邊一塔冷浮光九里松風揭寺香君去正當春雨動雪花消盡石蘭芳贈僧某曾見升壇落髮時伽黎衣冷影離離少年同隊修禪者秋水蓮中玉一枝贈僧演若海禪心静寄十三徽流水知音舉世稀自愛聲空絃絶處滿天明月鶴孤飛敬酬芳庭植講師一巻新詩冩衆芳碧雲裹出白雲鄉小溪秋水蘋花外良慰孤吟老夕陽送中巖立上人還臯亭山少年如玉在緇林此去臯亭落葉深寺近海門潮上處水中孤月是禪心送觀物初禪師退院後歸靈隠擊殘塗毒抖衣塵便掛輕㠶破淺春後夜冷泉池上㸔白雲明月是閒身無箬溪煥上人夜坐菱窠柿葉滿秋池彷彿樵歌在翠微隔寺晚鐘聲欲斷蒲葵樹底一僧歸春曉竹西窻上月痕斜雨歇春城呌亂蛙睡眼未醒人在夢斷雲流水隔桃花雜感五尺長琴被獨絃大音濁世没人傳一聲弹入碧空去三十六峯收紫煙題吳興峴山寺雨餘山態活如雲過午鐘閒寺影昏寂寞春風荒草裏野僧惟主一窪尊車塘晚歸寒雲無影雁寥寥如雪氷沙沍野橋木末夕陽未收盡江風吹合欲回潮寳覺寺晚歸半幅新霞漁舍外一梳殘月鵲巢邊近城幾樹官橋柳繫盡姑蘇過客船秋日題慈感寺老栢驚秋子徧庭寺深雲冷屋如氷九旬夏滿僧歸盡閑却虚堂照講燈桂花西風屑碎幾籯金幻與清香賽水沉吹入淮王招隠樹箇中縁有辟塵心山庵花梨架子定花瓶一朶紅梅對懴燈賈島佛前修夜課卧氷庵主是詩僧溪濵晚作𣺌𣺌斜陽下翠微紛紛黄葉徧苔磯青樓簫鼓西風外幾箇霜鴻一字飛約客不至昨朝新得剡山茶有約煎嘗對晚霞月上湘簾人不至一池春水落桐花瑞光寺蘚剥春痕土燥斑下堂僧散午鐘閒寺門半掩東風急塵捲空廊二十間送人南海鈐兵伏波簫皷按蠻軍馬首紅旂燕尾分海水如今平似掌樓船夜夜鎻閑雲賦教授允濟雲心山川融結氣絪緼舒巻油油一大鈞今古此心誰㑹得竹林中有卧龍人題吳興卞山黄龍洞巨靈穴此頑冥石應在乾坤初定時不是黄龍曾出見洞藏山底竟誰知楊妃㸔牡丹圖花上輕留一捻紅阿環無語對春風金輿欲度沉香月猶在霓裳半醉中遊楓橋寺吳王舊迹水烟移幾度孤舟此别離今日來遊故人盡稻花風裡亂蟬悲衣上酒痕江令宅邊蕭帝寺桃花曾借客温存湘羅襖上經年酒錯被人疑作淚痕和樵父詞山深猿鳥久忘年茅屋風吹夜見天莫問荆妻生計事一枝樵斧酒爐邉懐永豐宰阮允齊吉陽煙水幾千里一紙閒書失斷鴻裘葛相催驚老耳井邉桐葉又秋風館娃宫一夜娃宫有戰塵玉笄羞見苧蘿春浣紗前日東家女莫信亡吳是妾身賦江西隆上人瘦巖巉巉一穴嵌空石不是人間飯顆山鐘鼓聲中有吟者獨甘於此寄清孱漁父嵗儉何曾敢吃漿早於世路似忘羊桃花飯有秦人味不染膏梁膱膩香贈僧坐夏靈巖又欲回庵扉聞枕蠡塘開經房不鎻書櫺壊幾㸃浮螢照緑苔送虚舟立上人還天竺殘雪初乾溪水滑梅花狼藉桃花發靈山僧去盪虚舟滿棹晴雲帶新月答僧秋蓬賣菱人散日衘山一紙詩來鹿苑間料得短篷秋泛處荻花菰葉兩爛斑寄雲泉頤上人溪房夜掩白雲層酬唱詩筒繫海籐花落煮茶窻外石一航春雨隔吟燈寄浄慈寺修上人塵海翩翩獵梵衣何如蘋末㸔斜暉幾回行到言詩處水寺秋雲毷氉飛賦僧壬枕流床頭澗水響泠泠床上幽閒自曲肱莫放飲牛人洗耳恐沾塵汚石龕燈送信座主過天竺寺九里松邊鷲嶺頭松聲長帯白雲秋梵筵多有吟僧在須認詩中第一流僧遊鄂渚因贈夏口雲邊有逺期杖籐行李只揮持六朝文物今無幾為㸔頭陀寺裏碑木芙蓉懊惱春紅不受賒一枝枝似一團霞玉霄露重秋煙冷唐突西風是此花晚香贈秦奎風肅霜嚴草木凋一花半葉不相饒騷人受用秋英處探得天家别一條春日雜題三首昨朝飛雪又朝晴怕踏苔花損石稜三丈日高簷影轉卧聞殘水滴春氷碧薺抽條土力鬆春雷猶自蟄黄龍上清道士歸尋藥一笛吹雲入弁峯手撚薔薇一凭欄一年春事欲題難驚鴻掠盡碧雲去雨匝蘋洲生暮寒水仙花韈羅塵冷不勝嚬更向東風占盡春三十六灣明月下女冠逢著謫仙人唐室唐室艱難勢莫任匡君奏議抵金鍼塑人塑得先生貌難塑當時一片心小隠園詩原注孝宗賜皇兄崇王在吳興法華寺衮衣一返上清槎五十年間在咄嗟夜鶴不歸猿亦死一丘明月冷梅花梔子花小樹深叢絢緑華辟邪香冷玉無瑕薫風只是能竒絶疑是經春大雪花浙西憲臺夏夜聽雪江徐天民琴火天月滿繡衣庭秋思從君指下生莫怪老懐眠不得七絃彈出蟹行聲贈僧亷清外拉搭袈裟斷帯裙持心不背釋伽文風涵秋水霜涵月多少浮僧妬殺君送亨坐主徃天竺雲笈遥擕智者書要尋初地作工夫靈山懴主堂前草試㸔春痕幾遍枯誚暑賦火官之臣職夏九旬月屬徂暑氣猶氲氤赫赫朱轂駕於銀河之津暍黔首於原野困鳥獸於荆榛風如焚以灼石水如烹而沸鱗采蘋老人鬢已焦秃旅寄中吳假住地屋倚喘弗蘇百骸罹毒朝靣崇墻炎暉炙目夕坐短簷返照爍肉南北無十弓之長東西才兩尋之廣旁之林藪蔑有䕃障况廹近於淤河遂蒸熇而愈王病婦釋針而倦紉稚女洗粧而退帳於是作歌曰斗柄西指凉風秋矣火熱斯極金伏收矣積陽上升兹日瘳矣火官之臣行且休矣重曰桂芳兮蘋香素月兮清光赤雲滅兮白雲揚沐冠巾兮浴衣裳㧞火聚於髁國撤烘燎之吟床江湖後集巻二十
