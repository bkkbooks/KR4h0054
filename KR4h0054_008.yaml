body:
  text: 江湖後集卷八宋陳起撰趙庚夫庚夫字仲白莆田人寓居興化軍魏王八世孫兩舉春官不第以宗子取應得右選趙紫芝名冠四靈而仲白亞於紫芝陳振孫書録解題云劉後村志其墓擇其詩百篇為山中小集屬趙南塘序而傳之寄題孔道士雲庵道人居玉笥手闢小蓬萊門寂山相對庵空雲自來茶煙朝宛轉丹氣夜昭回欲助梨花夢擕鋤獨種梅宿花果園緣無耕種地役此老來身下馬看題壁聞雞起抱薪縣荒齎米過店好啜茶頻僕也師夫子宜為南北人遊山歸賦山光海影一微塵歸到庵中認得真對境直須心有眼參禪除是膽通身隱無高論姑隨性貧亦常談莫語人生死看來非大事世間何説更尖新宿秀才嶺下雨急寒城墊角巾家家門掩不逢人逺看草樹疑成雪忽見楊花憶是春復嶺征夫松作蓋深村客舍石為鄰清人神思明朝起半月行程溪水濵讀曽文清公集茶山八十二癯仙千首新詩手自編吟到瘴煙因避冦貴登從槖只棲禪新如月出初三夜淡比湯煎第一泉咄咄逼人門弟子劍南已見祖燈傳鬢髭鬢髭漸漸長霜莖老聽山中鶴唳聲九死得生尤可重百年幾日更多營自參梵夾機心息專食藜羮胃氣清檢點依然魔障在草堂釣艇未忘情落魄落魄蕉衫戴道冠菖蒲滿案浸清寒有錢即買丹砂煉無病頻將素問看連日遊山僧共往頻年乞米鶴同餐世間不朽非鍾鼎曽與高人靜處看落魄江湖夢裏尋起來佳處散煩襟長風送雨晚涼甚獨鴈呌雲秋意深胸次直須冰玉潔鬢邊莫放雪霜侵清時我是無能者肯作澤間憔悴吟懶懶不梳頭髮覆肩飢吟狂嘯傲流年琴無弦索眠為枕床有蒲團坐當氊夢著架裟曽見佛間拈如意想登天早知移却觀書眼去看廬山瀑布泉真州聞角畫角聽時恨最深戍樓偏在女墻隂聲寒恐有新霜落意逺未隨紅日沉涼月一天孤雁影秋風萬里壯夫心連宵只解搜詩思哀怨何曽動羽林心宇心宇今無一點塵面毛徑寸垢生鱗齋時野雀臨薌几定裏山蜂立葛巾欲喚羲黃談太古自疑嵇阮即前身兒童共指深衣笑問是秦人是晉人書李長吉集幾回掩却又重看吟罷心如著露蘭欲上玉樓窺老筆虬龍擁處雪霜寒葛起文起文字君容丹陽人起耕之弟遊黃山寺偶為尋幽出扶笻亦懶拈鸛巢依古塔燕語入虛欄筆下詩初就樽中酒屢添此遊堪喜處膝上一掀髯詠竹閣歲寒編竹閣蝸縮度窮年日暴南窗紙風垂北户簾爐深全火氣鐺小聚茶煙為索梅花笑微醺步矮簷窖嶺道中屨穿蒼蘚滑水復更山重有圃春偏晚無人碓自舂亂雲生峭壁一鳥沒高峯隨處桃花發仙源似可逢深院深院人間酒淺斟日長簾幕自沉沉梅花可是因春瘦洗雨梳風太不禁趙崇嶓崇嶓字漢宗開封人太宗九世孫嘉定十六年進士官至大宗丞有白雲小稿憶昔一首憶昔城南會珮馬輕春風芳華感人心折贈以為容俯仰一相失去若南飛鴻青青女蘿衣蔚蔚石上松嵗寒無夕秀安得長相從願為日月光落君懷袖中三五如循環千里宛可同題彈梟彈梟莫彈鶴惜此孤飛翰鶴舉即千里渺在青雲端彈之固無益瘦不充君盤却恐梧桐枝無復棲鳯鸞擬人生不滿百人生不滿百譬如朝露晞白日入虞淵胡不秉燭嬉大耋嗟晷短多憂亦奚為君看玄廬道輀車無停時伺晨當及旦佳會當及期故人故人西南風遺我一束詩長哦結幽想慌惚若見之遊雲靄層霄聚散安可期虛空聞妙音意重千金資相思若行月一夕天之涯間窗穿夢魂碧草春離離美人貌如花美人貌如花獨立古道邊芳年抱幽思豔裔春風前春風固無情桃李終欲言不剪紅豆枝相思獨懸懸適趣賦資在山林適趣非任放乾坤入我牖得此一昭曠雨露日以深禾黍日以長妻兒喜相謂一飽知可望飯蔬適我願此意應勿爽反挽歌二首生人送死人哀哀淚如霰生人閲寒暑冉冉亦如電來去遞相送展轉不可見丘樊謹封殖陵谷猶有變萬古長如斯何庸致深辨死生雖異塗昭晰本一理崦嵫落圓景一訣非永逝達人隨元化生死一劇耳生生常癡𡨕安知非真死死當安吾歸生當適吾意用看雲體上有懸石崖下有滑石道中有觀空人容顔半枯稿坐息窮年歲抱此希世寶雖然欠竒俊塵翳已一掃或云大道初不剩亦不少用力勤修為苦辛坐中老新州有樵人此意極了了穠華穠華侈春艷松柏凌霜雪芳時若轉盼萬族畏銷歇人生金石交所貴在黃髮同衾異寒燠抱藴應未察貧賤張與陳利達胡與越安得皎潔心長年似明月野馬野馬紛驅馳競此光一隙世事若頷髭朝摘暮還出惟應壯與老冉冉如過客嵗寒山上松稍稍見其實詠竹生花竹老方作花清氣應自結結實成琅玕中心抱冰雪世人弗肯食欲獻終不屑鳯凰在高岡音響方節節失題雲臺會功臣際會若風虎獨有嚴子陵垂竿富春渚相求到幽藐相如有平素吾寢惟吾真君意應勿忤歸來拂苔石整我竿上縷煌煌道義間足以照今古春日勾芒暢生意惠風改繁霜日月天清明桃李春輝光庶情悉萌達衆羽同飛翔乘時各有適皥皥齊康莊山人感物化欣愜殊未央回視元氣初萬端一微茫我欲觀其微因之問鴻荒田家方春事鋤犂晚節多黍稌雞豚樂豐嵗一飽輕萬事少長情熙熙呼喚相爾汝雖無禮節拘氣象應近古先進不可期無懷在農圃一蓮一蓮瓶中枯一蓮池中子結子心雖苦而猶勝枯死賞心一日期詎非得生理君看千嵗樗荒郊永淪棄飲少平生不善飲飲少醉已極恨不如淵明陶陶少虛日桑嵫無停景寸晷足可惜今人與古人展轉不相識孰能制頽齡擾擾竟何益白蓮池上白蓮花秋風洗香雪坐令紅黛皆塵俗一種凄涼不堪折微波脈脈露光漙姑射仙人步煙月征婦怨梧桐葉葉生涼秋燕山早寒已知遒則則力力歎不休堂前月光使人愁停針罷線淚沾裳朔風漸高天雨霜妾憂欲死幸未死未死猶堪寄衣去皎皎皎皎白玉堂有女白於玉門前車馬任西東門裏苔痕四時緑春風撩亂飛伯勞櫻桃花重紅夭夭夜深撲落金剪刀烏龍睡穩蟾蜍高代贈雙綰玉叉垂相逢暗斂眉紅潮初上臉未語兩心知羅襪凌波拂暗塵露桃煙柳不勝春珊瑚枝下重相見曽是鴛鴦夢裏人髙樓曲髙樓漠漠東風塵花鬚落溪生緑雲艷歌美酒消好春千金難解青娥顰燕鶯語言鳯凰意畫空不成天似水潮紅暈臉濃蛾低門前采蘩春正遲進酒行玉槽夜壓葡萄碧石溜寒泉響凌歷水精壺中澄琥珀醉呼酒星下瑶席小鬟春風花滿頭堂堂一曲真珠喉六國三朝春江流眼花落井消千愁難忘曲弱花低繡檻月滿緑楊津一笑領深意過於三月春樽前停妙舞堂上設華裀上客不須醉相將夜向晨幽居不作無輿歎幽居體自胖能貧蔬食足投老敝裘安濁酒融春意青燈話嵗寒外頭無限事忙殺不相干識得識得聱牙字三生拙未除間居兩疏傳餘事二王書老任衣冠古貧從爼豆疏農人適相告早晚出犂鋤翠雲寺杖屨入雲端天空眼力寬地因山氣濕窗帶瀑聲寒隱几俗氛逺捲簾僧夢殘相逢隱淪者妙語亦翻瀾漢地漢地文書密窮邊嵗月深但髙蘇武節不察李陵心過鴈西風急荒臺朔氣沉同生不同恨萬里一霑襟地僻地僻逢迎少吾生信杳冥清談養生論兀坐太玄經性拙貧逾樂神清夢數靈亭亭嵗寒友相對眼終青咫尺咫尺越山海其如千里何祗應憐命薄不道賦情多墜綰交枝玉纎圍百疊羅清宵無限思枕席起微波臘月臘月二十五人家祓舊年山人無可禱睡著不知天窗前窗前尋丈地種得一株梅明月清風我紅塵不復來失題白玉誰家郎紅粉何處女秀色總堪憐春風密相許幽意開簾野水聲倚杖青山色幽意在人間人間不相識春朝偶書一夕春歸桃李根清寒猶勒艷陽魂雪霜雨露年年事惟有梅花地位尊淮河水秋風淮水白滄茫中有英雄淚幾行流到海門流不去會隨潮汐過錢塘天寶禁中外庭班退夀王歸别有驕兒侍禁闈解事老奴寧及逺君恩如許政忘機廣寒宫碧海沉沉桂殿幽滿天風露四時秋寒宫白兔參差老一種凄涼各自愁臨汝道中野水平田稻正青肩輿軋軋趂新晴髼頭奴子無拘束牛背醉眠歌太平送還吳山藁萬卷文書一幅巾不將風鑑落埃塵桂花未緑槐花謝獨佩江蘺有幾人移梅鄰家爭乞麗春栽玉手輕分帶月培窗下老翁迂入骨清齋三日為移梅癡貓愛汝斒斕任汝癡了無殺意上鬚眉通宵鼠子喧人睡政爾相忘也大竒醉起醉起西窗日欲斜新煙初試雨前茶川原春意無聊賴開盡桐花到柿花幽齋幽齋宜凊復宜溫高卧騰騰百不聞贏得神安無夢事從教黃葉夜紛紛大廷大廷新革晉春秋王氣寧知在荻州泉下髯參心獨快不教司馬恨枋頭有感舞罷歌停嵗月深當時勝迹盡銷沉飛雲捲雨人爭賞留得佳名尚到今倚樓平楚連天獨倚樓樓頭日日望行舟相思飛盡梅花雪江上晴雲片片愁田家雞豚白酒樂豐年飽即高眠不問天少長有恩相爾汝淳風應似伏羲前西施捧心圖詩吳苑風光越水春兩山眉裏笑顰分腹心别有堪憂處狂殺君王藐不聞晚立古徑苔深晝掩關外頭塵土不曽間雨晴天氣明如鏡靜倚孤松看逺山獨立片雲收雨入西山望極蒼茫杳靄間蕩蕩太虛無一事祗應日月不曽間譙樓霜滿譙樓報五更道人睡穩幾曽聽金街應有朝天客珮馬禁寒望曉星小窗小窗風定曲肱眠骨冷魂清夢易圓蝴蝶不飛花自落海棠枝下月娟娟小窗對客紙帳梅花自一真小窗對語坐無裀詩家供給惟風月病與詩疏始覺貧清平樂樂府新聲替舊歌沉香亭北醉顔酡牡丹謝後生秋草一曲霓裳已覺多如夢令日日酒圍花陳畫閣紅樓相近殘月醉歸來長是雨羞雲困低問低問獨自繡幃睡穩窗外燕嬌鶯妬窗下夢魂無據夢好却頻驚不到綵雲深處無緒無緒紅重一簾花雨更漏子玉搔頭金約臂嬌重不勝殘醉留淺黛暈胭脂淺寒生玉肌待歸來渾未凖疑殺那回書信春又好思無窮捲簾花露濃謁金門春尚淺江上柳梢風軟銷盡玉梅春不管冷香和夢逺脈脈緑窗新怨花勝無心重剪簾押護香間不捲捲簾芳事遍春意泄香重一枝梅雪寒透玉壺氷暗結玉奴情更劣似語還羞竒絶妬白憐紅時節酒力未醒雙眼襭一簾風弄月晴意早簾外數聲啼烏有約不來春夢杳鎖窗微弄曉江上殘梅未掃葉底芳桃紅小天逺斷雲塵不到過春還草草春意薄江上晚來風惡簾外海棠花半落睡深渾未覺夢想當年行樂新恨暗添金鵲寫就錦箋無處託去鴻天一角清平樂懷人鶯歌蝶舞池館春多處滿架花雲留不住散作一川香雨相思夜夜情悰青衫淚滿啼紅料想故園桃李也應怨月愁風妬紅欺緑輕浪潮溫玉鸞袖捲香金􅀢􅝹嬌怯未消寒粟錦衾初罷承歡宿粧微褪香彎醉眼乍鬆還困斷雲猶繞巫山南柯子小姝絲髮風輕掠酥胸冷不侵背人小立卸瑶簪一縷柔情繫得幾人心曲檻花方蓓河橋柳未隂紅羞緑困不能禁惱亂東風無計等春深掩笑輕擡袖慵粧淺畫眉嫩晴簾箔玉梅飛門外寒輕疏柳趂黃時綰帶香羅結交叉緑玉枝看看又誤踏青期倚遍欄干心事只春知浣溪沙望海潮泛舟輕雲過雨炎暉初減樓頭片片餘霞曲徑通幽小欄斜護水天薄暮人家暝色趣歸鴉竹風交立玉清透窗紗斷岸漣漪亂萍芳葦繞煙沙依稀畫艇蓮娃掩鮫綃微沁急槳咿啞香霧霏微冷光搖曵婭紅深映低花天際玉鈎斜磯邊菱唱答驚斷鳴蛙滿棹白蘋歸去幽興繞天涯沁園春紫陌芳塵煙縷收寒雨絲過雲羡交隂桃葉窗前曲檻認巢燕子柳底朱門回首年時霧鬟風袖裊裊娉娉嬌上春逢迎處儘芳華繾綣玉佩殷勤誰知此際銷魂漫隱約人前笑語溫記掌中纎細真成一夢花時怨憶應為雙文載酒心情教眉詩句空悔風流曽誤人慿誰去待寄將恨事兩處平分摸魚兒捲珠簾幾畨花信輕寒猶自成陳一年芳事如朝夢容易緑深紅褪寒食近惟自有斷腸垂柳禁春困瑣窗深靜悄疊損縷衣凝塵暗掩金斗尉清潤章臺恨凖擬芳期未穩舊遊細把重忖鑑鸞叉鳯平分久留取年時心印誰與問待試寫花箋密寄教郎認妬香憐粉欲寫却還羞輕顰淺歎字字攪方寸張矩矩字方叔南徐人贊崇禧文室二仙圖鹿皮槲葉容顔枯稿青巾白袍飄然氣貌不同者形所同者道金丹一丸天地同老敬餞劉興伯提幹之官平生子劉子徑氣橫秋霜不肯作短簿海漘駕飛航稜嶒高頰顴碧眼鬚眉蒼鶯花風月夜錦繡傾肝腸諸公盍推轂置之白玉堂管庫著此士四海空茫茫僕也客於浙雲阡凄故鄉退鷁豈坦率瞽無預文章乘除君晚泰尚欲思激昻年飢僅半菽羞澀無酒漿贐别祗此詩君無誚凄涼登鍾山登髙得勝遊暫喜塵鞅脫林深鳥聲微石兀馬足滑一笑立髙寒雙明渺遐闊酒酣百慮消世事等毫末送姚提幹行虛齋鎮東鄞從之南容君我初未之識雍翰傾殷勤修潔以博習秀美而有文玉犀映秋水英辭湧春雲雞距角魯蜀昻然鶴非羣晤言到聖處商也樂所聞最喜直而義壯音駴鼓鼖告子少於孟先䇿養氣勛牛山木信美謹勿容斧斤助苗固得稿可使稗不耘觀于所植立真能張吾軍仁義可效治淵源在河汾詩書自師友芝蘭足膏薰剛風接徑翮去去翔霄旻清時有聞者必也吾子云賦山水雪景寒雲凝不飛回風舞霏雪移多山凹平漸釋澗聲咽飢烏噤無語老樹僵欲折薄暮漁舟歸行人稍稀絶詩翁酒力微清興渺天末夜深有竒事玉樓耿寒月約臺府同官王元敬以次七人登巾山以前峯月照半江水分韻得半字一江貫萬山雙塔抵層漢我來躡勝遊寒日己過半夕陽滿孤村潮勢吞兩岸俯視塵世微雲邊數聲鴈題三茅峯巨靈握竒石飛落人間世怒拳一擊破髙下成鼎峙三光發其精五嶽借之氣精氣久以靈稍稍見竒異香之為草木清之為泉水天則為洞天地則為福地嶔嶔白雲根怪巧分鎖細龍潛而虎藏猿啼而鶴唳始焉三仙居終也衆真萃至今丹砂光上下數萬里清遊動高吟今古幾騷士搜竒探幽深或僅見一二輸君呼筆神盡發萬古祕我于塵埃中讀之如親履呼兒謹謄藏再拜歸棐几次韻孟師翰鳯兒花滴滴金彩鳯與幽花動植自形色命名取肖似造化何容力丹穴呈九苞夜夢或吐白未若秋中芳榮悴了無迹物理紛以移血或化為碧安知秋草英不作金點滴非繇冶者鑄芳葩自光澤誤彼市中攫一過一目逆有懷尤贊府季專西風約暮雨虛亭得新爽忽焉見崚􅜤倣佛呈萬象誰其伴孤吟寒蛩軋幽響碧雲渺佳人抱膝注遐想題劉直孺拙逸軒營營天壤間孰不為智使有美山中君獨與世俗異一真不鑿若大愚四體安然如止水人皆喜君得佳扁我於其間有餘議一隂一陽分動靜江河山嶽判流峙造化而欲辭其勞造化之功亦息矣伊周孔孟心乎民老氏莊蒙忘此世使四君子俱恝然萬古滔滔孰經濟以拙而望巧巧未及成拙先至晦巧而為拙終焉多與巧相值逸者自逸勞者勞天之降材爾殊爾君才足以應萬殊袖手山林恐非計願君畢力運天巧却换軒名與張子為茅峯崇禧主人景架巖贊王肖岩所寫喜容虬髯如雲眼如月胸次毫端一泓雪政恐儒冠或誤身尚友虛無老莊列松隂泉影緑悠悠此時此意如何説三真跨鶴夜相從長嘯一聲山谷裂贈雲竹一老琴師歌昌黎不作頴師已千古風流隨逝水大音祗在天壤間雲竹翁能發其祕明之為侯王幽之為神鬼悟翁一轉指頭禪萬事泯然心耳廢澗泉淅瀝走宫商仙佩丁當分角徵數聲急羽來秋空夜半西風掠蛩砌諸公不但知此音真欲鈎深得其藝大篇小什分珠璣往往不惜兼金餽吾聞南風之歌下舜廊四海熙熙樂平治願翁持此天上頭一鼓解民愠再鼓阜民財勿作區區自豐計題錢則父凛對軒軒有老檜竒甚老紅落盡蒼苔院萬物隨時自流轉蒼然古檜夜窗前獨抱寒姿聳孤幹幽人丈室空無埃風聲月影共徘徊樹兮人兮兩清絶不然君肯居此哉題金淵緑淨亭慿髙四望天沉沉平蕪逺樹橫夕隂碧雲吐吞獻竒象乃知造物得我心漁舟兩兩疊煙棹白鳥出沒滄波深悠然呼酒納幽致須臾寒月照古琴第一峯詩原注顛倒一七體穿雲踏月登茅嶺一陳西風吹客衣松儼立兮如伏山周回兮若幃竹泉清可鑒苔石坐忘歸鶴唳空靄猿啼翠微白露下碧煙飛適意忘機歔欷凄清露重月明紗帽濕夾衣輕路險僕倦石危馬驚近市火數點出林鍾一聲客子征鞍暫解仙家雲關未扄濁酒三杯投倦榻夢回畫被寫吟情雪後呈邵堯章權尉刮地風成陳漫空雪作團侵陵詩骨瘦開拓酒腸寬入竹寒聲細緘梅冷艷乾長官何太喜農事正相干半年半年留鶴邑嵗晚倦重遊雪柳帶春意煙蕪生暮愁怕看新鳯厯忍拂舊貂裘莫道知心少相親有白鷗華亭道間移船過九曲滿袖貯西風木落山容老荷枯水面空客懷詩句裏時事酒杯中莫聽雲間鶴寧呼天外鴻題雲間皎上人扄緑軒藂竹傍幽亭蕭然一畫屏色欺春酒碧光映夜燈青雨葉供香潤風枝搖夢醒却嫌千畝闊浩渺緑難扄題黃岩黃山樓樓俯澄江碧山宜四面觀壓波橋影闊帶雨櫓聲寒客夢因詩醒歸心得酒寬虛懷納幽致濕翠撲欄干相公新創雲山觀於州治之東詩以頌之華榱勝概實相兼却笑滕王詫棟簾海內一雲髙出岫江南列嶂杳平簷作霖錫命宜爰立維石興歌正具瞻寰宇固應同德宇共期羮鼎試梅鹽帝城帝城那得見秋容秋在三吳澤國中蘆未著霜花己白蓼宜近水影偏紅一行落鴈低南浦萬點棲鴉起北風安得畫師模此景釣魚磯上著詩翁半年再作華亭客每喜輕帆得順風白水涵秋千頃淨清霜粲曉萬山空暫時放浪如塵外憶昨經過似夢中濁酒三杯眠未熟不能平處枕邊鴻次韻金陵趙民曹原注與裝水閣即事尚想溪亭跨鴨頭市囂到曉不曽休角聲吹斷老梅月橋影壓翻寒葦秋三語固知非昔比十年不到使人愁老來著腳茆峯下相望何殊風馬牛再用韻呈相公等囿乾坤造化中此花珍重殿春紅矜持不受荼䕷月披拂正須楊柳風三詠品題真入妙獨慚屬和未能工廳前舊本今應在何必移根江以東和澄齋劉制幹過蕪湖渭陽宅有感韻興言陟屺駐征艎丘水依然亦故鄉萱草夢寒詩思逺梅花月冷角聲長暫辭小隱從三聘况值清時已一陽朝籍漸通恩數洽會看梧檟發幽光留别耘業林逢吉飯牛翁鄭簡子天台山下兩詩仙剪霧裁氷五十年耘業三間千古意飯牛數集幾人傳半江明月曽同賦一段清風豈偶然匹馬衝寒西驛路碧雲苒苒思綿綿奉和魏提幹騎鶴樓前奏宓琴朅來又作海山吟碧雲不隔鄉關夢白髮能灰客子心愧我抗塵徒走俗羡君博古更通今新詩清響傳空谷擊節長歌到夜深登蘇臺用袁憲韻贈兩趙提幹原注汝積幼聞勝賞多從暇日違眼中朋友欲星稀退休不復思三顧能賦猶堪廣七依遊鹿臺前空逝水栖烏曲裏只斜暉書生懷古真癡絶看盡間雲入棟飛窗上窗上月朦朧香藝鼻觀通了無梅竹影猛省在舟中題啄蜂雀井團雀二圖遊蜂從何來飢雀巧相遇誰其釋紛拏放汝採花去日暮投荒榛吻利腹良餒爾竟何所爭固結不可解鴈聲鴈聲恰值到江東霜影空濛落晚篷寒著蘆花禁不得一層晴雪亂西風春吟四絶岸草不知緣底緑山花試問為誰紅元造本來惟寂寞年年多事是春風沙渚清泠薄葉水野亭和暖杏花風此中佳趣無人會牛背斜陽卧牧童花露半乾紅入户竹風微動緑侵床翠屏殘夢不知處幽鳥數聲春日長香鼎灰寒午夢回間情誰與夢徘徊杖藜信步穿幽徑一陳野芳何處來送賔書記自揚歸吳門一葉黃蘆渡渺茫誤隨野鶴上維揚角聲吹斷梅花夢依舊楓灣半葉霜聞杜鵑流落江南帝魄癡年年啼到緑隂肥蜀山邈在青天外只勸人歸不自歸勸農二絶善端天賦本無殊力穡之餘好讀書莫訝勸農因勸學須知公相起犂鋤長官誨汝亦諄諄須信民生總在勤試誦殷盤豳七月詩書即是勸農文題包虎正視耽耽怒作威西風搖毒上牙鬚山翁祗作丹青看馮婦從教自下車日日紅林飽血腴尚將餘力咬枯株髙亭素壁黃昏後疑有悲風落坐隅咏十月桃原注夢中得一樹春風怨落暉之句覺而足成十月桃開三四枝凄涼時候見芳菲小紅不著黃花蝶一樹春風怨落暉騎鶴仙擁麾猶願富腰錢千古相傳跨鶴仙莫笑昔人空覬望後來人欲更熏天題稅軒新築送青亭四首花木中間著小亭簷虛不礙兩峯青數聲啼鳥閙中過不似家山子細聽日抱吟情到此亭捲簾孤坐看雲生詩懷恰與雲相似一點悠然度太清白雲盡處青山小紅雨飛時緑樹新佳致仗誰同管領野禽啁哳話深春日移花影上疏簾香鼎燒殘逐旋添春事已隨詩入夢一庭芳草緑纎纎題趙子固水仙圖紫府川妃夜宴還玉盤金碗落人間香肌不受緇塵汚依約風前響珮環秦淮往在秦淮問六朝江樓只有女吹簫昭陽太極無行路嵗嵗鵝黃上柳條至後二日登狼峯江流不盡天連地山意無窮春復秋多少詩人無分到我來三月得重遊聞春禽萬疊雲山擁翠屏筍輿終日面山行幽禽上下好音語到底不知誰命名江湖後集卷八
