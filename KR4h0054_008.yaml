body:
  text: 江湖後集巻八宋陳起撰趙庚夫庚夫字仲白莆田人寓居興化軍魏王八世孫兩舉春官不第以宗子取應得右選趙紫芝名冠四靈而仲白亞於紫芝陳振孫書録解題云劉後村誌其墓擇其詩百篇為山中小集屬趙南塘序而傳之寄題孔道士雲庵道人居玉笥手闢小蓬莱門寂山相對庵空雲自来茶煙朝宛轉丹氣夜昭回欲助梨花夢擕鋤獨種梅宿花果園縁無耕種地役此老来身下馬看題壁聞雞起抱薪縣荒齎米過店好啜茶頻僕也師夫子宜為南北人遊山歸賦山光海影一㣲塵歸到庵中認得真對境直須心有眼參禪除是膽通身隠無高論姑隨性貧亦常談莫語人生死看来非大事世間何説更尖新宿秀才嶺下雨急寒城墊角巾家家門掩不逢人逺看草樹疑成雪忽見楊花憶是春複嶺征夫松作蓋深村客舍石為隣清人神思明朝起半月行程溪水濵讀曽文清公集茶山八十二癯仙千首新詩手自編吟到瘴煙因避冦貴登從槖只棲禪新如月出初三夜澹比湯煎第一泉咄咄逼人門弟子劍南已見祖燈傳鬢髭鬢髭漸漸長霜莖老聽山中鶴唳聲九死得生尤可重百年幾日更多營自參梵夾機心息專食藜羮胃氣清檢㸃依然魔障在草堂釣艇未忘情落魄落魄蕉衫戴道冠菖蒲滿案浸清寒有錢即買丹砂煉無病頻將素問看連日游山僧共徃頻年乞米鶴同飡世間不朽非鍾鼎曽與高人靜處看落魄江湖夢裏尋起来佳處散煩襟長風送雨晚涼甚獨鴈呌雲秋意深胷次直須冰玉㓗鬢邊莫放雪霜侵清時我是無能者肯作澤間憔悴吟懶懶不梳頭髮覆肩飢吟狂嘯傲流年琴無弦索眠為枕床有蒲團坐當氊夢着架裟曽見佛閑拈如意想登天早知移却觀書眼去看廬山瀑布泉真州聞角畫角聽時恨最深戍樓偏在女墻隂聲寒恐有新霜落意逺未隨紅日沉凉月一天孤雁影秋風萬里壯夫心連宵只解搜詩思哀怨何曽動羽林心宇心宇今無一㸃塵面毛徑寸垢生鱗齋時野雀臨薌几定裏山蜂立葛巾欲喚羲黄談太古自疑嵇阮即前身兒童共指深衣笑問是秦人是晉人書李長吉集幾迴掩却又重看吟罷心如著露蘭欲上玉樓窺老筆虬龍擁處雪霜寒葛起文起文字君容丹陽人起耕之弟遊黄山寺偶為尋幽出扶笻亦懶拈鸛巢依古塔燕語入虚欄筆下詩初就樽中酒屢添此遊堪喜處膝上一掀髯詠竹閣歲寒編竹閣蝸縮度窮年日暴南窗紙風垂北户簾爐深全火氣鐺小聚茶煙為索梅花笑㣲醺歩矮簷窖嶺道中屨穿蒼蘚滑水複更山重有圃春偏晚無人碓自舂亂雲生峭壁一鳥没高峯隨處桃花發仙源似可逢深院深院人閑酒淺斟日長簾幕自沉沉梅花可是因春瘦洗雨梳風太不禁趙崇嶓崇嶓字漢宗開封人太宗九世孫嘉定十六年進士官至大宗丞有白雲小稿憶昔一首憶昔城南會珮馬輕春風芳華感人心折贈以為容俯仰一相失去若南飛鴻青青女蘿衣蔚蔚石上松嵗寒無夕秀安得長相從願為日月光落君懐袖中三五如循環千里宛可同題彈梟彈梟莫彈鶴惜此孤飛翰鶴舉即千里𣺌在青雲端彈之固無益瘦不充君盤却恐梧桐枝無復棲鳯鸞擬人生不滿百人生不滿百譬如朝露晞白日入虞淵胡不秉燭嬉大耋嗟晷短多憂亦奚為君看𤣥廬道輀車無停時伺晨當及旦佳會當及期故人故人西南風遺我一束詩長哦結幽想慌惚若見之游雲靄層霄聚散安可期虚空聞妙音意重千金貲相思若行月一夕天之涯閑窗穿夣魂碧草春離離美人貎如花美人貌如花獨立古道邊芳年抱幽思豔裔春風前春風固無情桃李終欲言不剪紅豆枝相思獨懸懸適趣賦資在山林適趣非任放乾坤入我牖得此一昭曠雨露日以深禾黍日以長妻兒喜相謂一飽知可望飯蔬適我願此意應勿爽反輓歌二首生人送死人哀哀涙如霰生人閲寒暑冉冉亦如電来去遞相送展轉不可見丘樊謹封殖陵谷猶有變萬古長如斯何庸致深辯死生雖異塗昭晰本一理崦嵫落圓景一訣非永逝達人隨元化生死一劇耳生生常癡𡨕安知非真死死當安吾歸生當適吾意用看雲體上有懸石崖下有滑石道中有觀空人容顔半枯槁坐息窮年歳抱此希世寳雖然欠竒俊塵翳已一掃或云大道初不剰亦不少用力勤修為苦辛坐中老新州有樵人此意極了了穠華穠華侈春艶松栢凌霜雪芳時若轉盼萬族畏銷歇人生金石交所貴在黄髮同衾異寒燠抱藴應未察貧賤張與陳利達胡與越安得皎潔心長年似明月野馬野馬紛驅馳競此光一隙世事若頷髭朝摘暮還出惟應壯與老冉冉如過客嵗寒山上松稍稍見其實詠竹生花竹老方作花清氣應自結結實成琅玕中心抱冰雪世人弗肯食欲獻終不屑鳯凰在高岡音響方節節失題雲臺會功臣際會若風虎獨有嚴子陵垂竿富春渚相求到幽藐相如有平素吾寢惟吾真君意應勿忤歸来拂苔石整我竿上縷煌煌道義間足以照今古春日勾芒暢生意恵風改繁霜日月天清明桃李春輝光庶情悉萌達衆羽同飛翔乗時各有適皥皥齊康莊山人感物化欣惬殊未央回視元氣初萬端一㣲茫我欲觀其㣲因之問鴻荒田家方春事鋤犂晚節多黍稌雞豚樂豐嵗一飽輕萬事少長情熙熙呼喚相爾汝雖無禮節拘氣象應近古先進不可期無懐在農圃一蓮一蓮瓶中枯一蓮池中子結子心雖苦而猶勝枯死賞心一日期詎非得生理君看千嵗樗荒郊永淪棄飲少平生不善飲飲少醉已極恨不如淵明陶陶少虚日桑嵫無停景寸晷足可惜今人與古人展轉不相識孰能制頽齡擾擾竟何益白蓮池上白蓮花秋風洗香雪坐令紅黛皆塵俗一種凄凉不堪折㣲波脉脉露光漙姑射仙人歩烟月征婦怨梧桐葉葉生凉秋燕山早寒已知遒則則力力歎不休堂前月光使人愁停針罷線淚沾裳朔風漸高天雨霜妾憂欲死幸未死未死猶堪寄衣去皎皎皎皎白玉堂有女白於玉門前車馬任西東門裏苔痕四時緑春風撩亂飛伯勞櫻桃花重紅夭夭夜深撲落金剪刀烏龍睡穏蟾蜍高代贈雙綰玉釵垂相逢暗斂眉紅潮初上臉未語兩心知羅韈凌波拂暗塵露桃烟柳不勝春珊瑚枝下重相見曽是鴛鴦夣裏人髙樓曲髙樓漠漠東風塵花鬚落溪生緑雲艶歌美酒消好春千金難解青娥顰燕鶯語言鳯凰意畫空不成天似水潮紅暈臉濃蛾低門前采蘩春正遲進酒行玉槽夜壓葡萄碧石溜寒泉響凌歴水精壺中澂琥珀醉呼酒星下瑶席小鬟春風花滿頭堂堂一曲真珠喉六國三朝春江流眼花落井消千愁難忘曲弱花低繡檻月滿緑楊津一笑領深意過於三月春樽前停妙舞堂上設華裀上客不須醉相將夜向晨幽居不作無輿歎幽居體自胖能貧蔬食足投老敝裘安濁酒融春意青燈話嵗寒外頭無限事忙殺不相干識得識得聱牙字三生拙未除閑居兩疏傳餘事二王書老任衣冠古貧從爼豆疎農人適相告早晚出犂鋤翠雲寺杖屨入雲端天空眼力寛地因山氣濕窗帶瀑聲寒隠几俗氛逺捲簾僧夣殘相逢隠淪者妙語亦飜瀾漢地漢地文書宻窮邊嵗月深但髙蘇武節不察李陵心過鴈西風急荒臺朔氣沉同生不同恨萬里一霑襟地僻地僻逢迎少吾生信杳㝠清談養生論兀坐太𤣥經性拙貧逾樂神清夣數靈亭亭嵗寒友相對眼終青咫尺咫尺越山海其如千里何祗應憐命薄不道賦情多墜綰交枝玉纎圍百疊羅清宵無限思枕席起㣲波臘月臘月二十五人家祓舊年山人無可禱睡着不知天窗前窗前尋丈地種得一株梅明月清風我紅塵不復来失題白玉誰家郎紅粉何處女秀色總堪憐春風宻相許幽意開簾野水聲倚杖青山色幽意在人間人間不相識春朝偶書一夕春歸桃李根清寒猶勒艶陽魂雪霜雨露年年事惟有梅花地位尊淮河水秋風淮水白滄茫中有英雄淚幾行流到海門流不去會隨潮汐過錢塘天寳禁中外庭班退夀王歸别有驕兒侍禁闈解事老奴寧及逺君恩如許政忘機廣寒宫碧海沉沉桂殿幽滿天風露四時秋寒宫白兎參差老一種凄凉各自愁臨汝道中野水平田稻正青肩輿軋軋趂新晴髼頭奴子無拘束牛背醉眠歌太平送還吳山藁萬巻文書一幅巾不將風鑑落埃塵桂花未緑槐花謝獨佩江蘺有幾人移梅鄰家爭乞麗春栽玉手輕分帶月培窗下老翁迂入骨清齋三日為移梅癡猫愛汝斒斕任汝癡了無殺意上鬚眉通宵䑕子喧人睡政爾相忘也大竒醉起醉起西窗日欲斜新煙初試雨前茶川原春意無聊頼開盡桐花到柹花幽齋幽齋宜凊復宜温高卧騰騰百不聞贏得神安無夣事從教黄葉夜紛紛大廷大廷新革晉春秋王氣寧知在荻州泉下髯參心獨快不教司馬恨枋頭有感舞罷歌停嵗月深當時勝蹟盡銷沉飛雲捲雨人争賞留得佳名尚到今倚樓平楚連天獨倚樓樓頭日日望行舟相思飛盡梅花雪江上晴雲片片愁田家雞豚白酒樂豐年飽即高眠不問天少長有恩相爾汝淳風應似伏羲前西施捧心圖詩吳苑風光越水春兩山眉裏笑顰分腹心别有堪憂處狂殺君王藐不聞晚立古徑苔深晝掩關外頭塵土不曽閑雨晴天氣明如鏡靜倚孤松看逺山獨立片雲收雨入西山望極蒼茫杳靄間蕩蕩太虚無一事祗應日月不曽閑譙樓霜滿譙樓報五更道人睡穏幾曽聽金街應有朝天客珮馬禁寒望曉星小窗小窗風定曲肱眠骨冷魂清夣易圓蝴蝶不飛花自落海棠枝下月娟娟小窗對客紙帳梅花自一真小窗對語坐無裀詩家供給惟風月病與詩疎始覺貧清平樂樂府新聲替舊歌沉香亭北醉顔酡牡丹謝後生秋草一曲霓裳已覺多如夣令日日酒圍花陣畫閣紅樓相近殘月醉歸来長是雨羞雲困低問低問獨自繡幃睡穏窗外燕嬌鶯妬窗下夢魂無㩀夢好却頻驚不到綵雲深處無緒無緒紅重一簾花雨更漏子玉搔頭金約臂嬌重不勝殘醉留淺黛暈臙脂淺寒生玉肌待歸来渾未凖疑殺那回書信春又好思無窮捲簾花露濃謁金門春尚淺江上柳梢風軟銷盡玉梅春不管冷香和夣逺脉脉緑窗新怨花勝無心重剪簾押護香閑不捲捲簾芳亊徧春意泄香重一枝梅雪寒透玉壺氷暗結玉奴情更劣似語還羞竒絶妬白憐紅時節酒力未醒雙眼襭一簾風弄月晴意早簾外數聲啼烏有約不来春夣杳鎻窗㣲弄曉江上殘梅未掃葉底芳桃紅小天逺斷雲塵不到過春還草草春意薄江上晚来風惡簾外海棠花半落睡深渾未覺夣想當年行樂新恨暗添金鵲冩就錦牋無處託去鴻天一角清平樂懐人鶯歌蝶舞池館春多處滿架花雲留不住散作一川香雨相思夜夜情悰青衫淚滿啼紅料想故園桃李也應怨月愁風妬紅欺緑輕浪潮温玉鸞袖捲香金􅀢􅝹嬌怯未消寒粟錦衾初罷承歡宿粧㣲褪香彎醉眼乍鬆還困斷雲猶遶巫山南柯子小姝絲髮風輕掠酥胸冷不侵背人小立卸瑶簪一縷柔情繫得幾人心曲檻花方蓓河橋柳未隂紅羞緑困不能禁惱亂東風無計等春深掩笑輕擡袖慵粧淺畫眉嫩晴簾箔玉梅飛門外寒輕疎柳趂黄時綰帶香羅結交釵緑玉枝看看又誤踏青期倚徧欄干心事只春知浣溪沙望海潮泛舟輕雲過雨炎暉初减樓頭片片餘霞曲徑通幽小欄斜護水天薄暮人家暝色趣歸鴉竹風交立玉清透窗紗斷岸漣漪亂萍芳葦遶煙沙依稀畫艇蓮娃掩鮫綃㣲沁急槳咿啞香霧霏㣲冷光揺曵婭紅深映低花天際玉鈎斜磯邊菱唱荅驚斷鳴蛙滿棹白蘋歸去幽興遶天涯沁園春紫陌芳塵煙縷收寒雨絲過雲羡交隂桃葉窗前曲檻認巢燕子柳底朱門回首年時霧鬟風袖褭褭娉娉嬌上春逢迎處儘芳華繾綣玉佩慇懃誰知此際銷魂漫隠約人前笑語温記掌中纎細真成一夣花時怨憶應為雙文載酒心情教眉詩句空悔風流曽誤人慿誰去待寄將恨事兩處平分摸魚兒捲珠簾幾畨花信輕寒猶自成陣一年芳事如朝夣容易緑深紅褪寒食近惟自有斷腸垂柳禁春困𤨏窗深靜悄疊損縷衣凝塵暗掩金斗熨清潤章臺恨凖擬芳期未穏舊遊細把重忖鑑鸞釵鳯平分久留取年時心印誰與問待試寫花牋宻寄教郎認妬香憐粉欲冩却還羞輕顰淺歎字字攪方寸張榘榘字方叔南徐人贊崇禧文室二僊圖鹿皮槲葉容顔枯槁青巾白袍飄然氣貌不同者形所同者道金丹一丸天地同老敬餞劉興伯提幹之官平生子劉子勁氣橫秋霜不肯作短簿海漘駕飛航稜嶒高頰顴碧眼鬚眉蒼鶯花風月夜錦繡傾肝腸諸公盍推轂置之白玉堂筦庫着此士四海空茫茫僕也客於淛雲阡凄故鄉退鷁豈坦率瞽無預文章乗除君晚泰尚欲思激昻年饑僅半菽羞澁無酒漿贐别祗此詩君無誚凄凉登鍾山登髙得勝遊暫喜塵鞅脫林深鳥聲㣲石兀馬足滑一笑立髙寒雙明𣺌遐闊酒酣百慮消世事等毫末送姚提幹行虚齋鎮東鄞從之南容君我初未之識邕翰傾殷勤脩潔以博習秀美而有文玉犀映秋水英辭湧春雲雞距角魯蜀昻然鶴非羣晤言到聖處商也樂所聞最喜直而義壯音駴皷鼖告子少於孟先䇿養氣勛牛山木信美謹勿容斧斤助苗固得槁可使稗不耘觀于所植立真能張吾軍仁義可效治淵源在河汾詩書自師友芝蘭足膏薰剛風接勁翮去去翔霄旻清時有聞者必也吾子云賦山水雪景寒雲凝不飛回風舞霏雪移多山凹平漸釋澗聲咽饑烏噤無語老樹僵欲折薄暮漁舟歸行人稍稀絶詩翁酒力㣲清興𣺌天末夜深有竒事玉樓耿寒月約臺府同官王元敬以次七人登巾山以前峯月照半江水分韻得半字一江貫萬山雙塔抵層漢我来躡勝遊寒日己過半夕陽滿孤村潮勢吞兩岸俯視塵世㣲雲邊數聲鴈題三茅峯巨靈握竒石飛落人間世怒拳一擊破髙下成鼎峙三光發其精五岳借之氣精氣久以靈稍稍見竒異香之為草木清之為泉水天則為洞天地則為福地嶔嶔白雲根怪巧分鎻細龍潛而虎藏猿啼而鶴唳始焉三僊居終也衆真萃至今丹砂光上下數萬里清遊動高吟今古幾騷士搜竒探幽深或僅見一二輸君呼筆神盡發萬古祕我于塵埃中讀之如親履呼兒謹謄藏再拜歸棐几次韻孟師翰鳯兒花滴滴金彩鳯與幽花動植自形色命名取肖似造化何容力丹穴呈九苞夜夢或吐白未若秋中芳榮悴了無迹物理紛以移血或化為碧安知秋草英不作金㸃滴非繇冶者鑄芳葩自光澤誤彼市中攫一過一目逆有懐尤贊府季耑西風約暮雨虚亭得新爽忽焉見崚􅜤彷彿呈萬象誰其伴孤吟寒蛩軋幽響碧雲𣺌佳人抱膝注遐想題劉直孺拙逸軒營營天壌間孰不為智使有美山中君獨與世俗異一真不鑿若大愚四體安然如止水人皆喜君得佳扁我於其間有餘議一隂一陽分動靜江河山嶽判流峙造化而欲辭其勞造化之功亦息矣伊周孔孟心乎民老氏莊䝉忘此世使四君子俱恝然萬古滔滔孰經濟以拙而望巧巧未及成拙先至晦巧而為拙終焉多與巧相值逸者自逸勞者勞天之降材爾殊爾君才足以應萬殊䄂手山林恐非計願君畢力運天巧却换軒名與張子為茅峯崇禧主人景架巖贊王肖岩所冩喜容虬髯如雲眼如月胷次毫端一泓雪政恐儒冠或誤身尚友虚無老莊列松隂泉影緑悠悠此時此意如何説三真跨鶴夜相從長嘯一聲山谷裂贈雲竹一老琴師歌昌黎不作頴師已千古風流隨逝水大音祗在天壌間雲竹翁能發其秘明之為侯王幽之為神鬼悟翁一轉指頭禪萬事冺然心耳廢澗泉淅瀝走宫商仙佩丁當分角徵數聲急羽来秋空夜半西風掠蛩砌諸公不但知此音真欲鈎深得其藝大篇小什分珠璣徃徃不惜兼金餽吾聞南風之歌下舜廊四海熙熙樂平治願翁持此天上頭一鼓解民愠再鼓阜民財勿作區區自豐計題錢則父凛對軒軒有老檜竒甚老紅落盡蒼苔院萬物隨時自流轉蒼然古檜夜窗前獨抱寒姿聳孤榦幽人丈室空無埃風聲月影共徘徊樹兮人兮兩清絶不然君肯居此哉題金淵緑净亭慿髙四望天沉沉平蕪逺樹横夕隂碧雲吐吞獻竒象迺知造物得我心漁舟兩兩疊烟棹白鳥出没滄波深悠然呼酒納幽致須臾寒月照古琴第一峯詩原注顛倒一七體穿雲踏月登茅嶺一陣西風吹客衣松儼立兮如伏山週迴兮若幃竹泉清可鑒苔石坐忘歸鶴唳空靄猿啼翠㣲白露下碧烟飛適意忘機歔欷凄清露重月明紗㡌濕裌衣輕路險僕倦石危馬驚近市火數㸃出林鍾一聲客子征鞍暫解仙家雲關未扄濁酒三杯投倦榻夢回畫被冩吟情雪後呈邵堯章權尉刮地風成陣漫空雪作團侵陵詩骨瘦開拓酒腸寛入竹寒聲細緘梅冷艶乾長官何太喜農事正相干半年半年留鶴邑嵗晚倦重游雪柳帶春意煙蕪生暮愁怕看新鳯厯忍拂舊貂裘莫道知心少相親有白鷗華亭道間移船過九曲滿袖貯西風木落山容老荷枯水面空客懐詩句裏時事酒杯中莫聽雲間鶴寜呼天外鴻題雲間皎上人扄緑軒藂竹傍幽亭蕭然一畫屏色欺春酒碧光映夜燈青雨葉供香潤風枝揺夣醒却嫌千畆闊浩𣺌緑難扄題黃岩黃山樓樓俯澄江碧山宜四面觀壓波橋影闊帶雨櫓聲寒客夣因詩醒歸心得酒寛虚懐納幽致濕翠撲欄干相公新創雲山觀於州治之東詩以頌之華榱勝㮣實相兼却笑滕王詫棟簾海内一雲髙出岫江南列嶂杳平簷作霖錫命宜爰立維石興歌正具瞻寰宇固應同徳宇共期羮鼎試梅鹽帝城帝城那得見秋容秋在三吳澤國中蘆未著霜花己白蓼宜近水影偏紅一行落鴈低南浦萬㸃棲鴉起北風安得畫師模此景釣魚磯上着詩翁半年再作華亭客每喜輕㠶得順風白水涵秋千頃淨清霜粲曉萬山空蹔時放浪如塵外憶昨經過似夢中濁酒三盃眠未熟不能平處枕邊鴻次韻金陵趙民曹原注與装水閣即事尚想溪亭跨鴨頭市囂到曉不曽休角聲吹斷老梅月橋影壓飜寒葦秋三語固知非昔比十年不到使人愁老来著脚茆峯下相望何殊風馬牛再用韻呈相公等囿乾坤造化中此花珍重殿春紅矜持不受荼䕷月披拂正須楊柳風三詠品題真入妙獨慚屬和未能工㕔前舊本今應在何必移根江以東和澄齋劉制幹過蕪湖渭陽宅有感韻興言陟屺駐征艎丘水依然亦故鄉萱草夢寒詩思逺梅花月冷角聲長暫辭小隠從三聘况值清時已一陽朝籍漸通恩數洽㑹看梧檟發幽光留别耘業林逢吉飯牛翁鄭簡子天台山下兩詩仙剪霧裁氷五十年耘業三間千古意飯牛數集幾人傳半江明月曽同賦一段清風豈偶然匹馬衝寒西驛路碧雲苒苒思綿綿奉和魏提幹騎鶴樓前奏宓琴朅来又作海山吟碧雲不隔鄉關夢白髮能灰客子心愧我抗塵徒走俗羡君博古更通今新詩清響傳空谷擊節長歌到夜深登蘇臺用袁憲韻贈兩趙提幹原注汝積㓜聞勝賞多從暇日違眼中朋友欲星稀退休不復思三顧能賦猶堪廣七依遊鹿臺前空逝水栖烏曲裏只斜暉書生懐古真癡絶看盡閑雲入棟飛窗上窗上月朦朧香芸鼻觀通了無梅竹影猛省在舟中題啄蜂雀井團雀二圖游蜂從何来饑雀巧相遇誰其釋紛拏放汝採花去日暮投荒榛吻利腹良餒爾竟何所爭固結不可解鴈聲鴈聲恰值到江東霜影空濛落晚篷寒著蘆花禁不得一層晴雪亂西風春吟四絶岸草不知縁底緑山花試問為誰紅元造本来惟寂寞年年多事是春風沙渚清泠薄葉水野亭和暖杏花風此中佳趣無人會牛背斜陽卧牧童花露半乾紅入户竹風㣲動緑侵床翠屏殘夢不知䖏幽鳥數聲春日長香鼎灰寒午夢回閒情誰與夢徘徊杖藜信步穿幽徑一陣野芳何䖏来送賔書記自揚歸吳門一葉黄蘆渡𣺌茫誤隨野鶴上維揚角聲吹斷梅花夢依舊楓灣半葉霜聞杜䳌流落江南帝魄癡年年啼到緑隂肥蜀山邈在青天外只勸人歸不自歸勸農二絶善端天賦本無殊力穡之餘好讀書莫訝勸農因勸學須知公相起犂鋤長官誨汝亦諄諄須信民生總在勤試誦殷盤豳七月詩書即是勸農文題包虎正眎眈眈怒作威西風揺毒上牙鬚山翁祗作丹青看馮婦從教自下車日日紅林飽血腴尚將餘力咬枯株髙亭素壁黄昏後疑有悲風落坐隅咏十月桃原注夢中得一樹春風怨落暉之句覺而足成十月桃開三四枝凄凉時候見芳菲小紅不著黄花蝶一樹春風怨落暉騎鶴仙擁麾猶願富腰錢千古相傳跨鶴仙莫笑昔人空覬望後来人欲更熏天題稅軒新築送青亭四首花木中間着小亭簷虚不礙兩峯青數聲啼鳥閙中過不似家山子細聽日抱吟情到此亭捲簾孤坐看雲生詩懐恰與雲相似一㸃悠然度太清白雲盡䖏青山小紅雨飛時緑樹新佳致仗誰同管領野禽啁哳話深春日移花影上疎簾香鼎燒殘逐旋添春事已隨詩入夣一庭芳草緑纎纎題趙子固水仙圖紫府川妃夜宴還玉盤金椀落人間香肌不受緇塵汚依約風前響珮環秦淮徃在秦淮問六朝江樓只有女吹簫昭陽太極無行路嵗嵗鵝黄上柳條至後二日登狼峯江流不盡天連地山意無窮春復秋多少詩人無分到我来三月得重遊聞春禽萬疊雲山擁翠屏筍輿終日面山行幽禽上下好音語到底不知誰命名江湖後集巻八
