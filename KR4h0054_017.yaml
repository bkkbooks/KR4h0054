body:
  text: 江湖後集卷十七宋陳起撰吳仲方仲方字季仁霅川人範七世孫仲孚之兄也著秋潭集今輯自永樂大典散篇者惟詞若干闋名虛齋樂府鵲橋仙富沙七夕為友人賦翠綃心事紅樓歡宴深夜沉沉無暑竹邊荷外再相逢又還是浮雲飛去錦箋尚濕珠香未歇空惹間愁千縷尋思不似鵲橋人猶自得一年一度漢宫春次方時父元夕見寄投老歸來記踏青隄上三度逢君寒忩冷淡活計明月空樽紅紅白白又一畨春色撩人誰信道間中天地園林幾見成塵今夕偶無風雨便滿城簫鼓來往紛紛鼇山寶燈照夜羅綺千門珠簾盡捲看娉婷水上行雲應自笑周郎少日風流羽扇綸巾木蘭花慢漳州元夕玉梅吹霽雪覺和氣滿南州更連夕晴光一畨小雨朝靄全收人情不知底事但黃童白叟總追遊駕海千尋綵岫漲空萬點星毬風流秀色明眸金蓮步度輕柔任往來燕席香風引舞清管隨謳何曾見癡太守已登車去也又遲留人似多情皓月十分照我登樓永遇樂七夕和劉隨之雲鴈將秋露螢照夜涼透忩户星網珠踈月奩金小清絶無點暑天孫河鼓東西相望隱隱光流華渚粧樓上青瓜玉果多少騃兒癡女金針暗度蛛絲密結便有繫人心處經嵗離思霎時歡愛愁緒空萬縷人間天上一般情味枉自錦箋囑付又何似吹笙仙子跨黃鶴去夜飛鵲七夕和方時父韻微雲拂斜月萬籟聲沉涼露暗墜桐隂蛾睂乞得天孫巧愔愔樓上穿針佳期鵲相報到年時此夕歡淺愁深人間兒女説風流直到如今河漢幾曾風浪因景物牽情自是人心長記秋庭往事鈿花剪翠叉股分金道人無著正蕭然竹枕練衾夢回時天淡星稀間㺯一曲瑤琴沁園春自鄞歸賦客問吾年吾將老矣今五十三似北海先生過之又過善財童子參到無參官路太行世情滄海何止嵇康七不堪歸來也是休官令尹有髮瞿曇千巖秀色如藍新著箇樓兒恰對南看浮雲自在百般態度長江無際一碧虛涵荔子江珧蓴羮鱸鱠一曲春風酒半酣憑欄處正空流皓月光滿寒潭賀新郎送鄭怡山歸里載酒陽關去正西湖連天煙草滿堤晴絮采翠擷芳遊冶處譍和嬌絃艷鼓看栁外畫船無數萬頃琉璃渾鏡淨陡風波洶洶魚龍舞談笑裏遽如許流觴滿引澆離緒便東西斜陽立馬緑波前浦自是蓴鱸高興動恰值春山杜宇謾回首軟紅香霧咫尺佳人千里隔望空江明月橫洲渚清夢斷恨如縷張輯輯字宗瑞履信之子馮深目以東仙故又號焉有欸乃集朱湛盧序其詞云東澤得詩法於薑堯章世所傳欵乃集皆以為采石月下謫仙復出不知其又能詞也今輯自永樂大典散篇者只詞若干首名清江漁譜憶秦娥有寄春寂寂畫欄背倚春風立楚山無數暮天雲碧琴心寫遍愁何極斷腸誰與傳消息當年情墨淚痕猶濕浣溪紗夀老母夏果初收喚緑華氷盤巧簇映金瓜荷香飛上玉流霞明月長留千嵗色蟠桃多結幾畨花誰知羅帶有丹砂霜天曉角日暮暮天雲闊懶泛琴三疊恰有梅花相伴忩兒上一枝月憶别恁時節吟情誰共説欹枕偶成清夢畫角曉更愁絶臨江仙望廬山迢遞關山身歷遍煙霞勝處曾遊九江江畔繫孤舟匡廬如畫裏南望插天浮瀑布香爐齊五老層層爽氣陵秋何須魂夢覔瀛洲雲松終可卜我與謫仙儔洞仙歌代夀張辰川蓮舟玉字得真人親授圮上家風又還有問因何五馬踏月雲臺秋色裏却賞煙霞袖手酒邊聽説劒歌舞升平方許君為赤松友任濁世紛紜海水揚塵再相見雪髯依舊且嵗嵗中秋後逾旬更半月東籬菊花重九滿江紅題馬蹄山壁原注豫讀書晉王伯遼馬蹄山居雨中欲訪道會稽山空鶴寒落葉自語大書此句於碧崖丹壑間以堅歸盟醉髮吹涼但拂劒狂歌而已倩誰問九霄黃鶴便曾來未玉女忩深松晝靜研朱重點參同契記前回赤水得玄珠驪龍睡空擾擾人問世除學道無真是把洪崖肩拍挹浮丘袂朝駕長風滄島上夜騎明月青天際更幾時回首舊山川三千嵗東風第一枝代夀李夫人雨蘂方桃晴梢漸杏東風嬌語弦管愛香簾約餘寒喚舞袖翻嫩暖紅顔清健舊墨竹扶疏手段且碧窗寫就黃庭畫楫海山開卷春自好得花不淡花又好得春不淺曉鶯瑤佩秋生月蘸翠尊波滿長逢花處笑西母霜娥偷換要日邊爭看貂蟬綵侍更迎宣勸瑞鶴仙夀趙右司栁風雙燕語問有誰留人岸花去櫓星辰快平步俯圜扉草色青青如許兒童擁路玉豁邉當年杜母料從今指點山川總是繡衣行處回顧東堂深窈楚帖長春竹尊清午紅雲帝所搖佩玉更容與把蓬萊一笑幾畨清淺緑野為花作譜向花前三疊琴心看蒼鶴舞綺羅香夀趙太卿欲雨涼生初弦月在畫戟香中清嘯旋種芙蕖深夏木蘭芳沼銀漢入天鏡攙秋福星度雪欄爭照又誰寫萬幅蓴波一江佳思到魚鳥吳兒睂語笑裏要見圜扉緑遍平疇青繞羽扇綸巾瀟灑玉貌長好問千年慶會風雲政此日靜春花草更弦管非霧非煙鶴聲簾幕曉沁園春豫頃遊廬山愛之歸結屋馬蹄山中以廬山書堂為扁包日庵作記見稱廬山道人蓋援涪翁山谷例黃叔豹謂豫居鄱不應舍近取逺為更東澤黃魯庵詩帖往來於東澤下加以詩仙二字近與馮可遷遇於京師又能節文號豫東仙自是詩盟遂以為定號十年之間習隱事業略無可記而江湖之號凡四遷視人間朝除夕繳者真可付一笑對酒而為之歌曰東澤先生誰説能詩興到偶然但平生心事落花啼鳥多年盟好白石清泉家近宫亭眼中廬阜九疊屏開雲錦邊出門去且掀髯大笑有釣魚船一絲風裏嬋娟愛月在滄波上下天更叢書觀遍筆床靜晝蓬忩睡起茶竈踈煙黃鸖來遲丹砂成未何日風流葛稚川人間世聽江湖詩友號我東仙賀新郎代夀趙饒州緑蔭涼尊俎映雙旌飛翻新帶日邊恩露千里湖山添鮮碧玉宇光浮眉嫵料范老應難獨步君亦胸中兵十萬把甘霖小小春東楚江上早一犂雨赤城霞起連天姥有丹經親曾密授八篇竒語道骨仙風騎鯨客合侍紅雲帝所且畫戟清香時度散入邦人簫鼓裏恰春留芍藥叢歌舞歌更誦大鵬賦前調夀湛盧先生鵲喜花間曉惜凝香低將簾捲海棠開早前度登樓清嘯月吹入春風不老後五日花朝方到趂舞羅衣花訊暖撚吟髭玉勒迎東笑留肯住春郵小廬峯青裏壺天好一千春棋聲晝永劒光雲表綘雪驪珠看丹轉金鼎龍盤虎繞且未可飛仙蓬島河洛煙蕪眠狐兔握風雲辦此升平了却共我拾瑶草江湖後集卷十七
