body:
  text: 江湖後集卷十三宋陳起撰曾由基由基三山人題畫梅水仙山礬三友圖野梅清靖節水仙韻坡公山谷秀而野厥有山礬風陶蘇黃三君時異風味同後人思典刑寫入畫圖中贈貴官家小姬小蠻初按曲趂拍入涼州宫羽偶失次回眸顧部頭部頭色微嗔靣赭含嬌羞低鬟語同伴周郎曽顧不用坡仙鬱孤臺韻送鄭繡使還朝人人羡登仙去作上界遊誰知世蒙恩公其晦叔流衆芳正回春一葉偶似秋靈修豈數化宿莽休檻洲却憐貪榮人前後幾蜃樓策今陳洛陽原注時上封事疏肯諛滄州原注曾南豐久在外滄州疏太諛閶闔浮雲開臺閣清風留所期共推慶厯車可復偏重元祐舟賀林正字道山羣玉聚前輩説乾淳近代豈乏士清時賴有君誰傳艾軒𣲖喜得嫡孫親所欠非榮進名流萬古芬遊益公平園懷宜春周宰頌詩丞相非嗔客名流每舉樽魚烹惟沼在鶴化有軒存惜欠堯夫子幸生夷簡孫原注宜春宰乃益公侄孫平泉落誰手文獻説平園病起幽園檢校病起無情緒池邊日幾回蟲聲低覆草螺殼細生苔暑退蘆將變秋殘蓼續開久消環繞迹全若未嘗來送廣西鄭經幹并簡經略五嶺宜人地君今捧檄行但拚窮徹骨不到黯無聲婉畫從違裏編氓休戚情祖筵誰執爵三祝石先生古寺殘經間竹几瀹茗供花瓷法窟寂無語禪容晚帶飢蟲縈道子畫蛩響外孫碑風定聞踈磬玄關却自知趙嵗寒昆季三人拉李學諭余同遊南湖次嵗寒韻紫麒麟楦豈身榮腹有詩書氣便清野酌雅宜招勝士貴遊大半是宗英主翁舊有登堂約古樹今知夾道迎賸欲索梅同一笑却隨畫角㺯初更宦轍宦轍馳驅塵滿襟解鞍呼酒小登臨天垂碧處秋江淨山弄紫時西日沉韓記合還渠老手王詩似不要新吟撑天拄地吾儒事過耳飛禽空好音與中朝故人自憐骨相太邅迍為米折腰依舊貧古史多看多警省新詩愈改愈精神與遊造物真知已怕説天朝多故人蘭菊有時忙不得世間桃李幾畨新胡講書赴張國録講席之招良月也初日融霜泮水清鵠袍翔集宿中庭先生有道如陽月太白占祥聚德星安定重來闡湖學橫渠端坐講西銘自憐一唯無傳久避席何時覿典刑送玉堂守永嘉衮衮諸公塞要津獨當椽筆演絲綸久陪清禁聊均佚誰道明河不可親畿郡喜迎賢太守帝旁却欠直詞臣逸才畢竟九天憶應謂禁中須此人余秋責余不歸責之誠是也余非敢忘鄉井而答以是詩兔狡應多穴狐妖解首丘一巢鳩樣拙何計老莵裘西湖氷合忽見小舟四望黯同雲平湖墮銀漢一葉栁邊來應是寒澌泮嘲蠟梅孤芳不被雪霜欺占得南枝最崛竒氣骨不凡風韻少吕醫初見退之詩聚景園追涼五雲縹眇護簷牙不是尋常富貴家樹樹風蟬涼意足衣巾時復墮槐花題昌黎傳後唐治百年生退之行藏端的係興衰三書何用干時宰天使斯人欲有知題潘庭堅樂府後奉簡陳僉書性靈底物堪陶冶郢曲彌髙和彌寡錦囊勿使六丁偷會有昌黎賞東野晚思風號谷應樹聲喧隂雨瀟瀟南北村倦翼投林舟宿港滿懷秋思立黃昏題陳陟屺寺幽泉落竇碎瓊聲疑是朝天環珮鳴繞寺杉松皆雨露不應秋葉似恩輕題御愛牡丹天香不數魏姚家玉砌雕欄護綘紗聞説弓旌遍巖穴憐才應是勝憐花王諶諶字子信陽羡人有潛泉蛙吹集上之回蠲吉辰薦明廷祇中壇賔萬靈醮祠夀宫禮太一東祀天孫西太室靈芝寶鼎胙元封親郊雍畤回中峯中峯絶嶮天所劃百神驅導平如席雲髾秀革髙拂空翠輦玉鸞鳴霹靂試憑蕭關望朔方月支稽首樓蘭降復朝獨鹿狩鳴澤芬樹羽林歸建章建章壁門春晝永井幹泰液多遊幸千秋萬嵗奈樂何幾度鸞旗出安定張守送酒次敬字韻作詩謝之遊北山有客可與遊闕酒得無病豈意四從事過我不待請洗杓挹風度免慙林花盛公學此味如渾厚兼醇正公量虛谷如有來良善應肯分兵厨瀝少佐筆力徑罷營杖頭錢徐取松間徑登臨舊能賦七發踵枚乘此興老來衰西日尚餘映風怒雷再鼓雲破天一鏡山花下野鳥詩題一堪命府公文章伯聲稱聳羣聼明朝倒錦囊非是庶所訂豈伊綵鳯鳴而聆露鶴警定知謝東山凡百易子敬黃雀詩畢逋秦氏烏差池吳宫燕秦人挾彈巢若危吳宫遺火巢空散不知野田雀終日茅簷角卑棲俯啄蓬艾間不畏鷹鸇與繒􅗤贈茅也休逢人説也休舉世任沉浮清磬野雲曉素琴山月秋詩材頻料理世事不經求每向滄波上時時戲鴨鷗覿面秖談道知音不和詩盈樽清竹葉圍坐古梅枝煮茗雲生鼎抄糜雪滿匙張山山木落何日又追隨贈括蒼季此翁君來古括州吳楚一節遊衣染匡廬碧詩清雁蕩秋山行尋隱逸野坐傲公侯不欲携書獻文章生古愁次韻謝惠山村送水仙自是神仙客梅花亦讓青緑垂雲葉重黃映雪花輕襪小凌波穩杯斜帶露傾一枝來贈我吟几覺春生早行曉入荆溪路西風快似刀雪深埋樹腳水淺見溪毛嵗序相將换人心只自勞牧童牛背卧令我愧兒曹送薛端夫赴武學赴舉溫然如美玉文以武兼之發鏃妙穿的揮毫不待思行途多早氣參學已秋期捷報重陽近黃花泛一巵煮筍桉有磨人墨囊無使鬼錢難教典班史只可折花鈿破屋日多雨頽簷夜見天山童因煮筍庖下始生煙飯罷飯罷扣松關襟懷分外寬凍雲深擁寺寒瀨淺鳴灘苔剝碑文字香縈古篆盤尋春難著句為怕起愁端雪意猶商略溪雲半有無短莎眠野犢枯樹點寒烏牢落詩仍在蕭條嵗已徂過門人挽住相倩寫桃符栁絮解作漫天雪終成滿地灰行空無罣礙入幕任徘徊巧趂蜂鬚去輕隨燕翼來顛狂渾不定飛舞過樓臺北林經行到北林此地轉驚心小市魚蝦貴荒村竹樹深帆檣侵栁影罾屋占溪隂詩罷還飛去沙鷗識苦吟宿北山兀坐苦無營乘間偶訪僧山深雲作伴庵逈石為朋古木含蒼蘚幽花落翠藤昏鐘三扣罷童子上香燈四壁靜無人翛然夜不驚龕燈光熖薄紙帳夢魂清有月山猶暗無風松自鳴結茅終隱此髙枕待升平入邑馬踏新松影衣沾秀麥寒藤花綴纓珞竹筍透琅玕詩向間中得心因靜處寬一聲幽鳥囀深在翠林端野蔓侵沙徑山泉渡口梁樹頭蠶椹熟籬下雀梅香人與春光老間隨日影長撚鬚吟不就窮殺孟襄陽題禇道士雪巘詩卷五言與七字句句總清新但得詩囊富何憂客路貧梅花一巘雪瑶草半岩春著我司盟去吟邊養病身酬趙懶翁求墨會面苦無因緘書意亦勤相望七十里僅隔一重雲有句來求墨得詩如見君從知相憶夢花下擬論文道傍廟荒祠存玉像畫壁剝蒼苔額古名難問村空祭不來亂鴉號古木鬬雀罥浮埃猶有人求珓西風動紙灰生日又是逢初度紅稀緑暗時自斟生日酒間理去年詩活計惟書在衰容只鏡知人情與天道翻覆似枯棊旅中述懷未晚僮先卧無聊自展衾一燈愁裏夢數首客中吟鄰舍誰歌曲譙更逺送音秋風催素髮憔悴滿華簮到此到此添離恨垂楊已拂肩擔輕緣少鏹衣暖欲抽綿春事遽如許客懷殊未然竹籬沽酒市雨濕杏花煙乍歸去日猶殘雪歸來夏氣清間隨白雲出看到緑隂成野色供詩料山光快客情路逢鄉父老駐足問行程過山家此地知誰隱當門列翠屛栽花多是藥題壁半書經栗鼠咀紅果山禽墮翠翎峯頭冝眺望只欠小茅亭簡劉吉父長安為客者皆是利名人只有君同我惟添病與貧秋風籬下菊夜雨水邊蓴擬共租船去歸家趂小春簡章伯和論交三十載彼此坐詩窮只恨性各别其他心盡同茶苖封榖雨書葉寄蘋風無限懷君意鶯聲緑樹中舟行即事釣艇橫溪水漁罾搭槿籬年豐翁自樂酒熟客先知涼吹生蘋葉斜陽戀竹枝苦吟渾未就倚柂立移時答章伯和問疾伏枕屢經旬醫庸藥不靈自從春意動才覺病魂醒露洗桃心赤風楷栁眼青勞君相憶夢每夜到巖扃贈筆工試子玉簮筆他工總不如毫長宜貯墨管淨可抄書汝自誇淮兔吾猶注魯魚鬢毛斑白盡心折正緣渠吳江橋松江期一到二十二三年今日身臨此憑虛骨欲仙塔連吳苑樹帆帶洞庭煙見説鱸魚美囊無斫鱠錢招玉淵欲言非一事曉夕待君來吟屋新裝辦間門未敢開春光歸巷陌山色入樓臺猶有梅花在相期把酒杯題詩僧亞愚眉白集向來已觀集今見自吟詩天下有清論僧中真白眉淡如秋水淨濃比夏雲竒慎勿輕拈出常人罕見知到李山寺䇿杖扣禪坊空山草木長殿荒人晒席僧去佛無香榆樹苔衣緑松花粉穗黃兹行無伴侣獨自繞修廊為簡上人賦古色軒簡師得道不參禪燕坐常居古色軒夏禹告功遺迹在任公垂釣有車存海通泉洞深千尺寺映重巖月一痕何日短笻塵外去瓣香來此叩玄門小舟咿啞渡橫塘十里秋畦粳稻香莫怪雨聲驚客夢要催詩句入行囊重過蘋水波浮緑遙見菊籬花正黃佳節莫論重九後艤篷獨酌泛茱觴虎丘原注晉王珣故宅在此五百年前吾祖宅雲孫從昔未曽經山藏古寺忩連碧水繞平田稻正青臺染夜雲微帶潤劒涵秋水尚餘腥僧堂借得羊毛筆自蘸寒泉寫石屏逺出乍歸五旬行李經吳越四月風光正惠夷緑水悠悠晴脈脈青條總總實離離飛來何處雙黃蝶呌徹他山一子規却把間身成倦客關心書几晝長時簡吳若清絲桐挂壁戶常扃雅弄深防俗耳聼滴露研朱重點易焚香炷火細翻經山含晚色千峯紫松傲新霜一𣲖青獨向巖扉抱髙隱有誰能識少微星舟行前靣人家是畫圖數間茅屋映菰蒲濛籠雲裏羣峰出欸乃灘邊一棹孤嵗熟農人還自樂天晴水鳥競相呼絶憐兩岸垂絲栁比却來時一半枯次嶽尚書韻細字書橫雙眼明破窗閲盡幾隂晴年來干祿渾無夢老去吟詩尚有情謾向紙田耕石硯斷無金縷侑銀觥和篇聊博先生笑應笑寒儒太瘦生寄王仲衡尚書世態翻雲覆雨間令人合眼夢還山生平名義入肝膈嵗晚師門要面顔鷗鷺波寬雖有約鳯凰城近可容間留年看試調元手未擬安仁賦拙艱歸山特地捫蘿入翠微楊花故故點征衣遊人盡逐暮光去野老獨擕山色歸擬泛銀濤浮浩渺難尋玉貌問芳菲吳亡越伯渾休問且買清樽送落暉留山庵遙山一望青如染到得山邊却不青松徑有風常自掃巖扉入夜不曽扄燒殘柏子重添火沽得村醪旋倒瓶却羡山僧無一事日長簾下自翻經病起連日新晴愜病懷跧藏一室絶纎埃出來未得寒猶在窮不奈何春又回酒盞慚踈朋舊少紙簾不為俗人開日長自有間工課汲水銅瓶浸古梅借樓借得小樓聊寄迹夜深猶自未扃扉鼠搖暗壁驚人夢螢度破窗粘客衣舊隱圖書從水泛後園松菊與心違思量應被沙鷗笑煙雨滿船胡不歸題雲海亭二十年前曾到此重來又是晚春時蘆因水長全然短山被雲遮分外竒漁艇添成古圖畫鴈行點破碧琉璃布衣憔悴江湖客間倚欄干自覔詩秋風去年相遇釣魚磯今嵗飄飄又入扉渡月薄侵蟾冷拂雲輕助燕鴻飛逗遛餘響驚殘夢催促新寒上夾衣欲把絲桐傳此曲破琴絃斷損金徽泛苕溪六幅蒲帆去似飛浪翻新漲緑沿堤一川水墨王摩詰十里鶯花杜牧之雲繞楚宫春雨後煙籠秦樹晚晴時人生來往情何極江北江南酒一巵遊善區寺間來古寺欲忘歸無奈征塵染素衣緑葉雲稠荒澗水白雲青濕舊禪扉窗涵逺色明丹篆鐘冒嵐煙入翠微盛世登封今已矣斷碑無語對斜暉友人招飲故人邀我共清樽躡屐歸來已半醺無限雨聲供醉筆一窗燈影共誰分銅瓶火暖鳴天籟寶鼎香殘拂岫雲今夜夢魂清更甚扁舟冷伴白鷗羣入山入却山來事事宜眼邊何處不關詩風飄花片上書册水浸山峯入硯池酒欲飲時斟易盡碁當勝處著嫌遲箇中自有無窮趣莫遣兒曹取次知送墨與則上人遣送書齋小淨瓶麝煤藏久帶芳馨難書八萬四千偈只寫多心一卷經苕溪舟次扁舟煙重冷漁蓑兩岸人家浸小河芳草自生春自老落花隨