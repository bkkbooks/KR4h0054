淚霑衣長嗔失意同寒飢今日衣擁淚翻怨得意由輕肥炎涼世態得失間怨君却悔嗔君時夢遊月宫原注壬辰省闈已中而黜因賦此蜿虹絳彩垂霄路白波渺渺散寒露橫空擲綺結飛梁靉靆青雲匝風御揚金排玉水晶宫鸞佩霓袽笑相遇兔停玉杵取玄霜吳質無端強猜妬窺見腰中三尺氷便疑斫却婆娑樹桂香廣陌不得留灼灼修娥謾回顧天孫飛梭織氷紈帝子吹笙濕香霧笑指瑶臺十二層只怕結鄰未相許瀲灧金樞煙水寒會駕飛輪撇波去過橫逺途中蠶桑事已過耕稼老農勤橋斷荒村雨山埋半嶺雲小松穿石出野水落田分茅店傾醨酒相看亦論文病起事業書千卷生涯菊一籬約居慳問卜多病頗知醫看鏡癯添骨挼髭笑解頥閉門方得趣不誦北山移送洪宰西歸少歌漁春渡是日風雨送客來孤店踈軒竹數莖歸帆出煙雨羣吏立沙汀似我情何悄如君事最榮待無雲隔岸須看逺山青寺深寺深幽寂寂四月似秋天夜久聼山雨晚來添石泉斷巖風嘯木踈竹鳥棲煙鐘鼓林梢動空堂已罷禪安仁樓間晚晴時送默齋伯回星江已是悲秋客那堪送逺人亂山殘照慘落葉晚風頻去恨隨帆逺回頭轉意親明朝相憶處鱗鴈達情真呈豹林伯進齋表叔曲徑禪房午幽風動古林泉聲落澗靜磬韻隔雲深空谷留禽語青山洗客心頓然忘俗想來此不妨吟資政入村造夀器謾賦功成身退從來少緑野超然洗俗埃間出西疇營六檟勝傳南極映三槐迎門村婦㩦兒拜遮道田翁帶犬回競喜鳴珂歸舊隱爭如鷗鷺不相猜八月初五日有懷舊事看來擾擾總何謀且把行藏用酒酬籬菊趂隂移别徑江楓向晚落行舟秋蟲在壁催人織歸燕辭巢戀主愁今日去年風物異錢塘還在望山樓題蕭季賢雪澗軒避喧寬結小茅廬庭竹栽多引鳯棲滿地松叉風嘯木隔忩漁艇月涵溪歸鴻目送雲間失賀燕巢成棟外低料想春殘曾有夢謝家芳草緑將齊呈陳介叔青帝東來駕綵韀燒燈過後少晴天逢春已辦穿花屐阻雨先尋載酒船但覺野雲生樹外不知溪水漲灘前落梅有恨香還濕不得飛來傍舞筵春日書景狼藉殘梅滿地香遊蜂終日趂晴忙芳堤細草鱗鱗緑深院垂楊裊裊黃暖霧未消山失木春風無力曉侵裳眼看景物關情甚亟把詩吟送一觴冬晚簷樂無風靜自鳴開窗亦復使眸醒投林倦鳥低翻翼觸紙癡蠅細有聲籬外半懸紅子落墻間少見緑莎明陽生隂後春來近凖擬新詩為發萌因雨遣興細雨冥冥風頓凄微沾沙路不成泥珠排簷網凝絲重瓊積荷盤壓柄低青草岸頭三月暮黃梅葉外一山迷小塘水滿魚過塹隨浪流溝入古溪春雨遣興靜看何物不關情屋角青梅子巳成巢拂舊塵迎社燕花移新樹欲流鶯寒生簾幕深春雨暖卜園林甚日晴病起無聊休把酒東君去住亦堪驚題汪表叔對袁府起借軒和韻朱門虛老濟川材鏡面芙蕖取次開莫怪偷光鄰士壁絶勝附火乞兒堆拂塵尚欠千尋竹極目何須百尺臺魚鱉不知誰是主也隨流水向東來原注表叔所居面西故云傳聞八月十四日唱名北斗三魁夜吐芒競傳臚唱擢王揚遙知天上輪光滿先放人間桂籍芳失笑月烏空繞匝那知雲鴈不成行姮娥留取十分好萬里清輝分外彰代夀自上黃樞贊萬機曽將謀略定邊陲平淮便放裴公逸去越猶嫌范相遲瀲灧池塘蓮萬朵嬋娟亭館竹千枝居東賸有明農志歸衮應賡七月詩代夀某帥二首當年禁履上星辰便合登庸秉國鈞蓋海旌幢紆出鎮濟川舟楫已知津但從渤澥清沂泗肯把關河自越秦醖釀早成六月雨一朝翻手洗炎塵三年姬衮尚居東官府清平冠六雄仙洞蟠桃紅映日山亭修竹緑梳風已將儒雅安時俗更即人和驗嵗豐儉幕棲身無以頌元龜遊戲出蓮叢夀陳府博三嶼縈紆秀且竒苕華琢采妙工倕髙羅絳帳聲盈耳戲著斑衣笑解頥魚藻留連依水密鳯筒凖擬向陽吹的知梅信傳東閣先訪南宫第一枝代夀帥書三首欲看棠隂續世傳重移星履下鄞川風薰轅戟清官府日暖瀛壺小洞天塞外不傳青海箭幕邊穩泛緑池蓮箇中便是神仙境何必崆洞訪偓佺勳業從來簡帝聰東溟還復奏膚公庭前修竹添新緑洞裏蟠桃依舊紅野渡橫舟人未老大川作楫路將通願觀整頓乾坤手不負當年射六蓬笑談樽俎有餘歡不獨民安吏亦安競喜鯫生兼盛賜那堪鶚表録微官投機已發千鈞弩速化仍資九轉丹青眼相逢尤異處他年翹館舊門闌郊祀慶成詩寶歷登三祀觚壇類兩儀居歆修大報肇祀述前規景迓初陽吉齋嚴一月期采章循節儉緼豫屛紛離輅象停方貢兵驂却道馳殊庭崇祝告太室欵靈娭黃道晴曦麗青郊湛露滋龍常騰旎旖霓羽勝葳蕤列戟森賔衛嚴更警禁帷蒼圓尊上帝黃粹見方祇馥郁陽宫燎芬芳帝籍粢非煙浮羽籥叶氣冒尊彛濟濟鏘圓玉峩峩會采􅋒雲裙紛下逮月璧粲昭垂合奏諧純繹登歌美緝熙二觴勤俟獻虛次迄親祠翊翊靈施佑禳禳嘏致祠招搖回左翿閶闔敞南離侍仗朝紳擁升樓禁蹕隨臚歡皆嶽抃驛赦霈皇慈都號登瑶册追思遺寶龜燕謀端有自鴻祉浩無私肅穆東朝賀登閎宣室釐慶綿千嵗統歡奉萬年巵盛事輝三古龎恩被八維至誠深可卜滿假務深思兢業傳家法盈成保慶基萬方嚴表正九簣戒功虧帝夀齊南極邊塵靜北陲具臣懷美報成命繹周詩送友人黃梅浦逺草萋萋風細孤帆雨後低漁笛一聲何處作故山回首白雲迷憫農條桑事了蒸麻急刈麥人兼種稻歸作苦那能衣食足幾多遊冶厭輕肥謝石庵見示棹歌歎時因以見意蘆花裊裊西風急獨立髙樓聞鴈聲志士最傷秋夜月江南塞北兩般明牽牛花緑蔓如藤不用栽淡青花繞竹籬開披衣向曉還堪愛忽見蜻蜓帶露來舟行鷗鷺灘頭帆卸雨牛羊影外草生煙漁人撒網潮平晚栁岸維舟取次眠靈溪舟中風雨斜風吹雨打篷窗獨棹孤舟向曉江沙岸竹洲煙漠漠青山飛鷺一雙雙黃敏求敏求字叔敏修水人集名橫舟小藁或題詩其後云涪翁之音調朱絃至今草木猶芳妍後來清氣有所屬鑑轟句法非雕鐫蕭崱序以為其各體詩時出入於晚唐亦間似楊誠齋不専主山谷云野塘雜興仕進固所願貧賤亦所憂抱璞不自珍過取則足羞不如寂寞濵橫此野水舟時乎儻可為肯遜伊與周著書俟百世亦可軻與丘進退兩不惡久矣吾其籌地僻車馬稀柴門不須扄晨興正衣冠浣手供爐馨奈此日永何間課離騷經一片蘭茝心千古日月明爾豈乏忠憤所欠惟和平要之仕與止奚必分重輕吾但適吾可不願得爾名别詩人余叔雲萬栁堤邊住挑雲過艾東未應為計左輕去犯詩窮雙屐江湖上清名宇宙中折梅作行供香已破椒紅筆硯無靈久寒檠自掩門虛名何預我漫刺重煩君茶外無祗待詩邊得細論别懷莫兒女相祝張吾軍原注時叔雲方赴試書齋新闢書齋鶴柵寬一簾風月儘幽間百年易向忙中過萬事偏於好處慳漫説折腰營斗米何如留眼看雲山只消一卷梅花句留得林逋在世間題陳篔谷陳野逸吟藁謝却梅花吟課少苦無心事惱陶泓得君近日詩編讀增我晴窗眼力明爽似暑風秋九夏清踰夜月晝三更後山衣鉢塵埃久賴有雙英主夏盟豫丙子辛巳兩遊解空寺己亥秋又至思上人徙舊徑自怪石中頓發竒觀叔亮弟取山谷詩文名閣曰卧龍巖曰青玉盎山之門曰天下勝處令泳之作𨽻扁為賦七言兩扣雲關記昔曽重來詩眼倍晶明路移巖石中間入人在洞天深處行玉盎虛明添翠色霜鐘清冽帶秋聲與君小摘涪翁句留得青山不朽名涼棚未庚赫日已焚空亭午西齋坐甑同橫竹旋排蒼葉密小窗移在緑隂中情知瑣碎妨新月稍喜牽連得暑風分我清涼詩境界一蟬吟到夕陽紅經理順寧别墅未必餘資辦草廬先從意匠起規模某池宜植荷千柄此地合栽梅幾株怕礙看山墻矮築要寬種菊徑深鋤林泉隨分成幽趣誰計東郊入畫圖書鄭亦山冷淡生活九陌紅塵不肯居㩦家租屋住西湖月香水影賡和靖雨色晴光憶大蘇詩比晚唐成冷淡人如東野更清臞晴窗盡展芳編看一片寒氷浸玉壺遊落星寺星江山水甲江東所到僧房各不同拳石不知何代隕數椽恰占一湖中廬山屏倚朝昏碧彭蠡帆分上下風除却金焦相伯仲其他無此水晶宫栁絮近日柔絲可著鴉又分晴絮落天涯絶無氣力元非雪空費形容不是花便解與春遮去路也添為客重思家雨餘留得間蹤迹緑染浮萍夜聼蛙寄題靈川簿廨存愛堂二首一命如何解濟人細看存字最精神莫専紙上求明愛胸次渾涵不盡春愛無差等墨之徒理一由來分則殊愛只是情仁是性合於仁上著工夫初秋白雲道院檜柏株樟竹與松四山互長翠隂濃逼教秋暑無來路輸與山僧坐晚鐘莫道秋容冷淡加秋英風露勝春葩拒霜巖桂休相遜占得開時各自花間來汲水浸菖蒲淨洗塵埃半點無濯得老根如法瘦養教矮葉十分臞次鄭亦山求茶韻山谷松風賦響湯茗甌今帶六經香君詩莫道窮無對髙出車聲繞九羊原注車聲繞羊腸山谷煎茶詩前輩云黃九得恁窮亦山有君未知人窮相事之句因戲之訊黃乙山於夀寧寺客中聼雨况僧寮盡日無人訪寂寥一枕秋聲供痛快隔忩風裡有芭蕉草草茅亭古木間萬琅玕裏一禪關秋隂只俟風收盡分我浮生半日間水墨水仙玉潤金寒情窈窕縞裙翠帶態輕盈只愁微月清無對更畫梅􅈨作弟兄古香亭矮屋簷前老桂叢清隂分破廣寒宫誰知萬古香無價藏在黃金一粟中鵝黃雪綴碧瑶枝占斷風髙露下時吏散豫方有公事嚼花斟酒古香詩江湖後集卷十三
