body:
  text: 江湖後集卷二十四宋陳起撰陳起起字宗之錢塘人開書肆於睦親坊亦號陳道人寶慶初以江湖詩禍為史彌逺所黥有藝居乙藁見遺書本今葺自永樂大典中補詩五十一首題建溪劉希和吟趣園佳氣滿吳洲琅琅謫仙句當其傲雲月風流良可慕寂寥數百載何人踵逸步建溪有劉侯於吟契其趣是知建與吳妙處同一悟水石巧縈紆烟雲互吞吐花光時變眩山色無旦暮物物可供吟先為梅花賦趙紫芝運幹陋室與高門東西互接畛相聚雖不稠相别殊難忍風帆去程遙到時秋未盡少試禆畫材計臺作標凖恨無雙羽翔汨汨成蠧隱便結南浦夢獨立江風緊藝隱提管詩來依韵奉答君詩如梅花將盡春意函一枝漏泄處踏雪寒曾諳肯踐桃李場溪山還自甘破玉暗香度似親夷甫談我詩如折桐經霜為一空尚可親時髦託根日華宫莫謂背於時㑹在春風中小雨灑清明又是一畨紅藝隱再和復用以酬大藏五千卷齊沐啓寶函强名禪教律心了一一諳向來曾乞食此味醍醐甘拈花飲先笑意會不待談藝隱抱竒偉未可論苦空吾皇樂詢道日御賦政宫㑹看召嚴徐敷奏陛殿中鳴靴踏龍尾豈久蓮依紅送别曾幼廣赴漕試歸匹馬來東吳䇿勳在一戰文場老燕代餘子自北面西風敲鐙歸山應過處戀英氣凛橫槊河海能幾見自識韓將軍論交今惓惓洪扇贈别芮通父春氷幕千絲我箑美無度習習南浦秋受藏憶襲護之子思吳鱗觸熱遙問津舉箑寄薄劣却暑兼障塵荆榛道﨑嶇輕車宜徐徐戴星秣驪駒未午投林廬酌月重來期名言毋重違自嗟君是客忍賦别離詩送賀某赴興化任賀公夢三刀恩榮被詔函家山繄比鄰風俗應夙諳承流復宣化使民思棠甘向來愷悌心今足副時談壺山邈千里旌旗拂搖空是邦足文物教宜先泮宫嗟余病十載置身藥裹中追送不能逺望望晝錦紅呈朱叢瑞囊中五色絲擬將舜裳補玉階遠於天莫睹干戚舞治朝足文物一室自規矩少賤人或欺黔婁况貧窶毋作飯牛歌春滋夜來雨寄題當湖隱渌亭曲徑一亭幽三十六水聚簷影接波光蟬聲入秋思開薸靜看雲愛月懶種樹濠上意如何疏鍾烟外寺對菊有懷東園青女凌波楚江冷庭前一葉鳴金井砧杵誰家試夾衣西風攪碎蘆花影呼童折取籬下金旋汲山泉注古瓶細哦七字延秋色寒香似缺東園清江上子牟懷魏闕離情一動腸千結急呼斗酒破霜螯楚月不礙西湖月答熟庵昨宵約月臨西池氷蟾不至鶉火飛歸來一室白於晝乃是新詩光陸離當年應剖瓊蚌腹不然何以明於燭細窺字字欲走盤三復庵名悟圓熟一片情田萬古耕有年能得幾書經小疵終是未全稔孰若先生耨穫精南窗寄傲遂初欲移石畦蘭更紉菊茶烟細雜玉爐沉研影净涵金井渌林下今才見一人却疑圖任思舊臣自昔東山豈終隱似聞鸞詔下蒼旻送郭聖與就監試歸兼簡其弟楚尾吳頭月光冷山鳥不鳴桂浮影破霜採得蟾邊香蘭菊無言秋耿耿萬年枝外淺紅墻胥山小閣憩晚凉湖波江浪座中接寒篝凝夢歌雲觴明朝忙踏槐花市萬丈光芒生璧水瓜金繭紙市相高兀兀鉤提笑韓子小雁汀沙振寒羽亦復搴衣告歸去近别難甚况逺離一日仙舟隔輕霧信步信步過髙岡隨僧到上方泉浸松徑潤風出稻畦薌地險人誰問山深屋亦藏惜無碑可考創立自南唐三遊錢園併題四時畫圖只因閒未得又慕得閒名一幅無盡態四時有餘情吟清招鶴伴機熟付鷗盟坐久不知晚前汀烟水橫遊禹廟何期來此地重謁告成祠菲飲泉堪酌桐棺事莫知蟾分丹桂影龍矯老松枝拂石尋遺字苔荒大業碑雪中送黃希聲西歸可是歸心急行裝冒雪天向來期重任未可羡先鞭人事虧盈月烟波逺近船明時困英特此别又三年蘭亭歸途山水佳如此都忘客路難鷗明寒渚淨鴈入野田寬事久人多厭心清夢却安獨憐鸞翼逺誰念篋衣單還劉雪坡詞藁誰與分天巧裁成雲錦裳春花籠淡月秋水照斜陽得句皆竒偉知音盡老蒼尚期京國路相與較宫商嘉平旦雪天欲做竒事清寒發化機一雲無不覆萬物盡同輝水合漁烟暝山空獵火微夜窗歌七月三歎及無衣天一孕真精裁成六出霙大聲聞竹折空色助梅清節壯氊甘囓兵竒鶩自驚男兒須事業謾說剡舟明答趙章泉新詩將逺意千里附文鱗清響蟬噓露髙閒鶴卧雲但知耕野水不暇問朝紳賸欲陪顔笑凄凉吳楚分借居值雪已歎長安索米難可禁風雪滿長安無家又是於人借有命從來只自寬春入園林根覺暖色連天地眼生寒西湖寂寞梅無伴合向孤山忍凍看夜聼誦太極西銘六經宇宙包無際消得斯文一貫穿萬水混茫潮約海三辰煥爛斗分天鳶魚察理河洛後金玉追章秦漢前遙夜並聼仍暗味奎明誰敢第三篇挽宣教郎新差通判慶元府王琮前月相遇了無恙小窗畫卷手親開不知翁作仙遊去忽見兒封壙記來寂寂藝居香不斷悽悽松塢韻堪哀客中為灑秋風淚尚想吟魂繞夜臺謁陽明洞天羈游何事復來東豈是三生太史公舞鶴臺空丹蛻井見龍壇古瑞名宫石帆酒甕遺秦蹟玉簡金書閟禹功萬壑松風秋愈壯直將幽意問穹隆雪後青山當户牖雪後非吾有為問謝家池緑波還在否雪中三絶一天和氣到柴門檻內蘭芽也玉溫靜炷衙香誰與伴慈悲大士共黃昏探梅又復負前盟曽念霜風病不禁清曉擔頭和雪買數枝親插供觀音可憐切切度衆生千百年來魄尚靈自幼歸依今老矣濯雲曉汲薦清泠曉寒即事芳意迢迢客夢閒亂紅飛盡曉泥乾薄羅尚怯餘寒在一陳東風剪牡丹趙濟民生日原注雪中見招老病畏寒荆婦獨往小詩奉寄今嵗呈祥殊勝昔六花端為壽筵開小詩聊寓千秋意不得相陪法喜來第三橋詩梅花雪岸去舟單茅屋水田白鷺寒好景幾回吟不得重來無語立䦨干留題天樂寓張氏湖亭沉水香銷一局棊客來淺酌旋分題畫欄占得春多少簾捲東風日未西次黃伯厚惠紙衾韻冷浸溪藤松下月密緘逺寄袁安雪忍蹴茸茸一徑氊依約江行曉時節明逺閣風捲疏烟逺岫分天開一鏡皎無雲衰荷搖落汀洲晚猶舞餘香墜茜裙雪中簡趙德行滕六庭前三致意應翻奚錦報瓊瑶剡梅莫訝山隂棹寒色欺人是灞橋修父知縣萬里寄詩久未能答午枕夢見之覺而有答夢覺疏蟬韵更凄䦨干曲曲柳隂移吳蠶蜀繭繅千尺一種愁機兩處絲夜誦父子跏趺絶似僧青燈一盞夜三更讀殘戴記兒將倦山栗旋煨仍擘橙月下聞桂花一庭人靜月當空桂不多花細細風香露滴衣凉似水恍然移下廣寒宫胡季懷有詩約羣從為秋泉之集輒以山果助筵戲作二疊近詩通譜江西社新釀攙先天下秋已許眼中窺一豹可容杯裏散千憂君家香醪蜜不如試投桃李望瑶琚敢誇所無易所有潘郎一出果盈車詠琴上曹先生清如雅操直如絃此意于今久不傳月冷風髙清禁地只將古調奏鈞天與適安夜飲憶葵窗人在江干月上巵不妨想像一篇詩月來即是葵窗至對景成三憶曩時與葦航適安飲獻酬無算是杯行午酌從容至四更陶母侈於真率約退思無倦若為情觥籌交錯舞傞傞延得嫦娥泛醁波客謂平生無此樂二章聊繼飲中歌早起今早神清覺步輕杖藜聊復到前庭市聲亦有關情處買得秋花插小瓶井亭橋桐花夾岸栁遮山水面誰家燕子還摩利閣邊唐相井濯衣人散暮潺潺分得春禽效香奩體數聲應寄春消息才轉花梢濃緑隔早知襟韵倦逢迎莫遣臨風情脉脉喚渡一帆又是過西陵天正寒時雨欲氷心地自平潮自險回瞻絳闕認觚稜江湖後集卷二十四
