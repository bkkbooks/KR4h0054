body:
  text: 江湖後集巻十四宋陳起撰程炎子炎子字清臣宣城人有玉塘烟水集按寜國府志載程炎水西寺詩云炎涇縣隐士有烟水集應即炎子而志誤脱子字也餞周東巖之石門訪汾陽氏并呈友人漫浪江湖脚周遊到石門能延徐孺子知有令公孫話雨燈輝座醻春酒灎樽况逢朋友在一見必温存四安舟中多行三兩日猶在四安舟天正當寒夜人偏作逺遊風高雲葉動江闊浪花浮㑹得幽閒趣唯應是白鷗山中雜詩側耳橋邉聴聲聲在翠微自甘留此坐何苦勸人歸院悄驚春晝山空戀夕暉得如鷗與鷺對我欲忘機崑崙初鑿破大巧奪天真竹鎖三更月桃酣幾度春山空聞鶴唳溪遶卜鷗鄰為拂留題石松揺露滴身登高感興破㡌西風裏龍山憶孟嘉白衣誰送酒黄菊自開花塞逺書傳鴈天昏墨㸃鴉憑高窮北望何處是中華次郡太守劉朔齋秋晚謁謝昭亭小飲三首鞭揺五馬踏沙隄秋晚除書下紫泥蘚壁篆碑猿捧硯松闗唫句鶴分題裴休故宅今為寺謝朓閑官昔仕齊太守宴歸賔客從数聲山鳥日平西一禱心香雨便晴萬家和氣釀成醺時方入到昭亭路風已吹開疊嶂雲話向禪中參冷淡心於静處息紛紜麥畦邂逅長沮語想徹黄堂亦喜聞掀髯一笑倚危䦨面面青山不厭㸔霜染丹楓秋色絢日烘紫菊露痕乾鵲爐火慢熏龍腦蟹眼湯新㵸鳯團回簇絳紗城郭晚老梅吹角鴈拖寒題如庵脱畧機闗一散人清於蘭畹抱幽馨撫松細嚼淵明句㵸茗閑箋陸羽經春對風光秋對月曉觀雲氣夜觀星世間局面多翻覆着數雖高亦懶聼暮春花飛簷雨恰經旬强半韶華斷送頻三月便晴三十日一年只有一分春酒甘不飲心如醉詩苦耽吟味越真欹枕北窓清夢覺落紅啼鳥伴幽人古梅水邉山脚友漁樵梅欲窺人故故招樹剥龍鱗黏碧蘚枝翹鶴膝糁紅椒詩如老杜吟東閣夢約逋仙過斷橋好待月窓清影瘦傳他神子上生綃蠟梅畫樓人醉燭高燒滴在寒枝蠟未消蘂撇打鶯金彈滑花懸驅雀綵鈴揺歌兒戯拍供檀板妝女輕裁貼翠翹酒掲黄封詩嚼淡時勻乳蜜過山腰水樂洞南山水樂洞窈窈白雲深滿耳笙歌者誰能一洗心歸日去時雪學楊花舞歸日花如雪様飛何事楊花并雪絮送人西邁送人歸登新安五嶺五嶺﨑嶇一歩難白雲兼霧羃中間行人莫道山多險更有人心險似山天台陳山夫寄别用韻斷烟荒草共幽幽斜雨抛絲織晚愁鷗鳥似知人乍别飛來飛去渡船頭劉植植字成道永嘉人安上曽孫有漁屋集送周知丞之官桐廬潮滿桐江上秋風洗印時字民知最近占位莫嫌卑紙尾書名大松邉得句遲定懐東閣老無復寄來詩梅欲問孤山訊蹇驢行曉晴一枝籬外見數㸃雪中明太潔難為友群芳讓作兄何如伴高隐豈必盡調羮送周子餘赴松陽簿長松雖劇縣主簿却優閑溪淺清見石齋空静對山吏嚚嫌訟省郷狹覺民艱獨稱詩人意行吟苔竹間琵琶亭下問舟西亭問津處白傅此曽遊無復錦絃曲空停估客舟抛江春浪静傳柝夜烽收最愛廬峰峭相随過别州重遊仙巖觀瀑四山雲霧重况復值梅天瀑注玉函碧派從銀漢連飛來三百尺流潤幾千年仙者路安在翠蘿青靄邉送西外趙知宗三山蓬閬近賀白是仙才去領宗盟事知從韋素來幾人留北闕獨棹向南臺踏雨江頭别西陵潮已廻題王憲使滄浪閣城池浸空碧鑒影復觀心孺子去何在此歌傳至今一奩凉月白萬井市聲沉坎止寜勞問憑欄意獨深過彭澤井邑已非舊柴桑里尚存春風三畆宅落日數家村隔樹聞鷄犬編氓半子孫頽然孤壠在寒菊繞松根漁父生不事農耕悠然一舸輕沅湘依舊緑秦漢幾回更晚膾雜香茝夜醺歌濯纓豈同馳騖者秪欲釣虚名種玉亭為黄元信賦鉏徧蒼苔色梅花近地移山深藏羙璞春到長新枝草木初分潤氷霜久結知百年封殖在終與鼎鬵期賦鰣魚得真字寒碧湛無塵前溪得細鱗香堪配杞菊味不數菰蓴玉露䨇酘熟秋風一筯新釣緡吾自有何用覔𤣥真丙午普覺㸔梅寂寂西巖寺何人訪静來重尋舊遊地惟有道師梅樹蠧應留雪香清不受埃可堪𤣥鬢改春已隔年催呈葉先生侍郎位雖奎閣貴獨處一齋空還以經綸事全歸著述中閑心同野水煦物盡春風掩面將何向西楹奠已終喜曹東畎遷大理寺簿九衢多雨後庭下草痕新終擬持平手來為折檻人印開桐䕃午吟久燭花春却恨無來客分題寄所親嘉禾興聖院禪闗自幽閴竹亦號真如况是龍潜地曽經鳯食餘土深抱節宻林净著行踈誰謂乾淳逹清隂只似初重遊法空寺寺在方山頂山深不厭登瀑飛明月峽橋渡夕陽僧萬法元皆妄餘生了未能纍纍塔邉塜幾見谷為陵悼盧次元屈賈幽沉地單車去不歸湘江清見底吟魄逺何依行旐衝殘雨新楸掩落暉誰收遺篋藁有子未勝衣失題此是夕郎宅曽經左緯吟數聨漁父曲萬頃碧波心月上白蘋渚秋生古樹隂當年濯纓處清徹到如今荅東閣盎乏儲空謾自豪掬泉當酒味尤高賣文近覺馬卿倦脫贈今無范叔袍松下耕樵相爾汝人間膏火自煎熬荆山山裡山如壁壁罅猶堪種碧桃㸔梅呈同遊東閣清源此樹何年向此栽孤根低倚佛樓臺不嫌幽壑逢春晚獨在空庭立雪來一段精神肪玉潤數松掩映翠屛開知心藉爾歲寒友每到花邉不忍回静樂趙觀文挽詞大星殞地寂無光硯席凝塵閟野堂一老海濵天下憗百年江左恨空長家傳遺藁歸中秘帝録元勲紀太常路逺生芻來未得淚乾門下老劉郎題薛氏園屋頭深鎻嶼頭雲高下亭臺景旋分荷氣曉來迎露㸔泉聲雨後隔溪聞踈櫺不礙松蘿月高栁時停鷗鷺羣秪恐此身閑未得徴書催發暑如焚文㑹飛霞觀水滿平川月滿船船輕撑入藕花邉移來謝守巖前坐疑是容成洞裏仙茶竈烟遮松際鶴絲桐聲雜樹頭蟬明朝更踐彌明約句擬當年石鼎聨潯陽江樓樓壓潯陽地望雄四無倚着拄晴空九支江匯欄干外䨇劒峯明霧靄中庾令聲名猶昨日屈平蘭芷又薫風綢繆牖户知何計須及長淮棗未紅張紹文紹文字庶成南徐人雲溪叔父賜飲大梅花下以踈影横斜暗香浮動分韻得動字清溝泂寒波怪石亂扶擁輕風捲濃雲天際孤月湧主人宴親賔㑹合意彌重列炬照寒梅繁星粲脩隴清香逼詩魂吟興欲飛動酩酊歸去來嚴城角三弄鍾山路間立馬鍾山路斜陽鎻亂峯斷碑生緑蘚古道立青松春事梅邉覺郷愁酒後濃興亡多感慨我輩復情鍾自維揚辭親暫歸里中登樓有作爛漫家山景物妍西風收拾下蠻牋半分寒事梅花裏一叚幽懐夕照邉漁唱凄凉招野色鴈行縹緲帯晴烟淮山只在欄干北目送飛雲重黯然自淮陽還里中抵舍一夕即為通川之行喜得歸來席未安又携書劒上江干莫陪親戚話情愫空指溪山說肺肝客路幾程來杳杳天涯一棹去漫漫故鄉又被江雲隔寫得詩成欲寄難小院小院春寒閉寂寥東風吹雪未全消山茶謝了梅花落移得詩情上栁條醉鄉醉鄉詩筆是生涯短短蠻牋字字斜沉水一株烟未斷半窓寒月上梅花酹江月淮城感興舉杯呼月問神京何在淮山隐隐撫劒頻㸔勲業事惟有孤忠挺挺宫闕荒凉衣冠淪沒天地憑誰整一枰棊壊救時著數宜𦂳雖是幕府文書玉關烽火暫送平安信滿地干戈猶未戢畢竟中原誰定便欲凌空飄然直上拂拭山河影倚風長嘯夜深霜露凄冷水龍吟春晚日遲風軟花香困人天氣情懐懶牡丹謝了酴醿開後紅稀綠暗慵下粧樓倦臨鸞鏡粉輕脂淡嘆韶華迤邐將春歸去沉思處空腸斷長是愁蛾不展話春心只憑䨇燕良辰羙景可堪虚負登臨心眼鴈杳魚沉信音難託水遥山逺但無言倚遍欄干十二對芳天晚壺中天為兄峯雲水月主人壽丹臺仙伯記蹤跡當年瓊樓金闕底事來遊人世界為愛峯雲水月結屋南園境随人勝不是溪山别今朝初度碧蓮千頃齊發况是鴛侣新諧鳯雛纔長占人間歡悦且盡壺天終夕醉聼取妙歌千闋待得西風鶚書飛上更復青氊物功成名遂赤松還伴高潔沁園春為叔父雲溪主人壽數遍時賢誰似雲溪未老得閑自抽身州縣歸休舊隐灰心名利跳出塵寰卸却朝衣笑拈拄杖日在花隂竹徑間身輕健任高眠晏起渇飲飢餐垂弧猛省當年且約住春風開夀筵况園亭池館新竒佳麗弟兄子姪歌笑團欒緑鬢朱顔綸巾羽扇做箇人間長壽仙霞觴舉願年年今日長對南山章采采臨江人搖搖花行揺揺花長安城南道小草欣欣造物勻三月來來野田好女郎厭踏王孫園出郊更覺春嫣然五家蹙成錦繡谷䨇鬟妙舞玳瑁筵合歡扇裁七寳月䕃歩盖簇空青天分司自訟狂驚坐拾遺勸我莫近前此時揺揺絶低小媚紫得映車間鈿幸承踏歌羅襪煗偶荷細摘春心憐豈如黄土岡頭古柟樹花開花落無人覷一枝折頓固弗班五陵雋賞初何預嗚呼世無賞音兮竟大竒古柟蒼蒼雲雨垂秋日過清江傅聘君石溪隐居有羙人如玉招尋故意長山衣猶芰製野飯只菰粱秋入遙空白霜飛一葉黄年年三徑裏來徃有求羊九江庾樓作去晉千年後風流尚庾郎地收三楚大天過兩淮長北望驚塵暗西歸短髮蒼空留江上月夜夜照興亡結架思梁日登臨憶漢年佳遊驚我老孤思為誰牽春水江湖大夕陽天地偏萋萋青草外何處是秦川發興主静觀心妙耽竒發興長蘭邉招翡翠梧下待鸞凰天地東風緑江湖西日黄靈脩猶浩蕩誰與玩瓊芳武昌南樓懐古青虬修士去遒遒黄鶴飛仙苒苒遊北望日邉秦樹逺西來雪外蜀江浮吳時宫殿千年夢晉國風塵萬里愁今古茫茫無限事月明倚遍庾公樓滕王閣佩玉鳴鸞一笑空至今華觀疊青穹西山殘雨虹腰白南浦驕陽鴈背紅幾度登臨添感慨半生漂泊老英雄檻前猶是唐年水曽見王郎泛短篷武昌江漢亭憶南軒亭下䨇來緑玉虯岷嶓萬里㑹吳頭江穿南北天心過漢接東西地脉流水上龍争方一夢山中鵲起已千秋張劉精爽知何在安得同來賦逺遊别鄂倅趙有孚芙蓉花下把離觴江漢秋生夕漲凉騕裊神駒行地急超遥仙鶴去天長蜀兵未觧星辰赤淮哨將來日月黄近世平戎無好手請陳上䇿獻君王花樹風吹花樹昨朝紅今日㸔花樹已空可惜天高花薄命年年開落只由風章粲粲臨江人采之弟學易齋天目鍳孤明地籟奠衆響慮淡世欲輕性復道心長斂襟歩前庭手執周易往得知三畫初真契貫穹壤圖原注圖謂太極圖書原注書謂通書詣其㣲精實超惚恍啟䝉析其義端倪見俯仰九京如可作舍此吾安放題楊總卿鹿岡庵客行鹿岡暮四顧秋滿目澗碧煙草滋林黄霜橘熟歸鳥各東西啼螿相斷續愁心浩難留故山正幽獨秋日懐松溪趙宰經父晴牎静繙書凝塵掩行迹花影晝簾閒苔痕秋徑寂憑高招逺風縁流㺯寒碧緘情寄天涯杳杳江閩隔湖上游瞩寄家兄花霧壓晴埃栁風蕩暄濁錢塘佳麗地春華大堤曲幽禽粲林白野水明湖緑清賞逺難期懐哉羙如玉豫章寄家兄雨時山色深雨餘山意醒千山萬山間秋風鴈聲冷澄江浄秋思明霞烱秋影遥想大雲心華觴誰與領春日憶平陽郡慱士大雲心兄東風歸林園雲日靉春事静觀化道伸良感幽貞利烟芳生暮愁晴絲起新思有酒誰見同惻惻夜亡寐春日効韋體新緑灧晴池涓涓泉脉動東風度花梢春音入禽哢而我理羣書朋儔罕迎送翛然愜心期此樂誰能共豫章宋都官聲父樓上結架欝岧嶤登晀齊近逺江湖萬頃秋風烟四山晚心賞地曽妍目行天不盡振衣聊消揺閑㸔雲舒巻詠二疏人生白駒過世態蒼狗變紛紛慕跖蹻寥寥志務卞赫赫王侯居翕翕富貴戀翠葢擁㳺雲朱鞍曜驚電金張財力豪許史名聲衒滔滔利欲波卓卓見所見長揖萬乘君𤣥髮謝朝弁行人相嘆咨羣公遥祖餞高風振朝野流光照史傳嗟嗟紳緌士來者宜知勸絜矩書院示學子四時配四徳元亨利與貞天徳元最重方春木主生夏火物暢茂是為徳之亨金利秋向實水貞冬實成既貞又為元循環未嘗停天高而地下隂降復陽升氣理本同運天人特異名性情節理氣其義明且精元亨利貞理因時有足徴生長斂藏氣依理常偕行仁禮義知性一初同聖氓惻隐至羞惡辭讓是非情天人二而一如射中鵠正柰何天無心人欲易纒縈無心自無妄通復皆一誠吁嗟其有欲天理随榛荆殘忍仁斧斤貪冐義蝗螟禮失之綿蕞知止於挈缾天人一而二如水分渭涇大哉古聖人一念天是承仰觀俯以察天降地上騰夭桃華灼灼好鳥鳴嚶嚶木徳自此盛我心惟和平恢炱行熾景是月隂陽争天明一暢逹朱光布八紘動極必生静慎哉柔道乘金行兆新凉宇宙日清泠萬寳就凝實羣葩委芳菁三隂行肅物戒哉色與聲冬至甲子夜一葉開堯蓂凝隂雖已剝初陽才有萌觀天於閉塞掩身身欲寧諸君子其來我詩爾其聆子能悟此理見義自瓏玲子或昧此理見義等聾盲善根有由蘖端緒㣲㣲呈觸物動惻怛致愛先雛嬰在天元之時春意方勃興聲身貫律度動作鏘璜珩三千三百儀皦皦朝陽昇在天亨之時夏氣方敷榮利物合於義秋揫味金腥貞固守以知冬藏令𤣥𡨕一心一太極彼此無損増至哉子朱子講道于考亭若明通公溥萬古破說鈴仁元明可配禮亨通可稱義利公所在知貞溥所能若東南西北随方有依憑春元東甲乙夏亨南丙丁北貞壬及癸西利辛及庚若震離兊坎随用無變更火則離𤣥黄木則震主青秋則兊金說冬則坎水盈四者誠昭昭請細與君評真精妙凝合我得氣之英所學背斯理南轅馳幽并當其泉逹時浩浩江河傾當其火然時炎炎已煌熒萌蘖得所養拱把可霄崢冨貴真浮雲無為羡金籯榮華忽飄風無為寵辱驚鴆妖用之媒錢神事之兄四者苟能充於利必無營厚酒促亡家冶容擅傾城四者苟能充於欲必先懲曉起敞吾門参前倚輿衡晦息安其身主敬常惺惺勿謂闇室暗問如對日星勿謂閒居閑凛如警雷霆仁暴判舜桀義利别軻牼存心不以敬焦火寒凝氷事惟非與是一間谷為陵慎勿思鴻鵠常期肖螟蛉復坐吾語汝而學發新硎造道有標的求已見準䋲竭力事父母䕫䕫謹鷄鳴同氣曰兄弟急難念脊鴒婦道順為正子職孝烝烝友義切以偲詩歌木丁丁何莫非此徳拳拳服諸膺何愧百年身何慊萬物靈四者誠存存心乎鏤為銘然而仁與義又對立門庭知者義所藏禮者仁所形猶之四時運隂陽為之經春夏陽日長秋冬隂日凝又若仁義中仁尤莫與京元猶五常仁吾因伊川程益信春猶仁通貫如建瓴惟仁為噐重惟知亦不輕守之不以知惟仁莫能勝須知守之固尤在見之明若夫信猶土是又綱之宏聖門戒去信重於食與兵四端斯無違一心斯有恒天行以不息異乎有慾棖日進以無疆同乎一貫曽此為義理源源潔流乃清精體兮實踐見汝顔之瞠别楊尊逺遊同是客執别兩情牽天地愁眉破山林歸夢圓西行迷蜀道北望黯淮邉馬上封侯事相期在少年重陽後送謹常兄之符離嶺外分擕處離觴話逺途黄花㸔不足寒鴈去何孤農圃非吾業衣冠本世儒應當重行止無使世氛汙敬賦大人竹林真隐之圖野草閑花競賞音蕭然坐閲嵗年深當貞固日知高節只静虚中見本心何處乾坤無鳯集他時風雨有龍吟向來七子皆充隐不止山王累晉林盛世忠世忠字景韓清源人有松坡摘藁胡葦航寄古劒有人尺錦長安來逺寄寳匣手自開紅雲紫氣燦虚室鋏中青蛇鱗生苔誠携掌握一揮動瞬息天地興風雷少年志氣老益壯惟願聖詔下九垓廐中我有汗血馬與汝直北清氛埃丈夫當為國雪恥笑指經生真不才柴門石砌苔初合柴門手自開日催花影轉風逓竹聲來蟹眼翻茶鼎鵝兒灔酒杯不須憂嵗計魁芋已新栽劉常簿席上原注慶某翁八十近授長生劵從天下綺筵潞公專洛日吕望佐姬年坐語風生舌梳頭雪滿肩上思耆舊用飛詔到林泉觀棊爭先劉與項得勢楚侵秦本是知心友翻成敵國人運籌争刼殺敗局在逡廵袖手旁觀者機深亦損神送吕東山之清漳君是純陽𣲖神清性亦真有詩聊遣興無術可醫貧富貴皆尤物江湖易老人置山錢足矣客路莫因循寄藏叟僧善珍訪友南山路橋横古木隂砌苔無俗跡庭栢是禪心舊衲連雲補新詩帶月吟同袍嚴戒行别是一叢林生涯詩壯嵗欲飛騰生涯亦可矜一千餘日戰三十九年僧硯枕秋風夢書燈夜雨澄儒生貴知命飲水曲吾肱簡賈户部十五年前别相逢各老成舊遊如一夢忽見似重生劇飲無人敵高談坐客驚諸郎尤可喜事業短燈檠病起書院偶成蓄水滋蘭畹開窓近竹林敗糊黄螘閧斷簡老蟲侵酒尚欺人病詩能對客吟晨昏一飽足此外不關心秦竹溪校書清漳未回茅齋雅稱竹方牀風過踈籬有暗香劇飲一冬成酒病得閑終日為詩忙新移橘本便霜信貪㸔梅花倚夕陽相望故人三百里十宵九夢到清漳今是行呈劉以道少年湖海誤加鞭久戍歸歟暫息肩時有故山來夢裏更無愁緒到唫邉晨飱全仰數畦菜嵗計尤逋二頃田閑倚瘦笻長嘯處此身疑是結繩前塞上聞角刁斗城頭夜月寒一聲嗚咽到江干梅花吹落渾閑事白首征人淚暗彈倦妝圖睡覺春山懶更添起來餘恨鎖眉尖料應春事關心曲怕見楊花不捲簾嬾讀書不弄絲桐不作詩槃池疊石學兒嬉少年讀易都忘却身似羲皇未畫時王昭君漢使南歸絶信音氊庭青草始知春蛾眉却觧安邦國羞殺麒麟閣上人程垣垣字務實龍巖人古樂府長安花如錦不堪製郎衣拾得并州剪剪花花忽飛清溪彩鴛鴦野性不可馴君心空愛渠渠無愛君心莫嫌秋後扇明年還六月凄凉暫離别恩情難斷絶探賾二首一氣自盤礴萬物自儵忽盤礴運高厚儵忽祝生沒高厚固冥冥生沒亦汨汨願言握金鏡以祛我之惑莊周一妄誕丘明一浮夸兩都繡春英三京組朝霞楚騷哀靈均鵩賦凄長沙律以素王經春蛙與寒鴉雜興三首抛抛機中梭婉婉機中淑蘭膏媚鬢蟬笋纎潤紅玉織成錦繡叚光耀綺霞幅世無黄鍾尺何以製華服青青琅玕竹節直中心虚風月與相忘雪霜不能欺斸之獻良工堪葺黄金輿悲哉渭水濵空抱嵗寒姿南山有孤松夭矯蒼龍質亭亭聳華葢清風自永日珍重棟梁材甘心跧崖石梓匠持規矩大器匪易得樵家深溪藏毒蛟樵家氷竈口結侣腰彎刀破衲補更厚持擔俯清流勇徃不回首褰裳望青採豈暇尋枯朽樵叟蒼蒼䨇鬢銀矍鑠不憚勤背曲行歩遲徐徐溪水濵羣兒喧南山踏起南山塵翁跣負薪回換得一壺春樵子頭蓬面萎黄身輕歩忽逮方斫柴薪回又帯刀斧去戯笑茅根掘時暫松根踞間道後山歸人尋不知處樵徑捫蘿登峻坂不避嵐霾冐㧞茅過山䧆壯者為前導陰濕留歩跡葉滑無人掃誰言此地幽亦有春風到樵風樵夫識雨候風起裝樵歸只顧擔重輕無心問是非纔觀六鷁退随知少女機同行採樵人先後不相違夏日下聞溪渡溪橋架木度人行人影溪中歩歩生真水真山皆舊識時來時去幾關情魚驚鷗立無閑意鳥逐蟬飛有遁聲暫止筍輿生僕力可人時至午風清江湖後集巻十四
