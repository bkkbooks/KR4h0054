body:
  text: 湖後集卷九宋陳起撰姚寬寬字令威嵊人按文獻通考載西溪居士集五卷陳氏曰姚寬撰寬待制舜明廷輝之子宏字令聲之弟為工部監門金人來侵寬言木德所照必無虞言驗將除郎召對得疾仆殿上卒捉搦歌雙蝶護花飛老女怨春暮撲蝶金粉銷折花顔色故窗中聲唧唧雨泣至天曙問婆許嫁女莫要擇門户願得不單棲任他流浪去少年行少年白鼻騧玉勒錦連韉徑就胡姬飲熟醉當瓐眠剝絲入蠶繭郎意在纒綿江南新體悠悠復悠悠日夜瀟湘流瀟湘春草生行人向南愁緩歌竹枝娘窈窕蘋花洲江南無春秋花草紅復緑燕燕撇波飛雁雁依雲宿逰子去不歸凄涼採菱曲劉生劉生古豪俠意氣無與俱隱若一敵國不顧千金軀擊劒探赤丸投瓊叱梟盧醉使新豐酒笑擁西京姝宿諸暨大雄寺解榻無凝塵雲房愜幽素清寒薄衾枕微涼散庭户夢破流水聲鉤簾捲山霧時與靜者俱為擬湯休句望行人戍客久不歸生死關山道出塞入塞雲長亭短亭草夢斷玉階人愁深花欲老庭樹起秋風寄衣當及早昭君曲石崇云昔公主嫁烏孫令琵琶馬上作樂以慰其道路之思送昭君亦然非昭君自彈琵琶也昭君恨帝始不見遇席上請行單于得昭君大喜獻白璧一雙駿馬數匹而已昭君留北地作怨思之歌傳於漢後為此辭者多遺其事實漢宫深鎖千蛾眉妬寵爭妍君不知昭君自恃色殊衆畫師忍為黃金欺當時望幸君不顧淚濕花枝怨無主一朝按圖聘絶域慷慨尊前為君去蕭蕭車騎如流水慘淡風沙千萬里昔年公主嫁烏孫妾身况是良家子自嗟薄命無歸路弱質安能事強主可憐宫錦換氊裘忍變故音作新語馬上琵琶送將逺行路聞之亦凄斷寄書空憶鴈南飛只有怨歌傳入漢漢家失計何所獲羽林射士空頭白白璧駿馬無時無傾國傾城難再得西湖醉歸作湧金門外看春色水流不盡花枝碧一畨洗雨一畨風墮蘂零紅收不得蜜房羽客尋芳歇蝶翅粉盡金翠滅雲昏草暖天亦迷日暮楊花散成雪傾城一醉爭狂蕩踏歌相携大堤上湘妃有意解明璫桃葉竟誰迎兩槳東君無情背人去脈脈那由話𠂻素歸來簾幕護殘燈一夢間階月如霧搏雞行大雞角角號秋田小雞啾啾隨後先喧鳴得意啄遺黍四顧無人驚復聚青天閃倐片影落飢鳶搏取填空嗉紛紛散亂入荆棘老父譍門呌無力鳶飛突去何遒疾大雞還呼小雞出西溪早行清晨出故溪鄰曲未聞雞草露平平濕溪雲漠漠低轉山人忽見分路馬多迷作客風埃裏難堪聼鼓鼙天台夜雨瘴海逺黏天山城入暝煙春潮生蛤暈夜雨長蝸涎燈几花時落風簾客未眠平生懷此地今夕意茫然夜坐懷歸簡報恩振老冷燭翠光殘踈梅雪影寒客心春鴈急詩思暮江寬髣佛連環夢凄涼錦瑟彈明朝山下寺忩竹問平安春暮送碧雲闍梨歸靈巖歸意太匆匆逢春去住中淡香花濕雨薄影絮行風覓句愁何許談玄興未窮應緣知有處秪莫恨飄蓬宿多福寺蕭寺虛庭夜氣嘉微風入樹碧交加露荷滴瀝珠無翳月桂扶踈璧有瑕欲採蘋花歸已晚擬尋竹葉夢還賒愁來剩有凄涼意織女銀河又復斜釣魚自小弄絲來驚多去復回沙頭晚風起波上夕陽開春晴風雨惜春殘新晴為啓關白雲歸去盡還我舊青山真戒僧首房晝寢薄薄簾櫳日隂隂殿閣風無人驚午夢雙蝶下花叢羅椅椅字子遠廬陵人饒雙峯髙弟寶祐四年登第以秉義郎為江陵教授改潭州及宰贛之信豐遷提轄榷貨有澗谷集東南紀聞云椅以江南革命歸隱故鄉廬陵大儒也秋日雜興秋山何言哉萬物興自闌昔翳春空雲今作道上斑况此江浦蕙幾何不為菅幽泉大自在映月瀉潺湲跳魚甚微細解展秋江漪一靜未滿刻一動輒移時豈由魚樂乎或是水性之商量未渠穩風急蘆花低白蓮花白鸞仙人按羽衣曲中弄影江南漪江妃閉置未許歸一把青寒縈玉絲玉絲蟬連不禁折折著透根仍透葉風流極處絶成愁君不見婕妤手中團圓似明月江石勢橫截江虎踞足白龜却行馮夷哭大川當前波沄沄石也於此受命獨水石擊撞無了時因危見節難見竒世間大有胡廣輩欠讀澗民江石詩溪南春曉行逢二三月春映掌中杯緑久山猶淺花寒雨未開誰能奈愁得判不上樓來更莫看雲坐瀟湘有鴈回冷泉亭老木碧毿毿幽亭著兩三山飛劣到地空處遂為巖古塔開蒼蘚清泉滴暮嵐遊人莫來此渠正試春衫寄答楷姪時秋四壁冷片紙百回看字古微侵𨽻吟清不到寒人生快意有天下好詩難澗水光如月吾琴爾去彈題方武成詩卷斯人懷妙質事事合唐賢命短於長吉吟清似閬仙寒鴉政鳴噪獨鶴已蹁蹮落日山亭下沉思一愴然寄危驪塘贈以古鑑百尺樓頭山雨長夢提白髮濯滄浪從渠金帶花成簇何處魚羮飯不香語妙囊中了今古騷成肘後繫瀟湘山寒歲晚蘭苗盛欲當􅊶茅獻草堂澗底春氷偶不融風前凝作水精宫古人心事如此鑑今代眼明惟有公落月還應照太白秋江只合瞰涪翁送君去貌驪塘影影見踈梅颭晚風謝南劒黃史君贈松紋劒使君袖裏玉淵虬曽截蠻江江上流海立山搖三尺外風盲雨怪一時休民元不許佩牛犢客政何妨彈蒯緱遮莫塵清便回使青山猶赦郅支頭題圓覺寺小軒禪子安排定不癡數拳石映半泓池巖如大石元生就水似人心未動時二月春深梅不覺五更風起檜先知青林野寺西湖路直得先生一首詩遠逰因夢吳雲賦遠逰江花扶柁水悠悠半輪月散千山影一葉舟勝萬斛愁天氣漸於寒食近春風只到牡丹休水程孤冷難為夜起吸滄江當拍浮題向伯僑吳松雪霽圖暖來日曬氷滑恨極天寒竹修雲開梵鐸相訴水活漁船自流天上清流雪片人間名勝吳松兩賢相厄窘甚賴有斜陽半峰天隨漫解理艇不慣雪後霜前幸自竹篙間著拋來借與鄰船林昉昉字旦翁三山人訪隱者曉入南山路松風最好聽候扉黃犬睡尋食老鴉靈童子炊方熟先生醉未醒借來一榻坐看盡相牛經秋戍軍頭夜點名新戍起秋程月色黃弓甲風沙黑渭城斷笳清淚滿落葉此生輕努力供王事歸來享太平老樹元是誰人種枯殘此澗東半身虛映水一葉尚搖風著雨禽初散當暄蟻欲空年時濃緑影何處夕陽中同鄭魯望聽杜鵑每到桃花發山鵑呌得頻今年同聽處吳下未歸人客淚滴殘月物情愁暮春胥江有清水聊與濯衣塵山中衡門客去孏冠巾盡日看山自在身飲澗猿來驚照影泊枝禽起近衝人黑雲欲雨易成晚紅葉如花不當春卻憶東門牽犬恨當年何似布衣貧泊越浦老樹津亭纜客舟芙蕖香歇蓼花抽越山只作古時翠胥水半隨人事流别港鴈聲天有月斷橋漁火夜分秋翻然自笑芒鞋腳十載風波走幾州春歸南北春歸有許忙一晴輕䇿度林塘栁搖别岸東風瘦花落斷橋流水香老去客遊空劒氣日來心事只詩囊幽情一點雲天遠獨鳥無聲飛夕陽贈别傍橋買得小溪船略舉離杯去意懸一水夕陽紅蕩影數峯晴樹碧生煙秋聲不斷雲間鴈别恨空長栁外蟬後夜他州看明月定知相憶未成眠贈張髙士短髮蓬蓬戴小冠客來歡喜愛供看鶴孫夜飬翎猶濕童子南歸語尚蠻擊磬花邊禽醒悟持經忩下竹平安自言薄有耕桑地無事干人不出山登龍山塔寺吳越夕陽多遠山塔樓髙處九秋寒江豚吹浪腥風濕野鳥行空翥雪乾白日潮聲僧老盡黃埃世路客遊難海門航散孤雲落酒醒不堪深倚欄春曉薄衣初試曉寒輕雲閣殘隂雨弄晴落去好花微有恨生來野草半無名丹心愛國勞難破白髮欺人鑷又生瘦繞石欄三十匝緑楊何處脆鶯聲題所寓壁鹿羣上遙岑雲影抵蒼壁無客來敲門倚松讀周易南屏山畫猿古木懸藤臂半鈎何年影落此山秋三聲遠憶巴江月夜半孤舟起客愁山中春曉婆餅焦啼曉户開冷東風裏惜殘梅片雲秪傍簷頭宿昨夜何山作雨來雨中過周氏山莊吠犬柴門扣未開滿身風雨立蒼苔翠禽一箇髙枝上啄得殘桃落地來戴埴埴里居未詳詩多仿月蝕雪車之作非拘拘四靈者也和王教暮春出逰矯矯雪霜心孤貞受命獨留滯染緇塵垢面不靧沐背城借一戰填塹輸前瀆葵心向朝陽晞光不能燠徒囂終無贏驅馳惟僕僕豈無豐水滋永嗟非佳榖呼爾授芻秣羈紲繫駒犢堪羡我良朋林桂賸芳馥博覽繹故書胸中三萬軸悠然西河上日與英俊逐振鐸揚儒風函丈紛冠服師友遞響答循誘教匪撲精進日千里目駭地脈縮顧我闕黨徒無成坐欲速披襟莫奮飛隨羣被私淑枵然藜莧腸殊未飽公餗彈鋏何時歸涎沫流肌肉遙想烹太牢殷勤羮采菽原注詩箋采菽所以芼太牢待君子也更當春暮時浴沂襟佩肅心賞弄篇章絶唱清風穆流水諧朱絃押強破萬竹孝先謾耐嘲橫榻便空腹安識物外逰幽賞機緣熟矧復有良儔堅久渝晚菊依然蒼筤叢檀欒旁淇澳原注補韻澳亦作奧荆公押一緘荷起豫明珠得盈掬大雅久不作疏越鼓凡目臨風挹回瀾淨洗塵翳麯披閲不停手豈復憚諄復自笑詩思慳企山才抵麓正望使南印象馬來天竺競病安能𢋫振紙空瑟簌絶影天邊鴻坐困家池鶩搜索縱成篇無異蟲蠧木所幸情不違合并在旦夙願言戒逝糧出晝勿三宿輦下曲舊來聞説京師樂香街十里春風箔朝踏金梯入鳯樓暮下瓊鈎延翠幄蛾緑梅花裝淑質蘭蕙芳笙歌棗下曲琵琶陌上桑宿酲未解鶯催曉玉珂䇿馬長安道解珮遺簮日日歡不覺紅顔醉中老我謂京國皆繁華何時飛走登雲車誰知著足緇塵底八年飄泊空咨嗟蕭蕭竹忩風暗度耿耿蘭缸燈自語孤坐逢掖凝清霜獨卧重衾踏寒雨雲雨陽臺夢不成况欲綺席羅傾城丈人屋上烏啼夜乾鵲巢中鳩喚晴啼夜夜未央娟娟素月明喚晴晴未霽寂寂青春深鳩喚烏啼終有侣猶勝月兔孀居千萬春雹玄黓執徐歲月律中無射京師連雨雹小者如彈大者如拳林柯葉亂下烏鳶折飛翮屋瓦砉劃遭擊撲居人顛沛行道錯愕初疑巨颶掀捲馮夷宫淵珍散墮光閃爍復疑清霄萬里驅長蛟泣淚盈盈驟飄薄稜層水精碎噴噀珠琲滑有識覷天巧一何景象惡嘗聞聖人在上冬夏無愆伏亭毒二氣不相剝破塊封條已無異祉羽無勞驗風角今天子握極衡運斗樞景化豫順羣慝蕭灼精祲胡未孚氷雨墮霄幕其欲霈廣澤胡不為甘霖沾丐枯焦重甲坼其欲膏土脈胡不為晞薤厭浥瀼瀼普漸洽其欲表誅伐胡不為皚􅀢駟見而霣草木黃落其欲弭蟄蟲滋生植胡不為嘉平之三白驅蝗入地千百尺或云水氣專一不解散胡不為長河玉岸之寒氷可納凌室助頒刷或云隂氣脅陽不相入胡不為氤氲五色之卿靄叶應豐穰昭帝德此雹舒不如雨露慘不如霜雪結不如氷澌之嚴沍散不如雲霧之蔥鬱夭非欲示懲詎用作戲劇漢儒説證應紛紛太不一或賢邪易位或賦斂苛刻或妻妾失倫或大臣擅法玄道幽且渺牽附多穿鑿仲尼百世師麟經戒侵逼此變凡在書公室浸衰削自下陵上曰僭以柔變剛曰剝沸湯湛冷泉凝寒勝燠熱溫雨受隂氛凌沍自然結時當秋氣杪是理尤彰灼風起庚庚作令日行西西主殺數至九變金乃從革大則為兵小刑罰內外靡不以時決天地方會藏沴候生京洛得非少皥執矩未潔齊得非蓐收為正有顛錯得非箕伯吞聲不掃除青女護姦不除滅穹旻赫然奮嚴威重隂膠固紛零落我願聖王覩此攬乾綱用夬決登俊良屏邪慝隂塵靜掃單于庭陽和遍吹鄒子律大明威威照九州寒燠時序百榖熟天若雨珠真可噱請以綴衮冕之十二旒龍旗和鸞之纓絡彗星紹定壬辰閠九月己酉之夜彗星出清臺奏御正衙避席太官減膳羞瞽宗徹音樂雞竿肆眚出囚繫龍扆責躬求讜直精誠徹九垓德音走重譯圜橋冠帶虀鹽生管窺熿熿對以臆臣聞泰素朕形玄黃辨色左旋右轉一闔一闢來伸往屈四時行除舊布新寒暑易恢恢天網踈統理廢厥職東方歲星木主仁不掃暴刻尚捶剝南方熒惑火主禮不掃驕蹇習凌弱西方太白金主義不掃冦盜生亂略北方辰星水主智不掃蒙蔽長讒慝中央填星土主信不掃詐欺滋姦猾皇穹遴選綱紀星出持彗帚掃環域日華機上有九彗乍上乍下空如筆歸邪向上有兩彗出也不行見則滅天狗短彗在尾傍火光炎炎空烜赫天攙類彗雲如斗蚩尤類彗旗後曲六賊如彗在西方咸漢帶彗居正北驅䇿舉莫前彗乃排膠轕不指房心明堂位不臨箕尾后妃宅不抵參昴詠衾裯不向牛女逐淫佚不訪獄廪至婁胃不詢蓋營到危室不求社廟上井鬼不好文章逰奎壁不窮天根越亢氐不咨弋獵來栁畢不從玄枵問虛耗不由張素丐觴客不自觜觹訪葆旅不入栁倉覔厨食不呼七星問急事不召南斗共斟酌天王帝廷為大角兩旁三星如鼎足所柄所指以建時節曰攝提格灑掃庭內萬化基蕪穢不治孰觀法軫驅風車為宰輔負衡失平在修飾翼鼓羽翮主蠻夷飛翰不徑必振刷秃帚一加內清外肅四海九州罔不臣妾帝座中居斡樞機萬年千載不停息和陳府教授見贈遺風洙泗濵汲古酌犧樽魚躍池藻翻鶯呼庭樹喧樂山不樂水居城猶居村一朝黃鐘鳴九畹滋蘭根諭鶴文鶴陽禽也而遊於隂一墮矰繳入於樊籠飲啄棲遲無復介然雅淡之態少焉羈鞲稍縱奮長喙引修吭跳踉落泊過者驚怒觸罪蹈辱羣鳴如訴豫心惻然呼而諭之曰猛獸摶也拘於檻子其猛而搏者耶鷙鳥攫也縶於紲子其縶而攫者耶仙姿浮曠而懷清逈觀子之性泊乎淵靜丹眸含精洪髀舒縞觀子之形粲焉月皎逸氣出塵幽響警露觀子之心飄飄雲路九臯摩空萬里籋雲度蓬壺跨昆閬豈不邁往而絶塵哉飢不啄腐鼠謂在田也渴不飲盜泉謂在野也翮短尾雕混迹雞羣鬱鬱豢養壯志未伸又非頡頏煙霞軒翥林汀也結而脰束而翎羽翼既成青田赤霄非子之故程也耶言猶未畢群鶴忿悁竦毛勵翼長紆抑之未伸悼哀訴之弗直皇皇向我若有歌者曰豢豫於儲胥之下兮質豫於勺水之陂褰頓悴之弗察兮仍顑頷之莫知紛外侮之多儃兮懼昭質之纎夷曠一飽之靡安兮矧上征乎崦嵫嘹唳四起悲聲徹天修辭慰藉一語莫宣回視周除孤雄屹立寂若無聞淡若無識揖而延之化為羽客翩然馭風九垓瞬息羣仙賦原注中伏日夀宣參政之作南端熙穆東閣晏清瓊鑾颯纚華芝紛繽蹁躚風馭來自殊庭扣閽請曰鳯鳴朝陽龍翔景雲翼翼國瑞壽矣卯君余攬德輝以來御扉其撤扄閽者辭羣仙曰長贏阜物朝霽霈霖八荒仁夀六氣平均意有間矣若為啓眀閽者曰今日何日願有謁於大鈞羣仙曰豈曲度房中聲揚濮上或彈絲吹竹以奉徽音耶曰有是哉豈栁肢低月蕖艷凌波有若電羽之翁翁者耶曰有是哉豈齊優戲劇謔浪傾河足資笑噱而徹聽營耶曰有是哉豈池塘緑淨蓮芰香浮有所謂鼓蘭槳而歌采菱者耶抑涼臺逺岫竹院碁枰玉壺簷動桃笙波澄方羊燕適爰滌袢暑之襟耶寧風生麈尾扇隔庾塵飄飄羲皇上人耶閽者不答徐而歌曰九垓昊昊兮無聲八柱膴膴兮上騰陽道柔兮隂彚征孰綱轄是兮伏藏不升羣仙囅然而笑曰槖籥機緘固運轉不停也耶乃賡而和曰鉉必玉兮柅必金鼎中實兮魚弗賔斡造化兮揭乾坤黃中正位兮玉立千春少焉霞袽軒舉環珮鏘鳴仰而視之惟見卿雲綺錯泰階衡平實癸未中伏槐府稱夀之辰也江湖後集卷九
