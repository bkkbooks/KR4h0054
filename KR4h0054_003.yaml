body:
  text: 江湖後集卷三宋陳起撰周端臣端臣字彥良建業人御前應制有葵窗藳西京少年行西京少年兒生長豪貴族光浮兩臉紅春留雙鬢緑常騎大宛馬多佩于闐玉明珠博美姬黃金酬麗曲朝從咸陽逰暮向長陵宿朱門人候歸夜夜然紅燭毋忽詩毋忽咫尺水中恐有伏龍毋忽尋丈山中恐有毒蟲是以古君子不敢欺盲聾審密言語間戒謹暗室中幾微怠所防敵國起奴童事固不可忽理亦不可窮周室八百年成於垂釣翁僕以紹熙壬子中夏二十有五日始躋風篁探龍井遂至廣福謁三賢像閲舊碑追觀一代風流為賦此詩適月林依公留設茗供因書以遺之他日能為我揭詩板于壁間使示來者亦山中之一助也原注龍井寺有辨才師趙清獻蘇文忠塑像竒石爛橫道兹山信多姿江湖釃兩股一泓乃孤危相傳龍所家或恐神護持腥風轉霮䨴隂崖立淋漓惜無緯蕭勇探此抱寶癡山僧作屋意慘淡生幽思胡為金繆影顛倒眩俗兒坐來百念失蒼官導前馳招提果深登屐痕恍前期咄哉少肉山著此髙顴師端能致遨逰絶唱相娛嬉過溪亦何事相送了不疑渠能縛禪律因來數鬚眉我愛秦郎記字壓頭陀碑月林只夜夜人物自一時賢愚盡蟻封來者吾得知二月芳草碧寄吳中故人二月芳草碧江南新燕來撫兹良嵗時佳人安在哉佳人棄我去杳在天之涯天涯望不極叢愁結中懷翠觴不成歡玉琴有餘哀西湖春事深林花為誰開折花無所贈三嗅空徘徊樓前東流水湛湛生緑苔去波日千里還繞姑蘇臺憑水寄我思旦暮腸九回聽無悔琴悟琴如悟道神間若無營在心不在指以意非以聲鏘爾風篁韻泠然天籟鳴曲終各一笑相對無虧成物蠧太虛運元氣萬物皆慿倚物或有所違氣亦隨而否肉蠧則生蟲木蠧則生蟻嗟哉政亦然於焉起姦宄蠧久不可為氣靡物自毁但得元氣存不患蠧不死奉謝藝居清供之招生平愧彼蒼得飽非耘種自揆蔑寸長居然叨薄俸朅來桂玉地幸了藜藿奉日昨訪藝居見我如伯仲劇談闢幽荒妙論洗沉痛呼童張樽罍芳醪啓春甕乃約屏羶葷初筵俱清供珠櫻映翠莢光色交浮動佳境喜漸入愷之未癡蠢屬厭薦春萌雋永咀秋葑黃獨忽登俎味借蜂蜜重翻憐少陵翁山雪入吟諷早韭晚菘輩吾家所售用列品不自珍而與朋友共雕盤放手空適口頗恣縱日暮雨催返虛忩結清夢寄語五侯鯖從兹勿勞送孟冬多風霜孟冬多風霜草木俱披靡老栁葉才脫拂拂新萌起凍梅如枯榛班班亦含蘂寒暑運四時成此嵗功美孰知四時間獨有春不死白虎行女修玄鳥開嬴始附庸于周自非子由襄寖強三十世末命昭莊踰崛起殺降濺血長平坑返戈盡篡天王城黷兵不戢恃強大物忌太盛終當傾邯鄲賈人識竒貨發謀不惜千金破窈窕尊前歌舞人腹中已孕秦家禍怙勢陵威奮餘烈怨氣愁聲九州裂虎暴狼貪天使然六國未滅嬴先滅天道何曽長助強豈知用柔能勝剛君不見後來項羽戰無敵却使山河歸漢王送翁賔暘之荆湖君不見司馬子長志橫秋少年足迹不肯休胸中盤屈竒偉氣筆力直與造化侔又不見杜陵子美夸壯逰一身幾走半九州吟懷吐納天地秀作為篇章光斗牛君今去去幾千里匣劍囊書赴知已知己從來素有情投機之會趨功名功名豈有作能致莫辭跋涉長江行長江四月南風起武昌魚飲秦淮水南風不久又西風食魚休忘鱸魚美天涯别夢思城東何日一樽重與同草橋夜醉月明下桃關晴吟春色中不堪蜀魄相催去却憐檣燕相留住一片離情去住間正是逰人腸斷處荆湖右道分南北勢與中原豈懸隔五湖膏血互吞噬萬里煙塵入謀畫莫如子長子美但能事文章蚤歸來獻平戎䇿書逸人俞太中屋壁羡君還似我居處傍林泉洗硯魚吞墨烹茶鶴避煙間唯歌聖代老不恨流年每到論詩外慵多對榻眠贈岐賁推官動靜不違書如君始是儒婢間猶畫卦兒戲亦投壺門冷僧長往官清道更孤吾君能大用皇宋即唐虞寄唐異山人不見琴詩友相思二十秋能銷幾度别便是一生休未得雲邉步還應雪滿頭何時各攜杖竟去會嵩丘逰下竺枕流亭枕流亭下路兩嵗不曽來今日偶重到夕陽猶未回池乾無水放地暖有花開後約如能繼多應為探梅題崇勝院河亭陜郡衙中寺亭臨翠靄間數聲離岸櫓幾點别州山野客猶思住江鷗亦忘還隔墻歌舞地喧靜不相關作謝馮亞惠鶴殷勤親惠鶴迢遞自江濆情性渾如我精神酷似君舞思同座看唳想隔城聞從此添詩景為題好共分真州梅欹倒幾株梅黏枝半是苔相傳前代種曽歷太平來山冷雪猶在春深花始開亂離無酒買嚼蘂當銜杯書冷泉亭壁一酌野泉香翛然俗慮忘靜聽山鳥語如笑世人忙近水苔常濕無風樹亦涼老僧間似我清坐到斜陽聞滁陽失守憶表兄猶憶歸淮甸何期陷敵塵秪聞殘破慘未得死生真夢不諳長路書難附便人吞聲無限淚一滴一傷神裴墳買船穿僻徑墳古最幽深山近風常冷松蟠晝亦隂來時無速騎歸路有鳴禽寄語城居者何人肯訪尋寄題石都尉林亭園林都尉宅景好冠京華便合名金谷其如是石家池塘分御水樓閣見宫花有客因來説令人動嘆嗟冬日書事一月天不暖前村到豈能間聞啄木鳥疑是打門僧松色濃經雪溪聲澀帶氷吟餘還默坐稚子問慵譍虛室虛室似僧房蒲團倚竹床半忩紅日影一陳紫蘭香誦熟間居賦書成急就章數朝門不出過却幾春光湖天湖天初過雨晴意有無間春水半侵路曉雲多礙山酒煩村店暖詩就野亭刪風靜無啼鳥垂楊樹樹間暮春漳川間居書事吟齋漳水濵孤僻度殘春長喜詩無病不憂家更貧鍾聲來逺寺山色遍諸鄰門有誰相訪僧過豈厭頻贈三門漕運錢舍人相知有宿緣一見兩欣然我拙宜名野君亷恨姓錢唱酬思閣筆迎送愧樓船却恐徴歸闕慵過砥柱邉聞王衢王闢登第寄賀人間第一榮初得好科名萬乘登樓看三台讓路行搜羅空草澤宴會敵蓬瀛榜眼兼衣鉢偏怡野客情原注衢為榜眼闢為衣鉢登駝巘嶺登頓來忘倦間常到亦難西風搖短鬢落日倚危欄山迥江湖小秋髙天地寬故園何處是空遣客眸酸富景園詩地比諸園小池從前代開猶餘喬木在曽見上皇來幽徑埋黃葉空庭老緑苔荒寒吟思怯落日獨徘徊初冬即事初冬天氣暖小似立春時萬樹無多葉千花試一枝天紅霜有信星暈雨先期怕見梅花發愁懷未辦詩讀黨籍碑黨籍碑成國步屯忠臣埋沒瘴鄉塵興衰未必皆關數治亂由來實在人雷昔震陵天已怒石今漫滅世尤珍九原難呌諸賢起一掬傷心淚染巾重陽後一日偕翁賓暘張敬之江樓分韻得臺字一笑江樓把酒杯闌干倚遍重徘徊風生别浦潮回去雲暗前山雨過來秋冷丹楓先葉墜節遲黃菊未花開慿髙引領還興感昨日誰登戲馬臺青銅香鴨詩誰把工夫巧鑄成銅青依約緑毛輕自歸騷客文房後無復王孫金彈驚沙觜莫追蘆葦暖灰心聊吐蕙蘭清回頭却笑江湖伴多少遭烹為不鳴送牛首爐與人千載墦間偶得存傳從鼻祖到雲孫土痕蝕處形摹薄苔色侵來欵識昏製樣想應規象鼎驗圖只合配犧尊贈君博古齋中去書傳間時細討論謝長安孫舍人寄惠蜀箋彩箋一軸敵瓊瑰喜見親題手自開逺勝浣花人寄到貴從視草客分來百張重疊霞初卷十色參差錦乍裁紅藥篇章方雅稱老夫無用擬封回晨興夜長乞待得晨興耽睡僮猶喚不譍燒葉爐中無宿火讀書忩下有殘燈臨階短髮梳和月傍岸衰容洗帶氷料得巢禽翻怪訝尋常日午起慵能和三門竇程寺丞見贈禹門公署似仙居誰羡同年在直廬間製曲教鴉角唱醉吟詩遣鳳毛書蒙過村巷驚玄豹命踏廳階上白驢莫訝此篇酬更晚只緣思澀豈情疏懷寄河中表兄李徴君蒲津棠樹兩間人我愧虛名帝亦聞三世往還為近戚一時遞互喚徴君雖同閉户辭丹詔尚阻連床卧白雲苦恨中條鎮相隔老來離思轉紛紛代上劉郎中彈壓江湖聳市朝相逢人盡説風騷詩從南嶽吟逾老名得西山薦益髙半世歷官才幕府午年還國尚郎曹兒時曽誦先生句鏡裏如今已二毛古劍籀文漫滅蘚花殘膽怯旁人不敢看飛去暗防風雨夜握來光射斗牛寒曽成歃血諸侯約肯受無魚下客彈寶匣祕藏英氣在提㩦終擬斬樓蘭送人失官歸浮世功名總是虛縱然軒冕又何如趂無白髮來侵鏡好買青山去荷鋤賢聖一丘無用土英雄幾板可疑書生涯儻了寒暄計獨抱遺經亦有餘次韻友人悼寵落梅條脫空嗟蕚緑華俗塵難久駐仙車數聲畫角單于塞一曲山香阿母家墮砌尚疑粧後粉點衣猶認唾時花别來埋沒春風靣幾度虛忩歎月斜春日即事起來袖手怯寒添冷落文楸掩玉奩燕子池塘春雨細杏花庭院曉風尖酒醒未解便欹枕香炷初熏密下簾百五數來能幾日黃金栁色已侵簷逰秀府擇勝園擇勝前朝錫雅名不多花木四時榮樓當列岫仍臨水地比諸園最傍城池暖錦鱗冬亦泳洞寒丹鶴曉先鳴宗王信是神仙侣創得蓬壺小樣成咏鶴原注分得仙字韻覔來雛鶴養經年認得呼名傍客前放去幾隨雲過海歸來一片雪翻天翎梳修竹林間日影照寒梅澗下泉眷戀軒墀應有謂主人風骨是神仙落葉燮燮霜紅不自持半隨流水半霑泥歸巢便覺棲禽冷覔穴空教返蟻迷風徑學花飛上下夜忩疑雨灑東西滿階不聽家僮掃擬把新詩逐片題次韻張敬之桂花年年緑桂著花時黃雪團枝自一竒林靜秋風生處早山髙涼月上來遲亭邉露濕欄猶倚書畔香清枕屢欹惆悵淮南無夢到楚騷歌罷當吟詩次韻勿齋蠟梅不與南枝鬬粉光品題應合讓蘇黃融成蜂蠟千葩秀散作龍涎幾陳香立悟瞿曇真靣目坐忘姑射舊梳粧好風吹墮檀心句白雪空驚寡和章碧桃武陵夢覺艷粧空回首芳姿迥不同蕚緑仙留蒼玉佩蘂珠人在碧霞宫素腮褪粉啼春雨翠袖籠寒怯曉風惆悵湧金池上路闌杆倚遍夕陽中靈隱山前即事猿不聞呼僧已歸翠煙依舊鎖崔嵬水今流向人寰去山昔飛從佛國來古徑夏寒風落木蒼崖隂潤雨生苔客纓自喜無塵濯歌罷滄浪飲一杯春日間居自笑春來縱酒狂信緣無定恣尋芳杯中似蟻浮來緑甕裏如鵝脫下黃花底枕琴迷洞府溪邉濯足憶滄浪一從禁閣辭榮後不復乘雲入帝鄉劉寺墳園萬竹蒼寒擁寺門寺牌金字御書存榮華肯信當年事儀制空留後世恩影閣有燈塵網暗殯宫無月土花昏見梅不敢輕攀折恐是春風水際魂栖霞嶺九折﨑嶇入杳冥蒼崖中斷見雲生著身髙處不知險回首省時方始驚半嶺雷奔空石墮滿山花發曉霞明世間豈是無平地何事吾儂愛此行遊籍田國典斯為重親耕示不輕詔涓正月吉躬率百僚行奉禮儀修獻司農器具呈儲胥嚴武備鹵簿肅文明北闕班春早東郊賀雨晴青壇晨氣潤紫陌曉寒清玄武移天仗鈎陳出帝城停雲依别殿翔鳥避行營十二蒼龍駕三千白虎兵園花迎翠輦田栁拂霓旌少皥陳圭瓉先農薦特牲紺轅縈黛耜蒼佩映朱紘俯講三推禮祗勤萬乘情艱難均土庶次第及公卿海宇瞻秋稔山川慶禮成豈惟知稼穡况乃奉粢盛祈嵗稽豳雅因時昉舜耕顧嚴天下勸非侈國人榮藝史觀先烈桑樞歎晚生何當蕆熙事夷夏頌隆平古斷腸曲三十首髻雲鬆滑嚲鸞叉清減羞臨玉鏡臺蛺蝶也知人寂寞一雙飛過杏墻來催花一霎雨依微芳徑泥香草色萋可是一春天氣冷牡丹開了未鶯啼被擁嬌寒曉夢春起來無事翠眉顰金瓶拈得雙青杏搯破中心見箇人竹葉裙紗摺摺香荷風占斷晚西涼年來歡事愁邉減别後秋更夢外長條風忩户栁隂隂雲碧春衫尉水沉花裏小欄人不到流鶯啼起去年心夢破巫山生色屏錦囊情薄歇餘馨關河春晚無消息腸斷樓前楊栁青無計消除夜漏長羅衾熏徹舊時香十分又是凄愁處雨歇芭蕉小院涼香凝薇帳春風院酒涴榴裙夜月樓間把花枝思往事舊歡都變作新愁一篩涼雨歇亭臯菡蓞無香可得消玉簟怯秋眠未穩阿誰樓上夜吹簫團扇多情手尚攜金風庭砌拒霜開斷腸一夜西樓雁不帶書來帶恨來破除難盡是恩情却怕恩生怨亦生思念不休心惑亂夢驚人語似郎聲一股金花擘斷叉兩行玉筯界香腮近來自覺氷肌瘦栁録春衫放窄裁井梧和雨下銀床梁燕隨風别畫堂二十五聲秋漏永夢回各自耐思量錦屏殘睡思忡忡心緒無聊酒易中栁院蘚廳慵不到斑鳩啼暖落花風風色翻成料峭晴間期女伴踏青行怪來昨夜燈花好却是今朝鬬草贏花庭梨雪疊香痕燕子歸來亦斷魂懊惱一場春不管月明空自立黃昏裛裛羅巾淚粉光緑琴哀怨調凄涼芳容自覺隨風老落盡桃花暗斷腸忩下親裁白苧衣日長花影上階遲不堪杜宇啼春苦又是去年腸斷時金風幾日老庭莎經下忩櫺換碧紗天氣已涼人尚逺晚粧羞戴麗秋花玉纎無力怯梳頭鏡裏容顏見自羞一陳落紅簾外雨十分春是十分愁舊家院落舊秋風只有當時人不同惆悵一忩無用月為誰涼夜曬梧桐修竹生煙晚逗隂翠羅香袖怯寒侵恨同社燕身為客怕剝秋蓮苦在心壓髻慵簮雙鳳叉傷心羞覷合歡鞋折花暗卜郎音信旋繫羅裙走下階雙蛾顰翠恨天涯睡起蜂黃沁臉霞燕子日長深院靜東風無力到楊花春嬌殘醉睡初回索酒扶頭強起來金斗壓灰熏篤耨玉瓶㪺水養徘徊蜂蝶飛飛春事忙暖風池館百花香連花折得青梅子怕觸心酸不敢嘗楝花篩雪糝蒼苔人未歸來燕已來滿眼春驚連日老兩眉愁是幾時開依舊斜陽燕子樓共誰把酒話間愁韋娘去後西風老爛漫黃花滿院秋彈罷瑶箏歇雁行月移花影上回廊離情不奈秋蕭索更著寒螿管夜長小雨班班濕畫欄一番重做杏花寒春衫拈起還慵著却憶天涯客袂單湖山園丹樓碧閣靣山開緑樹紅芳繞水栽多少好春間過却主人無暇不曽來同用晦上人逰渼陂渼陂寒水碧溶溶野客江僧望不窮更值晚來風雨歇終南一半浸波中落葉西風不管鵲巢寒成陳飄來響更乾最是山房秋思客夢回疑作雨聲看送諤師赴王寺丞召寫碑才髙吐鳳欺黃絹墨妙回鸞命碧雲雙美便堪傳萬古羲之書法退之文和江南提刑王國博見寄欲寫情懷難一一擬尋山水隔千千輸他吳越間鷗鷺朝夕長親畫舸前清明湖上誰家園裏一聲鶯啼向春風似有情驚起少年逰冶興插花沽酒醉清明古墳詩短牆摧倒樹欹斜碧薺春開滿地花馬鬛就荒無認處墓前碑在野人家題真妃出浴圖百媚千嬌出浴時君王凝盼轉魂迷香肌猶恐紅綃重可忍他年踐馬蹄秋曉一抹涼煙曉未收露籬踈雨濕牽牛不知天上秋多少昨夜西風到小樓湖上歸别却吳姬舊酒壚扁舟吹笛過平湖晚雲又是商量雨遮得秋山一半無簡雪忩董寺丞世路機心走兔迒雪忩一縷不遮藏籋雲梯月真遊戲茅舍何曽外玉堂聖賢事業在心槃禹稷顏回豈異觀世故波瀾同起滅姓名千古要清寒鄰園晚步忽然楊栁幾絲風零落桃花數片紅滿面好春吟不得一園蝴蝶過墻東寒食湖隄紫陌笙歌簇禁煙幾年無此好晴天畫橋日晚逰人醉花插滿頭扶上船春月送人一湖春緑染初成栁色東風二月晴燕子來時人却别梨花雖好負清明酬薛田推官見贈紅蓮客惠碧雲篇未及他山買石鐫且選眼前粗竹上和煙大刻兩三聨元夕小院春寒月到遲閉門間課上元詩南來父老消磨盡耳畔無人説舊時謝人惠天花花從天上落人間北客來稀路阻難勝味忽驚藜莧腹春風腸斷五臺山內人燒香圖花底燒香深閉門宫鴉棲了已黃昏君王未識無人妒雖不承恩却感恩買木犀花拚却杖頭沽酒物湖邉博得木犀花西風可是無拘束一路吹香直到家題葉靖逸東菴一菴自隱古城邉不是山林不市門里落月半忩霜滿屋卧聽宰相去朝天二月五日西郊口占晴日西郊按物華東風寒峭帽簷斜江梅已辦調羮事交割春光與杏花秋晚孤山山夾寒雲晚不收蘋花洲渚雁聲秋西湖處士無消息落日丹楓處處愁夜歸側側梅寒戀客衣市樓燈比舊年稀酒徒歌伴凋零盡獨自吟詩月下歸朱門朱門茅屋偶為鄰北阮那憐南阮貧却是梅花無世態隔墻分送一枝春謝劉大著寄惠玉箋皎潔分明如我鬢卷舒正直似君心三千里外情多少一幅真堪直萬金早冬湖上晴湖水落葑田乾白鳥飛來立晚寒楊栁不知秋已逺尚搖踈翠拂欄干遣興寄徐抱獨樓外垂楊啼曉鴉樓中倦客醉思家東風不管春將半一夜清寒勒杏花挽藝居二首天地英靈在江湖名姓香良田書滿屋樂事酒盈觴字畫堪追晉詩刋欲遍唐音容今已矣老我倍凄涼詩思間逾健儀容老更清遽聞身染患不見子成名易簀終婚娶求棺達死生典刑無復覩空有淚如傾江湖後集卷三
