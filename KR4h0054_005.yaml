body:
  text: 江湖後集卷五宋陳起撰鄭清之上清之字德源號青山慶元之鄞人嘉定十年進士原名炎字文叔從樓昉學史彌逺薦為魏憲王府教授理宗嗣位以定策功纍拜太傅四登相位封魏國公致仕卒贈魏郡王諡忠定端平中召還真西山魏鶴山諸君子時號小元祐皆清之之力亦南渡賢宰執也有安晚堂集方回云初江湖詩獄之興史彌逺議下大理逮治時鄭清之在鎖闈白彌逺中輟而陳起僅流配則起之刻是集蓋感之也按安晚堂集六十卷起所刻者十二卷末有臨安府棚北大街睦親坊南陳解元宅書籍鋪刋字一行今世所傳者缺五卷惟第六卷至十二卷存今葺自永樂大典者分為二卷共詩一百七十九首乃起所選入江湖集者也妾薄命妾有一片心奚啻金與石金石尚可磨此心終不易妾有金錯刀不買珠與翠一笑向尊前願買郎心醉姢姢桃李花東風蕩柔枝見郎郎弗顧掩面啼春閨不關郎意惡自悲妾命薄江漢亭百韻山川自髙深開闢由邃古長江㵼岷峨橫亘截區宇東流為沔津疏鑿仗神禹襟帶成奧區都㑹稱卾渚環城得修岡雄勝著臺府上有江漢亭慿髙欲鶱舉雲譙護左方南樓以為輔飛甍立嶕嶤才去天尺五星辰近梯級嵐霏日吞吐橫陳極蒼茫萬象互昻俯晴光敞雙明景物恣枚數炊煙接空翠下列十萬户榱棟出稜角闤闠分脈縷川塗競走集水陸跨重阻東南引湖湘西北控淮楚舟車所交屬人物森萃聚歌謡雜諧合來往紛傴僂溟濛塵蔽空揮霍汗成雨游蓋驚雲飄聮轡識驂舞驅馳溢阡陌時節相媚嫵裾袖翳朝日光曜燭綃組憧憧蟻遷穴紜紜繭抽緒亭亭肆遐睎一一可細覩至如城中邊萬竈宅貔虎春秋謹教閲什什而伍伍紅斾羅旌幢中軍立旗鼓氷霜貫戈甲雷霆震弓弩後先嚴車徒坐作中規矩被廬猶晉搜少長悉有序禮成既飲至絡繹還所部俯瞰了不遺清流數魴鱮乃若天空澄江色入環堵雲水渺相接斜陽落晴塢千艘卧平沙片帆歸逺浦微茫泛一葉咿軋響雙櫓報譯認檣烏航琛知海賈微隂轉層巒輕煙生宿莽棲鳥絶重瀾歸鴻集寒嶼夜深漁火明孤洲記鸚鵡晴隂與朝暮景色若誇詡方春及韶淑鶯燕爭鳴乳桃李出新粧周張環繡黼修眉橫柳堤遺鈿錯花圃孟夏薰風來草木自蕃橆翠幄帷清隂密葉覆幽墅入林梯空旻影團修月斧露掌逼髙寒金波沃肝腑隆冬雪紛飛瓊樓耀江滸萬花著林端晃不分細巨兹維四時媚代謝聽寒暑榮枯雖異撰去來莫追拒彼動此靜觀羣魚沸鼎釡紛綸各狀態天械發機杼或如懷袖物俯拾恣所取或如海陸珍搜羅寄庭廡或如觀大駕旄頭先鹵簿或如親校獵玉虬挖翠羽或富若武庫寶物窮積貯或麗若上林鳥獸羅禁籞或紓若綺縠或列若簨簴或背若相違或進若相與或蓊若興雲或林若率旅或驚若脫兔或拱若禮鼠或若雞出塒或若馬奔圉或變若龍蛇或怪若䝟貐或奮焉若讐或比焉若侣或矯若怒嗔或偃若戲侮或賸若贏餘或匱若貧窶或聚散翕忽或縱橫旁午或禽聲咿嚘髙下參律吕或人語呌噪歷落寫筐筥或以琴置膝絲音冝搏拊或時棊滿枰石韻雜珩瑀或欹枕髙眠胡蝶夢栩栩或相對啜茶舌本躍清語或暇日觀書腸腹自撑住或乘興飛觴醉後忘爾汝或即境揮毫圖畫入縑楮造物無盡藏儻來亦何忤俯仰已陳迹恍惚失處所逹觀萃兹亭宇宙一秬黍斯亭名者誰儒林得鼻祖昔賢維南軒心學紹東魯眷焉西南遊芳洲擷蘺荰遺墨尚淋浪𨽻刻照亭柱邇來三十年軒桷漸頽窳堂堂魏國孫玉節蒞兹土英聲凛荆揚盛事踵遐武曽候廬陵秀一笑不齟齬風月喜平分江山藉宗主興仆追前修遺蹟洊搜補飛翬抗雄梁石花呈古礎荒榛得竒觀幽思發新杼公餘多勝概往往壓諸庾賡酬駕元白光焰陵李杜領客共落成而我亦同俎半生嗟鏤氷一字不堪煮樂事紀末顛鴻筆愧燕許吾伊補書債欸乃效漁父儻繼竹枝詞編入武昌譜鄭德言親覩洛迦觀音相遂依所見繪畫朝夕嚴奉且求贊語敬題其旁具足圓通性一念本昭徹佛我與信心是三無差别凡人未見聖如渴以河說佛身忽現前如水印秋月心精自開遮見根匪優劣念中有大士珠瓔百寶結補陀洛伽相自在猶日揭是名為正觀倒想作竒絶稽首圓通尊兹念無起滅非相亦非念不盈復不闕唯然觀自在無眼耳鼻舌送繼一郭處士聖君如堯舜豈無巢與由計然亦何慕五湖一扁舟之人久不作側席思巖幽嘗聞鹿何君清芬徹凝旒重華錫嘉號見一光林丘誰謂雅道息競風日悠悠脫冠掛神武有士歸東州笑將金閨籍猛博處士裘鈞天為開顔曰此夷逸儔大書繼一字虹光燭奎婁宸章軼麟衮正聲出天球清名奬靜退下視古素侯睿謨廣先憲姱節追前修况今輯衆雋丞弼登虞周明時樂閒暇出處自不侔赤城宅仙子登陸方蓬洲君歸訪司馬坐忘春與秋方瞳照緑髮戲轉黃河流煙霞肅逋客隱者應輟耰欸乃輔行色春風生柁樓孟童子中異科而還來訪余於行都賜第輒贈以詩在昔昌黎公序贈張童子獨出超等夷芳名駕青史君門藹世勳敻軼西平李宗社方同休彪炳見孩稚天庭插犀角星眸炯秋水誦書如焦琴髙下涵角徴朱門共駭聽洗此筝笛耳老翁欲笞兒眼看拾青紫一朝聞九關賚豫出周篚我朝晏與楊炳炳貴名起願子志逺大勤學踵前軌家尊我相知作詩贈歸騎正月晦夕夢中作偈覺但記其首兩句遂於枕上足之録呈慧上人是身本虛妄覔主了無得誰知日用間顛到由六賊茫茫前後際生滅在空色賊去主人歸渾家不相識因筆記賊入空室頌平生一片癡妄意室中物自言富可待到了貧徹骨一宵入人家百寶認髣佛揀得真金身明處是泥佛惠墨老龍卧蒼海千年抱明珠神禹決淮泗偃蹇不受驅怒走嵩岱頂風雨撼八區亭亭立天柱化作青松珠蟠根蟄九地融液如流酥嶙峋脫支節幽人拾肌膚虹光夜穿屋盎突明膏腴芳薰漸凝漬𤣥霜出氷壺糅以丹鳯髓摹以青龜趺搗以明月兔曝之暘谷烏或潤似玉玦或堅如金觚六丁下取將香藹流清都絳闕注仙籍白日飛凡夫借問何神靈黑質分龍軀干將昨已至莫耶復來趨二龍適吻合變化尤其殊君看一滴水雙雙躍天衢和葺芷應直院送秋蘭韻大椿凌千秋靈芝競三秀書傅遞誇詡垂芳古今宙貴耳但竒竒相馬失之瘦誰知楚醒花逺避漢金酎擇交得素節彼哉懷春誘夫君全德馨內美本吾有姑置芝與椿秋蘭歲相壽東湖送藕與葺芷草木雖無知葉落能糞本榮枯遞乘除苖實自穮􅀈東湖百頃蓮夏日傲趙盾州家浚河渠獮剃甚耘墾長身萬柄荷髦梗付鍤畚寒煙尉青鏡時有白浪輥水解育仙骨根著泉源混外乾乃中腴下益寧上損淤泥胎玲瓏多節竅渾沌園丁亦善沒擘波沸魴鱒象株忽仰浮登岸殊衮衮誰知絳縣塗可試平叔粉名非玉井船實過秋蘭畹殽蔌雜燕豆葅菜補中壼交梨能養生萱草亦忘忿空言出好事孰與津燥吻贈君擬條氷差勝羞藻蕰林治中鄭廣文以詩來遣魯酒報聘拙語輔行長公本喜飲半入野人腹南洲春夢婆亦復開醉目尚想晉流麗鱉飲更升木興來索老兵誰謂酌可獨我亦愛客至陶巾時一漉雖有彭澤田種秫若不足頗因病入務瓢棄尚餘緑豈無大雅朋來伴離騷讀廣文餐簷花和靖峙修竹交情如酎醇秀句喜心沃觴政嘗卜夜談闈屢更僕胡為閟宇芝但憶頽山玉聊爾遣書瓻安得洗愁斛昔誇聖人中今愧平原督原注今歲家釀殊末佳杯手助持螯車涎笑逢麴青州豈烏有白衣問黃菊如臯應解顔對飲頗勝俗原注梅聖俞詩獨坐與婦飲頗勝俗客對何時赤壁游匏樽笑相屬欲歌鹿鳴三正若龜藏六飲肯遺公榮雨煩過御叔欣聞麥兩岐况有魚百族小郤揖二豪觥船倒醽醁謝玉泉君黃伯厚和韻卯飲貪引巵夕食不猒腹松醪灔玉池鬱尊傲黃目歸閒喜擕幼欣榮對夏禾頗笑屈原醒寧甘馬周獨詩筒發豪思江月欲戲漉每賡北海詠未羡西鄰足槽規長吉紅蟻玩杜陵緑醉鄉擬續記書眼瞭可讀時康萬户春興到七賢竹筵虛艷姬舞靣想宫嬪沃别腸驅藥使健筆命騷僕居然得良朋清辭㵼壺玉習池可聮乘步兵有餘斛原注步兵厨有酒三百斛誰能酒限拘强效八州督今年小麥好豈屑官廩麴嘉節迫蒲艾早計數茰菊客中真有佳眼前喜無俗賦殷金石聲光粲斗牛屬句到後三三人誰賽六六試編諸賢詩第以伯仲叔共成杜康傳更聚山中族萬事付亡何乾坤一杯醁諸君和篇摩壘致師不容閉壁再續前韻平生周伯仁耿耿空洞腹翛然猿鶴姿豈辦鳩鷹目僕射不解事居士偶題木種柳僅成五樂園秪可獨皓首愧商隱湛恩霑漢漉城府百無有丘壑一已足詎省醉裙紅安識墜樓緑生經未渠諳酒頌聊喜讀耳熱聞秦聲浪謂肉勝竹髙陽有勍者盛氣如曲沃直須殿上飲撫床徑呼僕競看碗揮金幾欲斗撞玉方丈食萬錢娉婷珠一斛豈復堪束帶靡徒揖郡督耆壽祝老叨嘉名艷春麴乃知梁州萄大勝伯始菊相逢作青眼洗去爾許俗泠然曲寡和尚有騎能屬元和一漁翁喜共學士六吳歈閒雅奏楚優效孫叔石鼎夜未央春空雲已族何當一㑹期清歡溢寒醁邴原解劇飲雅名稱龍腹季倫殺為嬉席妓敢嗔目有酒何庸辭恐射蔣濟木但當擕酒去明花賞幽獨年秫未足了原注孔羣聖米猶可漉原注杜悰愛屐憐猩魂奪巵笑蛇足桂漿有餘芳桑落見重緑諌逺衢尊投法置酺飲讀籌觥進蓛肴流觴屏絲竹未憂瓶罌罄但費匜盥沃勝事在園林家務付兒僕原注陶淵明傳釀羔截肪乳炮鳯泣脂玉錬句丹九轉摛文泉萬斛競詆酒中賢抵看帳下督穿幘俯前案障靣厭方麴原注楊愔語魯漫漢事吹不落眼花原注樂天詩歸去采籬菊華胥國遨遊無懷氏風俗登詩壇爭長破愁城相屬二簋用坎四三客敬需六共樂時方清誰言世之叔相從孟公座寧别輔氏族原注謂鄭廣文也一笑祝諸賢行釂天家醁原注今內醖上尊扁以醽醁再和戲黃玊泉黃公辭酒壚經笥捧便腹讀書飢鳶聲了了崇文目陂澄萬頃波巢寄一枝木戲題百姓眼自笑孤館獨轍涸聊相濡神液未容漉嘯歌非彈劔悁隘殊躄足文織犧尊黃句弦綺琴緑不見蟹杯持徒費爾雅讀坐對罌卧墻空有葉映竹枯腸但茶搜燥吻遲原注去聲膏沃主人如馬庾酒使缺猩僕原注封溪令事思折酤媪劵欲訪義漿玉喟兹鯨吸量眇矣龍驤斛靈根日灌溉詩課自程督試當閲醫經薄釀借神麴共醉靈均絲未問長房菊飲興非有期衣曬寧免俗杯勺雖不勝嘔泄聽隨屬懶疊陽關三肯競梟博六不飲但麥豆頗勝劉文叔醉騎黃犢孫歸玩墨君族子為評酒名擬號安晚醁謝葺芷和韻無詩不言酒原注荆公謂李白無一詩不言酒作賦真狂腹未破公子慳况與佳人目壯心思擊壺聖杯賡啄木原注樂天啄木曲不如飲此神聖杯袖想胡旋雙粧記搖手獨原注見陳陶獨搖手行賔筵乏酬獻醴齊催泲漉禰衡辨撾鼓元崇方病足曾無列屋粉空韻梳鬟緑百篇謫仙詠十軸蒙溪讀原注見顧雲池陽醉歌有美建安璩競爽淇園竹芒端寒燠轉胸次古今沃卧甕嗤舍郎祭酒可令僕原注漢僕射中興改祭酒時陳南北洗頗醉東西玉雖微醖五斗端有才一斛詩壇長齊盟筆陳嚴總督方將喝銀雲未肯平封麴原注李賀酒酣喝月使倒行銀雲櫛櫛瑶殿明陸龜蒙中酒賦拔酒樹平麴封宫宴看傳柑帝歌須和菊原注德宗作黃菊歌翰林學士韋綬奉和牛心固異撰犢鼻且同俗尊酒日相逢我歌君為屬歎期踐三五釀頃虧十六原注樂府庾信對酒人生一百年歡笑惟三五王績有田十六頃悉以釀酒酣暢嗟阮修飲狂謝裴叔原注裴叔則語石崇云飲人狂藥責人以正禮窪尊留古製長勺分魯族居然同老襟淺斟醽水醁原注湘東有醽水故酒得名謝鄭廣文和韻鱣堂心醉經精神應滿腹溫飽非所志飲食不以目原注溫公謂今人以耳而衣以目而食說詩稱解頥善問待攻木頗愁百斛量孔庭惟立獨俎豆答衛問筐瓷缺鄒漉原注見鄒陽酒賦曾子非養口漆園且尊足時於清夜分酌以翠勺緑原注緑尊翠勺為君斟酌聊澆磊磈胸不廢吾伊讀每篇亦作句原注君之來詩每篇必有亦作語如對記書竹相逢蓋初傾一别桑重沃融尊慚坐滿魯餽踈拜僕衛生不自寶抑首親患玉囊無諛墓金米乏佳傳斛厨煙㸑人清蔬果園夫督粟瓶收秫田黍釀用隂麴解同杜陵襟期醉昌黎菊赤手當縛莵原注來詩語有白戰之白眼謾嗔俗莊虛左氏宴觴肯西子屬酒債尋常㑹期遭百六要須中聖賢庶以展伯叔醉入無功鄉醒起屈原族原注漢徙族屈昭景大岸幘一笑粲共賦醽酒醁贈已訥二老軒原注青山惠安寺吾聞墨者徒設教本兼愛釋伽𢎞其源方識宇宙大河沙與寶塔平等了無礙夫何佛法衰涉晉唐五代祖師南北分鼻孔爭譎怪傳流各衣鉢紛綸辨宗派爾來三百年涂轍日以隘教律復異門禪機亦殊解訂以大小乘森若立矛介虎豹自狰擰蛇龍相噬嘬駕空樹金碧爾汝别疆界蒲盧學抱子嗣續植根蒂蝸爭競蠻觸夷樂騁兜佅裘屨無二顔楚越隔肝肺天􅋶苦羈束心穽堅莫壞之人良可悲賢愚固難概誰知已訥公粲粲發眉采少年摻袂遊瓶錫遍湖海是非不關耳窮逹付長慨晚歸耕石田禾枯將種稗唯有舊家山青眼終不改掛笠寄清樾編茅客缺噫目之維摩室而無天女在謂是龎公居似缺孔明拜强名曰二老當索形骸外泉石日幽雅松竹森蔚薈軒窗抱巖壑胸次絶瑕纇睡起聽粥魚微雲初霮䨴宴坐圓覺埸忘言默相對二老容于軒須彌納一芥捨軒求二老怒風號大塊軒以二老名未免蛇足畫請更以不二免為軒所賣我為說偈言聊以贖詩債東湖誰將東湖光斂作大圓鑑千峯就妝束萬象互窺瞰紅消日腳明緑净山影蘸我來一登臨扁舟聊可纜次抱拙妾薄命落花流水何紛紛三分春色二分塵黃鸝繞樹戀不得蝶蜂浪作花都巡昨日繁華今寂寞飄零多屬風雨晨金谷無人粉香死錦踪繡跡俱成陳世人重花不重葉林園自此無精神東君年少時酷愛枝頭花庸奴桃李妾姚魏滿蹊未數黃娘家一朝棄背春風老懶踏長門階上草芳菲特暫歡顔色不長好白頭事人那可期不堪重賦章臺詩和鄭制幹謝借居且惠朋樽醉螯詩平生愛山林里居想王屋孤月自無朋斷雲曽不族詎知嚴遵市倏有賈誼卜西河就索居漆園問尊足翟門羅可去軻宅仁已熟似聞結駟多每見後騎屬魯臺時遣餽監侯已發粟競歡王儉蓮肯問顔公粥家貧願鄰富蒹葭欣倚玉頗容滑稽叟來簉堂上燭猶能辨絲簧漸近不如竹濁醪慁嘉醖庸行參聖讀願為善頌禱既醉備五福謀婦擬提壺敲門驚啄木持螯兩從事來就桑下宿美味均適口雙明喜增目命駕匪千里星言愧不夙聮句乏追韓補詩聊繼束終當效樂天駱馬為酒鬻拙偈調偃溪上人昌黎先生入山裏大顛牢把數珠子松下經函著净瓶照管習之翻却水丞郎滿擔江西禪行行勘辨鼻撩天偃溪爛嚼雪窗紙換却舌頭别參起贈許石田為僧平明對鏡良獨難子能脫屣彈指間戲視此身如髦蠻冠巾擺落逃濡關千鈞强弩一笑彎萬錢買盡江南山厭渠世路車輪殷赤腳健倒蒼苔斑參寥佛印若是班江湖風月不汝慳汝狂方醒衆所歡我獨見之為三嘆辨詰孔釋語可刪白雲深處輸君間靈隱慧上人惠詩為古風以贈貫休齊已唐詩人當時逸氣凌簮紳聲名亹亹逼甫白幽蘭直與梅爭春誰知北靣石霜老服勤杖屨皆終身二公所得當蓋世英詞傑句風中塵至今傳者以詩重妙處反為詩所湮㺯翰戲墨雖佛事炊沙作糗成飢嗔不欲詩工與字巧緒餘能奪道之真心宗一了萬法具辨才飛轉陶家輪君不見阿難多聞及辨慧呪語要敵摩伽神乍晴觀蜂房戲占蜜蜂家計千頭奴日併花課供蜜租粉紅黃白各本色擁腫雙腳尻為車採花歸來不知數一一到門如合繻方春乳房湧金屋子弟分王遣之國廣輪處處成甘州饞口嚌嚅不遺力蜜脾割盡到蠟膚畢歲辛勤用謀食秋深冬早未見春嗅芳咀華來藻蘋釀成餱糧香滿室日日飽衙知愛君問誰食蜜還主臣阜財富國今何人和葺芷筍詩我貧每笑齊之斶晚食雖甘未忘肉梅肥尚餘風折緑溟涬餐英命騷僕藩籬剟彼羝角觸送似玉堂如楚束惡詩聊賦徐凝瀑妙句飛來潄鳴玉曽無導吏隨賈餗坐遣跛奚委葵菽茁芽勤視緣坡竹期飫伯仁空洞腹書腸膏腥士之辱得魚不敢餉羊續要知菜味勝山谷步趨强顔髮曲局盤有美茹無不足陋矣王芻箋淇澳田家老農喜說田家早缺月踈星穿木杪洗錚燎草作晨炊麥飯咽甘蟲食蓼兒牽秧馬婦擕笠泥滑不嫌春雨少平疇拍拍水連堤姑惡數聲天欲曉水急船行頗遲湖流湍駛欲下瀨舟人挽牽如蹶張空令百丈重牛首如何萬斛浮龍驤進寸退尺天未定暮四朝三風作强遲明檣烏幸西望看取快箭激修房重賦章臺楊花滿地飛蝴蝶叉梁露濕羅衣怯臉痕玉潤拂紅膏顔色如花命如葉鯉魚風起蒲葉香鶯啼燕舞春日長墮紅殘蕚斷君腸誤逐浮萍轉零落自古佳人多命薄畫馬圖房精夜隕渥窪水中有天馬變如鬼籋雲流赭登玉臺清風謖謖生雙耳無端遣入天子間足底百趼如關山隔河唐將浴牝馬哀鳴頓足將奔還風毛雨鬛不自整肯顧苑北雲錦斑但有風稜餘瘦骨竊銜不管霜蹄蹶大星昨夜落旄頭好載閼氏媒突厥舊冬得蔞蒿數十根植之舍傍今春遂可採擷輒持羾黃堂拙語先之聊發一笑蔞蒿見録爾雅篇族譜系出荆楚壖居人採擷不論錢橫道躪躒如車前物有貴賤所遇然雞壅豕苓以帝言世間何由正味焉嗜艾昌歜性所便氷壺先生虀瓮傳敢驕玉食輕膏羶天隨酷謂杞菊賢一賦金石聲相宣玉糝羹芋稱蘇仙天上酥酡能比肩憶昔客授湘湖偏乍逢此蒿口流涎嚼寒氷玊香滿咽紺滑琉璃鳴貝編糅以豚膏軟如綿脆甘豐膩潔且鮮天花石耳羞爭姸木雞退飛山之巔笑渠茅蕨成兒拳岸視橰圃眉宇軒七葅五菜誰敢先獨能兄事玊版禪一别楚産知幾年孤根朅來植鄞川春苖出土含曉煙援條小摘喜欲顛故人千里方言還調芼酌之雙觥船枯腸慰滿藜莧緣食芹而美不敢専遣送兵厨羞爼籩噴飯一笑篔簹邊靜樂用元韻為勸學之什再和士惟食志非食力於陵奚事親屨織靜樂一門自師友簣進不為子貢息元仲季方從太丘海內人士俱願識案上惟作羽籥聲室中定無鉏帚色申旦督課如園蔬子夜程書過衡石舉似翁嫗笞其兒教育英才笑安得文獻超羣王謝家韋布當磨鐡硯墨再和勸學韻仕學優於服田力公儀之家廢葵織詩書為府道德林樂在藏修洎游息濃薰班馬有餘香暗模曹劉豈難識插架牙籖映隙曛近竹藝編侵晚色諸生競詫邊腹笥正音如聞孔堂石從知車馬自稽古須信熊魚可兼得四科褒進惟尚賢欽想昌黎方讀墨碧扇行氷蠶吐絲青唾茸天孫轉機聲隆隆帝家初裁新樣月蒼然正色摩寒宫一朝飛隨烈士手九關自此無剛風乘鸞女與蒲葵翁癡翁騃女誰為容吳剛斧頭紅玉篆并州剪刀快如箭化工持此天然巧古璧團團照君靣長安四時生麴塵馬頭搖曳春風轉君不見醉李白窮杜甫當時西游乘蹇驢太清獻賦動旒冕脫靴笑視將軍奴竒哉二子真坦率朝暮貰酒黃公壚游蓋飄雲手遮日未省有扇如清夫清夫扇子僅盈尺買斷清風歸嘯廬何物元規敢相汚醉中祗恐李杜呼我當吮筆和墨喚起文與可把君畫入李白杜甫圖適得滷蛤頗佳遺餉菊坡因記曾作蛤子詩有文身吳泰伯緘口魯銅人之句戲綴前語代簡文身泰伯甘斥鹵緘口銅人舌微吐借資墨客富濡沫原注滷乃墨魚之瀋骨醉唇香登燕俎半熟含酒老叨賦此翁僅可闖堂户班班雋永帶神液入室真味翁未覩菊坡風裁黃豫章如食蝤蛑江搖柱盤餐盡廢太瘦生格逺調髙自清苦子蛤遣汝到眉桉努力去為酒中虎原注諺稱海錯醎者為捉酒虎未下醎䜴有何好猶似蓴羹傲傖父海之介夫此小兒雞肋見笑楊德祖前身曾作水解仙飛入珠宫飲甘露能令齒吻䇿餘烈一鼎松風潄寒乳客有誦袁蒙齊得雨酬倡之什輒賡元韻志喜也呈虛齊使君雷伯四月瘖無聲鳴鳩呼婦鳬浴晴星如撒沙燈吐紅羲和駕鞭乘赤明稚秧針水未入種秀麥浪畦猶督耕香車不動百龍蟄轉轆如織千蛇橫愛民太守心語口癲我以旱寧無生川靈有知龜亦許異物蛇蜒歸掌撫一雨果從方寸來此念端誠本天與但看父老歌豐年不用兒童學皇舞弭災肯效欒巴噀哺民無異紫芝乳一年事在阿堵中四封笑溢迎門語我州瀦野同淮徐公方有意六輔渠上天下澤鍾惠施千里波及皆君餘蒙齊詩成虛齊和我樂賦之如遂初坐對聨珠飽官粟但有歡喜無欷歔祗今快續二賢詠不須乞米移顔書育王老禪屢惠佳茗比又擕日鑄為餉因言久則味失師授以焙藏之法必有以傳之笑謂非力所及漫成拙語解嘲録以為謝曾讀茶經如讀律一物不備茶不出未論煮瀹應節度第一收藏在堅密摘鮮封裹頃焙芳濕蒸為寇防侵疆朝屯莫蒙要微火九轉溫養如丹房育王老慧老茶事新授祕訣乃如此幾畨惠我先春芽朅來細問茶何似我初謂師茶絶竒十日之後如飲糜頗疑緇俗果異撰良苦輒為居所移吾言未終師絶呌為茶傳法恨不早綺疏應合有司存料理如前毋草草對師大笑喜欲譁三年宰相食無鮭長鬚赤腳共井臼荒寒政類山人家扊扅炊盡瓶笙吼何曾敲雪春雲走不如時扣趙州門侍者可人長摸首江湖後集卷五
