  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4h0054_WYG_002-1a, image: WYG1357/WYG1357-0735a.png}
body:
  text: 江湖後集巻二宋陳起撰劉子澄子澄字清叔泰和人曽知棗陽後較畫軍事為賈似道所忌劉將孫稱其有史才所著有平淮疏補史行於世事見江西通志案宋史子澄坐唐州之役削秩而敗衂實由似道故志書云然其詩亦有和似道者盖一時倡酬之作也集名玉淵吟藳憩南臺寺居塵等出家涉世類行脚岳靈招我隠雨止雲亦閣乾坤錦囊収風月麈柄握衆鳥各自鳴豈礙冲霄鶴䝉泉行呈張敬父玉龍蟠向荆山麓噴起雙泉氷雪瀑琮琤萬古作寒鳴冷浸一山渾是玉泉旁樹老亦如龍泉根石濯瑪瑙紅更有金蓮吐泉底歴歴星在銀潢中池光六月如霜洗藍橋倒影壺天裏流下人間灌稻畦嵗嵗家家飯雲子我行荆州見山少忽對林泉如久要張侯引我飛羽觴勸我為泉開一笑我歌數語泉應聞兹山古號荆州門英雄過者心在鹿安得泉聲到耳根曹瞞疾馳𤣥徳懼潘璋設伏雲長怒早知成敗等丘墟悔不解鞍學巢父英雄何在水長流閲盡英雄過未休今日為侯泉上醉明朝西指鹿門逰樅陽出陸浮家無定日仕在水雲鄉棹别洞庭月帆迎赤壁霜早寒裘代葛多病藥充糧明日樅陽客征鞍去路長過鴻宿洲洲名號鴻宿流徙合来居淮郡侵江宻人烟罩水疎無山供笛竹有港便罾魚壯士休營業功成返故廬逰石門縣層山流杯亭觀卓錫泉寺惟泉㝡古有詠載州圖㡬度流觴了長如卓錫初楚山閩老住隋柏宋朝枯雨後人耕急荒岡帶月鋤董宰見和用韻留别謾辱君相送我行非壯圗客程来又去人事久如初句淡僧能和泉靈旱不枯升髙莫怨險世路爾能鋤武陵别任年魁詔書應在道君但趣行装去棹乘桃漲朝衣帶芷香歸齋尋舊話上殿拜新皇論事依經好平遷是玉堂夀星寺江湖偉觀豈不近京都紅塵此地無吳山青似越江水白於湖天接帆邉海烟生樹外晡危欄僧共倚莫恨旅懐孤㑹真觀水簾原注有晉石天尊像又唐鬼補鐘觀近朱陵萃列真烟霞雖僻境長春若非火府煉神處安用水簾遮世塵古像著靈多是石補鍾留跡似非人尋源亦有桃花澗莫是山山可避秦厲漕飲别海棠下索詩天然翠袖隠豐肌好是胭脂未透時夜睡無香供蝶夢晨粧有恨只鶯知坡仙具眼猶燒燭子美多情却欠詩料得錦城花正好怨公厎事訪春遲又和著雨胭脂沁玉肌絶疑妃子醉眠時未邀佳客閒来賞已怪逰蜂早得知燒燭不妨循故事巻紗何惜賦新詩羨君立就花前句我欲賡吟思苦遲雲峯寺詩原注寺在雲宻峯禹得金書樵人見碑䖏也上有丹窖玉牀禹溪治水神書在此祁溪名猶似念胼胝當時民墊賴誰力今日地平惟佛祠泉出玉牀疏作乳火生丹窖結成芝雲峯自有樵人徑岣嶁尋碑誤退之逰岳麓宫抱黄洞連天七十二雲屏真境先於翠麓呈洞發金光丹氣結泉疏乳白玉華生江心鴈影重臨字谷口禽呼自答名閒步不教方外覺破烟雙鶴已来迎雲中寺地僻層雲巋古禪我来訪古尚依然越人重見流觴水隋刹猶存卓錫泉石罅遺題思往蹟巖隈紀事憶前賢可人不為時摩拂朝暮青山一抹烟登祝融宿上封寺詩并序淳祐壬寅九日登衡之祝融風輕雲斂氣候如春四盼神州流峙縈帶天低日近漏禪祥如金虬夜宿上封寺見軫宿掛簷北斗可摘晨起視羲輪湧出光變萬狀因思衡之視岱距海為逺而日觀乃與岱等則其髙並岱而壓崧華也審矣因賦唐律命男拱辰書之祝融尊與岱宗齊仙境今容佛屋依曉揖日輪知海窄夜捫星軫覺天低風髙殿悉杉為瓦雲冷僧常綿作衣莫剪光天壇下草時廵要秣六龍嘶江陵逢黄虚舟山谷機忘似白鷗有孫今復號虛舟信風為棹先開浪與月同艙不載愁吟就自將歌欸乃醉時寜逐境漂流乾坤等是虚舟爾只好和詩莫帶休和張功曹清明之什蘭江無物可闗情春去春來感亦生流水幾畨供褉事新烟兩度過清明念鄉鵑淚和花滴懐友鶯腸學柳縈讀遍離騷詩自慰世間無地不蠻荆和賈秋壑南樓韻大別磯頭江漢合烟波堪詠亦堪圖山標禹貢他州有水列周南到處無鶴外聲來蘄笛逺鴻邊影落楚帆孤豋臨此地陪秋壑收拾乾坤寘玉壺過金陵總卿吳履齋以詩贈別用謝六朝三百有餘期不滿詩人一皺眉只有燕迷新巷陌更無鳯集古臺基兵於史傳多陳迹酒與江山是已知僕指長淮又西去輿圖向後更誰披林逢吉逢吉字表民東魯人有天台集玉谿吟草嘗修赤城志及自為續志三巻世多稱之按張榘有留別耘業林逢吉飯牛翁鄭簡子詩云天台山下兩詩仙則逢吉本魯人南渡後流寓天台者也寄題鄭熙寧夫玉軒良玉本不琢大音無希聲觀君命軒意欲以詩自鳴君詩志古調考擊參差韺冷冷澗泉泣切切谿條清孚尹露涵采潤美月泛英昔聞洛山中種者須其成非希咸陽價匵韞那敢輕用之薦穹昊何但鬼神驚凉欲覺庭葉夜疏耿鐙驚一讀一啓予古調真難評重建神秀樓慨昔淳熙初忠定守郡時樹樓城南門衆秀皆來歸挿空繚千嶠注海合兩溪雲眉扁古𨽻蛟鳯躍出飛西瞻建標霞東頫採菊籬循環一甲子天假兹良期象賢宣祖烈布政軼吏師乘暇陟危級更新敞前規肆開落成宴鐙月交明輝傑棟小芳桂修梁薄辛夷空濶渺納納青紅濕離離太平畢文簡慶厯元厚之猗彼三碩輔勲業疇或非公今繼其躅嵗月幾推移魏謩寳遺笏鄭武緇舊衣過者豋斯樓咸誦金石詞郤笑楚臣作空因秋氣悲簡許逺元寮問雲從何來明月翳光景須臾忽破散依舊寒炯炯問月何能照月亦不自領雲來非我過雲去非我幸無心付無事雖巧不能逞幽人起寤嘆婆娑弄清影世人有萬端令人發深省送天台李明府貫一歸越赤城譚舊令為政且鳴琴澗瀑知清操山雲識苦吟自甘微賤拙誰信勒碑深歸路春風近烟花繞禁林餞台倅王司令幾叔參釐天府黼坐頒泥檢黄圖駕玉星自應攄學業端不藉門庭凍日湖梅白春風院柳青從今亨路去台嶺記曾經山齋書事掩巻聽蟬韻憑欄數雁行井風梧葉雨籬月菊花霜又見秋將老那堪夜更長愁吟無語共殘灺落書床挽都梁太守洪季輔寺丞鼓吹舟歸日軍門巷哭時身抛淮郡印亊入峴山碑敵在家何用城危孰與持墓門今已閉千載使人悲次韻酬陳之道明府見贈為政鄱君日劬然似苦吟光前還照後行古却居今危世道猶直故山春正深露生觀庻物清坐更觀心送王季和文知施州二首皁蓋蠶叢去青祗鳯厯頒雪林猿呌峽春院鳥啼山文字傳三楚恩威化八蠻政成明主召九虎啓天闗宿幸依劉表時䝉説項斯方為感知賦遽作送行詩萬里通吳蜀千山隔夢思江頭野梅發應記共吟時送淨應老道源往浙右片雲離海嶼吳地去隨縁托鉢應行乞升牀亦坐禪舟停上塘雪寺隔過山烟刺史知聞舊無須覔鏡傳訪懐遇師獨隱重嵓裏全無物役心禪因秋月悟詩對晚雲吟訪古猿驚錫抛生鳥上林相知今十載不憚逺來尋送祖太長老住虎丘吳國前朝寺懸知補處難岳雲迎外度海月定中觀子去揮犀拂吾當賣布單梅花知別意無語澹相看初夏别墅池館春方謝連朝雨似烟亂荷藏睡鷺繁木集嘶蟬地僻觀書樂心清得句𤣥野僧時過我擕手弄雲泉寄餞趙清中主上元簿六代舊都遺跡在詞人懐古去豋臨長干塔上青山逺𤣥武湖邊碧草深肯把簿書遮望眼但圖方畧副焦心平江大海雖吾願臺閣須材必訪尋寄聖水老法照五載禪林結淨縁又飛一錫過甘泉曉池洗鉢雲常潤夜閣繙經月自圓碧眼誰參庭畔栢赤身難並社中蓮飽看勝景多佳句好為閒人寄一篇送薛子範明府歸永嘉天台邑債今還了未上清班意若何行李比如初到少鬢絲贏得近來多民輸界首攀車送君向城隅枉騎過恨滿東風不能到柳邊鶯語即驪歌次韻劉允叔丈主簿讀予所編天台集見贈之作樓頭殘月映儲胥人在西窓酒醒餘夢裏都忘閬風路吟邊如到玉霄居鄰牆共作無何飲别墅期看未見書祇恐弓旌便招去漢家答詔待相如輓王房州伯洪崇牙出鎮古邊頭名與龔黄共一流方見勒碑歌善政忽驚罷市哭仁侯燕飛古巷人千里梅落寒溪月一樓前亊已非那可問晚雲零落緑山稠輓開府宋公五朝大老今誰是曉月長庚可愴然王某曾當揮制日伏生將及授書年雁峯去就朱輪養台嶺歸從白布纒秩視冡司優贈典夜臺光寵射穹躔輓新昌王明府吉甫不見髙人祗自悲每哦佳句望烏衣浣花風月參謀去採藥溪山茂宰歸萬里險艱頭已白半生功業夢還非阿戎盍上青雲路奕世清門要發揮輓處士張君扣龍泉了探慈湖倦矣歸擕一束書白首功名銷壯氣清溪游釣樂閒居山人寧有趨戎幕方伯今誰顧草廬鄉舊凋零無復見北風吹雨更愁予次韻沈興之税院嵗暮即事二首一櫩寒雨滴愁聲贏得松齋睡思清急景不知年又謝壯心空悵事無成温存凍壁火初舉陵鑠破窓風自嗚多謝故交相慰藉浪捐珠璧使人驚穿雲時有一鴻聲喚雪風來冷更清臘意未教梅蕚老春風先放柳條成亂離每嘆兵難戢貧賤還憂道不鳴節物一番空自好暗添年紀却堪驚題大慈寺兼簡照講師來從金地過銀地智者修禪古道場疊嶂倚空圍日月穹聳松壑飽風霜碑文多是唐人刻經巻猶隨煬帝藏偶值故交初入院一鐙留宿水聲房梁民曹以二首為小園木香光寵次韻抒謝春風珠幰走青虬清夜西園誰共遊十里水邊渾似雪喚船應是誤王猷攀條折蘂屬騷人遲恐顛風掃玉塵如付枕囊供醉寢繁香薫骨解留春天台邵明府履善遺牡丹各一絶人間興廢手摶沙喬木猶存少故家不見石邊題甲乙空餘姓氏落名花原註牛家黄一春苦雨又憂花爛盡秧根榖再芽見説雲頭紅可喜老農猶恐是朝霞原註雲頭紅可是東皇雨露深不成一字亦腰金世間大有麒麟楦對此誰能起媿心原註金繁腰一枝美過玉柈盂嵗晚何由復遇蘇我欲命名名不得有名無實不如無原註無名種懐仙橋晴雷晝夜激奔湍澗草巖花亦耐寒劉阮茫茫空仰止恐乘風月一鞭鸞送倪平仲髙士歸天台緑章封事歩虛仙來自東皇太乙邊滿袖明珠出光怪又隨溪月上歸船桐栢山髙空翠寒夜深星斗近仙壇下宫銀瀑三千丈付與詩人雨後看同謝鄒訪平老江湖包笠今閒郤黙坐惟繙貝葉文耳重嬾聞時俗事客來聊薦一甌雲送宗鏡上人歸剡因寄聲髙九萬孫季蕃送師歸隱鏡山中萬壑千巖指顧間菊磵花翁如見問為言憔悴老江闗神剜天劃成巖洞横亘危梁接應真垂下玉虹三百丈雪花飛濺一山春一僧禮拜能行過下靣人看膽亦寒月出幻成銀色界始知方廣在林端隨處禪房有水聲我來石上坐忘形臨行更酌潭中渌要洗多生業障清夜豋桐栢上清閣雨過中宵夜滿空一山松竹韻溪風披衣獨上上清閣身在半天雲氣中新昌道中殘村時有兩三家繚繞清溪路更賖客裏不知春去盡滿山風雨落桐花剡中詩遺踪曾記晉諸賢乘興今無雪後船斷塹毁垣難借問甎文猶著太康年題方叔所藏馬中逺春牧晚歸圖一抹東風樹色新牛羊莽莽散平原微烟細草知歸路竹塢人家半掩門次韻王亞夫景存縣尉送春二首欲勸東君盡一杯臨岐無語獨遲回晚風自有留連意逓得鶯聲過柳來豋臨長是愛清暉晚嵗知心亦自稀永晝松齋掩書坐却看梁燕引雛歸題六馬圖二首駿影爭馳意氣雄被塵晴苑碧溶溶誰將妙筆開生靣霧鬛風鬃慘淡容龍媒要是龍眠筆意在能空冀北羣老我惟知賞神駿何時變化上青雲同錢則父豋郡城觀予所和梅仲潛金山弔東魯林表民逢吉詩淮民同賦一絶水落寒沙晚照收沙邊誰復艤孤舟鮑昭自作蕪城賦難寫江南不盡愁案此首不知作者姓氏題字疑有錯誤原本附録林表民詩後今姑仍其舊江湖後集巻二
