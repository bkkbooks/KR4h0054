body:
  text: 江湖後集卷十五宋陳起撰王志道志道字希聖義興人有閬風吟藁題大禹廟古木夾幽徑森嚴夏禹祠隂雲護陵寢遺廟鎖蛟螭窆石今猶在梅梁事亦竒道人情意厚邀我讀殘碑和半庵慶成詩韻重屋祗承敬勿休前星主鬯二凝旒度筵九尺陳黃目助祭諸王未白頭精意已知通烈祖儀文元不減圜丘兩階屢舞苖民格何况金穰嵗有秋賦江湖偉觀東南王氣萃錢塘襟帶江湖國勢強萬頃煙波流德澤四時絃管樂豐穰帆歸别浦魚鹽聚雨過平堤草木香欲賦上林才不逮舉頭三祝壽無疆簡中朝貴人場屋辛勤債未償又隨宦轍到河陽米無五斗腰徒折醋有三升鼻慣嘗屢典朝衣賙過客時沽坊酒滌愁腸此心對越知無愧午夜爐香乞嵗穰挽趙右司化瑟初更世道清宗臣只合在朝廷謀猷况已彌台衮姓字尤當列御屏不向紅雲鳴玉佩却隨丹旐引芻靈象賢喜有金閨彥全似先生舊典刑和秋浦聞雞偶成窗前銀燭熖將暗樓上梅花引已殘忽聽雞鳴思起舞百年王業尚偏安日南長至小飲於雙清樓坐客九人皆一時名勝各和灣字韻詩豫亦效顰以謝一杯春酒對湖山逺勝夷猶緑水間覔句未工天欲暮碧雲飛滿舍前灣寄興五湖深處足逍遙錯把扁舟繫栁條塵世不如煙水闊笑騎黃鶴上層霄僑寄山居霍然幾月凡見之於目聞之於耳者輒綴成絶句名之曰田園雜興非敢比石湖聊以寫一時間適之趣云爾幽居無事屬山家閉却柴門日未斜啼鳥一聲驚夢覺小窗間坐聽蜂衙羃羃黃雲麥壠秋牧童橫笛倒騎牛百金買得葫蘆扇持向田頭蔽日頭雨過天青似蔚藍碧雲收入鱯魚潭蠶姑舉手交相慶趂得新晴老却蠶早蠶上箔將成繭晚界蠶方起大眠兩月辛勤敢胥怨成絲成絹更成綿樹頭桑葉似穿錢凖擬今年賤似前誰信天公難預料今年却貴似常年紡車才了辦繅車澗水當門足漚麻輸却官租償却債今年猶剩百斤茶自從巡尉罷搜茶便覺山中氣象嘉賣得錢來供飽飯尚餘醉酒插山花漠漠輕煙護鵲巢楊花無賴矗天髙粼粼白水秧疇滿省却年時灌溉勞樵得田頭二麥歸做成餅餌飽妻兒農家喜有耘田本接到秈禾稻熟時新竹成林猶帶粉早秧出水便成針日長門巷無人過一覺齁齁夏木隂和峴窗韻是日也適赴座主西湖社日之宴雨餘西子濕香腮那得心情滯酒杯浪逐畫船分社飯也教人道賞春來秋早過湖漠漠輕雲冒兩山樓臺依約有無間畫船未出波光定一目新鴻度栁灣和髙簿送梅文如翻水艷天葩始信才猷屬故家為愛新吟貪咀嚼霜髭撚斷日西斜多君時送早春葩不減孤山處士家留取水窗和月看夜深踈影正橫斜標格清竒壓衆葩數枝頻到士元家情知老大花應笑強飲從教醉眼斜屈曲溪橋路兩了淡煙如隔小櫺紗南枝已入詩人手三弄從教咽暮笳逺望青山兩髻丫水紋風細皺如紗不知逰冶誰家子也捲黃蘆學塞笳花底莓苔蒲樹丫翠翹玉珥碧襦紗靚粧雅器鳴琴友不向朱門聽鼓笳口占謝髙簿送錦薰籠一種薰籠出錦機殷勤遣送到書幃自慚不是裁花手沾得仇香香滿衣和談雲翔送雙桂韻雙桂婆娑天上花殷勤分送士元家捷鈐果副聮韀祝謁謝當期榖旦差漁父岸芷汀蘭曲曲春緑蓑青箬老江濆倚船三弄東風惡吹斷巫山片片雲嵗朝轎中伊軋聲類櫓舟因感舊逰嵗朝伊軋上藍輿酷似當年在帝都柔櫓數聲楊柳外小舟逗曉過西湖蕭澥澥字汛之自號金精山民有竹外蛩吟藳按金精山在贑州寧都縣道書三十五福地也澥蓋贑之隱者讀史雁門翼處不身親成事安知非楚人何事當年良史筆嗇于一傳著功臣何事漢庭羞噲伍竟于鐘室起疑猜腰間刀劍少年氣尚出淮隂跨下來寫樂府昭君怨後古今題品幾詞人莫怨邊風兩鬢塵不是丹青曽汝誤琵琶到老一宫嬪昭君詞琵琶馬上去躊躇不是丹青偶誤渠會得吳宫西子事漢家此策未全疏讀秦紀築了連雲萬里城春風弦管醉中聽凄涼六籍寒灰裏宿得咸陽火一星讀文君白頭吟不顧此身輕夜馳晚年吟苦亦奚為從來簪折瓶沈事已在雙鬟暗合時戲效玉臺體薄幸拋人輕似梭憶君還似恨君多此心至竟真相憶到得恨時無奈何題東籬采菊圖倒樽醉卧菊籬邉此段風流亦偶然要識先生獨醒處平生心事在寒泉江上冬日效石湖田園雜詠體溪落洲荒水半篙枯楊兩岸冷蕭騷田家預辦來年事加得陂頭一丈髙睡起屋外一蟬鳴樹隂矮窗睡起靜沈沈破衣半解斜陽裏捫得蝨時多快心雪晴一雪曉來旋放晴瓦溝餘滴響中庭開窗已上三竿日滿嶺松梢醉未醒紹定庚寅紀事民困飢寒為盜賊却從樂處弄干戈大都郡邑初輕視不剪柔桑煩斧柯稻梁平地冦難防到處搬為塞上糧路險林深多脫榖東風緑偃滿山秧桑柘原頭緑正肥巢林春燕引雛飛前村不復炊煙起長是清明寒食時山花依舊發新叢溝澮池塘水自通前日人家無間斷頽牆破竈草萊中風動緑林千里亂星垂黑氣萬家災可憐墮在如今劫人禍天刑先後來冦中逃山三三兩兩伏茅茨有事難言只自知心破膽寒無處著風枝露葉亦驚疑才入林巒屏迹時此身自幸少人知嬰孩底苦不解事偏是怕時方始啼度九曲嶺﨑嶇石徑起江濱寸步登天苦瘦身行到三義開路口更從隔嶺問樵人客中月夜茅柴白白兩三杯客裏情懷旋旋開正喜江頭風月好却緣風月又愁來題或林尼院壁剪剪香雲翠影寒更無紅粉舊時痕秪因曽悟桃花偈間却春風夢幾畨提壺望斷碧雲無白衣一春長是獨醒時煩君卷舌東風裏休勸飢人食肉糜常山舟中兩岸人家峙兩樓中間一水過行舟倚篷碎擘桃花片亂擲江心試急流還安舟中亂蟬鳴咽夕陽天楊栁隂中幾客船岸下長江流浩浩誰知岸上有乾田過東平悼曽英甫前時來客此山居同醉梅邉酒幾壺不道後來成死别影堂吟落一燈孤韶口山家茅屋一區山四圍門前蕷圃帶茭池兒童似駭儒衣到兩兩三三壁縫窺避亂山家野人生長在髙山道路﨑嶇輕往還長是五更炊未熟已籠雞鴨送林間深村林麓冷颼颼滿眼風光總是愁日月羡渠雙喜鵲自跳自擲樹梢頭亂後過隆教寺紙窗破碎網蜘蛛古鐵香爐灰半無吟得詩成無筆在間尋枯炭壁間書亂定到邑蒙蒙野草自榮華破屋夾茅人賣茶滿巷門基帶磚石有時認得故人家蕭元之元之臨江人有鶴皋小藁塞馬歌答楊侍郎侍郎贈我六尺騟矯矯龍性天骨殊四蹄鐵立目電閃此其壯志思長驅牽來細觀問厮飬何物有此權竒狀為言此是古孫龍往往得之沙塞上森張霧鬛碨礌􅐢蕭稍駿尾搖朔風氷河蹙裂蹄甲鋭竹批兩耳雙方瞳向時淮西屢戰勝曽駝猛士敲金鐙帳前欲得不敢言空懸寶珠光照乘我有百發落雁鈚前年引滿射赤眉功成萬死不見賞歸騎驢子吟楚詞浮沈不作飛騰夢感公贈我意勤重旋蒙臯比作鞍韉更染青絲結韁鞚祗今中原刀斗鳴黃沙莽莽白骨腥願公急起掃欃槍百萬勳業一旦成我當乘此載前旌男兒報義要輕生送郡守張宗丞淮漢秋風起邊聲不可聽九重選良牧內地著郎星土沃桑麻長城荒草樹青民居多近水一一是江亭淚落鄉邦事民痍久未瘳官收隨畝劵人上運糧舟冦起征方急年飢糴未休更聞來取楮何以應需求本是詩書種躬耕寂寞濵傾家市鞍馬捐命犯風塵幕府差功級京華困旅貧不如歸去好依舊號詩人送季庸奉祠歸里昭代昌文化無人歎陸沈諸公自才傑吾道正山林紫蓋三年緑滄波萬里心長安豈無路塵起汙瑶簪别趙李曹蓮幕皆佳士如君淡素何圄空公事少官滿薦書多憂國關豐歉籌邉定戰和艱難别知己吾道欲滄波相别日雖淺相期意獨深那知成逺别何以慰孤吟旅鴈蘆花浦啼猿楓樹林明朝應此念把酒亦愁心聞德音入蜀蜀山萬里外聖主得遙聞歸使愁無路遺黎泣見君千年文物郡百戰虎狼羣才退慚司馬無因寫檄文行子行子家何處征帆楚岸開滄江還幾曲白鳥忽雙來别酒寒衝醒輕舟浪打回孤懷正牢落更聽暮猿哀立春日大雪作代簡招友山意久辭臘林根凍未消清尊如有待白髮正無聊嵗去梅花在春初柳絮飄同吟二三子折簡可能招西山道中省得離家日秋風吹我衣客吟詩句贈兒問幾時歸獨宿孤村館長懷舊竹扉羈愁不堪觸山雨暗斜暉清明省掃歸舟陸相半一徑險仍修沿溪去未休薜蘿春暗樹楊栁暮遮樓蕩槳漁舟駛寒鍾僧寺幽倚篷賒濁酒猶可洗詩愁傷廬長史居昔年傳得文標集每對青燈一起豫偶訪袁人尋古事舊時居處已民居還西里所居長恐山林計未成可能俯仰羡公卿鶴間不受雲拘束梅冷惟堪雪主盟北闕無書休悔出東皋有秫可歸耕鏡容漸改驚非昔猶喜傍人喚後生南浦泊舟重來江閣俯滄流一帶西山萬古愁漁叟不知來客意徑移船過北沙頭鄧允端允端字茂初臨江人涉江采芙蓉涉江采芙蓉欲采寄所思所思今何在望斷天一涯將花照秋水秋水清且漪行樂不得再日暮空淒悲古樂府梧桐葉落秋容早夜夜寒蛩泣衰草鳳叉金冷鬢雲凋可惜紅顔鏡中老音塵望斷沈雙鯉喚起相思何日已瑣窗人靜月輪孤六曲屏山冷如水過處士山齋一室蕭疏甚禪床印佛宗樹隂生石蘚茶鼎帶松風去去水千里行行山幾重佩琴與詩卷回首翠微中遣興得志心偏壯謀生事轉踈雨蓑春種藥月案夜抄書窮逹雖同道功名不定居慿誰報消息為問近何如題社友詩藁詩裏玄機海樣深散於章句斂於心會時要似庖丁刃妙處應同靖節琴韻勝想君言外得字新令我意邊尋癡人説夢終難信何日樽前取次吟秋興輕煙漠漠鎖晴嵐野水溪邊小駐驂日暮征鴻落何處似將風景過江南試箋撥開宿火起爐煙留得餘香伴夜禪落盡碧桃春不管東風却放栁飛綿徐從善從善字仲善古括人有月窗摘藳山中山中隱計成習懶自無營醉薄人生事貧諳世俗情床頭惟有易身外不須名千載知吾意無如向子平呈藝居生來稽古心文士獨知音世事隨年懶詩愁入鬢深夢拋三尺組書敵幾籯金何似謀清隱湖山風月林趙令尹知常軒利欲如雲翳碧虛已私克盡始還初人情多向巧中拙造物偏從密處踈冷笑金多堪作塢極知水到自成渠作詩曾廣名軒義應記南州孺子徐題雅溪必種軒之子風流邁晉人區區凡木肯同群數竿隨寓堪為友一日豈容無此君鏤月影憐虛處見吟秋聲愛靜中聞凌霄事業符髙趣看取年年長緑雲題碧雲禪房我輩偷間祗暫時買山應負昔年期客因覔句心自語僧説坐禪寒不知香滯濕雲看穗冷磬隨深澗覺聲遲小窗風掠梅花落清逐茶煙度竹籬初春霜曉初陽潔逰嵐散薄痕夜來殘雪盡新水滿漁村江上夕思蘆葦風輕晚色和秋光清潤入漁歌夕陽灔灔長江上最是歸舟載得多桃花飄盡悵然有感東風如幻已飛埃劉阮逡巡去不回惆悵香紅能幾日又隨流水到蓬萊書白雲石上精舍雲深流水繞世事良多松自老山中僧定幾朝昏門前石徑無人掃瓜洲别吳菊潭鄉國無書憶老親昨來邉報不堪聞江頭握手收征淚不喜留君喜别君宿山家好山長向屋頭橫竹建泉聲入甕鳴洗得芋魁留客坐旋吹竈火點榕明即事七十衰翁雪滿頭未談邊事涕先流更言近日無和糴縱是凶年亦免愁髙吉吉字幾伯廬陵人有懶真小集自序農服先疇之田畝工用髙曽之規矩思昔與李杜論交氣酣懷古歌芒碭之白雲弔梁山之秋草者非吾家逹夫乎受知黃太史而蜀天巴月之句令人雋永者非吾家子勉乎二公唐宋詩人冠冕余不肖少駑努力窺逺祖不能見窗壁歌嗚嗚嗣遺響固不敢不勉今老矣習懶成真耽吟成癖深灰撥火心手相應亦足以發敗囊欲癭雖多奚為刪其蕪穢姑以藉手見古人於他日云江萬里序曰詩本髙人逸士為之使王公大人見為屈膝者而近所見類猥甚不能於科舉者必曰詩往往持以走謁門户是反屈膝於王公大人不暇曽不若俯焉科舉之文猶是出其上逺甚至以科舉之文出其上是有甚出於所謂髙者之下矣髙君幾伯於為詩獨以其能於科舉者而能焉有子屬文文無滯思鷺洲之試其選在三顧容易而居此選哉吾先觀文次觀其詩也然鷺洲之學專為科舉而父子間其自今以所講於鷺洲者歸而詠情性真是不知手之舞之足之蹈之矣時至骨换此一時也吾却當先觀其詩次觀其文也有所思上山采芳桂不盈一掬金金色容易變零落傷我心欲以遺所思山遙水沈沈微物豈足貴但感嵗月深胡不歸二首客從暑中來清風入我户佩帶楚蘭香囊癭湘蘺句一笑忘形骸百年示肺腑烹鯉喚麴生勞苦竹深處逺遊焉倀倀歸夢應栩栩回首白雲飛下有白髮母白髮不堪剪兒去定何所頻頻占鵲喜嗷嗷待烏哺去時萱始華執手淚如雨萱華幾飄風月落啼杜宇煢煢蕩子妻空房守幽獨纒綿心緒長吞聲忍夜哭背燈耿孤影香冷雲幕低絶憐屋上烏替人嗚嗚啼試長沙胡邦明墨墨卿遡源流甄陶何逺矣系出五大夫殺身成人美䇿勳凌煙閣繇此著姓氏開國從膠東裂土封黑水平生好太玄握手忘汝爾一笑吐竒芬熏透詩人髓磨礲去圭角耐久堅莫比朋來自逺方陶泓管城子傳文章心印千古盡在是我老久絶交未忘抄録耳種樹書一編養生論盈紙煩卿為記之嵗晚吾事已秋窗雜興月朗衆星稀天髙萬籟息草露濕秋蟲悲悽聲唧唧隔窗聽鳴機寒光曙猶織微物固催人尤為貧女惜塞南塞南月冷烏夜飛茫茫曠野無枝棲防邊夜歌大風起鐵衣如氷凍不死功成那忍乞愛卿呌閽已獻龜形綺錢塘江邉烏欲棲小卿醉軟紅玉肌嚲雲溜簪困未醒山頭赤烏啄金餅春宵恨不長如年無情銀漏何濺濺起來一笑花嫣然快閣不跨揚州鶴來尋快閣鷗澄江依舊月落木幾畨秋山色橫青眼交情嘆白頭一聲何處笛我欲理歸舟雨肥雨肥蔬解甲坡暖竹添丁物態俱自得人癡終不醒獨行寧愧影真懶遂忘形巢燕歸何晚柴門風為扄送客之楚嘶騎隨鞭尾詩囊挂杖頭好風吹客去落日啓豫愁沙水搴沅芷邀春醉楚樓故人如問訊雲卧懶如鷗憶瀟湘故人竹好無多箇江清不覺深餘香隨去蝶軟語愛幽禽美景翻成恨經年不寄音長沙一樽酒得共幾回斟覔桂花金粟如來佛拈花微笑時煩君修月斧分我占秋枝且約黃香住莫令青女知夜窗清不寐剩讀幾篇詩庾嶺庾公陳迹已悠悠春到江南天盡頭依舊氷花照行客瘴煙原不犯清流江水悠悠去莫追箇中造道有深機我來豈為觀魚説人笑無鈎釣傍磯讀淵明傳誰為栖栖魯孔丘轍環天下果何求愛人學道行吾志束帶何傷見督郵巫山秀麗為四川之竒觀其一晴巫峽秋深景最幽山嵐潑翠淡煙浮看來不復成雲雨空鎖襄王舊日愁江湖後集卷十五
